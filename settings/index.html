<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#002870;--orange:#FF5539;--teal:#00B290;--blue:#1C38F5;--amber:#FFB600;
  --dark:#111827;--mid:#6B7280;--light:#F8F9FA;--white:#fff;--border:#E5E7EB;
  --r:8px;--r-sm:6px
}
body{font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:#F0F2F5;min-height:100vh}

/* Header */
.hdr{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;gap:16px}
.hdr-brand{font-size:18px;font-weight:900;color:#fff;letter-spacing:2px}
.hdr-brand span{color:var(--orange)}
.hdr-title{color:rgba(255,255,255,.7);font-size:13px}
.hdr-back{margin-left:auto;color:rgba(255,255,255,.6);font-size:12px;text-decoration:none;padding:5px 12px;border:1px solid rgba(255,255,255,.2);border-radius:5px}
.hdr-back:hover{background:rgba(255,255,255,.1)}

/* Layout */
.page{max-width:900px;margin:0 auto;padding:24px 16px}

/* Status banner */
.status-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r);margin-bottom:20px;font-size:12px;font-weight:500}
.status-bar.ok{background:#E1F5EE;color:#065F46;border:1px solid #A7F3D0}
.status-bar.warn{background:#FFF8E7;color:#92400E;border:1px solid #FDE68A}
.status-bar.err{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab-btn{padding:9px 16px;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--mid);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn.on{color:var(--orange);border-bottom-color:var(--orange)}
.tab-btn:hover:not(.on){color:var(--dark)}

/* Card */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px}
.card-sub{font-size:11px;color:var(--mid);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* Form fields */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy)}
.field input[type=password]{font-family:monospace;letter-spacing:.5px}
.field-note{font-size:10px;color:var(--mid);margin-top:3px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-navy{background:var(--navy);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--dark)}
.btn-orange{background:var(--orange);color:#fff}
.btn-danger{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
.btn-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}

/* Key reveal */
.key-wrap{position:relative}
.key-wrap input{padding-right:68px}
.key-wrap .reveal-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;padding:3px 8px;background:var(--light);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--mid)}

/* Status dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:#10B981}
.dot-red{background:#EF4444}
.dot-amber{background:var(--amber)}
.dot-grey{background:var(--mid)}

/* SKU grid */
.sku-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.sku-card{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;cursor:pointer;background:#fff;transition:all .15s}
.sku-card:hover{border-color:var(--mid)}
.sku-card.selected{border-color:var(--teal);background:#E1F5EE}
.sku-tag{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.sku-name{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:2px}
.sku-spec{font-size:10px;color:var(--mid)}

/* NAT AVG table */
.nat-table{width:100%;border-collapse:collapse;font-size:12px}
.nat-table th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--mid);border-bottom:2px solid var(--border)}
.nat-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.nat-table td input{width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;font-family:inherit}
.nat-table td input:focus{outline:none;border-color:var(--navy)}
.nat-table tr:hover td{background:var(--light)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

/* Logo preview */
.logo-preview{margin-top:8px;height:48px;display:flex;align-items:center;gap:10px}
.logo-preview img{height:40px;border:1px solid var(--border);border-radius:4px;padding:4px}
.colour-swatch{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);flex-shrink:0}

/* Connection test */
.conn-result{font-size:11px;padding:6px 10px;border-radius:4px;margin-top:6px;display:none}
.conn-result.ok{background:#E1F5EE;color:#065F46}
.conn-result.err{background:#FEE2E2;color:#991B1B}
/* Model catalogue */
.mc-table{width:100%;border-collapse:collapse;font-size:11px}
.mc-table th{text-align:left;padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--mid);border-bottom:2px solid var(--border);background:var(--light);white-space:nowrap;position:sticky;top:0;z-index:2}
.mc-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.mc-table tr:hover td{background:#FAFBFF}
.mc-table tr.disabled td{opacity:.45}
.mc-name{font-weight:700;color:var(--navy);font-size:11px}
.mc-vendor{font-size:10px;color:var(--mid)}
.mc-arch{font-size:9px;padding:1px 5px;border-radius:8px;background:#EFF3FF;color:var(--blue);font-weight:600;margin-right:2px;white-space:nowrap}
.mc-bench{font-size:11px;font-weight:600}
.mc-bench.hi{color:#065F46}.mc-bench.md{color:#92400E}.mc-bench.lo{color:var(--mid)}
.mc-lic{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600}
.mc-lic.open{background:#E1F5EE;color:#065F46}
.mc-lic.comm{background:#FFF8E7;color:#92400E}
.mc-toggle{width:28px;height:16px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block}
.mc-toggle.on{background:var(--teal)}
.mc-toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.mc-toggle.on::after{left:14px}
.staging-item{background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.staging-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0}
.mc-filter{padding:5px 9px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:#fff}
.mc-filter:focus{border-color:var(--navy)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">ATL<span>A</span>S</div>
  <div class="hdr-title">Settings</div>
  <a href="../index.html" class="hdr-back">&#8592; Portal</a>
</div>

<div class="page">

  <!-- Status bar -->
  <div class="status-bar warn" id="statusBar">
    <span class="dot dot-amber"></span>
    <span id="statusText">Checking configuration...</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn on" data-tab="company"   onclick="showTab('company')">&#127970; Company</button>
    <button class="tab-btn"    data-tab="keys"       onclick="showTab('keys')">&#128274; API Keys</button>
    <button class="tab-btn"    data-tab="catalogue"  onclick="showTab('catalogue')">&#129302; Model Catalogue</button>
    <button class="tab-btn"    data-tab="hardware"   onclick="showTab('hardware')">&#9881; Hardware &amp; Costs</button>
    <button class="tab-btn"    data-tab="natavg"     onclick="showTab('natavg')">&#127758; National Averages</button>
  </div>

  <!-- Tab content -->
  <div id="tab-content"></div>

  <!-- Save bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border);margin-top:8px">
    <div style="font-size:11px;color:var(--mid)">Settings stored in browser localStorage &nbsp;·&nbsp; Never sent to any server except the respective APIs</div>
    <div class="btn-row" style="margin:0">
      <button class="btn btn-danger" onclick="resetAll()">&#9888; Reset All</button>
      <button class="btn btn-navy" onclick="saveAll()">&#10003; Save Settings</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Supabase key format detection — legacy JWT keys (eyJ...) need Authorization: Bearer.
// New-format keys (sb_publishable_/sb_secret_) must NOT be sent in Authorization header
// or Supabase rejects with HTTP 401 ("not a JWT"). Send apikey header only for those.
// Reference: https://supabase.com/docs/guides/api/api-keys
function sbHeaders(key, extra){
  var h = { apikey: key }
  if (/^eyJ/.test(key||'')) h['Authorization'] = 'Bearer ' + key
  if (extra) Object.assign(h, extra)
  return h
}

// ── State ─────────────────────────────────────────────────────────────────────
var CFG = {}  // live config object, loaded on boot and mutated by UI

var HARDWARE_SKUS = [
  { id:'gb200nvl72', name:'NVIDIA GB200 NVL72',  tag:'Flagship',   color:'#00B290', tdp:120, gpus:72,  rack_units:1 },
  { id:'vrnvl72',    name:'NVIDIA VR NVL72',      tag:'Next-Gen',   color:'#00B290', tdp:120, gpus:72,  rack_units:1 },
  { id:'vrnvl4',     name:'NVIDIA VR NVL4',       tag:'Edge',       color:'#1C38F5', tdp:14,  gpus:4,   rack_units:1 },
  { id:'mi325x',     name:'AMD MI325X',            tag:'AMD Primary',color:'#FFB600', tdp:75,  gpus:8,   rack_units:1 },
  { id:'mi300x',     name:'AMD MI300X',            tag:'AMD Std',    color:'#FFB600', tdp:75,  gpus:8,   rack_units:1 },
  { id:'h100sxm',    name:'NVIDIA H100 SXM5',     tag:'Standard',   color:'#6B7280', tdp:70,  gpus:8,   rack_units:1 },
  { id:'a100sxm',    name:'NVIDIA A100 SXM4',     tag:'Standard',   color:'#6B7280', tdp:40,  gpus:8,   rack_units:1 }
]

var NAT_AVG_FIELDS = [
  { key:'power_tariff_inr',      label:'Industrial Power Tariff',   unit:'Rs/kWh',       default:'7.50',  hint:'National avg ~Rs 7.5/unit' },
  { key:'water_cost_inr_kl',     label:'Industrial Water Cost',      unit:'Rs/kL',        default:'45.00', hint:'National avg ~Rs 45/kL' },
  { key:'land_cost_lakh_acre',   label:'Industrial Land Cost',       unit:'Rs lakh/acre', default:'80.00', hint:'National avg ~Rs 80L/acre' },
  { key:'engineer_salary_lakh',  label:'Software/AI Engineer Salary',unit:'Rs lakh/yr',   default:'12.00', hint:'National avg ~Rs 12L/year' },
  { key:'civil_cost_index',      label:'Civil Construction Index',   unit:'base 100',     default:'100',   hint:'100 = national baseline' },
  { key:'construction_cr_mw',    label:'DC Civil Cost',              unit:'Rs Cr/MW',     default:'8.00',  hint:'Civil+structural per MW DC' }
]

var GEMINI_MODELS = [
  { id:'gemini-2.5-flash',       label:'Gemini 2.5 Flash (recommended)' },
  { id:'gemini-2.0-flash',       label:'Gemini 2.0 Flash' },
  { id:'gemini-2.0-flash-lite',  label:'Gemini 2.0 Flash Lite' },
  { id:'gemini-1.5-flash',       label:'Gemini 1.5 Flash' },
  { id:'gemini-2.0-flash-lite',  label:'Gemini 2.0 Flash Lite (scraping)' }
]

// ── Boot ──────────────────────────────────────────────────────────────────────
function uploadLogo(input, key, previewId) {
  var file = input.files && input.files[0]
  if (!file) return
  var reader = new FileReader()
  reader.onload = function(e) {
    var dataUrl = e.target.result
    CFG[key] = dataUrl
    // Update the URL text input to show it's been uploaded
    var inp = document.getElementById('cfg-' + key)
    if (inp) inp.value = '(uploaded: ' + file.name + ')'
    // Update preview
    var prev = document.getElementById(previewId + '-preview')
    if (prev) {
      var img = document.createElement('img')
      img.src = dataUrl
      img.style.cssText = 'height:40px;border:1px solid #E5E7EB;border-radius:4px;padding:4px'
      prev.innerHTML = ''
      prev.appendChild(img)
    }
    showToast('✓ Logo uploaded: ' + file.name)
  }
  reader.readAsDataURL(file)
}


// ── Model Catalogue tab ───────────────────────────────────────────────────────
var MC_ROWS = []
var MC_STAGING = []
var MC_LOAD_STATE = ''
var MC_FILTER_TEXT   = ''
var MC_FILTER_DOMAIN = ''
var MC_FILTER_SPEC = ''
var MC_FILTER_COUNTRY = ''
var MC_FILTER_LEVEL = ''
var MC_FILTER_REASONING = ''
var MC_FILTER_VENDOR = ''
var MC_FILTER_ENABLED = 'all'
var MC_FILTER_REVIEW = false

async function loadModelCatalogue() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) {
    MC_LOAD_STATE = 'no-creds'
    return
  }
  MC_LOAD_STATE = 'loading'
  try {
    var r = await fetch(url + '/rest/v1/model_catalogue?order=vendor.asc,name.asc&limit=200', {
      headers: sbHeaders(key)
    })
    if (r.ok) {
      MC_ROWS = await r.json()
      console.log('[Catalogue] loaded', MC_ROWS.length, 'models')
    } else {
      MC_LOAD_STATE = 'error'
      return
    }
    var r2 = await fetch(url + '/rest/v1/model_catalogue_staging?status=eq.pending&order=created_at.desc&limit=50', {
      headers: sbHeaders(key)
    })
    if (r2.ok) MC_STAGING = await r2.json()
    MC_LOAD_STATE = 'loaded'
  } catch(e) {
    console.warn('[Catalogue] load error:', e.message)
    MC_LOAD_STATE = 'error'
  }
}

function renderCatalogue() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''

  // No credentials
  if (!url || !key) {
    return '<div class="card">'
      + '<div class="card-title">Model Catalogue</div>'
      + '<div style="background:#FFF8E7;border:1px solid var(--amber);border-radius:8px;padding:16px 18px;font-size:12px;color:#92400E">'
      + '&#9888; Supabase credentials not configured. Go to <strong>API Keys</strong> tab and enter your Supabase URL and key, then save.'
      + '</div></div>'
  }

  // Not yet loaded — trigger load and show spinner
  if (MC_LOAD_STATE === 'idle' || MC_LOAD_STATE === '') {
    MC_LOAD_STATE = 'loading'
    loadModelCatalogue().then(function() {
      var el = document.getElementById('tab-content')
      if (el && document.querySelector('.tab-btn[data-tab="catalogue"]') &&
          document.querySelector('.tab-btn[data-tab="catalogue"].on')) {
        el.innerHTML = renderCatalogue()
      }
    })
    return '<div class="card"><div class="card-title">Model Catalogue</div>'
      + '<div style="padding:32px;text-align:center;color:var(--mid);font-size:12px">'
      + '<div style="font-size:32px;margin-bottom:10px">⏳</div>'
      + '<div style="font-weight:600;color:var(--navy);margin-bottom:4px">Loading model catalogue from Supabase...</div>'
      + '<div style="font-size:11px">Fetching from model_catalogue table</div>'
      + '</div></div>'
  }

  // Still in flight
  if (MC_LOAD_STATE === 'loading') {
    return '<div class="card"><div class="card-title">Model Catalogue</div>'
      + '<div style="padding:32px;text-align:center;color:var(--mid);font-size:12px">'
      + '<div style="font-size:32px;margin-bottom:10px">⏳</div>'
      + '<div style="font-weight:600;color:var(--navy)">Loading...</div>'
      + '</div></div>'
  }

  // Error
  if (MC_LOAD_STATE === 'error') {
    return '<div class="card"><div class="card-title">Model Catalogue</div>'
      + '<div style="background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:14px 18px;font-size:12px;color:#991B1B">'
      + '&#10060; Failed to load from Supabase. Check your credentials and that the model_catalogue table exists. '
      + '<button onclick="MC_LOAD_STATE=\'idle\';showTab(\'catalogue\')" style="margin-left:8px;padding:3px 10px;background:#991B1B;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">Retry</button>'
      + '</div></div>'
  }

  // No-creds state (caught after initial load attempt)
  if (MC_LOAD_STATE === 'no-creds') {
    return '<div class="card"><div class="card-title">Model Catalogue</div>'
      + '<div style="background:#FFF8E7;border:1px solid var(--amber);border-radius:8px;padding:14px 18px;font-size:12px;color:#92400E">'
      + '&#9888; Supabase credentials not set. Configure in <strong>API Keys</strong> tab first. '
      + '<button onclick="MC_LOAD_STATE=\'idle\';showTab(\'catalogue\')" style="margin-left:8px;padding:3px 10px;background:#92400E;color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">Retry</button>'
      + '</div></div>'
  }

  // ── Loaded — render the table ─────────────────────────────────────────────
  var vendors = Array.from(new Set(MC_ROWS.map(function(r){ return r.vendor }))).sort()
  var archetypes = ['all','coding','document','audio','video','vision','multimodal','embedding','reranking','general','indic']

  function benchColor(v) { return !v ? 'lo' : v >= 80 ? 'hi' : v >= 65 ? 'md' : 'lo' }
  function licClass(l) {
    return ['Apache2','MIT','CC-BY','Gemma','Llama-Community'].includes(l||'') ? 'open' : 'comm'
  }

  var domains   = ['','general','code','indic','geospatial','biomedical','finance','legal','aerospace','industrial','world_model']
  var specs     = ['','text_gen','reasoning','vlm','embed','audio_asr','audio_tts','img_gen','video_gen','geo_vision','timeseries','anomaly','world_sim','med_seg']
  var countries = Array.from(new Set(MC_ROWS.map(function(r){ return r.country_origin }).filter(Boolean))).sort()
  var levels    = ['','small','medium','large','frontier']

  function domainLabel(d) {
    return {general:'General',code:'Code',indic:'Indic',geospatial:'Geospatial',biomedical:'Biomedical',
      finance:'Finance',legal:'Legal',aerospace:'Aerospace',industrial:'Industrial',world_model:'World Model'}[d] || d || '—'
  }
  function levelBadge(l) {
    var c={small:'#6B7280',medium:'#0891B2',large:'var(--navy)',frontier:'var(--orange)'}[l]||'#aaa'
    return l ? '<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:'+c+';color:#fff;font-weight:600">'+l+'</span>' : '—'
  }
  function countryFlag(c) {
    return ({US:'🇺🇸',CN:'🇨🇳',IN:'🇮🇳',FR:'🇫🇷',DE:'🇩🇪',AE:'🇦🇪',CA:'🇨🇦',UK:'🇬🇧'}[c]||'🌐')+' '+(c||'')
  }

  var rows = MC_ROWS.filter(function(r) {
    if (MC_FILTER_TEXT) {
      var q = MC_FILTER_TEXT.toLowerCase()
      var hit = (r.name||'').toLowerCase().includes(q)
        || (r.family_name||'').toLowerCase().includes(q)
        || (r.vendor||'').toLowerCase().includes(q)
        || (r.domain||'').toLowerCase().includes(q)
        || (r.specialisation||[]).some(function(s){ return s.toLowerCase().includes(q) })
        || (r.country_origin||'').toLowerCase().includes(q)
      if (!hit) return false
    }
    if (MC_FILTER_DOMAIN    && r.domain !== MC_FILTER_DOMAIN) return false
    if (MC_FILTER_SPEC      && !(r.specialisation||[]).includes(MC_FILTER_SPEC)) return false
    if (MC_FILTER_COUNTRY   && r.country_origin !== MC_FILTER_COUNTRY) return false
    if (MC_FILTER_LEVEL     && r.level !== MC_FILTER_LEVEL) return false
    if (MC_FILTER_REASONING === 'yes' && !r.is_reasoning) return false
    if (MC_FILTER_REASONING === 'no'  &&  r.is_reasoning) return false
    if (MC_FILTER_VENDOR    && r.vendor !== MC_FILTER_VENDOR) return false
    if (MC_FILTER_ENABLED   === 'enabled'  && !r.enabled) return false
    if (MC_FILTER_ENABLED   === 'disabled' &&  r.enabled) return false
    if (MC_FILTER_REVIEW    && !r.review_needed) return false
    return true
  })

  var reviewCount = MC_ROWS.filter(function(r){ return r.review_needed }).length

  var html = '<div class="card">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    + '<div class="card-title">Model Catalogue <span style="font-size:11px;font-weight:400;color:var(--mid)">'+MC_ROWS.length+' models · '+rows.length+' shown</span></div>'

    + '</select>'
    + '<select class="mc-filter" onchange="MC_FILTER_SPEC=this.value;refreshCatalogue()">'

    + '</select>'
    + '<select class="mc-filter" onchange="MC_FILTER_LEVEL=this.value;refreshCatalogue()">'
    + levels.map(function(l){ return '<option value="'+l+'"'+(l===MC_FILTER_LEVEL?' selected':'')+'>'+(l||'All levels')+'</option>' }).join('')
    + '</select>'
    + '<select class="mc-filter" onchange="MC_FILTER_REASONING=this.value;refreshCatalogue()">'
    + [['','All models'],['yes','Reasoning only'],['no','Non-reasoning']].map(function(v){ return '<option value="'+v[0]+'"'+(v[0]===MC_FILTER_REASONING?' selected':'')+'>'+v[1]+'</option>' }).join('')
    + '</select>'
    + '<select class="mc-filter" onchange="MC_FILTER_ENABLED=this.value;refreshCatalogue()">'
    + [['all','All status'],['enabled','Enabled'],['disabled','Disabled']].map(function(v){ return '<option value="'+v[0]+'"'+(v[0]===MC_FILTER_ENABLED?' selected':'')+'>'+v[1]+'</option>' }).join('')
    + '</select>'
    + '</div>'
    + '<div style="display:flex;gap:6px;margin-bottom:10px">'
    + '<button class="btn btn-outline" onclick="MC_FILTER_TEXT=MC_FILTER_DOMAIN=MC_FILTER_SPEC=MC_FILTER_COUNTRY=MC_FILTER_LEVEL=MC_FILTER_REASONING=MC_FILTER_VENDOR=\'\';MC_FILTER_ENABLED=\'all\';MC_FILTER_REVIEW=false;refreshCatalogue()" style="font-size:11px;padding:4px 10px">&#10005; Clear</button>'
    + (MC_FILTER_REVIEW ? '<button class="btn btn-outline" style="font-size:11px;padding:4px 10px;background:#FEF3C7" onclick="MC_FILTER_REVIEW=false;refreshCatalogue()">Showing ⚠ only — clear</button>' : '')
    + '<div style="flex:1"></div>'
    + '<button class="btn btn-outline" onclick="MC_LOAD_STATE=\'idle\';MC_ROWS=[];MC_STAGING=[];showTab(\'catalogue\')" style="font-size:11px;padding:4px 10px">&#8635; Reload</button>'
    + '<button class="btn btn-teal" onclick="saveCatalogueChanges()" style="font-size:11px;padding:4px 12px">&#8593; Sync</button>'
    + '<button class="btn btn-outline" onclick="addModelRow()" style="font-size:11px;padding:4px 12px">+ Add</button>'
    + '</div>'

  if (!rows.length) {
    html += '<div style="padding:20px;text-align:center;color:var(--mid);font-size:12px">No models match the current filters.</div>'
  } else {
    html += '<div style="overflow-x:auto;max-height:480px;overflow-y:auto">'
      + '<table class="mc-table"><tr>'
      + '<th>On</th><th>Model</th><th>Domain</th><th>Specialisation</th>'
      + '<th>Params</th><th>Level</th><th>Country</th><th>Reasoning</th>'
      + '<th>License</th><th>⚠</th><th></th></tr>'
      + rows.map(function(r) {
          var i = MC_ROWS.indexOf(r)
          return '<tr class="'+(r.enabled?'':'disabled')+(r.review_needed?' style="background:#FFFBEB"':'')+'">'

            + '<div class="mc-vendor" style="font-size:9px">'+esc(r.family_name||r.vendor||'')+'</div></td>'
            + '<td style="font-size:11px">'+domainLabel(r.domain||'')+'</td>'
            + '<td>'+(r.specialisation||[]).slice(0,2).map(function(s){ return '<span class="mc-arch">'+esc(s)+'</span>' }).join('')+'</td>'
            + '<td style="font-size:11px;white-space:nowrap">'+(r.params_b?r.params_b+'B':'—')+'</td>'
            + '<td>'+levelBadge(r.level)+'</td>'
            + '<td style="font-size:11px">'+(r.country_origin?countryFlag(r.country_origin):'—')+'</td>'
            + '<td style="text-align:center">'+(r.is_reasoning?'🧠':'')+'</td>'
            + '<td style="font-size:10px;color:var(--mid)">'+esc(r.license_type||r.license||'—')+'</td>'
            + '<td style="text-align:center">'+(r.review_needed?'<span title="'+esc(r.review_note||'')+'">⚠</span>':'')+'</td>'

  }
  html += '</div>'

  // Staging queue
  html += '<div class="card">'
    + '<div class="card-title">Staging Queue <span style="font-size:11px;font-weight:400;color:var(--mid)">('+ MC_STAGING.length +' pending)</span></div>'
    + '<div class="card-sub">New models detected by Intel Scraper. Approve to add to catalogue, reject to dismiss.</div>'
  if (!MC_STAGING.length) {
    html += '<div style="padding:12px;text-align:center;color:var(--mid);font-size:12px;background:var(--light);border-radius:6px">No pending items</div>'
  } else {
    MC_STAGING.forEach(function(item) {
      html += '<div class="staging-item">'
        + '<div style="flex:1">'
        + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">'
        + '<span class="staging-badge" style="background:#FFF8E7;color:#92400E">Pending</span>'
        + '<span style="font-size:12px;font-weight:700;color:var(--navy)">'+esc(item.detected_name||'Unknown')+'</span>'
        + (item.detected_vendor?'<span style="font-size:10px;color:var(--mid)">'+esc(item.detected_vendor)+'</span>':'')
        + (item.detected_params_b?'<span style="font-size:10px;color:var(--mid)">'+item.detected_params_b+'B</span>':'')
        + '</div>'
        + (item.source_title?'<div style="font-size:10px;color:var(--mid)">'+esc(item.source_title)+'</div>':'')
        + '</div>'
        + '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0">'
        + '<button onclick="approveStaging(\''+esc(item.id)+'\')" class="btn btn-teal" style="font-size:11px;padding:5px 10px">&#10003; Approve</button>'
        + '<button onclick="rejectStaging(\''+esc(item.id)+'\')" class="btn btn-outline" style="font-size:11px;padding:5px 10px">&#10005; Reject</button>'
        + '</div></div>'
    })
  }
  html += '</div>'
  return html
}

function refreshCatalogue() {
  var el = document.getElementById('tab-content')
  if (el) el.innerHTML = renderCatalogue()
}

function toggleModelEnabled(idx) {
  if (MC_ROWS[idx]) {
    MC_ROWS[idx].enabled = !MC_ROWS[idx].enabled
    refreshCatalogue()
  }
}

function toggleFeatured(idx, val) {
  if (MC_ROWS[idx]) MC_ROWS[idx].featured = val
}

function addModelRow() {
  MC_ROWS.unshift({
    id: 'new-' + Date.now(),
    name: '', vendor: '', family_name: '',
    domain: 'general', specialisation: ['text_gen'],
    country_origin: '', level: 'small',
    params_b: null, context_length_k: null,
    gpu_memory_gb: {}, license_type: 'Apache-2.0',
    is_reasoning: false, is_multimodal: false,
    review_needed: false, review_note: null,
    enabled: true, featured: false, source: 'manual'
  })
  refreshCatalogue()
  showToast('New model row added — edit and sync')
}

function editModelRow(idx) {
  var r = MC_ROWS[idx]
  if (!r) return
  var newName = prompt('Model name:', r.name || '')
  if (newName === null) return
  r.name = newName.trim()

  var newFamily = prompt('Family name (e.g. Llama, Qwen, Sarvam):', r.family_name || r.vendor || '')
  if (newFamily !== null) r.family_name = newFamily.trim()

  var newDomain = prompt('Domain:\ngeneral | code | indic | geospatial | biomedical | finance | legal | aerospace | industrial | world_model', r.domain || 'general')
  if (newDomain !== null) r.domain = newDomain.trim()

  var newSpec = prompt('Specialisations (comma-separated):\ntext_gen, reasoning, vlm, embed, audio_asr, audio_tts, img_gen, video_gen, geo_vision, timeseries, anomaly, world_sim, med_seg', (r.specialisation||[]).join(', '))
  if (newSpec !== null) r.specialisation = newSpec.split(',').map(function(s){ return s.trim() }).filter(Boolean)

  var newCountry = prompt('Country of origin (US/CN/IN/FR/DE/AE/CA):', r.country_origin || '')
  if (newCountry !== null) r.country_origin = newCountry.trim().toUpperCase()

  var newLevel = prompt('Level (small/medium/large/frontier):', r.level || 'small')
  if (newLevel !== null) r.level = newLevel.trim()

  var newParams = prompt('Parameters (billions):', r.params_b || '')
  if (newParams !== null) r.params_b = parseFloat(newParams) || null

  var newLic = prompt('License type:', r.license_type || r.license || 'Apache-2.0')
  if (newLic !== null) r.license_type = newLic.trim()

  var isReasoning = confirm('Is this a reasoning/thinking model? (OK=yes, Cancel=no)')
  r.is_reasoning = isReasoning

  if (r.review_needed) {
    var clearReview = confirm('Mark review as resolved? (OK=yes)')
    if (clearReview) { r.review_needed = false; r.review_note = null }
  }

  refreshCatalogue()
  showToast('Row updated — sync to save')
}

async function saveCatalogueChanges() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) { showToast('Configure Supabase first', 'error'); return }
  showToast('Syncing catalogue to Supabase...')
  var errors = 0
  for (var i = 0; i < MC_ROWS.length; i++) {
    var row = MC_ROWS[i]
    if (!row.id || row.id.startsWith('new-')) continue // new rows need full data first
    try {
      var r = await fetch(url + '/rest/v1/model_catalogue?id=eq.' + encodeURIComponent(row.id), {
        method: 'PATCH',
        headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'return=minimal'}),
        body: JSON.stringify({
          enabled:        row.enabled,
          featured:       row.featured,
          name:           row.name,
          vendor:         row.vendor,
          family_name:    row.family_name,
          domain:         row.domain,
          specialisation: row.specialisation,
          country_origin: row.country_origin,
          level:          row.level,
          is_reasoning:   row.is_reasoning || false,
          is_multimodal:  row.is_multimodal || false,
          license_type:   row.license_type || row.license,
          review_needed:  row.review_needed || false,
          review_note:    row.review_note || null,
          params_b:       row.params_b,
          updated_at:     new Date().toISOString()
        })
      })
      if (!r.ok) errors++
    } catch(e) { errors++ }
  }
  if (errors === 0) showToast('\u2713 Catalogue synced to Supabase')
  else showToast('Synced with ' + errors + ' errors — check console', 'error')
}

async function approveStaging(id) {
  var item = MC_STAGING.find(function(i){ return i.id === id })
  if (!item) return
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) { showToast('Configure Supabase first', 'error'); return }
  // Move to model_catalogue
  try {
    var newRow = {
      name: item.detected_name, vendor: item.detected_vendor || '',
      params_b: item.detected_params_b, context_length_k: item.detected_context_k,
      license: item.detected_license,
      bench_mmlu: (item.detected_benchmarks||{}).mmlu || null,
      bench_humaneval: (item.detected_benchmarks||{}).humaneval || null,
      source: 'scraper_detected', enabled: true, featured: false
    }
    var r1 = await fetch(url + '/rest/v1/model_catalogue', {
      method: 'POST',
      headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(newRow)
    })
    if (r1.ok) {
      // Update staging status
      await fetch(url + '/rest/v1/model_catalogue_staging?id=eq.' + encodeURIComponent(id), {
        method: 'PATCH',
        headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'return=minimal'}),
        body: JSON.stringify({ status: 'approved', reviewed_at: new Date().toISOString() })
      })
      MC_STAGING = MC_STAGING.filter(function(i){ return i.id !== id })
      await loadModelCatalogue()
      refreshCatalogue()
      showToast('\u2713 Model approved and added to catalogue')
    }
  } catch(e) { showToast('Approve failed: ' + e.message, 'error') }
}

async function rejectStaging(id) {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) return
  try {
    await fetch(url + '/rest/v1/model_catalogue_staging?id=eq.' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'return=minimal'}),
      body: JSON.stringify({ status: 'rejected', reviewed_at: new Date().toISOString() })
    })
    MC_STAGING = MC_STAGING.filter(function(i){ return i.id !== id })
    refreshCatalogue()
    showToast('Model rejected')
  } catch(e) { showToast('Reject failed: ' + e.message, 'error') }
}

function boot() {
  try { CFG = JSON.parse(localStorage.getItem('atlas_global_cfg') || '{}') } catch(e) { CFG = {} }
  showTab('company')
  updateStatusBar()
  // Load additional fields from Supabase (async, fills gaps from root index)
  loadFromSupabase()
  // Model catalogue loads lazily when tab is opened (not on every boot)
}

async function loadFromSupabase() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) return
  try {
    var r = await fetch(
      url + '/rest/v1/app_config?key=in.(brand_name,brand_tagline,brand_logo_url,brand_doc_logo_url,brand_colour_primary,brand_colour_accent,parent_company_name,parent_company_website,parent_company_addr1,parent_company_addr2,parent_company_city,parent_company_country,local_company_name,local_company_addr1,local_company_addr2,local_company_city,doc_author_default,doc_prefix,nat_avg_power_tariff_inr,nat_avg_water_cost_inr_kl,nat_avg_land_cost_lakh_acre,nat_avg_engineer_salary_lakh,nat_avg_civil_cost_index,nat_avg_construction_cr_mw,atlasai_primary_model,gpu_skus)&limit=50',
      { headers: sbHeaders(key) }
    )
    if (!r.ok) return
    var rows = await r.json()
    var na = CFG.national_averages || {}
    var changed = false
    rows.forEach(function(row) {
      var km = {
        'brand_name': 'companyName', 'brand_tagline': 'companyTagline',
        'brand_logo_url': 'logoUrl', 'brand_doc_logo_url': 'docLogoUrl',
        'brand_colour_primary': 'brandPrimary', 'brand_colour_accent': 'brandAccent',
        'parent_company_name': 'parentCompanyName', 'parent_company_website': 'parentCompanyWebsite',
        'parent_company_addr1': 'parentAddr1', 'parent_company_addr2': 'parentAddr2',
        'parent_company_city': 'parentCity', 'parent_company_country': 'parentCountry',
        'local_company_name': 'localCompanyName', 'local_company_addr1': 'localAddr1',
        'local_company_addr2': 'localAddr2', 'local_company_city': 'localCity',
        'doc_author_default': 'docAuthor', 'doc_prefix': 'docPrefix',
        'atlasai_primary_model': 'geminiTextModel'
      }
      if (km[row.key] && !CFG[km[row.key]]) { CFG[km[row.key]] = row.value; changed = true }
      if (row.key.startsWith('nat_avg_')) {
        var k = row.key.replace('nat_avg_', '')
        if (na[k] === undefined) { na[k] = parseFloat(row.value) || 0; changed = true }
      }
      if (row.key === 'gpu_skus' && !CFG.gpu_skus) {
        try { CFG.gpu_skus = JSON.parse(row.value); changed = true } catch(e) {}
      }
      if (row.key.startsWith('hw_cost_') && CFG.hardware_costs === undefined) {
        var hc = CFG.hardware_costs || {}
        hc[row.key.replace('hw_cost', '')] = parseFloat(row.value) || 0
        CFG.hardware_costs = hc; changed = true
      }
    })
    if (Object.keys(na).length) CFG.national_averages = na
    if (changed) {
      try { localStorage.setItem('atlas_global_cfg', JSON.stringify(CFG)) } catch(e) {}
      // Re-render active tab to show loaded values
      var activeBtn = document.querySelector('.tab-btn.on')
      if (activeBtn) showTab(activeBtn.dataset.tab)
      updateStatusBar()
    }
  } catch(e) {
    console.warn('[Settings] Load from Supabase failed:', e.message)
  }
}

function updateStatusBar() {
  var bar  = document.getElementById('statusBar')
  var text = document.getElementById('statusText')
  var hasGemini = !!(CFG.key_gemini || CFG.geminiKey)
  var hasSB     = !!(CFG.sbUrl && CFG.sbKey)
  var hasCompany = !!CFG.companyName

  if (hasGemini && hasSB && hasCompany) {
    bar.className = 'status-bar ok'
    bar.querySelector('.dot').className = 'dot dot-green'
    text.textContent = 'Configured \u2014 Gemini key set \u00b7 Supabase connected \u00b7 Company set'
  } else {
    var missing = []
    if (!hasGemini)  missing.push('Gemini API key')
    if (!hasSB)      missing.push('Supabase credentials')
    if (!hasCompany) missing.push('Company name')
    bar.className = 'status-bar warn'
    bar.querySelector('.dot').className = 'dot dot-amber'
    text.textContent = 'Missing: ' + missing.join(', ')
  }
}

// ── Tab rendering ─────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('on', b.dataset.tab === tab)
  })
  var el = document.getElementById('tab-content')
  switch(tab) {
    case 'company':   el.innerHTML = renderCompany();   break
    case 'keys':      el.innerHTML = renderKeys();      break
    case 'models':    el.innerHTML = renderModels();    break
    case 'hardware':  el.innerHTML = renderHardware();  break
    case 'natavg':    el.innerHTML = renderNatAvg();    break
    case 'catalogue': el.innerHTML = renderCatalogue(); break

  }
}

function field(label, key, type, placeholder, note, extra) {
  var val = CFG[key] !== undefined ? CFG[key] : ''
  var inputType = type === 'password' ? 'text' : (type || 'text')
  var style = type === 'password' ? 'font-family:monospace' : ''
  return '<div class="field">'
    + '<label>' + label + '</label>'
    + (type === 'password'
      ? '<div class="key-wrap"><input type="text" id="cfg-' + key + '" value="' + esc(String(val)) + '" placeholder="' + esc(placeholder||'') + '" style="' + style + '" oninput="live(\'' + key + '\',this.value)">'
        + '<button class="reveal-btn" onclick="toggleReveal(\'' + key + '\')">show</button></div>'
      : '<input type="' + inputType + '" id="cfg-' + key + '" value="' + esc(String(val)) + '" placeholder="' + esc(placeholder||'') + '" oninput="live(\'' + key + '\',this.value)">')
    + (note ? '<div class="field-note">' + note + '</div>' : '')
    + '</div>'
}

function select(label, key, options, note) {
  var val = CFG[key] !== undefined ? CFG[key] : ''
  var opts = options.map(function(o) {
    return '<option value="' + esc(o.v) + '"' + (o.v === val ? ' selected' : '') + '>' + esc(o.l) + '</option>'
  }).join('')
  return '<div class="field"><label>' + label + '</label>'
    + '<select id="cfg-' + key + '" onchange="live(\'' + key + '\',this.value)">' + opts + '</select>'
    + (note ? '<div class="field-note">' + note + '</div>' : '')
    + '</div>'
}

// ── Tab: Company ──────────────────────────────────────────────────────────────

// SKU helpers
function setSkuPrimary(i) {
  var skus = CFG.gpu_skus || []
  if (skus[i]) { CFG.primaryGpuSku = skus[i].id; showTab('hardware') }
}
function updateSku(i, field, val) {
  var skus = CFG.gpu_skus || []
  if (skus[i]) skus[i][field] = val
  CFG.gpu_skus = skus
}
function removeSku(i) {
  var skus = CFG.gpu_skus || []
  skus.splice(i, 1)
  CFG.gpu_skus = skus
  showTab('hardware')
}
function addSku() {
  var skus = CFG.gpu_skus || []
  skus.push({ id:'new_sku', vendor:'', name:'New SKU', type:'GPU', tdp_w:0, fp8_tflops:0, usd_per_unit:0, gpus_per_chassis:8, cooling:'dlc', tier:'standard', enabled:true })
  CFG.gpu_skus = skus
  showTab('hardware')
}
function liveHC(key, val) {
  var hc = CFG.hardware_costs || {}
  hc[key] = val
  CFG.hardware_costs = hc
}
async function saveSkus() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) { showToast('Configure Supabase first', 'error'); return }
  try {
    var r = await fetch(url + '/rest/v1/app_config', {
      method: 'POST',
      headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify([{ key: 'gpu_skus', value: JSON.stringify(CFG.gpu_skus || []) }])
    })
    if (r.ok) showToast('\u2713 GPU SKUs saved to Supabase')
    else showToast('Save failed: HTTP ' + r.status, 'error')
  } catch(e) { showToast('Save failed: ' + e.message, 'error') }
}
async function saveHardwareCosts() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) { showToast('Configure Supabase first', 'error'); return }
  var hc = CFG.hardware_costs || {}
  var rows = Object.keys(hc).map(function(k) { return { key: 'hw_cost' + k, value: String(hc[k]) } })
  if (!rows.length) { showToast('No hardware costs to save', 'error'); return }
  try {
    var r = await fetch(url + '/rest/v1/app_config', {
      method: 'POST',
      headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(rows)
    })
    if (r.ok) showToast('\u2713 Hardware costs saved to Supabase')
    else showToast('Save failed: HTTP ' + r.status, 'error')
  } catch(e) { showToast('Save failed: ' + e.message, 'error') }
}

      + '<td style="color:var(--mid)">' + esc(f.unit) + '</td>'
      + '<td><input type="number" step="0.01" id="na-' + f.key + '" value="' + esc(String(val)) + '" onchange="liveNatAvg(\'' + f.key + '\',this.value)"></td>'
      + '<td style="color:var(--mid);font-size:10px">' + esc(f.hint) + '</td>'
      + '</tr>'
  })
  html += '</table>'
    + '<div class="btn-row" style="margin-top:12px">'
    + '<button class="btn btn-teal" onclick="syncNatAvgToSupabase()">&#8593; Sync to Supabase</button>'
    + '<span style="font-size:11px;color:var(--mid)">Writes nat_avg_* keys to app_config table so all browsers pick up the same values</span>'
    + '</div>'
    + '</div>'
  return html
}

// ── Tab: Territory Config ─────────────────────────────────────────────────────
function renderTerritory() {
  var tc = CFG.territory_config || {}
  function tcField(label, key, placeholder, note) {
    var val = tc[key] !== undefined ? tc[key] : ''
    return '<div class="field"><label>' + label + '</label>'
      + '<input type="number" step="0.01" id="tc-' + key + '" value="' + esc(String(val)) + '" placeholder="' + esc(placeholder||'') + '" onchange="liveTerritoryConfig(\'' + key + '\',this.value)">'
      + (note ? '<div class="field-note">' + note + '</div>' : '')
      + '</div>'
  }
  return '<div class="card">'
    + '<div class="card-title">Territory-Level Overrides</div>'
    + '<div class="card-sub">Override national averages for the current territory. Leave blank to use S1 extracted data or national averages. These are applied in FM cost calculations.</div>'
    + '<div class="field-row">'
    + tcField('Power Tariff', 'power_tariff_inr', 'Rs/kWh e.g. 4.5', 'Overrides S1 extracted tariff and national average')
    + tcField('Civil Cost Index', 'civil_cost_index', 'e.g. 85 (national = 100)', 'Relative to national baseline of 100')
    + '</div>'
    + '<div class="field-row">'
    + tcField('Manpower Cost Multiplier', 'manpower_mult', 'e.g. 0.75 (national = 1.0)', '1.0 = national avg, 0.75 = 25% cheaper')
    + tcField('State GST Rate (%)', 'gst_rate', 'e.g. 18', 'Applied to programme cost calculations')
    + '</div>'
    + '<div class="field-row">'
    + tcField('Land Cost Rs lakh/acre', 'land_cost_lakh_acre', 'e.g. 45', 'Overrides national avg for this territory')
    + tcField('Water Cost Rs/kL', 'water_cost_inr_kl', 'e.g. 35', 'Industrial water cost override')
    + '</div>'
    + '<div style="margin-top:8px;padding:10px;background:var(--light);border-radius:var(--r-sm);font-size:11px;color:var(--mid)">'
    + 'These overrides apply globally until cleared. For per-engagement overrides, use the Engagement Docket.'
    + '</div>'
    + '</div>'
    + '<div class="card">'
    + '<div class="card-title">Programme Defaults</div>'
    + '<div class="card-sub">Default values for new engagements in the Financial Model</div>'
    + '<div class="field-row">'
    + '<div class="field"><label>Programme Period (years)</label>'
    + '<select id="cfg-programme_years" onchange="live(\'programme_years\',parseInt(this.value))">'
    + [5,7,10,15,20].map(function(y){ return '<option value="'+y+'"'+(y===(CFG.programme_years||10)?' selected':'')+'>'+y+' years</option>' }).join('')
    + '</select></div>'
    + '<div class="field"><label>Default Currency</label>'
    + '<select id="cfg-default_currency" onchange="live(\'default_currency\',this.value)">'
    + [{v:'INR',l:'INR \u2014 Indian Rupee'},{v:'USD',l:'USD \u2014 US Dollar'},{v:'EUR',l:'EUR \u2014 Euro'},{v:'AED',l:'AED \u2014 UAE Dirham'},{v:'SGD',l:'SGD \u2014 Singapore Dollar'}]
        .map(function(o){ return '<option value="'+o.v+'"'+(o.v===(CFG.default_currency||'INR')?' selected':'')+'>'+esc(o.l)+'</option>'}).join('')
    + '</select></div>'
    + '</div>'
    + '</div>'
}

// ── Live update helpers ───────────────────────────────────────────────────────
function live(key, val) {
  CFG[key] = val
}

function liveGemini(val) {
  // Write to BOTH key names since different tools use different names
  CFG.key_gemini  = val
  CFG.geminiKey   = val
}

function liveSB(key, val) {
  CFG[key] = val
  // Also write the underscore variant
  var alt = key === 'sbUrl' ? 'sb_url' : 'sb_key'
  CFG[alt] = val
}

function liveModel(id, val) {
  var mt = CFG.model_tiers || {}
  if (id === 'model-default') {
    CFG.geminiTextModel = val
    mt.default = val
  } else if (id === 'model-pei') {
    mt.pei = val
  } else if (id === 'model-scraping') {
    mt.scraping = val
  } else if (id === 'model-s4') {
    mt.s4 = val
  } else if (id === 'model-search') {
    CFG.geminiSearchModel = val
  }
  CFG.model_tiers = mt
}

function liveNatAvg(key, val) {
  var na = CFG.national_averages || {}
  na[key] = parseFloat(val) || 0
  CFG.national_averages = na
}

function liveTerritoryConfig(key, val) {
  var tc = CFG.territory_config || {}
  tc[key] = parseFloat(val) || null
  CFG.territory_config = tc
}

function selectSku(id) {
  CFG.primaryGpuSku = id
  showTab('hardware')
  showToast('Primary GPU: ' + id)
}

function refreshLogo(key, previewId) {
  key = key || 'logoUrl'; previewId = previewId || 'tool-logo'
  var inp = document.getElementById('cfg-' + key)
  if (!inp) return
  CFG[key] = inp.value
  var prev = document.getElementById(previewId + '-preview')
  if (!prev) return
  if (inp.value) {
    var img = document.createElement('img')
    img.src = inp.value
    img.style.cssText = 'height:40px;border:1px solid #E5E7EB;border-radius:4px;padding:4px'
    img.onerror = function(){ this.style.opacity = '0.3' }
    prev.innerHTML = ''
    prev.appendChild(img)
  } else {
    prev.innerHTML = '<span style="font-size:11px;color:#6B7280">No logo set</span>'
  }
}

function toggleReveal(key) {
  var inp = document.getElementById('cfg-' + key)
  if (!inp) return
  inp.type = inp.type === 'text' ? 'password' : 'text'
}

// ── Save ──────────────────────────────────────────────────────────────────────
function saveAll() {
  // Collect any final field values (in case oninput wasn't triggered)
  var fields = document.querySelectorAll('[id^="cfg-"]')
  fields.forEach(function(el) {
    var key = el.id.replace('cfg-', '')
    if (el.tagName === 'SELECT' || el.tagName === 'INPUT') {
      if (key === 'key_gemini') { CFG.key_gemini = el.value; CFG.geminiKey = el.value }
      else if (key === 'sbUrl') { CFG.sbUrl = el.value; CFG.sb_url = el.value }
      else if (key === 'sbKey') { CFG.sbKey = el.value; CFG.sb_key = el.value }
      else CFG[key] = el.type === 'number' ? (parseFloat(el.value) || el.value) : el.value
    }
  })
  // Mirror to legacy keys that older tools still read
  if (CFG.key_gemini) {
    try { localStorage.setItem('atlas_gemini_key', CFG.key_gemini) } catch(e) {}
  }
  try {
    localStorage.setItem('atlas_global_cfg', JSON.stringify(CFG))
    updateStatusBar()
    showToast('✓ Settings saved')
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error')
    return
  }
  // Sync to Supabase (async, non-blocking)
  syncToSupabase()
}


async function syncToSupabase() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) return
  var rows = []
  // Company fields — compatible with root index app_config keys
  if (CFG.companyName)         rows.push({ key: 'brand_name',              value: CFG.companyName })
  if (CFG.companyTagline)      rows.push({ key: 'brand_tagline',           value: CFG.companyTagline })
  if (CFG.logoUrl)             rows.push({ key: 'brand_logo_url',          value: CFG.logoUrl })
  if (CFG.docLogoUrl)          rows.push({ key: 'brand_doc_logo_url',      value: CFG.docLogoUrl })
  if (CFG.brandPrimary)        rows.push({ key: 'brand_colour_primary',    value: CFG.brandPrimary })
  if (CFG.brandAccent)         rows.push({ key: 'brand_colour_accent',     value: CFG.brandAccent })
  if (CFG.parentCompanyName)   rows.push({ key: 'parent_company_name',     value: CFG.parentCompanyName })
  if (CFG.parentCompanyWebsite)rows.push({ key: 'parent_company_website',  value: CFG.parentCompanyWebsite })
  if (CFG.parentAddr1)         rows.push({ key: 'parent_company_addr1',    value: CFG.parentAddr1 })
  if (CFG.parentAddr2)         rows.push({ key: 'parent_company_addr2',    value: CFG.parentAddr2 })
  if (CFG.parentCity)          rows.push({ key: 'parent_company_city',     value: CFG.parentCity })
  if (CFG.parentCountry)       rows.push({ key: 'parent_company_country',  value: CFG.parentCountry })
  if (CFG.localCompanyName)    rows.push({ key: 'local_company_name',      value: CFG.localCompanyName })
  if (CFG.localAddr1)          rows.push({ key: 'local_company_addr1',     value: CFG.localAddr1 })
  if (CFG.localAddr2)          rows.push({ key: 'local_company_addr2',     value: CFG.localAddr2 })
  if (CFG.localCity)           rows.push({ key: 'local_company_city',      value: CFG.localCity })
  if (CFG.docAuthor)           rows.push({ key: 'doc_author_default',      value: CFG.docAuthor })
  if (CFG.docPrefix)           rows.push({ key: 'doc_prefix',              value: CFG.docPrefix })
  // National averages
  var na = CFG.national_averages || {}
  NAT_AVG_FIELDS.forEach(function(f) {
    var val = na[f.key] !== undefined ? na[f.key] : f.default
    rows.push({ key: 'nat_avg_' + f.key, value: String(val) })
  })
  // atlasAI config
  var mdl = CFG.geminiTextModel || (CFG.model_tiers && CFG.model_tiers.default) || 'gemini-2.5-flash'
  rows.push({ key: 'atlasai_primary_model', value: mdl })
  rows.push({ key: 'atlasai_s4_max_tokens', value: '4096' })
  rows.push({ key: 'atlasai_s4_timeout_ms', value: '60000' })
  if (!rows.length) return
  try {
    var r = await fetch(url + '/rest/v1/app_config', {
      method: 'POST',
      headers: sbHeaders(key, {'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(rows)
    })
    if (r.ok) console.log('[Settings] Synced ' + rows.length + ' rows to Supabase')
    else console.warn('[Settings] Supabase sync failed: HTTP ' + r.status)
  } catch(e) {
    console.warn('[Settings] Supabase sync error:', e.message)
  }
}

function resetAll() {
  if (!confirm('Clear ALL settings? This removes API keys, company info, and all preferences.')) return
  CFG = {}
  try { localStorage.removeItem('atlas_global_cfg') } catch(e) {}
  updateStatusBar()
  showTab('company')
  showToast('Settings cleared')
}

// ── Test connections ──────────────────────────────────────────────────────────
async function testGemini() {
  var key = document.getElementById('cfg-key_gemini')
  if (!key || !key.value.trim()) { showResult('gemini-test-result', 'Enter a key first', false); return }
  showResult('gemini-test-result', 'Testing...', null)
  try {
    var r = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + key.value.trim())
    if (r.ok) {
      var d = await r.json()
      var count = (d.models || []).length
      showResult('gemini-test-result', '\u2713 Valid \u2014 ' + count + ' models available', true)
    } else {
      showResult('gemini-test-result', '\u2717 Invalid key (HTTP ' + r.status + ')', false)
    }
  } catch(e) {
    showResult('gemini-test-result', '\u2717 ' + e.message, false)
  }
}

async function testSupabase() {
  var url = (document.getElementById('cfg-sbUrl') || {}).value || CFG.sbUrl || ''
  var key = (document.getElementById('cfg-sbKey') || {}).value || CFG.sbKey || ''
  if (!url || !key) { showResult('sb-test-result', 'Enter URL and key first', false); return }
  showResult('sb-test-result', 'Testing...', null)
  try {
    // NOTE: root /rest/v1/ endpoint requires a SECRET key and always 401s for
    // publishable/anon keys by Supabase design. Query a real table instead.
    var r = await fetch(url + '/rest/v1/app_config?limit=1&select=key', { headers: sbHeaders(key) })
    if (r.ok) {
      showResult('sb-test-result', '\u2713 Supabase connected', true)
    } else {
      showResult('sb-test-result', '\u2717 Connection failed (HTTP ' + r.status + ')', false)
    }
  } catch(e) {
    showResult('sb-test-result', '\u2717 ' + e.message, false)
  }
}

async function syncNatAvgToSupabase() {
  var url = CFG.sbUrl || CFG.sb_url || ''
  var key = CFG.sbKey || CFG.sb_key || ''
  if (!url || !key) { showToast('Configure Supabase first', 'error'); return }
  var na = CFG.national_averages || {}
  var rows = NAT_AVG_FIELDS.map(function(f) {
    return { key: 'nat_avg_' + f.key, value: String(na[f.key] !== undefined ? na[f.key] : f.default) }
  })
  try {
    var r = await fetch(url + '/rest/v1/app_config', {
      method: 'POST',
      headers: sbHeaders(key, {'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(rows)
    })
    if (r.ok) showToast('\u2713 National averages synced to Supabase')
    else showToast('Sync failed: HTTP ' + r.status, 'error')
  } catch(e) {
    showToast('Sync failed: ' + e.message, 'error')
  }
}

function showResult(id, msg, ok) {
  var el = document.getElementById(id)
  if (!el) return
  el.textContent = msg
  el.style.color = ok === true ? '#065F46' : ok === false ? '#991B1B' : 'var(--mid)'
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function showToast(msg, type) {
  var t = document.getElementById('toast')
  t.textContent = msg
  t.style.background = type === 'error' ? '#991B1B' : 'var(--navy)'
  t.classList.add('show')
  setTimeout(function(){ t.classList.remove('show') }, 2500)
}

boot()
</script>
