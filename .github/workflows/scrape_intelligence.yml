name: Intelligence Scraper

on:
  schedule:
    - cron: '30 20 * * 0'   # Every Sunday at 2:00 AM IST (Sunday 8:30 PM UTC)
  workflow_dispatch:
    inputs:
      domains:
        description: 'Comma-separated domain codes (leave empty for all)'
        required: false
        default: ''
      items_per_domain:
        description: 'Items per domain (default: 2)'
        required: false
        default: '2'
      geographies:
        description: 'Geographies (default: India)'
        required: false
        default: 'India'
      run_rss:
        description: 'Run RSS feeds from feed_library (true/false)'
        required: false
        default: 'true'
      run_search:
        description: 'Run search grounding (true/false)'
        required: false
        default: 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch@3 xml2js

      - name: Run Intelligence Scraper
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          SARVAM_API_KEY:   ${{ secrets.SARVAM_API_KEY }}
          DOMAINS_OVERRIDE: ${{ github.event.inputs.domains }}
          ITEMS_PER_DOMAIN: ${{ github.event.inputs.items_per_domain || '2' }}
          GEOGRAPHIES:      ${{ github.event.inputs.geographies || 'India' }}
          RUN_RSS:          ${{ github.event.inputs.run_rss || 'true' }}
          RUN_SEARCH:       ${{ github.event.inputs.run_search || 'true' }}
        run: node scripts/scrape-intelligence.js
