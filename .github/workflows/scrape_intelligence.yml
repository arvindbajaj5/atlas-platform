name: Intelligence Scraper

on:
  schedule:
    # Run daily at 2:00 AM IST (20:30 UTC previous day)
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      domains:
        description: 'Comma-separated domain codes to scrape (leave empty for all)'
        required: false
        default: ''
      items_per_domain:
        description: 'Items per domain (default: 5)'
        required: false
        default: '5'
      run_enrichment:
        description: 'Run enrichment phase (true/false)'
        required: false
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run Intelligence Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DOMAINS_OVERRIDE: ${{ github.event.inputs.domains }}
          ITEMS_PER_DOMAIN: ${{ github.event.inputs.items_per_domain || '5' }}
          RUN_ENRICHMENT: ${{ github.event.inputs.run_enrichment || 'true' }}
        run: node scripts/scrape-intelligence.js
