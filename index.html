<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS Test</title>
<style>
  body { font-family: sans-serif; background: #002870; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: white; border-radius: 12px; padding: 32px; width: 320px; }
  h2 { color: #002870; margin-bottom: 20px; }
  input, select { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
  button { width: 100%; padding: 12px; background: #FF5539; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
  #msg { margin-top: 16px; color: #002870; font-weight: bold; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h2>ATLAS — Sign In</h2>
  <input type="text" id="name" placeholder="Your name">
  <select id="role">
    <option value="">Select role</option>
    <option value="BUSINESS_HEAD">Business Head</option>
    <option value="SALES">Sales</option>
    <option value="PRESALES">Pre-Sales</option>
    <option value="OPERATIONS">Operations</option>
  </select>
  <button id="loginBtn">Enter ATLAS</button>
  <div id="msg"></div>
</div>
<script>
  document.getElementById('loginBtn').addEventListener('click', function() {
    var name = document.getElementById('name').value.trim();
    var role = document.getElementById('role').value;
    if (!name || !role) {
      document.getElementById('msg').textContent = 'Please enter name and select role.';
      return;
    }
    document.getElementById('msg').textContent = 'Welcome, ' + name + '! Role: ' + role;
  });
</script>
</body>
</html>
