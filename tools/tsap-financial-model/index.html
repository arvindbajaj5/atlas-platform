function tpS2Form() {
  var sel = TP.objectives || []
  var html = '<div style="padding:16px 0">'

  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
    + '<button onclick="TP.stage=\'s1_done\';switchTab(\'profile\')" style="padding:5px 12px;border:1px solid var(--border);background:transparent;border-radius:5px;font-size:12px;cursor:pointer">&#8592; Back to intelligence</button>'
    + '<div style="font-size:14px;font-weight:700;color:var(--navy)">' + esc(TP.territory) + '   Set Objectives</div>'
    + '<div style="font-size:11px;color:var(--mid)">Select up to 5 objectives</div>'
    + '<span style="margin-left:auto;font-size:12px;font-weight:700;color:' + (sel.length>=5?'var(--orange)':'var(--teal)') + '">' + sel.length + '/5 selected</span>'
    + '</div>'

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'

  // Objectives panel
  html += '<div>'
  OBJECTIVES.forEach(function(group) {
    html += '<div style="margin-bottom:12px">'
      + '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mid);padding:6px 10px;background:var(--light);border-radius:4px;margin-bottom:6px">'+esc(group.group)+'</div>'
      + group.items.map(function(item) {
          var isSel = sel.indexOf(item) >= 0
          var blocked = false
          return '<div onclick="tpToggleObj(\'' + item.replace(/'/g,"\\'") + '\')" '
            + 'style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;border:1.5px solid '
            + (isSel?'var(--navy)':blocked?'var(--border)':'var(--border)')
            + ';background:' + (isSel?'rgba(0,40,112,.06)':'#fff')
            + ';cursor:' + (blocked?'not-allowed':'pointer')
            + ';opacity:' + (blocked?'.45':'1')
            + ';margin-bottom:4px">'
            + '<div style="width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1.5px solid '
            + (isSel?'var(--navy)':'var(--border)')
            + ';background:' + (isSel?'var(--navy)':'#fff')
            + ';display:flex;align-items:center;justify-content:center">'
            + (isSel?'<span style="color:#fff;font-size:9px;font-weight:700">&#10003;</span>':'')
            + '</div>'
            + '<span style="font-size:12px;font-weight:' + (isSel?600:400) + '">' + esc(item) + '</span>'
            + '</div>'
        }).join('')
      + '</div>'
  })
  html += '</div>'

  // Context panel
  html += '<div>'
    + '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px">Selected objectives</div>'
    + '<div style="font-size:11px;color:var(--mid);margin-bottom:10px">Max 5. Use the context box for anything outside the list.</div>'
    + '<div style="display:flex;flex-direction:column;gap:5px;min-height:60px">'
    + (sel.length ? sel.map(function(o,i){
        return '<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;background:var(--light);border-radius:4px">'
          + '<span style="font-size:10px;font-weight:700;color:var(--navy);width:14px">' + (i+1) + '</span>'
          + '<span style="flex:1">' + esc(o) + '</span>'
          + '<span onclick="tpToggleObj(\'' + o.replace(/'/g,"\\'") + '\')" style="cursor:pointer;color:var(--mid);font-size:14px">&#215;</span>'
          + '</div>'
      }).join('') : '<div style="font-size:11px;color:var(--mid);font-style:italic">No objectives selected yet</div>')
    + '</div></div>'

    + '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px">Additional context <span style="font-weight:400;color:var(--mid)">(optional)</span></div>'
    + '<div style="font-size:11px;color:var(--mid);margin-bottom:8px">Anything your team knows that the AI should factor in   ground truth, specific constraints, political dynamics, client conversations.</div>'
    + '<textarea id="tp-free-text" rows="8" '
    + 'style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;line-height:1.5"'
    + ' placeholder="e.g. The CM has personally committed to making this the AI capital of Himachal. Budget is pre-approved in the supplementary estimates. Site in Bilaspur is surveyed and has 10MW available from HPSEBL grid connection...">'
    + esc(TP.freeText||'') + '</textarea>'
    + '</div>'

    + (sel.length > 0
      ? '<button onclick="tpRunS2()" style="width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">&#9889; Generate territory profile &#8594;</button>'
      : '<button disabled style="width:100%;padding:11px;background:var(--border);color:var(--mid);border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:not-allowed">Select at least 1 objective first</button>')

  html += '</div>'
  html += '</div></div>'
  return html
}

function tpToggleObj(name) {
  var idx = TP.objectives.indexOf(name)
  if (idx >= 0) {
    TP.objectives.splice(idx, 1)
  } else {
    TP.objectives.push(name)  // no cap
  }
  switchTab('profile')
}

async function tpRunS2() {
  var ft = document.getElementById('tp-free-text')
  TP.freeText = ft ? ft.value : ''
  TP.stage = 's2_loading'
  switchTab('profile')

  var result = await callS2(TP.territory, TP.s1, TP.objectives, TP.freeText)
  if (!result.ok) {
    TP.stage = 's2_form'; switchTab('profile')
    setTimeout(function(){ alert('Stage 2 failed: ' + result.error) }, 100)
    return
  }
  TP.s2 = result.data
  TP.overrides.working   = (TP.s2.working_in_favour || []).map(function(p){ return { text: p.point, metric: p.metric, confidence: p.confidence, removed: false } })
  TP.overrides.attention = (TP.s2.needs_attention   || []).map(function(p){ return { text: p.point, severity: p.severity, mitigation: p.mitigation, removed: false } })
  TP.stage = 's3'
  switchTab('profile')
}

//                                                                               
// Stage 3: Matchmaking Results
//                                                                               

function tpS3Result() {
  if (!TP.s2) { TP.stage = 's2_form'; return tpS2Form() }
  var icons = {T1:'&#127965;',T2:'&#127807;',T3:'&#128681;',T4:'&#127970;',T5:'&#127758;'}
  var dimLabels = {
    infrastructure_readiness: 'Infrastructure', fiscal_capacity: 'Fiscal Capacity',
    ai_opportunity_density: 'AI Opportunity', workforce_readiness: 'Workforce',
    political_commercial: 'Political & Commercial', central_strategic_value: 'Central Strategic'
  }
  var viabCol = { excellent:'var(--teal)',strong:'var(--teal)',viable:'var(--amber)',challenging:'var(--orange)',not_recommended:'var(--orange)' }
  var viabBg  = { excellent:'#E1F5EE',strong:'#E1F5EE',viable:'#FFF8E7',challenging:'#FEE2E2',not_recommended:'#FEE2E2' }

  // Compute archetype match
  var dimScores = TP.s2.dim_scores || {}
  var dims = Object.keys(dimScores)
  var archVecs = {}
  TP.archetypes.forEach(function(a){
    var key = a.code || a.id
    archVecs[key]={}; dims.forEach(function(d){ archVecs[key][d]=0 })
  })
  TP.archetype_dims.forEach(function(d){
    var dk = d.archetype_code || d.archetype_id; if(archVecs[dk]) archVecs[dk][d.dimension]=parseFloat(d.score)||0
  })
  var matches = TP.archetypes.map(function(a){
    var key = a.code || a.id
    var sumSq=0
    dims.forEach(function(d){
      var av=((parseFloat(dimScores[d])||0)/100)*4+1
      var bv=parseFloat((archVecs[key]&&archVecs[key][d]))||3
      sumSq+=Math.pow(av-bv,2)
    })
    var maxDist=Math.sqrt(dims.length*16); var dist=Math.sqrt(sumSq)
    var score=(maxDist>0)?Math.max(0,1-dist/maxDist):0
    return { arch:a, score:isNaN(score)?0:score }
  }).sort(function(a,b){return b.score-a.score})
  var best = matches[0]
  var pct  = best ? (isNaN(best.score)?0:Math.round(best.score*100)) : 0

  var html = '<div style="padding:16px 0">'

  // Nav
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
    + '<button onclick="TP.stage=\'s1_done\';switchTab(\'profile\')" style="padding:5px 12px;border:1px solid var(--border);background:transparent;border-radius:5px;font-size:12px;cursor:pointer">&#8592; Intelligence</button>'
    + '<button onclick="TP.stage=\'s2_form\';switchTab(\'profile\')" style="padding:5px 12px;border:1px solid var(--border);background:transparent;border-radius:5px;font-size:12px;cursor:pointer">&#9997; Objectives</button>'
    + '<div style="font-size:14px;font-weight:700;color:var(--navy);flex:1">' + esc(TP.territory) + '   Territory Profile</div>'
    + '<button onclick="tpExportWord()" style="padding:5px 12px;border:1px solid var(--border);background:transparent;border-radius:5px;font-size:12px;cursor:pointer">&#128196; Word</button>'
    + '<button onclick="tpExportPPT()" style="padding:5px 12px;border:1px solid var(--navy);background:var(--navy);color:#fff;border-radius:5px;font-size:12px;cursor:pointer">&#128190; PPT</button>'
    + '</div>'
    + tpTokenDisplay()

  // Headline recommendation
  if (TP.s2.headline_recommendation) {
    html += '<div style="background:var(--navy);border-radius:8px;padding:14px 18px;color:#fff;margin-bottom:14px">'
      + '<div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Strategic Recommendation</div>'
      + '<div style="font-size:14px;font-weight:500;line-height:1.5">' + esc(TP.s2.headline_recommendation) + '</div>'
      + '</div>'
  }

  // Archetype match banner
  if (best) {
    html += '<div style="background:linear-gradient(135deg,rgba(0,40,112,.06) 0%,rgba(0,40,112,.02) 100%);border:1.5px solid var(--navy);border-radius:8px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px">'
      + '<div style="font-size:28px">' + (icons[best.arch.id]||'') + '</div>'
      + '<div style="flex:1">'
      + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:2px">Matched archetype   ' + pct + '% confidence</div>'
      + '<div style="font-size:16px;font-weight:900;color:var(--navy)">' + esc(best.arch.name||best.arch.id) + '</div>'
      + '<div style="font-size:12px;color:var(--mid);margin-top:2px">' + esc((best.arch.description||'').substring(0,120)) + '</div>'
      + '</div></div>'
  }

  // Three columns: Working | Attention | Objective Feasibility
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">'

  // Working in favour
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">&#9989; Working in favour</div>'
    + TP.overrides.working.filter(function(p){ return !p.removed }).map(function(p,i){
        return '<div style="padding:7px 9px;background:#F0FDF4;border-radius:5px;margin-bottom:6px;border-left:3px solid var(--teal)">'
          + '<div style="font-size:11px;line-height:1.4">' + esc(p.text) + '</div>'
          + (p.metric ? '<div style="font-size:10px;color:var(--mid);margin-top:3px">&#128202; ' + esc(p.metric) + '</div>' : '')
          + '<div style="display:flex;gap:4px;margin-top:4px">'
          + '<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:var(--teal);color:#fff;font-weight:700">' + esc(p.confidence||'') + '</span>'
          + '<span onclick="tpRemovePoint(\'working\',' + i + ')" style="font-size:9px;color:var(--mid);cursor:pointer">Remove</span>'
          + '</div></div>'
      }).join('')
    + '<div onclick="tpAddPoint(\'working\')" style="font-size:11px;color:var(--mid);cursor:pointer;padding:5px;text-align:center;border:1px dashed var(--border);border-radius:5px;margin-top:4px">+ Add observation</div>'
    + '</div>'

  // Needs attention
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">&#9888; Needs attention</div>'
    + TP.overrides.attention.filter(function(p){ return !p.removed }).map(function(p,i){
        var sevCol = p.severity==='critical'?'var(--orange)':p.severity==='moderate'?'var(--amber)':'var(--mid)'
        return '<div style="padding:7px 9px;background:#FFF8F0;border-radius:5px;margin-bottom:6px;border-left:3px solid '+sevCol+'">'
          + '<div style="font-size:11px;line-height:1.4">' + esc(p.text) + '</div>'
          + (p.mitigation ? '<div style="font-size:10px;color:var(--mid);margin-top:3px">&#128161; ' + esc(p.mitigation) + '</div>' : '')
          + '<div style="display:flex;gap:4px;margin-top:4px">'
          + '<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:'+sevCol+';color:#fff;font-weight:700">' + esc(p.severity||'') + '</span>'
          + '<span onclick="tpRemovePoint(\'attention\',' + i + ')" style="font-size:9px;color:var(--mid);cursor:pointer">Remove</span>'
          + '</div></div>'
      }).join('')
    + '<div onclick="tpAddPoint(\'attention\')" style="font-size:11px;color:var(--mid);cursor:pointer;padding:5px;text-align:center;border:1px dashed var(--border);border-radius:5px;margin-top:4px">+ Add observation</div>'
    + '</div>'

  // Objective feasibility
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px">Objective feasibility</div>'
    + (TP.s2.objective_viability||[]).map(function(v){
        var col = viabCol[v.viability] || 'var(--mid)'
        var bg  = viabBg[v.viability]  || 'var(--light)'
        var sc  = v.score || 0
        return '<div style="margin-bottom:8px">'
          + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
          + '<span style="font-size:11px;font-weight:600">' + esc(v.objective||'') + '</span>'
          + '<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:'+bg+';color:'+col+';font-weight:700">' + esc(v.viability||'') + '</span>'
          + '</div>'
          + '<div style="height:5px;background:var(--border);border-radius:3px;margin-bottom:3px">'
          + '<div style="width:'+sc+'%;height:100%;background:'+col+';border-radius:3px"></div>'
          + '</div>'
          + (v.rationale ? '<div style="font-size:10px;color:var(--mid);line-height:1.3">' + esc(v.rationale) + '</div>' : '')
          + '</div>'
      }).join('')
    + '</div>'

  html += '</div>'

  // Feasibility grid (situation   objectives)
  html += tpFeasibilityGrid()

  // Radar + dim bars + archetype comparison
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'

  // Radar
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px">Dimension Radar</div>'
    + '<canvas id="tp-radar-chart"></canvas>'
    + '</div>'

  // Dim bars + archetype comparison
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px">Dimension Scores vs Archetype</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px">'
    + dims.map(function(d){
        var sc = Math.round(dimScores[d]||0)
        var bestKey2 = best ? (best.arch.code||best.arch.id) : null
        var ref = best ? Math.round(((archVecs[bestKey2]&&archVecs[bestKey2][d])||0)*20) : 0
        var lbl = dimLabels[d] || d
        return '<div>'
          + '<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">'
          + '<span style="color:var(--mid)">' + esc(lbl) + '</span>'
          + '<span style="font-weight:700;color:var(--navy)">' + sc + ' <span style="color:var(--mid);font-weight:400">vs ref ' + ref + '</span></span>'
          + '</div>'
          + '<div style="position:relative;height:5px;background:var(--border);border-radius:3px">'
          + '<div style="position:absolute;left:0;top:0;width:'+sc+'%;height:100%;background:var(--teal);border-radius:3px;opacity:.8"></div>'
          + '<div style="position:absolute;left:0;top:0;width:'+ref+'%;height:100%;background:transparent;border-right:2px solid var(--navy)"></div>'
          + '</div></div>'
      }).join('')
    + '</div>'
    + '<div style="font-size:10px;color:var(--mid);margin-top:8px">&#9646; Teal = Territory &nbsp; | &nbsp; Navy line = Archetype reference</div>'
    + '</div>'

  html += '</div>'

  // All archetypes ranked
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px">All archetype matches</div>'
    + '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">'
    + matches.map(function(m,i){
        var sc2 = isNaN(m.score)?0:Math.round(m.score*100)
        var isBest = i===0
        return '<div style="text-align:center;padding:10px 8px;border-radius:6px;background:'+(isBest?'rgba(0,40,112,.08)':'var(--light)')+';border:1.5px solid '+(isBest?'var(--navy)':'transparent')+'">'
          + '<div style="font-size:20px;margin-bottom:4px">' + (icons[m.arch.id]||'') + '</div>'
          + '<div style="font-size:11px;font-weight:' + (isBest?700:400) + ';color:var(--navy);margin-bottom:6px">' + esc(m.arch.name||m.arch.id) + '</div>'
          + '<div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:4px">'
          + '<div style="width:'+sc2+'%;height:100%;background:'+(isBest?'var(--navy)':'var(--teal)')+';border-radius:2px"></div>'
          + '</div>'
          + '<div style="font-size:12px;font-weight:700;color:'+(isBest?'var(--navy)':'var(--mid)')+'">' + sc2 + '%</div>'
          + '</div>'
      }).join('')
    + '</div></div>'

  html += '</div>'

  // Draw radar after render
  setTimeout(function(){
    var ctx = document.getElementById('tp-radar-chart'); if (!ctx) return
    if (TP.radarChart) { try{ TP.radarChart.destroy() }catch(e){} }
    var labels  = dims.map(function(d){ return dimLabels[d]||d })
    var userData = dims.map(function(d){ return Math.round(dimScores[d]||0) })
    var bestKey = best ? (best.arch.code||best.arch.id) : null
    var archData = best ? dims.map(function(d){ return Math.round(((archVecs[bestKey]&&archVecs[bestKey][d])||0)*20) }) : []
    TP.radarChart = new Chart(ctx, {
      type:'radar',
      data:{ labels:labels, datasets:[
        { label:'Territory', data:userData, fill:true, backgroundColor:'rgba(0,178,144,.2)', borderColor:'#00B290', pointBackgroundColor:'#00B290' },
        { label:best?esc(best.arch.name||best.arch.id):'Reference', data:archData, fill:true, backgroundColor:'rgba(0,40,112,.1)', borderColor:'#002870', pointBackgroundColor:'#002870', borderDash:[4,3] }
      ]},
      options:{ responsive:true, scales:{ r:{ min:0,max:100,ticks:{stepSize:25,font:{size:8}},pointLabels:{font:{size:9}} } },
        plugins:{ legend:{ position:'bottom',labels:{font:{size:10}} } } }
    })
  }, 100)

  // Save result to Supabase
  setTimeout(tpSaveResult, 500)

  return html
}

//    Feasibility grid                                                           
function tpFeasibilityGrid() {
  var p = TP.s1
  if (!p || !TP.objectives.length) return ''

  // Situation signals (from Stage 1 data)
  var e = p.hard_stats && p.hard_stats.energy  || {}
  var w = p.hard_stats && p.hard_stats.water   || {}
  var l = p.hard_stats && p.hard_stats.land    || {}
  var k = p.hard_stats && p.hard_stats.workers || {}
  var d = p.hard_stats && p.hard_stats.digital || {}

  var signals = [
    { label:'Power supply', val: e.status, enabler: 'surplus', risk: 'deficit' },
    { label:'Power cost', val: e.tariff_index_pct<=85?'competitive':e.tariff_index_pct>=115?'expensive':'average', enabler:'competitive',risk:'expensive' },
    { label:'Water stress', val: w.stress_index, enabler:'low', risk:'critical' },
    { label:'DC cooling', val: w.dc_cooling, enabler:'high', risk:'low' },
    { label:'Land availability', val: l.govt_land, enabler:'high', risk:'low' },
    { label:'Skilled labour', val: k.skilled_labour, enabler:'abundant', risk:'scarce' },
    { label:'Digital infra', val: d.internet_pct>=60?'strong':d.internet_pct>=35?'adequate':'weak', enabler:'strong',risk:'weak' },
  ]

  // Objective   signal relevance map (which signals matter for which objectives)
  var relevanceMap = {
    'Sovereign AI Centre of Excellence':         ['Power supply','Power cost','Water stress','DC cooling','Land availability','Skilled labour','Digital infra'],
    'High-Performance Computing Hub':            ['Power supply','Power cost','Water stress','DC cooling','Land availability'],
    'Edge AI & Rural Connectivity':              ['Digital infra','Power supply'],
    'Agricultural Modernisation & Food Security':['Skilled labour','Digital infra','Water stress'],
    'Industrial & Manufacturing AI':             ['Power supply','Power cost','Skilled labour'],
    'e-Governance & Citizen Service Delivery':   ['Digital infra','Skilled labour'],
    'Disaster & Emergency Management':           ['Digital infra','Power supply'],
    'Water Resource Management':                 ['Water stress','Digital infra'],
    'Healthcare AI & Telemedicine':              ['Digital infra','Skilled labour'],
  }

  function cellRag(signal, objName) {
    var relMap = relevanceMap[objName]
    if (!relMap || relMap.indexOf(signal.label) < 0) {
      return { bg:'#f9f9f9', col:'var(--mid)', text:'' }  // not relevant
    }
    var v = signal.val
    if (v === signal.enabler) return { bg:'#E1F5EE', col:'var(--teal)', text:'&#9679;' }
    if (v === signal.risk)    return { bg:'#FEE2E2', col:'var(--orange)', text:'&#9675;' }
    return { bg:'#FFF8E7', col:'var(--amber)', text:'&#9677;' }
  }

  var html = '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;overflow-x:auto">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px">Feasibility Matrix   Situation vs Objectives</div>'
    + '<div style="font-size:10px;color:var(--mid);margin-bottom:8px">&#9679; Enabler &nbsp; &#9677; Neutral &nbsp; &#9675; Risk &nbsp; Grey = not directly relevant</div>'

  // Header row
  html += '<table style="width:100%;border-collapse:collapse;font-size:10px">'
    + '<tr><th style="text-align:left;padding:5px 8px;background:var(--navy);color:#fff;border-radius:4px 0 0 0;min-width:120px">Situation Signal</th>'
    + '<th style="text-align:center;padding:4px 6px;background:var(--navy);color:#fff;font-size:9px">Value</th>'
    + TP.objectives.map(function(o){
        return '<th style="text-align:center;padding:4px 6px;background:var(--navy);color:#fff;font-size:9px;max-width:80px">'
          + esc(o.length>20?o.substring(0,18)+'..':o) + '</th>'
      }).join('')
    + '</tr>'

  // Signal rows
  signals.forEach(function(sig, ri){
    html += '<tr style="background:'+(ri%2===0?'#fff':'var(--light)')+'">'
      + '<td style="padding:6px 8px;font-size:11px;border-bottom:1px solid var(--border)">' + esc(sig.label) + '</td>'
      + '<td style="text-align:center;padding:6px 4px;font-size:10px;font-weight:600;border-bottom:1px solid var(--border);color:'
        + (sig.val===sig.enabler?'var(--teal)':sig.val===sig.risk?'var(--orange)':'var(--mid)') + '">'
        + esc(String(sig.val||'N/A')) + '</td>'
      + TP.objectives.map(function(obj){
          var c = cellRag(sig, obj)
          return '<td style="text-align:center;padding:6px;background:'+c.bg+';border-bottom:1px solid var(--border);font-size:14px;color:'+c.col+'">'+c.text+'</td>'
        }).join('')
      + '</tr>'
  })

  html += '</table></div>'
  return html

function tpRemovePoint(type, idx) {
  TP.overrides[type][idx].removed = true
  switchTab('profile')
}

function tpAddPoint(type) {
  var text = prompt('Add observation:')
  if (!text || !text.trim()) return
  TP.overrides[type].push({ text: text.trim(), removed: false, confidence: 'medium', severity: 'moderate' })
  switchTab('profile')
}

//    Save to Supabase                                                           
async function tpSaveResult() {
  if (!TP.s1 || !TP.s2) return
  var slug = TP.territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  var row = {
    id:             'TASS-' + Date.now(),
    territory_id:   slug,
    answers:        { objectives: TP.objectives, free_text: TP.freeText },
    dim_scores:     TP.s2.dim_scores,
    archetype_code: null, // populated by matchmaking
    created_at:     new Date().toISOString()
  }
  await sbInsert('territory_assessments', row)
}

function renderGapTab() {
  var gap = calcFundingGap()
  var netColor = gap.net_commitment > 0 ? 'var(--orange)' : 'var(--teal)'

  var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px">'
    + kpiCard('Total demand', fmtCrFull(gap.demand), 'var(--navy)')
    + kpiCard('Scheme + loan + grant', fmtCrFull(gap.supply), 'var(--blue)')
    + kpiCard('Revenue (gross profit)', fmtCrFull(gap.revenue_gp), 'var(--teal)')
    + kpiCard(MODEL.territory + ' net commitment', fmtCrFull(gap.net_commitment), netColor)
    + '</div>'

    // Coverage bar
    + '<div class="card">'
    + '<div class="card-hdr">Funding coverage: ' + gap.coverage_pct + '%</div>'
    + '<div style="height:14px;border-radius:7px;background:#e5e7eb;overflow:hidden;margin:8px 0 12px">'
    + '<div style="height:100%;border-radius:7px;background:linear-gradient(90deg,var(--teal),var(--blue));width:' + Math.min(100,gap.coverage_pct) + '%;transition:width 0.4s"></div>'
    + '</div>'

    // Waterfall table
    + '<table class="fm-tbl"><tbody>'
    + '<tr><td style="font-weight:600">Programme demand</td><td style="text-align:right;font-weight:600">' + fmtCr(gap.demand) + '</td><td></td></tr>'
    + '<tr><td style="color:var(--teal)">Less: scheme / grant / other funding</td><td style="text-align:right;color:var(--teal)">(' + fmtCr(gap.supply) + ')</td><td style="text-align:right;font-size:11px;color:var(--mid)">' + Math.round(gap.supply/gap.demand*100) + '%</td></tr>'
    + (gap.revenue_gp > 0 ? '<tr><td style="color:var(--teal)">Less: Track 2 gross profit</td><td style="text-align:right;color:var(--teal)">(' + fmtCr(gap.revenue_gp) + ')</td><td style="text-align:right;font-size:11px;color:var(--mid)">' + Math.round(gap.revenue_gp/gap.demand*100) + '%</td></tr>' : '')
    + '<tr class="total-row"><td>' + esc(MODEL.territory) + ' net commitment</td><td style="text-align:right;color:' + netColor + '">' + fmtCr(gap.net_commitment) + '</td><td style="text-align:right;font-size:11px;color:'+netColor+'">' + Math.round(gap.net_commitment/gap.demand*100) + '%</td></tr>'
    + '</tbody></table></div>'

    // Year by year
    + '<div class="card"><div class="card-hdr">Net commitment by year (indicative)</div>'
    + '<table class="fm-tbl"><thead><tr><th>Year</th><th style="text-align:right">Demand</th><th style="text-align:right">Supply est.</th><th style="text-align:right">Track 2 GP</th><th style="text-align:right">Net</th></tr></thead><tbody>'

  var demand = calcDemandByYear()
  var supplyPerYr = gap.supply / MODEL.programme_years
  for (var y = 1; y <= MODEL.programme_years; y++) {
    var d = demand[y] || 0
    var s = Math.round(Math.min(supplyPerYr, d))
    var r = Math.round((rev.gpByYear ? rev.gpByYear[y]||0 : 0))
    var net = Math.max(0, d - s - r)
    html += '<tr><td>Year ' + y + '</td><td style="text-align:right">' + fmtCr(d) + '</td>'
      + '<td style="text-align:right;color:var(--teal)">(' + fmtCr(s) + ')</td>'
      + '<td style="text-align:right;color:var(--teal)">(' + fmtCr(r) + ')</td>'
      + '<td style="text-align:right;font-weight:700;color:' + (net>0?'var(--orange)':'var(--teal)') + '">' + fmtCr(net) + '</td></tr>'
  }
  html += '</tbody></table>'
    + '<div style="margin-top:16px;height:200px"><canvas id="chart-gap"></canvas></div>'
    + '</div>'

  // One-liner
  html += '<div class="card" style="border-left:3px solid var(--teal)">'
    + '<div style="font-size:13px;line-height:1.75;color:var(--dark)">'
    + esc(MODEL.territory) + ' puts in <strong>Rs ' + fmtCr(gap.net_commitment) + ' Cr net cash</strong> over ' + MODEL.programme_years + ' years '
    + (gap.supply > 0 ? '(balance covered by scheme funding, grants and external financing). ' : '. ')
    + (rev.totalGst > 0 ? 'In return, the territory earns <strong>Rs ' + fmtCr(rev.totalGst) + ' Cr in GST</strong> from the AI economy over ' + MODEL.programme_years + ' years.' : '')
    + (gap.net_commitment > 0 && rev.totalGst > 0 ? ' <strong>Benefit-cost ratio: ' + Math.round(rev.totalGst / gap.net_commitment * 10)/10 + 'x.</strong>' : '')
    + '</div></div>'

  return html
}

  var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px">'
    + kpiCard('Peak cash requirement', fmtCrFull(cf.peakCash), cf.peakCash < 0 ? 'var(--orange)' : 'var(--teal)')
    + kpiCard('Break-even quarter', cf.breakevenQtr ? 'Q' + cf.breakevenQtr + ' (Y' + Math.ceil(cf.breakevenQtr/4) + ')' : 'Not reached', cf.breakevenQtr ? 'var(--teal)' : 'var(--orange)')
    + kpiCard('NPV (at ' + MODEL.discount_rate_pct + '%)', fmtCrFull(cf.npv), cf.npv >= 0 ? 'var(--teal)' : 'var(--orange)')
    + kpiCard('Indicative IRR', cf.irr + '%', cf.irr >= MODEL.discount_rate_pct ? 'var(--teal)' : 'var(--orange)')
    + '</div>'

    + '<div class="card"><div class="card-hdr">Discount rate</div>'
    + '<div>' + fmtInput('Discount rate (%)', 'number', MODEL.discount_rate_pct, 'MODEL.discount_rate_pct=+this.value;switchTab(ACTIVE_TAB)', 'min="0" max="30" step="0.5"') + '</div>'
    + '</div>'

    // Cumulative cash flow chart
    + '<div class="card"><div class="card-hdr">Cumulative cash flow (Rs Cr)</div>'
    + '<div style="height:220px"><canvas id="chart-cashflow"></canvas></div>'
    + '</div>'

    // Quarterly bar chart
    + '<div class="card"><div class="card-hdr">Quarterly cash in vs out (Rs Cr)</div>'
    + '<div style="height:200px"><canvas id="chart-qtrly"></canvas></div>'
    + '</div>'

    // Cash flow table (yearly summary)
    + '<div class="card"><div class="card-hdr">Annual cash flow summary (Rs Cr)</div>'
    + '<table class="fm-tbl"><thead><tr><th>Year</th><th style="text-align:right">Total outflow</th><th style="text-align:right">Total inflow</th><th style="text-align:right">Net</th><th style="text-align:right">Cumulative</th></tr></thead><tbody>'

  for (var yr = 1; yr <= MODEL.programme_years; yr++) {
    var yrQtrs = cf.quarters.filter(function(q){ return q.yr === yr })
    var out = yrQtrs.reduce(function(s,q){ return s+q.outflow },0)
    var inp = yrQtrs.reduce(function(s,q){ return s+q.inflow },0)
    var net = yrQtrs.reduce(function(s,q){ return s+q.net },0)
    var cum = yrQtrs[yrQtrs.length-1].cumulative
    html += '<tr><td>Year ' + yr + '</td>'
      + '<td style="text-align:right;color:var(--orange)">(' + fmtCr(out) + ')</td>'
      + '<td style="text-align:right;color:var(--teal)">' + fmtCr(inp) + '</td>'
      + '<td style="text-align:right;font-weight:600;color:' + (net>=0?'var(--teal)':'var(--orange)') + '">' + fmtCr(net) + '</td>'
      + '<td style="text-align:right;font-weight:600;color:' + (cum>=0?'var(--teal)':'var(--orange)') + '">' + fmtCr(cum) + '</td></tr>'
  }
  html += '</tbody></table></div>'

  return html
}

//    TAB 6: What-If                                                             
function renderWhatIfTab() {
  var SCENARIOS_DEF = {
    conservative: { label:'Conservative', rev_scenario:'bear', dc_type:'bm', desc:'B&M DC, bear revenue, minimal schemes' },
    base:         { label:'Base',         rev_scenario:'base', dc_type:'mdc', desc:'MDC DC, base revenue, standard scheme coverage' },
    optimistic:   { label:'Optimistic',   rev_scenario:'bull', dc_type:'mdc', desc:'MDC DC, bull revenue, maximum scheme + VGF' }
  }

  // Compute gap for each scenario without mutating MODEL
  var results = {}
  var origDC = MODEL.dc_type, origRev = MODEL.rev_scenario
  Object.keys(SCENARIOS_DEF).forEach(function(s) {
    MODEL.dc_type = SCENARIOS_DEF[s].dc_type
    MODEL.rev_scenario = SCENARIOS_DEF[s].rev_scenario
    var g = calcFundingGap()
    var cf = calcCashFlow()
    var rev = calcRevenue()
    results[s] = { gap: g, irr: cf.irr, npv: cf.npv, peak: cf.peakCash, rev: rev.totalRev, gst: rev.totalGst }
  })
  MODEL.dc_type = origDC; MODEL.rev_scenario = origRev

  var html = '<div class="card"><div class="card-hdr">Scenario comparison</div>'
    + '<table class="fm-tbl"><thead><tr><th>Metric</th>'
    + Object.keys(SCENARIOS_DEF).map(function(s){ return '<th style="text-align:right">' + SCENARIOS_DEF[s].label + '</th>' }).join('')
    + '</tr></thead><tbody>'
    + [
        ['Total demand (Rs Cr)',           function(s){ return fmtCr(results[s].gap.demand) }],
        ['Total supply (Rs Cr)',           function(s){ return fmtCr(results[s].gap.effective_supply) }],
        ['Net commitment (Rs Cr)',         function(s){ return fmtCr(results[s].gap.net_commitment) }, true],
        ['Coverage %',                     function(s){ return results[s].gap.coverage_pct + '%' }],
        ['5yr revenue (Rs Cr)',            function(s){ return fmtCr(results[s].rev) }],
        ['5yr territory GST (Rs Cr)',      function(s){ return fmtCr(results[s].gst) }],
        ['Peak cash requirement (Rs Cr)',  function(s){ return fmtCr(results[s].peak) }],
        ['Indicative IRR',                 function(s){ return results[s].irr + '%' }],
        ['NPV (Rs Cr)',                    function(s){ return fmtCr(results[s].npv) }],
      ].map(function(row) {
        return '<tr><td>' + row[0] + '</td>'
          + Object.keys(SCENARIOS_DEF).map(function(s) {
              return '<td style="text-align:right;font-weight:' + (row[2]?'700':'400') + '">' + row[1](s) + '</td>'
            }).join('')
          + '</tr>'
      }).join('')
    + '</tbody></table></div>'

    // Save scenario
    + '<div class="card">'
    + '<div class="card-hdr">Save scenario</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + Object.keys(SCENARIOS_DEF).map(function(s) {
        return '<button class="btn btn-outline" onclick="saveScenario(\'' + s + '\',\'' + SCENARIOS_DEF[s].label + '\')">' + SCENARIOS_DEF[s].label + '</button>'
      }).join('')
    + '<button class="btn btn-primary" onclick="saveScenario(\'custom\',\'Custom\')">Save current as Custom</button>'
    + '</div></div>'

  return html
}

//    Chart initialisation                                                       
function initCharts(tab) {
  setTimeout(function() {
    if (tab === 'cost')     initDemandChart()
    if (tab === 'supply')   initFundingMixChart()
    if (tab === 'gap')      initGapChart()
    if (tab === 'revenue')  initRevenueChart()
    if (tab === 'cashflow') { initCashFlowChart(); initQtrlyChart() }
  }, 100)
}

function destroyChart(id) {
  if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id] }
}

function initDemandChart() {
  var el = document.getElementById('chart-demand'); if (!el) return
  destroyChart('demand')
  var yrs = MODEL.programme_years
  var capex  = calcCapex().total
  var opex   = calcOpex().total
  var ucdev  = ucDevPhase()
  var people = calcPeople().byYear
  var cxph   = capexPhase()
  var labels = Array.from({length:yrs},function(_,i){ return 'Y'+(i+1) })
  CHARTS['demand'] = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label:'CapEx',   data:labels.map(function(_,i){ return Math.round((cxph[i+1]||0)*capex) }), backgroundColor:'#1C38F5', stack:'s' },
        { label:'OpEx',    data:labels.map(function(){ return opex }),                                 backgroundColor:'#002870', stack:'s' },
        { label:'UC Dev',  data:labels.map(function(_,i){ return Math.round(ucdev[i+1]||0) }),         backgroundColor:'#FFB600', stack:'s' },
        { label:'People',  data:labels.map(function(_,i){ return people[i+1]||0 }),                   backgroundColor:'#00B290', stack:'s' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom', labels:{boxWidth:12,font:{size:10}}} }, scales:{ x:{stacked:true}, y:{stacked:true, ticks:{font:{size:10}}} } }
  })
}

function initFundingMixChart() {
  var el = document.getElementById('chart-funding-mix'); if (!el) return
  destroyChart('funding-mix')
  var sup = calcTotalSupply()
  var labels = [], data = [], colors = []
  var colorMap = { grant:'#00B290', loan:'#1C38F5', scheme:'#002870', vgf:'#FFB600', inkind:'#6B7280', equity:'#FF5539', revenue_share:'#8B5CF6' }
  Object.keys(sup.byType).forEach(function(k) {
    if (sup.byType[k] > 0) { labels.push(k.replace('_',' ')); data.push(sup.byType[k]); colors.push(colorMap[k]||'#ccc') }
  })
  if (!data.length) return
  CHARTS['funding-mix'] = new Chart(el.getContext('2d'), {
    type: 'doughnut',
    data: { labels:labels, datasets:[{ data:data, backgroundColor:colors }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom', labels:{boxWidth:12,font:{size:10}}} } }
  })
}

function initGapChart() {
  var el = document.getElementById('chart-gap'); if (!el) return
  destroyChart('gap')
  var demand  = calcDemandByYear()
  var rev     = calcRevenue()
  var sup     = calcTotalSupply()
  var supPerYr = sup.total / MODEL.programme_years
  var yrs     = MODEL.programme_years
  var labels  = Array.from({length:yrs},function(_,i){ return 'Y'+(i+1) })
  CHARTS['gap'] = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label:'Demand',  data:labels.map(function(_,i){ return demand[i+1]||0 }),    backgroundColor:'rgba(255,85,57,0.5)', stack:'a' },
        { label:'Supply',  data:labels.map(function(){ return Math.round(supPerYr) }), backgroundColor:'rgba(0,178,144,0.6)', stack:'b' },
        { label:'Revenue', data:labels.map(function(_,i){ return rev.gpByYear ? rev.gpByYear[i+1]||0 : 0 }), backgroundColor:'rgba(28,56,245,0.5)', stack:'b' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom', labels:{boxWidth:12,font:{size:10}}} }, scales:{ y:{ticks:{font:{size:10}}} } }
  })
}

function initRevenueChart() {
  var el = document.getElementById('chart-revenue'); if (!el) return
  destroyChart('revenue')
  var rev  = calcRevenue()
  var yrs  = MODEL.programme_years
  var labels = Array.from({length:yrs},function(_,i){ return 'Y'+(i+1) })
  CHARTS['revenue'] = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label:'Gross revenue', data:labels.map(function(_,i){ return rev.byYear[i+1]||0 }),  backgroundColor:'rgba(0,40,112,0.15)', yAxisID:'y' },
        { label:'Gross profit',  data:labels.map(function(_,i){ return rev.gpByYear ? rev.gpByYear[i+1]||0 : 0 }),  backgroundColor:'rgba(0,178,144,0.5)', yAxisID:'y' },
        { label:'Territory GST', data:labels.map(function(_,i){ return rev.gstByYear[i+1]||0 }), type:'line', borderColor:'#FFB600', backgroundColor:'#FFB600', fill:false, tension:0.3, yAxisID:'y' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom', labels:{boxWidth:12,font:{size:10}}} }, scales:{ y:{ticks:{font:{size:10}}} } }
  })
}

function initCashFlowChart() {
  var el = document.getElementById('chart-cashflow'); if (!el) return
  destroyChart('cashflow')
  var cf = calcCashFlow()
  var labels = cf.quarters.map(function(q){ return 'Q'+q.q })
  var cumData = cf.quarters.map(function(q){ return q.cumulative })
  var peakIdx = cumData.indexOf(Math.min.apply(null, cumData))
  CHARTS['cashflow'] = new Chart(el.getContext('2d'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label:'Cumulative cash (Rs Cr)', data:cumData, borderColor:'#1C38F5', backgroundColor:'rgba(28,56,245,0.08)', fill:true, tension:0.3, pointRadius:0, pointHoverRadius:4 },
        { label:'Break-even', data:cf.quarters.map(function(){ return 0 }), borderColor:'rgba(0,178,144,0.5)', borderDash:[5,5], pointRadius:0, fill:false }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom',labels:{boxWidth:12,font:{size:10}}},
        annotation:{ annotations: cf.breakevenQtr ? [{ type:'line', xMin:cf.breakevenQtr-1, xMax:cf.breakevenQtr-1, borderColor:'#00B290', borderWidth:2, label:{display:true, content:'Break-even Q'+cf.breakevenQtr, position:'start', font:{size:9}} }] : [] }
      },
      scales:{ y:{ticks:{font:{size:10}}} }
    }
  })
}

function initQtrlyChart() {
  var el = document.getElementById('chart-qtrly'); if (!el) return
  destroyChart('qtrly')
  var cf = calcCashFlow()
  // Show yearly aggregated for readability
  var labels = Array.from({length:MODEL.programme_years},function(_,i){ return 'Y'+(i+1) })
  var outflows = [], inflows = []
  for (var yr = 1; yr <= MODEL.programme_years; yr++) {
    var yrQtrs = cf.quarters.filter(function(q){ return q.yr === yr })
    outflows.push(yrQtrs.reduce(function(s,q){ return s+q.outflow },0))
    inflows.push(yrQtrs.reduce(function(s,q){ return s+q.inflow },0))
  }
  CHARTS['qtrly'] = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label:'Total outflow', data:outflows.map(function(v){ return -v }), backgroundColor:'rgba(255,85,57,0.6)' },
        { label:'Total inflow',  data:inflows,                                backgroundColor:'rgba(0,178,144,0.6)' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom',labels:{boxWidth:12,font:{size:10}}} }, scales:{ y:{ticks:{font:{size:10}}} } }
  })
}

//    Form helpers                                                               
function fmtInput(label, type, val, onchange, extra) {
  return '<div><label>' + esc(label) + '</label><input type="' + type + '" value="' + esc(String(val||'')) + '" onchange="' + onchange + '"' + (extra ? ' ' + extra : '') + '></div>'
}
function fmtSelect(label, val, options, labelFn, onchange) {
  return '<div><label>' + esc(label) + '</label><select onchange="' + onchange + '">'
    + options.map(function(o){ return '<option value="' + o + '"' + (val==o?' selected':'') + '>' + esc(labelFn(o)) + '</option>' }).join('')
    + '</select></div>'
}
function kpiCard(label, val, color) {
  return '<div class="ucrd"><div class="ucrd-v" style="color:' + color + '">' + esc(val) + '</div><div class="ucrd-l">' + esc(label) + '</div></div>'
}

//    Funding source CRUD                                                        
async function addFundingSource() {
  var fs = { id: genId(), engagement_id: ENGAGEMENT_ID||'standalone', name: 'New source', type: 'scheme', amount_cr: 0, start_year: 1, end_year: MODEL.programme_years }
  FUNDING_SOURCES.push(fs)
  if (ENGAGEMENT_ID) await sbPost('tsap_funding_sources', fs)
  switchTab('supply')
}

async function removeFundingSource(id) {
  FUNDING_SOURCES = FUNDING_SOURCES.filter(function(fs){ return fs.id !== id })
  if (ENGAGEMENT_ID) await sbDelete('tsap_funding_sources', 'id=eq.' + id)
  switchTab('supply')
}

async function updateFS(id, field, value) {
  var fs = FUNDING_SOURCES.find(function(f){ return f.id === id })
  if (!fs) return
  fs[field] = value
  if (ENGAGEMENT_ID) {
    var patch = {}; patch[field] = value
    var sb = getSB()
    await fetch(sb.url + '/rest/v1/tsap_funding_sources?id=eq.' + id, {
      method: 'PATCH',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(patch)
    })
  }
  switchTab('supply')
}

//    Scenario save / load                                                       
async function saveScenario(name, label) {
  if (!ENGAGEMENT_ID) { showToast('Load an engagement first', 'error'); return }
  var payload = {
    id: 'sc-' + ENGAGEMENT_ID + '-' + name,
    engagement_id: ENGAGEMENT_ID,
    name: name,
    label: label || name,
    model_json: MODEL,
    results_json: { gap: calcFundingGap(), rev: calcRevenue(), cf: { irr: calcCashFlow().irr, npv: calcCashFlow().npv } },
    updated_at: new Date().toISOString()
  }
  var ok = await sbPost('tsap_scenarios', payload)
  showToast(ok ? 'Scenario saved' : 'Save failed', ok ? '' : 'error')
}

//    Boot                                                                       
async function init() {
  // Load unit costs
  var rows = await sbGet('tsap_unit_costs', 'active=eq.true', 200)
  rows.forEach(function(r) { UNIT_COSTS[r.item_code] = r })
  console.log('Unit costs loaded:', Object.keys(UNIT_COSTS).length)

  // Load engagements
  await loadFXRates()
  ALL_ENGAGEMENTS = await sbGet('engagements', 'order=name.asc', 50) || []

  // Parse engagement from URL
  var params = new URLSearchParams(window.location.search)
  ENGAGEMENT_ID = params.get('eng') || null
  if (ENGAGEMENT_ID) {
    var eng = ALL_ENGAGEMENTS.find(function(e){ return e.id === ENGAGEMENT_ID })
    if (eng) {
      ENGAGEMENT_NAME = eng.name || ''
      MODEL.programme_name = ENGAGEMENT_NAME + '   TSAP Financial Model'
      MODEL.territory = eng.territory || MODEL.territory
    }

    // Load SASC output for this engagement
    var sascItems = await sbGet('docket_items', 'engagement_id=eq.' + ENGAGEMENT_ID + '&item_type=eq.solution&order=created_at.desc', 1)
    if (sascItems && sascItems[0] && sascItems[0].content) {
      SASC_DATA = sascItems[0].content
      console.log('SASC data loaded for engagement:', ENGAGEMENT_ID)
    }

    // Load funding sources
    FUNDING_SOURCES = await sbGet('tsap_funding_sources', 'engagement_id=eq.' + ENGAGEMENT_ID, 50) || []

    // Load last saved scenario
    var savedScenarios = await sbGet('tsap_scenarios', 'engagement_id=eq.' + ENGAGEMENT_ID + '&name=eq.custom&order=updated_at.desc', 1)
    if (savedScenarios && savedScenarios[0] && savedScenarios[0].model_json) {
      Object.assign(MODEL, savedScenarios[0].model_json)
    }
  }

  // Populate engagement dropdown
  var sel = document.getElementById('eng-select')
  if (sel && ALL_ENGAGEMENTS.length) {
    ALL_ENGAGEMENTS.forEach(function(e) {
      var opt = document.createElement('option')
      opt.value = e.id
      opt.textContent = e.name || e.id
      if (e.id === ENGAGEMENT_ID) opt.selected = true
      sel.appendChild(opt)
    })
  }

  if (ENGAGEMENT_NAME) document.getElementById('eng-status').textContent = ENGAGEMENT_NAME
  updateHeader()
  TP_INIT_DONE = true
  if (TP.stage === 'home') switchTab(ACTIVE_TAB || 'cost')
}

async function selectEngagement(id) {
  if (!id) { ENGAGEMENT_ID = null; ENGAGEMENT_NAME = ''; document.getElementById('eng-status').textContent = ''; switchTab('cost'); return }
  window.location.href = window.location.pathname + '?eng=' + id
}

init()
