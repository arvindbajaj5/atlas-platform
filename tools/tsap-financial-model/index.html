<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSAP Financial Model   ATLAS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#002870;--orange:#FF5539;--teal:#00B290;--blue:#1C38F5;--amber:#FFB600;
  --dark:#111827;--mid:#6B7280;--light:#F8F9FA;--white:#fff;--border:#E5E7EB;--card:#fff;
  --r:8px;--r-sm:6px
}
body{font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:#F0F2F5;min-height:100vh}
/* Header */
.hdr{background:var(--navy);color:#fff;padding:14px 20px}
.hdr-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.hdr-title{font-size:16px;font-weight:700}
.hdr-territory{font-size:11px;opacity:0.7;margin-top:2px}
.hdr-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hdr-kpi{background:rgba(255,255,255,0.1);border-radius:var(--r-sm);padding:8px 10px}
.hdr-kpi-val{font-size:14px;font-weight:700}
.hdr-kpi-lbl{font-size:10px;opacity:0.7;margin-top:1px}
/* Engagement bar */
.eng-bar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px}
.eng-bar select{flex:1;max-width:300px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:'Inter',sans-serif}
/* Tabs */
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.tab-btn{padding:10px 14px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:var(--mid);font-family:'Inter',sans-serif;white-space:nowrap;margin-bottom:-1px;transition:color 0.15s}
/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hdr{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px}
/* KPI cards */
.ucrd{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center}
.ucrd-v{font-size:16px;font-weight:700;margin-bottom:2px}
.ucrd-l{font-size:11px;color:var(--mid)}
/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
input[type=number],input[type=text],select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:'Inter',sans-serif;color:var(--dark);background:var(--white)}
/* Tables */
.fm-tbl{width:100%;border-collapse:collapse;font-size:12px}
.fm-tbl th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);color:var(--mid);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.fm-tbl td{padding:5px 8px;border-bottom:1px solid var(--border)}
.fm-tbl .total-row{border-top:2px solid var(--navy)}
.fm-tbl .total-row td{font-weight:700;color:var(--navy)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--dark)}
.btn-primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-outline{background:transparent;color:var(--navy);border-color:var(--navy)}
/* Main */
.main{padding:16px;max-width:980px;margin:0 auto}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.toast-err{background:#c0341a}

/*    ATLAS Standard Masthead                                                 */
.atlas-hdr{background:var(--navy,#002870);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.atlas-hdr-left{display:flex;align-items:center;gap:12px;}
.atlas-brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:3px;white-space:nowrap;}
.atlas-brand span{color:#FF5539;}
.atlas-tool-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);padding:3px 8px;background:rgba(255,255,255,0.1);border-radius:4px;letter-spacing:.3px;}
.atlas-eng-badge{font-size:11px;color:rgba(255,255,255,0.6);padding:3px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.atlas-eng-badge strong{color:#fff;}
.atlas-hdr-right{display:flex;align-items:center;gap:8px;}
.atlas-ver{font-size:10px;font-weight:700;color:#FF5539;padding:2px 7px;background:rgba(255,85,57,0.15);border-radius:10px;white-space:nowrap;}
.atlas-nav-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;font-family:inherit;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.8);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.atlas-nav-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.4);}
.atlas-nav-btn:disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.atlas-nav-btn.orange{background:#FF5539;border-color:#FF5539;color:#fff;}
.atlas-nav-btn.orange:hover{background:#e04530;}
.atlas-nav-btn.teal{background:rgba(0,178,144,0.15);border-color:#00B290;color:#00B290;}
.atlas-nav-btn.teal:hover{background:rgba(0,178,144,0.25);}
</style>
</head>
<body>

<div class="atlas-hdr">
  <div class="atlas-hdr-left">
    <div class="atlas-brand">ATL<span>A</span>S</div>
    <div class="atlas-tool-name">Financial Model</div>
    <div class="atlas-eng-badge" id="hdr-territory">Loading...</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div style="text-align:center"><div style="font-size:12px;font-weight:700;color:#fff" id="hdr-demand"> </div><div style="font-size:9px;color:rgba(255,255,255,0.45)">Demand</div></div>
    <div style="color:rgba(255,255,255,0.15)">|</div>
    <div style="text-align:center"><div style="font-size:12px;font-weight:700;color:#4ade80" id="hdr-supply"> </div><div style="font-size:9px;color:rgba(255,255,255,0.45)">Supply</div></div>
    <div style="color:rgba(255,255,255,0.15)">|</div>
    <div style="text-align:center"><div style="font-size:12px;font-weight:700" id="hdr-gap"> </div><div style="font-size:9px;color:rgba(255,255,255,0.45)">Net commitment</div></div>
    <div style="color:rgba(255,255,255,0.15)">|</div>
    <div style="text-align:center"><div style="font-size:12px;font-weight:700;color:#4ade80" id="hdr-coverage"> </div><div style="font-size:9px;color:rgba(255,255,255,0.45)">Coverage</div></div>
  </div>
  <div class="atlas-hdr-right">
    <span class="atlas-ver">v1.0</span>
    <button class="atlas-nav-btn" onclick="window.location.href='../../'">&#8592; Portal</button>
  </div>
</div>

<div class="eng-bar">
  <span style="font-size:11px;font-weight:600;color:var(--mid);white-space:nowrap">Engagement:</span>
  <select id="eng-select" onchange="selectEngagement(this.value)">
    <option value="">-- Standalone --</option>
  </select>
  <span style="font-size:11px;color:var(--teal);font-weight:600" id="eng-status"></span>
</div>

<div class="tab-bar">
  <button class="tab-btn" data-tab="profile"  onclick="switchTab('profile')">&#127919; Territory Profile</button>
  <button class="tab-btn" data-tab="cost"     onclick="switchTab('cost')">Programme Cost</button>
  <button class="tab-btn" data-tab="supply"   onclick="switchTab('supply')">Funding Sources</button>
  <button class="tab-btn" data-tab="gap"      onclick="switchTab('gap')">Funding Gap</button>
  <button class="tab-btn" data-tab="revenue"  onclick="switchTab('revenue')">Revenue Model</button>
  <button class="tab-btn" data-tab="cashflow" onclick="switchTab('cashflow')">Cash Flow</button>
  <button class="tab-btn" data-tab="whatif" onclick="switchTab('whatif')">What-If</button>
</div>
<div style="display:flex;gap:3px;align-items:center;padding:4px 12px;border-bottom:1px solid #E5E7EB;background:#fff"><span style="font-size:10px;color:#6B7280;margin-right:4px">Currency:</span><span id="curr-btns"></span></div>

<div class="main">
  <div id="tab-content"><div style="padding:40px;text-align:center;color:var(--mid)">Loading...</div></div>
</div>

<div id="toast" class="toast"></div>

<script charset="utf-8">//    atlasLogUsage (shared, injected into tools that call AI APIs)             
function atlasGetCfg2() { try{return JSON.parse(localStorage.getItem('atlas_global_cfg')||'{}')}catch(e){return {}} }
var _UC_PRICING = null
async function sbInsert(table, data) {
  var sb = getSB(); if (!sb.url) return null
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table, {
      method:'POST',
      headers:{apikey:sb.key,Authorization:'Bearer '+sb.key,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify(data)
    })
    return r.ok
  } catch(e) { return false }
}

async function _loadPricing() {
  if (_UC_PRICING) return _UC_PRICING
  var g=atlasGetCfg2(); var sb={url:g.sbUrl||g.sb_url||'',key:g.sbKey||g.sb_key||''}
  if (!sb.url) { _UC_PRICING={}; return _UC_PRICING }
  try {
    var r=await fetch(sb.url+'/rest/v1/app_config?key=like.price_%&limit=50',{headers:{apikey:sb.key,Authorization:'Bearer '+sb.key}})
    if (r.ok) { var rows=await r.json(); _UC_PRICING={}; rows.forEach(function(row){_UC_PRICING[row.key]=parseFloat(row.value)||0}) }
    else _UC_PRICING={}
  } catch(e) { _UC_PRICING={} }
  return _UC_PRICING
}
function _calcAPIcost(model, inTok, outTok) {
  if (!_UC_PRICING) return 0
  var m=(model||'').toLowerCase()
  var prefix = m.startsWith('gemini-2.0')?'price_gemini_2_0_flash':m.startsWith('gemini-3.1')?'price_gemini_3_1_flash_lite':m.startsWith('gemini-3.5')?'price_gemini_3_5_flash':m.startsWith('claude-haiku')?'price_claude_haiku_4_5':m.startsWith('claude-sonnet')?'price_claude_sonnet_4_6':'price_gemini_3_1_flash_lite'
  return ((inTok*(_UC_PRICING[prefix+'_input']||0))+(outTok*(_UC_PRICING[prefix+'_output']||0)))/1000000
}
async function atlasLogUsage(params) {
  try {
    await _loadPricing()
    var g=atlasGetCfg2(); var sb={url:g.sbUrl||g.sb_url||'',key:g.sbKey||g.sb_key||''}
    if (!sb.url||!sb.key) return
    var inT=params.input_tokens||0, outT=params.output_tokens||0, model=params.model||'unknown'
    var provider=model.startsWith('gemini')?'google':model.startsWith('claude')?'anthropic':model.startsWith('sarvam')?'sarvam':'other'
    fetch(sb.url+'/rest/v1/api_usage_log',{method:'POST',headers:{apikey:sb.key,Authorization:'Bearer '+sb.key,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({tool:params.tool||'unknown',call_type:params.call_type||'api_call',provider:provider,model:model,input_tokens:inT,output_tokens:outT,cost_usd:_calcAPIcost(model,inT,outT),latency_ms:params.latency_ms||0,status:params.status||'success',engagement_id:params.engagement_id||null,topic_code:params.topic_code||null,session_id:null,notes:params.notes||null})}).catch(function(){})
  } catch(e) {}
}

//    Currency layer                                                             
var FX_RATES = { usd_inr: 95.76, usd_eur: 0.865, eur_inr: 110.70, _source: 'config', _date: '' }
var ACTIVE_CURRENCY = 'INR'
async function loadFXRates() {
  try {
    var ctrl = new AbortController()
    var timeout = setTimeout(function(){ ctrl.abort() }, 4000)
    var r = await fetch('https://api.frankfurter.app/latest?from=USD&to=INR,EUR', { signal: ctrl.signal })
    clearTimeout(timeout)
    if (r.ok) {
      var data = await r.json()
      if (data && data.rates) {
        if (data.rates.INR) FX_RATES.usd_inr = data.rates.INR
        if (data.rates.EUR) FX_RATES.usd_eur = data.rates.EUR
        if (FX_RATES.usd_inr && FX_RATES.usd_eur) FX_RATES.eur_inr = Math.round(FX_RATES.usd_inr / FX_RATES.usd_eur * 100) / 100
        FX_RATES._date = data.date || new Date().toISOString().slice(0, 10)
        FX_RATES._source = 'live'
        return
      }
    }
  } catch(e) {}
  var g = atlasGetCfg2(); var sb = { url: g.sbUrl||g.sb_url||'', key: g.sbKey||g.sb_key||'' }
  if (!sb.url) return
  try {
    var r2 = await fetch(sb.url+'/rest/v1/app_config?key=in.(fx_usd_inr,fx_usd_eur,fx_eur_inr)', { headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key } })
    if (r2.ok) {
      var rows = await r2.json()
      rows.forEach(function(row) {
        if (row.key==='fx_usd_inr') FX_RATES.usd_inr = parseFloat(row.value)||95.76
        if (row.key==='fx_usd_eur') FX_RATES.usd_eur = parseFloat(row.value)||0.865
        if (row.key==='fx_eur_inr') FX_RATES.eur_inr = parseFloat(row.value)||110.70
      })
      FX_RATES._source = 'supabase'
    }
  } catch(e) {}
}
function renderCurrencySelector() {
  var html=''; var currencies=['INR','USD','EUR']
  for (var i=0;i<currencies.length;i++) {
    var c=currencies[i]; var on=ACTIVE_CURRENCY===c
    html+='<button data-curr="'+c+'" onclick="setCurrency(this.dataset.curr)" style="padding:3px 9px;border-radius:5px;font-size:11px;font-weight:'+(on?700:500)+';border:1px solid '+(on?'#002870':'#E5E7EB')+';background:'+(on?'#002870':'#ffffff')+';color:'+(on?'#ffffff':'#6B7280')+';cursor:pointer;margin-left:2px">'+c+'</button>'
  }
  return html
}
function setCurrency(c) {
  ACTIVE_CURRENCY=c
  var cb=document.getElementById('curr-btns'); if(cb) cb.innerHTML=renderCurrencySelector()
  if(typeof renderAll==='function') renderAll()
  if(typeof updateHeader==='function') updateHeader()
}

function fmtCr(v, dp) {
  var n = parseFloat(v || 0)
  if (ACTIVE_CURRENCY === 'USD') return '$' + (n * 10 / FX_RATES.usd_inr).toFixed(dp !== undefined ? dp : 1) + 'M'
  if (ACTIVE_CURRENCY === 'EUR') return 'EUR ' + (n * 10 / FX_RATES.usd_inr * FX_RATES.usd_eur).toFixed(dp !== undefined ? dp : 1) + 'M'
  return (dp === undefined ? Math.round(n) : n.toFixed(dp)).toLocaleString('en-IN')
}
function fmtCrFull(v) {
  if (ACTIVE_CURRENCY === 'USD') return '$' + (parseFloat(v||0) * 10 / FX_RATES.usd_inr).toFixed(1) + 'M'
  if (ACTIVE_CURRENCY === 'EUR') return 'EUR ' + (parseFloat(v||0) * 10 / FX_RATES.usd_inr * FX_RATES.usd_eur).toFixed(1) + 'M'
  return 'Rs ' + Math.round(parseFloat(v||0)).toLocaleString('en-IN') + ' Cr'
}


//                                                                            
// TSAP Financial Model   full build
// Both sides: demand (cost) derived from SASC + unit costs
//             supply (funding) with full instrument modelling
// Revenue model (Track 2), cash flow (quarterly), charts (Chart.js)
//                                                                            

//    Supabase                                                                   
function atlasGetGlobal() {
  try { return JSON.parse(localStorage.getItem('atlas_global_cfg') || '{}') } catch(e) { return {} }
}
function getSB() {
  var g = atlasGetGlobal()
  return { url: g.sbUrl || g.sb_url || '', key: g.sbKey || g.sb_key || '' }
}
async function sbFetch(table, params, limit) {
  return sbGet(table, params, limit)
}

async function sbGet(table, params, limit) {
  var sb = getSB(); if (!sb.url) return []
  try {
    var ctrl=new AbortController(); var tid=setTimeout(function(){ ctrl.abort() },8000)
    var r = await fetch(sb.url+'/rest/v1/'+table+'?'+params+(limit?'&limit='+limit:''),
      { headers:{apikey:sb.key,Authorization:'Bearer '+sb.key}, signal:ctrl.signal })
    clearTimeout(tid)
    return r.ok ? r.json() : []
  } catch(e) { return [] }
}
async function sbPost(table, data, prefer) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table, {
      method: 'POST',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key, 'Content-Type': 'application/json', Prefer: prefer || 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(data)
    })
    return r.ok
  } catch(e) { return false }
}
async function sbDelete(table, params) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table + '?' + params, { method: 'DELETE', headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key } })
    return r.ok
  } catch(e) { return false }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
// fmtCr, fmtCrFull: currency-aware versions in shared layer below
function showToast(msg, type) {
  var t = document.getElementById('toast')
  if (!t) return
  t.textContent = msg
  t.className = 'toast show' + (type === 'error' ? ' toast-err' : '')
  setTimeout(function() { t.className = 'toast' }, 3000)
}
function genId() { return 'fs-' + Date.now() + '-' + Math.floor(Math.random()*9999) }

//    State                                                                      
var ACTIVE_TAB = 'cost'
var ENGAGEMENT_ID = null
var ENGAGEMENT_NAME = ''
var ALL_ENGAGEMENTS = []
var UNIT_COSTS = {}      // keyed by item_code
var SASC_DATA = null     // latest SASC docket_item for engagement
var FUNDING_SOURCES = [] // from tsap_funding_sources
var ACTIVE_SCENARIO = 'base'
var CHARTS = {}          // Chart.js instances keyed by canvas id

//    Model state                                                                
var MODEL = {
  programme_name:    'TSAP Financial Model',
  territory:         'Himachal Pradesh',
  programme_years:   5,
  dc_type:           'mdc',
  phase1_mw:         10,
  fx_usd_inr:        85,
  discount_rate_pct: 10,

  // Demand overrides (null = use derived value)
  capex_override_cr:  null,
  opex_override_cr:   null,
  ucdev_override_cr:  null,

  // Revenue model
  rev_enabled:        true,
  rev_scenario:       'base',   // bear | base | bull
  rev_ramp_pct:       [8, 25, 55, 80, 100],   // Y1-Y5 as % of Y5 run-rate
  rev_capture_bear:   3.0,
  rev_capture_base:   7.0,
  rev_capture_bull:   15.0,
  rev_market_y1_cr:   34000,
  rev_market_cagr:    65.0,
  rev_gm_ow_pct:      40.0,
  rev_gst_rate:       18.0,
  rev_territory_gst_share: 45.0,
}

//    Unit cost helpers                                                          
function uc(code) { return UNIT_COSTS[code] || { value_usd: 0, value_inr: 0 } }
function ucInr(code) { return parseFloat(uc(code).value_inr || 0) }
function ucUsd(code) { return parseFloat(uc(code).value_usd || 0) }
function usdToCr(usd) { return usd * MODEL.fx_usd_inr / 10 }   // $M -> Rs Cr: $1M * 85 / 10 = 8.5 Cr

//    Demand calculations                                                        
function calcCapex() {
  if (MODEL.capex_override_cr !== null) return { total: MODEL.capex_override_cr, lines: [{ label: 'Override', cr: MODEL.capex_override_cr, source: 'manual' }] }
  var mw = MODEL.phase1_mw
  var isMDC = MODEL.dc_type === 'mdc'
  var lines = [
    { label: 'Compute (GPU accelerators)',       cr: usdToCr(ucUsd('capex_compute_per_mw') * mw),                         source: 'HAICE FM v2.1' },
    { label: 'MDC container / pod',              cr: isMDC ? usdToCr(ucUsd('capex_pod_per_mw') * mw) : 0,                 source: 'HAICE FM v2.1' },
    { label: 'Civil & structural',               cr: usdToCr(ucUsd(isMDC ? 'capex_civil_mdc_per_mw' : 'capex_civil_bm_per_mw') * mw), source: 'HAICE FM v2.1' },
    { label: 'DLC-HPAC cooling',                 cr: usdToCr(ucUsd(isMDC ? 'capex_cooling_mdc_per_mw' : 'capex_cooling_bm_per_mw') * mw), source: 'HAICE FM v2.1' },
    { label: 'Power & electrical',               cr: usdToCr(ucUsd(isMDC ? 'capex_power_mdc_per_mw' : 'capex_power_bm_per_mw') * mw), source: 'HAICE FM v2.1' },
    { label: 'Seismic risk + insurance',         cr: usdToCr(ucUsd(isMDC ? 'capex_seismic_mdc_per_mw' : 'capex_seismic_bm_per_mw') * mw), source: 'HAICE FM v2.1' },
    { label: 'Regulatory + environmental',       cr: ucInr(isMDC ? 'capex_regulatory_mdc' : 'capex_regulatory_bm'),       source: 'HAICE FM v2.1' },
  ]
  if (SASC_DATA && SASC_DATA.bom && SASC_DATA.bom.capex_usd) {
    var sascCr = usdToCr(SASC_DATA.bom.capex_usd / 1e6)
    lines.push({ label: 'SASC BOM additional items', cr: Math.max(0, sascCr - lines.reduce(function(s,l){ return s+l.cr },0)), source: 'SASC' })
  }
  var total = lines.reduce(function(s, l) { return s + l.cr }, 0)
  return { total: Math.round(total), lines: lines }
}

function calcOpex() {
  if (MODEL.opex_override_cr !== null) return { total: MODEL.opex_override_cr, lines: [{ label: 'Override', cr: MODEL.opex_override_cr }] }
  var lines = [
    { label: 'Power (hydel Rs 3.5/kWh, PUE 1.15)', cr: ucInr('opex_power_phase1') },
    { label: 'Core ops & maintenance',              cr: ucInr('opex_core_ops_phase1') },
    { label: 'NOC / SOC / inference engineering',   cr: ucInr('opex_noc_soc_phase1') },
    { label: 'DR + HP State Cloud + multi-site',    cr: ucInr('opex_dr_cloud_phase1') },
    { label: 'Bandwidth & connectivity',            cr: ucInr('opex_bandwidth_phase1') },
    { label: 'Sales, marketing & API platform',     cr: ucInr('opex_sales_phase1') },
    { label: 'Model licences',                      cr: ucInr('opex_model_licence') },
  ]
  var total = lines.reduce(function(s,l){ return s+l.cr },0)
  return { total: Math.round(total), lines: lines }
}

function calcUCDev() {
  if (MODEL.ucdev_override_cr !== null) return { total: MODEL.ucdev_override_cr, lines: [{ label: 'Override', cr: MODEL.ucdev_override_cr }] }
  if (!SASC_DATA || !SASC_DATA.selectedUCs) return { total: 0, lines: [] }
  var complexity = { simple:0, medium:0, complex:0, research:0 }
  var globalComp = (SASC_DATA.layerCfg && SASC_DATA.layerCfg.ucdev && SASC_DATA.layerCfg.ucdev.complexity) || 'medium'
  ;(SASC_DATA.selectedUCs || []).forEach(function(ucId) {
    var wl = (SASC_DATA.ucWorkloads || {})[ucId] || {}
    var comp = wl.complexity || globalComp
    complexity[comp] = (complexity[comp] || 0) + 1
  })
  var lines = []
  var costs = { simple: ucInr('ucdev_simple'), medium: ucInr('ucdev_medium'), complex: ucInr('ucdev_complex'), research: ucInr('ucdev_research') }
  Object.keys(complexity).forEach(function(tier) {
    if (complexity[tier] > 0) {
      lines.push({ label: complexity[tier] + ' x ' + tier + ' UC', cr: complexity[tier] * (costs[tier] || 8.5) })
    }
  })
  var uat = (SASC_DATA.selectedUCs.length || 0) * ucInr('ucdev_uat')
  if (uat > 0) lines.push({ label: 'UAT & acceptance testing', cr: uat })
  var total = lines.reduce(function(s,l){ return s+l.cr },0)
  return { total: Math.round(total), lines: lines }
}

function calcPeople() {
  if (!SASC_DATA || !SASC_DATA.peopleModel) return { byYear: [0,0,0,0,0,0], total: 0 }
  var pm = SASC_DATA.peopleModel
  var duration = pm.duration_months || 12
  var byYear = [0,0,0,0,0,0]
  if (pm.yearCosts) {
    byYear = [0, pm.yearCosts[0]||0, pm.yearCosts[1]||0, pm.yearCosts[2]||0, 0, 0]
  } else if (pm.total) {
    // Distribute evenly
    var perYear = pm.total / Math.ceil(duration/12)
    for (var y = 1; y <= Math.ceil(duration/12); y++) byYear[y] = Math.round(perYear)
  }
  var total = byYear.reduce(function(s,v){ return s+v },0)
  return { byYear: byYear, total: total }
}

function capexPhase() {
  return MODEL.dc_type === 'mdc' ? [0, 0.60, 0.30, 0.10, 0, 0] : [0, 0.20, 0.40, 0.40, 0, 0]
}

function ucDevPhase() {
  var total = calcUCDev().total
  return [0, total*0.40, total*0.40, total*0.20, 0, 0]  // waves 1/2/3
}

function calcDemandByYear() {
  var capex  = calcCapex().total
  var opex   = calcOpex().total
  var ppl    = calcPeople().byYear
  var ucdev  = ucDevPhase()
  var cxPh   = capexPhase()
  var yrs = MODEL.programme_years
  var byYear = [0,0,0,0,0,0]
  for (var y = 1; y <= yrs; y++) {
    byYear[y] = Math.round(
      (cxPh[y]||0) * capex +
      opex +
      (ppl[y]||0) +
      (ucdev[y]||0)
    )
  }
  return byYear
}

function totalDemand() {
  return calcDemandByYear().slice(1, MODEL.programme_years+1).reduce(function(s,v){ return s+v },0)
}

//    Revenue model                                                              
function calcRevenue() {
  if (!MODEL.rev_enabled) return { byYear: [0,0,0,0,0,0], gstByYear: [0,0,0,0,0,0], totalRev: 0, totalGst: 0 }
  var m = MODEL
  var captureY5 = m.rev_scenario === 'bear' ? m.rev_capture_bear : m.rev_scenario === 'bull' ? m.rev_capture_bull : m.rev_capture_base
  var yrs = m.programme_years
  var byYear = [0,0,0,0,0,0]
  var gstByYear = [0,0,0,0,0,0]
  var gpByYear = [0,0,0,0,0,0]
  for (var y = 1; y <= yrs; y++) {
    var marketY = m.rev_market_y1_cr * Math.pow(1 + m.rev_market_cagr/100, y-1)
    var ramp = (m.rev_ramp_pct[y-1] || 100) / 100
    var rev = Math.round(marketY * (captureY5/100) * ramp)
    var gst = Math.round(rev * (m.rev_gst_rate/100) * (m.rev_territory_gst_share/100))
    var gp  = Math.round(rev * (m.rev_gm_ow_pct/100))
    byYear[y]  = rev
    gstByYear[y] = gst
    gpByYear[y]  = gp
  }
  var totalRev = byYear.slice(1,yrs+1).reduce(function(s,v){ return s+v },0)
  var totalGst = gstByYear.slice(1,yrs+1).reduce(function(s,v){ return s+v },0)
  return { byYear: byYear, gstByYear: gstByYear, gpByYear: gpByYear, totalRev: totalRev, totalGst: totalGst }
}

//    Supply / funding sources                                                   
function calcEMI(source) {
  if (source.type !== 'loan' || !source.interest_rate_pct || !source.tenure_years) return 0
  var P = source.amount_cr || 0
  var totalMonths = source.tenure_years * 12
  var moratorium = (source.moratorium_months || 0) + (source.grace_period_months || 0)
  var n = totalMonths - moratorium
  if (n <= 0) return P   // bullet
  var r = (source.interest_rate_pct / 100) / 12
  if (r === 0) return P / n
  var emi = P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1)
  return Math.round(emi * 100) / 100
}

function calcTotalInterest(source) {
  var emi = calcEMI(source)
  if (!emi) return 0
  var n = (source.tenure_years * 12) - ((source.moratorium_months||0) + (source.grace_period_months||0))
  return Math.round((emi * n - source.amount_cr) * 100) / 100
}

function calcTotalSupply() {
  var byType = { grant:0, loan:0, equity:0, vgf:0, inkind:0, scheme:0, revenue_share:0 }
  FUNDING_SOURCES.forEach(function(fs) {
    byType[fs.type] = (byType[fs.type]||0) + (fs.amount_cr||0)
  })
  var total = FUNDING_SOURCES.reduce(function(s,fs){ return s + (fs.amount_cr||0) },0)
  return { byType: byType, total: Math.round(total) }
}

function calcFundingGap() {
  var demand = totalDemand()
  var supply = calcTotalSupply().total
  var rev = calcRevenue()
  var netRev = rev.totalRev * (MODEL.rev_gm_ow_pct/100)  // only gross profit offsets cash
  var effective_supply = supply + netRev
  return {
    demand:            demand,
    supply:            supply,
    revenue_gp:        Math.round(netRev),
    effective_supply:  Math.round(effective_supply),
    net_commitment:    Math.max(0, demand - effective_supply),
    coverage_pct:      demand > 0 ? Math.round(effective_supply / demand * 100) : 0
  }
}

//    Cash flow (quarterly)                                                      
function calcCashFlow() {
  var yrs  = MODEL.programme_years
  var qtrs = yrs * 4
  var demand  = calcDemandByYear()
  var capex   = calcCapex().total
  var opex    = calcOpex().total
  var ucdev   = ucDevPhase()
  var ppl     = calcPeople().byYear
  var cxPh    = capexPhase()
  var rev     = calcRevenue()
  var supply  = calcTotalSupply()

  // Spread supply inflows evenly across programme quarters (simplified)
  var supplyPerQtr = supply.total / qtrs

  var quarters = []
  var cumulative = 0
  var peakCash = 0
  var breakevenQtr = null

  for (var q = 1; q <= qtrs; q++) {
    var yr = Math.ceil(q / 4)
    var qInYr = ((q-1) % 4)

    // Outflows
    var capexQ  = Math.round((cxPh[yr]||0) * capex / 4)
    var opexQ   = Math.round(opex / 4)
    var ucdevQ  = Math.round((ucdev[yr]||0) / 4)
    var peopleQ = Math.round((ppl[yr]||0) / 4)
    var loanEMI = FUNDING_SOURCES.filter(function(fs){
      return fs.type === 'loan' && (fs.start_year||1) <= yr && (fs.end_year||yrs) >= yr
    }).reduce(function(s,fs){
      // EMI is monthly, convert to quarterly
      var emi = calcEMI(fs)
      var morQ = Math.floor(((fs.moratorium_months||0) + (fs.grace_period_months||0)) / 3)
      var startQ = ((fs.start_year||1) - 1) * 4 + morQ + 1
      return q >= startQ ? s + emi * 3 : s
    }, 0)

    var outflow = capexQ + opexQ + ucdevQ + peopleQ + Math.round(loanEMI)

    // Inflows
    var revQ   = Math.round((rev.byYear[yr]||0) * (MODEL.rev_gm_ow_pct/100) / 4)
    var grantQ = Math.round(supplyPerQtr)
    var inflow = revQ + grantQ

    var net = inflow - outflow
    cumulative += net

    if (cumulative < peakCash) peakCash = cumulative
    if (breakevenQtr === null && cumulative >= 0 && q > 1) breakevenQtr = q

    quarters.push({
      q: q, yr: yr, qInYr: qInYr+1,
      capexQ: capexQ, opexQ: opexQ, ucdevQ: ucdevQ, peopleQ: peopleQ, loanEMI: Math.round(loanEMI),
      outflow: outflow,
      revQ: revQ, grantQ: grantQ, inflow: inflow,
      net: net, cumulative: cumulative
    })
  }

  // IRR (Newton-Raphson, quarterly cash flows)
  function calcIRR(cashflows) {
    var rate = 0.02
    for (var iter = 0; iter < 100; iter++) {
      var npv = 0, dnpv = 0
      for (var i = 0; i < cashflows.length; i++) {
        npv  += cashflows[i] / Math.pow(1+rate, i)
        dnpv -= i * cashflows[i] / Math.pow(1+rate, i+1)
      }
      if (Math.abs(npv) < 0.01) break
      rate -= npv / dnpv
    }
    return Math.round(rate * 4 * 100)  // annualise quarterly rate   %
  }

  var cfArr = quarters.map(function(q) { return q.net })
  cfArr.unshift(-(calcCapex().total * 0.2))  // initial investment

  // NPV at discount rate
  var discountQ = MODEL.discount_rate_pct / 100 / 4
  var npv = quarters.reduce(function(s,q) {
    return s + q.net / Math.pow(1 + discountQ, q.q)
  }, 0)

  return {
    quarters: quarters,
    peakCash: Math.round(peakCash),
    breakevenQtr: breakevenQtr,
    irr: calcIRR(cfArr),
    npv: Math.round(npv)
  }
}

//    JSON repair                                                                
function repairJSON(str) {
  return str
    .replace(/^```json\s*/,'').replace(/```\s*$/,'')
    .replace(/\r\n/g,' ').replace(/\r/g,' ').replace(/\n/g,' ').replace(/\t/g,' ')
    .replace(/[\x00-\x1F\x7F]/g,' ')
    .replace(/": true\|false/g,'": false')
    .replace(/": "true\|false"/g,'": false')
    .replace(/": boolean/g,'": false')
    .replace(/(\d),(\d{2,3})(?=,|\s|"|\})/g, function(m,a,b){ return a+b })
    .replace(/(\d),(\d{2,3})(?=,|\s|"|\})/g, function(m,a,b){ return a+b })
    .replace(/": ([a-zA-Z][a-zA-Z_-]*)([,\s\}])/g, function(m,w,t){
      return (w==='true'||w==='false'||w==='null') ? '": '+w+t : '": "'+w+'"'+t
    })
    .replace(/\}\s*"/g,'}, "')
    .replace(/([\d"tfn])\s{2,}"/g, function(m,c){ return c+', "' })
    .replace(/,(\s*[}\]])/g,'$1')
}

//    Gemini call                                                                
async function geminiCall(prompt, useSearch, maxTokens) {
  var key = getGeminiKey()
  if (!key) return { ok:false, error:'No Gemini API key in Settings' }
  var models = useSearch ? TP_SEARCH_MODELS : TP_MODELS
  for (var i=0; i<models.length; i++) {
    try {
      var body = { contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.1, maxOutputTokens:maxTokens||2048} }
      if (useSearch) body.tools = [{ google_search:{} }]
      var r = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/'+models[i]+':generateContent?key='+key,
        { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }
      )
      if (r.ok) {
        var data = await r.json()
        var text = ''
        var parts = data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts
        if (parts) parts.forEach(function(p){ if(p.text) text+=p.text })
        var tokens = (data.usageMetadata&&data.usageMetadata.totalTokenCount)||0
        console.log('[TP] geminiCall OK model='+models[i]+' tokens='+tokens)
        return { ok:true, text:text, tokens:tokens, model:models[i] }
      }
      console.log('[TP] skip model='+models[i]+' status='+r.status)
      if (r.status!==404&&r.status!==400) {
        var ed = await r.json().catch(function(){ return {} })
        return { ok:false, error:'API '+r.status+': '+(ed.error?ed.error.message:r.statusText) }
      }
    } catch(e) { return { ok:false, error:e.message } }
  }
  return { ok:false, error:'All Gemini models unavailable' }
}

//    callS2                                                                     
async function callS2(territory, s1data, objectives, freeText) {
  var prompt = buildS2Prompt(territory, s1data, objectives, freeText)
  tpTimerStart(Math.round(prompt.length/4))
  var result = await geminiCall(prompt, false, 3000)
  tpTimerStop()
  if (!result.ok) return { ok:false, error:result.error }
  TP_TOKENS.s2_prompt   = Math.round(result.tokens*0.6)
  TP_TOKENS.s2_response = Math.round(result.tokens*0.4)
  var parsed = parseSectionResponse(result.text)
  if (!parsed.ok) return { ok:false, error:'S2 parse: '+parsed.error }
  return { ok:true, data:parsed.data }
}

  digital:'{"internet_pct":0,"ofc_km":0,"nkn":false,"smart_cities":0,"bharatnet_pct":0,"govt_dcs":0,"swan":"partial"}',
  policy:'{"raw":["policy"],"useable":[{"point":"what this enables","source":"policy","impact":"medium"}]}',

  geography:'{"advantages":["text"],"constraints":["text"],"known_issues":{"social":["text"],"economic":["text"]}}',
  opportunities:'{"ai_opportunities":[{"domain":"Agriculture","relevance":"high","score":70,"rationale":"reason","example_ucs":["uc1"]}],"headline":"summary"}'
}

function buildSectionPrompt(name, rawText, territory) {
  return 'Extract ONLY the '+name+' data from this research about '+territory+', India.\n'
    +'Output ONLY valid JSON matching this schema. No explanation. No markdown. '
    +'Use null for missing values. Strings in double quotes. Numbers as plain decimals.\n\n'
    +'Schema: '+SECTION_SCHEMAS[name]+'\n\nResearch:\n'+rawText.substring(0,6000)
}

//    Parse section response                                                     
function parseSectionResponse(text) {
  var fullMatch = text.match(/\{[\s\S]*\}/)
  if (fullMatch) {
    try { return { ok:true, data:JSON.parse(repairJSON(fullMatch[0])) } } catch(e) {}
  }
  return { ok:false, error:'No valid JSON found' }
}

//    Extract one section                                                        
async function tpExtractOneSection(sectionName, rawText, territory) {
  var result = await geminiCall(buildSectionPrompt(sectionName, rawText, territory), false, 1024)
  if (!result.ok) return { ok:false, section:sectionName, error:result.error }
  TP_TOKENS.s1_extract += result.tokens
  var parsed = parseSectionResponse(result.text)
  if (!parsed.ok) {
    console.log('[TP] '+sectionName+' parse fail: '+result.text.substring(0,100))
    return { ok:false, section:sectionName, error:parsed.error, raw_response:result.text }
  }
  return { ok:true, section:sectionName, data:parsed.data }
}

//    Build TP.s1 from sections                                                  
function buildS1FromSections(results, territory) {
  var sections={}, failed={}
  results.forEach(function(r){ if(r.ok) sections[r.section]=r.data; else failed[r.section]={error:r.error,raw_response:r.raw_response||''} })
  var m=sections.macro||{}, e=sections.energy||{}, w=sections.water||{}
  var l=sections.land||{}, k=sections.workers||{}, d=sections.digital||{}
  var op=sections.opportunities||{}
  return {
    territory:territory, headline:op.headline||null,
    hard_stats:{ macro:m, energy:e, water:w, land:l, workers:k, digital:d },
    policy:sections.policy||{}, programmes:sections.programmes||{},
    geography:sections.geography||{}, ai_opportunities:op.ai_opportunities||[],
    _sections:sections, _failed:failed, _complete:Object.keys(failed).length===0
  }
}

//    Retry / skip section                                                       
async function tpRetrySection(sectionName) {
  if (!TP.s1||!TP._rawIntel) return
  var result = await tpExtractOneSection(sectionName, TP._rawIntel, TP.territory)
  if (result.ok) {
    delete TP.s1._failed[sectionName]
    TP.s1._sections[sectionName] = result.data
    var hs = {macro:1,energy:1,water:1,land:1,workers:1,digital:1}
    if (hs[sectionName]) TP.s1.hard_stats[sectionName] = result.data
    if (sectionName==='policy')       TP.s1.policy       = result.data
    if (sectionName==='programmes')   TP.s1.programmes   = result.data
    if (sectionName==='geography')    TP.s1.geography    = result.data
    if (sectionName==='opportunities'){ TP.s1.ai_opportunities=result.data.ai_opportunities||[]; TP.s1.headline=result.data.headline }
    TP.s1._complete = Object.keys(TP.s1._failed).length===0
    tpSaveProfile()
  } else { TP.s1._failed[sectionName].error = result.error }
  switchTab('profile')
}

function tpSkipSection(sectionName) {
  if (TP.s1&&TP.s1._failed) { delete TP.s1._failed[sectionName]; TP.s1._sections[sectionName]={} }
  switchTab('profile')
}

//    Save profile                                                               
async function tpRefreshIntel() {
  var territory = TP.territory
  if (!territory) return
  if (!confirm('Clear cached intelligence for '+territory+' and re-search? This will run a fresh Gemini search.')) return
  var slug = territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  // Delete from Supabase
  var sb = getSB()
  if (sb.url) {
    try {
      await fetch(sb.url+'/rest/v1/territory_profiles?id=eq.'+encodeURIComponent(slug),
        { method:'DELETE', headers:{ apikey:sb.key, Authorization:'Bearer '+sb.key,
          'Content-Type':'application/json', Prefer:'return=minimal' } })
      console.log('[TP] Cache deleted for '+slug)
    } catch(e) { console.log('[TP] Delete failed:', e) }
  }
  // Reset state
  TP.s1 = null; TP._rawIntel = null
  TP_TOKENS = { s1_raw:0, s1_extract:0, s2_prompt:0, s2_response:0 }
  // Go directly to search   bypass tpStartS1 entirely to avoid cache check
  if (!TP.archetypes.length) await loadTPData()
  await loadGeminiTextModel()
  var prompt = buildRawIntelPrompt(territory)
  TP.stage = 's1_loading'; switchTab('profile')
  tpTimerStart(Math.round(prompt.length/4))
  var result = await geminiCall(prompt, true, 4096)
  tpTimerStop()
  if (!result.ok) {
    TP.stage = 'home'; switchTab('profile')
    setTimeout(function(){ alert('Search failed: '+result.error) }, 100)
    return
  }
  TP_TOKENS.s1_raw = result.tokens; TP._rawIntel = result.text
  // Save fresh raw intel (overwrites old row)
  await sbInsert('territory_profiles', {
    id:slug, territory:territory, raw_intel:result.text,
    raw_cached_at:new Date().toISOString(), profile:null,
    generated_at:new Date().toISOString(),
    expires_at:new Date(Date.now()+90*24*60*60*1000).toISOString()
  })
  await tpRunExtraction(territory, result.text, slug)
}


async function tpSaveProfile() {
  if (!TP.s1) return
  var slug = TP.territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  await sbInsert('territory_profiles',{
    id:slug, territory:TP.territory, profile:TP.s1,

async function tpLoadCached(id) {

  else if (row.raw_intel) { await tpRunExtraction(row.territory,row.raw_intel,id) }
}

async function tpStartS1() {
  var inp = document.getElementById('tp-territory-input')
  var territory = inp ? inp.value.trim() : ''
  if (!territory) return
  TP.territory=territory; TP._rawIntel=null
  TP_TOKENS = { s1_raw:0, s1_extract:0, s2_prompt:0, s2_response:0 }
  if (!TP.archetypes.length) await loadTPData()
  await loadGeminiTextModel()
  var slug = territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  var cached = await sbFetch('territory_profiles','id=eq.'+encodeURIComponent(slug),1)
  if (cached&&cached[0]&&cached[0].raw_intel) {
    var exp = cached[0].expires_at ? new Date(cached[0].expires_at) : null
    if (!exp||exp>new Date()) {
      TP._rawIntel=cached[0].raw_intel
      if (cached[0].profile&&cached[0].profile._sections){ TP.s1=cached[0].profile; TP.stage='s1_done'; switchTab('profile'); return }
      await tpRunExtraction(territory,TP._rawIntel,slug); return
    }
  }
  var prompt = buildRawIntelPrompt(territory)
  TP.stage='s1_loading'; switchTab('profile')
  tpTimerStart(Math.round(prompt.length/4))
  var result = await geminiCall(prompt,true,4096)
  tpTimerStop()
  if (!result.ok){ TP.stage='home'; switchTab('profile'); setTimeout(function(){ alert('Search failed: '+result.error) },100); return }
  TP_TOKENS.s1_raw=result.tokens; TP._rawIntel=result.text
  await sbInsert('territory_profiles',{id:slug,territory:territory,raw_intel:result.text,
    raw_cached_at:new Date().toISOString(),profile:null,
    generated_at:new Date().toISOString(),expires_at:new Date(Date.now()+90*24*60*60*1000).toISOString()})
  await tpRunExtraction(territory,result.text,slug)
}

async function tpRunExtraction(territory, rawText, slug) {
  var SECS=['macro','energy','water','land','workers','digital','policy','programmes','geography','opportunities']
  TP._extracting={}; SECS.forEach(function(s){ TP._extracting[s]='pending' })
  TP.stage='s1_extracting'; switchTab('profile'); tpTimerStart(0)
  function updateDot(name,status){
    TP._extracting[name]=status
    var el=document.getElementById('tp-sec-'+name); if (!el) return
    var dots={pending:'&#9711;',loading:'&#9680;',done:'&#9989;',error:'&#10060;'}
    var cols={pending:'var(--mid)',loading:'var(--navy)',done:'var(--teal)',error:'var(--orange)'}
    el.innerHTML='<span style="font-size:14px">'+dots[status]+'</span>'
      +'<span style="font-size:12px;color:'+cols[status]+'">'+el.dataset.label+'</span>'
  }
  var B1=SECS.slice(0,5); B1.forEach(function(s){ updateDot(s,'loading') })
  var r1=await Promise.all(B1.map(function(s){
    return tpExtractOneSection(s,rawText,territory).then(function(r){ updateDot(s,r.ok?'done':'error'); return r })
  }))
  await new Promise(function(res){ setTimeout(res,500) })
  var B2=SECS.slice(5); B2.forEach(function(s){ updateDot(s,'loading') })
  var r2=await Promise.all(B2.map(function(s){
    return tpExtractOneSection(s,rawText,territory).then(function(r){ updateDot(s,r.ok?'done':'error'); return r })
  }))
  tpTimerStop()
  TP.s1=buildS1FromSections(r1.concat(r2),territory); TP.stage='s1_done'
  tpSaveProfile(); switchTab('profile')
}

function ragClass(val, lo, hi) {
  // val: actual value, lo: green threshold, hi: red threshold
  if (val === null || val === undefined) return 'rag-grey'
  if (val <= lo) return 'rag-green'
  if (val >= hi) return 'rag-red'
  return 'rag-amber'
}
function indexRag(pct) {
  // pct vs national avg: <85% = green (cheaper), 85-115% = amber, >115% = red (costlier)
  if (!pct) return 'rag-grey'
  if (pct <= 85) return 'rag-green'
  if (pct >= 115) return 'rag-red'
  return 'rag-amber'
}
function arrow(pct) {
  if (!pct) return ''
  if (pct <= 85) return '&#9660; '
  if (pct >= 115) return '&#9650; '
  return '&#8212; '
}
function ragText(pct) {
  if (!pct) return 'N/A'
  return arrow(pct) + pct + '% of natl avg'
}

    + '<div style="font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;max-width:550px">'
    + 'Three-stage intelligence engine: objective data (4Ws, macros, digital)   policy and programme levers   AI-generated strategic profile matched to your objectives   archetype comparison.'
    + '</div>'
    + '</div>'

  // Input + archetypes
  html += '<div style="display:grid;grid-template-columns:1fr 280px;gap:14px">'

  html += '<div>'
    + '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:12px">'
    + '<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px">Generate territory intelligence</div>'
    + '<div style="font-size:11px;color:var(--mid);margin-bottom:12px">Enter any Indian state or UT. We search for current macroeconomic, energy, water, land, workforce and policy data.</div>'
    + '<div style="display:flex;gap:8px">'
    + '<input id="tp-territory-input" type="text" placeholder="e.g. Himachal Pradesh, Assam, Maharashtra..." '
    + 'style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit" '
    + 'onkeydown="if(event.key===\'Enter\')tpStartS1()">'
    + '<button onclick="tpStartS1()" style="padding:9px 18px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">&#9889; Generate</button>'
    + '</div></div>'

  // Past profiles
  html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 18px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">Cached profiles</div>'
    + '<div id="tp-past-list" style="font-size:12px;color:var(--mid);font-style:italic">Loading...</div>'
    + '</div>'

  html += '</div>'

  // Archetypes sidebar
  html += '<div><div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 18px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">Territory archetypes</div>'
    + TP.archetypes.map(function(a){
        return '<div style="padding:8px 0;border-bottom:1px solid var(--border)">'
          + '<div style="font-size:12px;font-weight:700;color:var(--navy)">' + (icons[a.id]||'') + ' ' + esc(a.name||a.id) + '</div>'
          + '<div style="font-size:10px;color:var(--mid);line-height:1.4;margin-top:2px">' + esc((a.description||'').substring(0,80)) + (a.description&&a.description.length>80?'...':'') + '</div>'
          + '</div>'
      }).join('')
    + '</div></div>'

  html += '</div></div>'
  // Load past profiles async
  setTimeout(tpLoadPast, 100)
  return html
}

function tpS1View() {
  var p = TP.s1; if (!p) return tpHome()
  var e = p.hard_stats && p.hard_stats.energy   || {}
  var w = p.hard_stats && p.hard_stats.water    || {}
  var l = p.hard_stats && p.hard_stats.land     || {}
  var k = p.hard_stats && p.hard_stats.workers  || {}
  var m = p.hard_stats && p.hard_stats.macro    || {}
  var d = p.hard_stats && p.hard_stats.digital  || {}
  var geo = p.geography || {}
  var pol = p.policy    || {}
  var prg = p.programmes || {}

  var html = '<div style="padding:16px 0">'

  if (p._failed && Object.keys(p._failed).length) html += tpRenderFailedSections(p._failed)

  // Header row
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    + '<div><div style="font-size:16px;font-weight:900;color:var(--navy)">' + esc(p.territory||TP.territory) + '</div>'
    + '<div style="font-size:11px;color:var(--mid);margin-top:2px">Territory Intelligence   Stage 1 of 3</div></div>'
    + '<div style="display:flex;gap:8px">'
    + '<button onclick="tpRefreshIntel()" style="padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;color:var(--mid)" title="Clear cache and re-search">&#8635; Refresh intelligence</button>'
    + '<button onclick="tpGoS2()" style="padding:9px 18px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">Set Objectives &#8594;</button>'
    + '</div>'
    + '</div>'

  // Headline
  if (p.headline) {
    html += '<div style="background:var(--navy);border-radius:8px;padding:14px 18px;color:#fff;margin-bottom:14px">'
      + '<div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Intelligence Headline</div>'
      + '<div style="font-size:14px;font-weight:500;line-height:1.5">' + esc(p.headline) + '</div>'
      + '</div>'
  }

  //    HARD STATS                                                              
  html += tpSectionHeader('HARD STATS', 'Objective data   macroeconomics, 4Ws, digital infrastructure', '#002870')

  // Cost indices strip
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px">'
  html += tpCostTile('&#9889; Energy Tariff', e.industrial_tariff ? 'Rs '+e.industrial_tariff+'/unit' : 'N/A',
    e.tariff_index_pct, e.dc_feasibility ? 'DC: '+e.dc_feasibility : null, 'lower is better')
  html += tpCostTile('&#128167; Water Cost', w.industrial_cost_per_kl ? 'Rs '+w.industrial_cost_per_kl+'/kL' : 'N/A',
    w.water_cost_index_pct, 'Stress: '+(w.stress_index||'N/A'), 'lower is better')
  html += tpCostTile('&#128119; Labour Cost', k.avg_engineer_salary_lakh ? 'Rs '+k.avg_engineer_salary_lakh+'L pa' : 'N/A',
    k.salary_index_pct, k.skilled_labour||null, 'lower is better')
  html += tpCostTile('&#127968; Land Cost', l.cost_per_acre_lakh ? 'Rs '+l.cost_per_acre_lakh+'L/acre' : 'N/A',
    l.land_cost_index_pct, 'Govt land: '+(l.govt_land||'N/A'), 'lower is better')
  var gei=e.green_energy_index||0
  var gRag=gei>=70?'rag-green':gei>=40?'rag-amber':'rag-red'
  var gBg={'rag-green':'#E1F5EE','rag-amber':'#FFF8E7','rag-red':'#FEE2E2'}[gRag]
  var gCol={'rag-green':'var(--teal)','rag-amber':'var(--amber)','rag-red':'var(--orange)'}[gRag]
  html += '<div style="background:'+gBg+';border-radius:8px;padding:12px 14px;border-left:4px solid '+gCol+'">'
    + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:4px">&#127807; Green Energy</div>'
    + '<div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px">'+(gei?gei+'/100':'N/A')+'</div>'
    + '<div style="font-size:11px;font-weight:700;color:'+gCol+'">'+(e.carbon_intensity_gco2?e.carbon_intensity_gco2+' gCO /kWh':'No data')+'</div>'
    + '<div style="font-size:10px;color:var(--mid);margin-top:3px">24x7: '+(e.green_24x7_feasibility||'N/A')+'</div>'
    + '</div>'
  html += '</div>'

  // Stats grid
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'

  // Macro
  html += tpStatCard('Macroeconomics', [
    { label:'GSDP', val: m.gsdp_cr ? 'Rs '+Number(m.gsdp_cr).toLocaleString('en-IN')+' Cr' : 'N/A', rag:'' },
    { label:'Growth', val: m.gsdp_growth_pct ? m.gsdp_growth_pct+'%' : 'N/A', rag: m.gsdp_growth_pct >= 7 ? 'rag-green' : m.gsdp_growth_pct >= 5 ? 'rag-amber' : 'rag-red' },
    { label:'Per capita vs national', val: m.vs_national_pct ? m.vs_national_pct+'%' : 'N/A', rag: indexRag(m.vs_national_pct) },
    { label:'Fiscal health', val: m.fiscal_health||'N/A', rag: m.fiscal_health==='surplus'?'rag-green':m.fiscal_health==='balanced'?'rag-amber':'rag-red' }
  ])

  // Energy
  html += tpStatCard('Energy (Watts)', [
    { label:'Installed capacity', val: e.installed_mw ? Number(e.installed_mw).toLocaleString('en-IN')+' MW' : 'N/A', rag:'' },
    { label:'Status', val: e.status||'N/A', rag: e.status==='surplus'?'rag-green':e.status==='balanced'?'rag-amber':'rag-red' },
    { label:'Grid reliability', val: e.grid_hrs ? e.grid_hrs+'h/day' : 'N/A', rag: e.grid_hrs>=22?'rag-green':e.grid_hrs>=18?'rag-amber':'rag-red' },
    { label:'Renewable mix', val: e.renewable_pct ? e.renewable_pct+'%' : 'N/A', rag: e.renewable_pct>=40?'rag-green':e.renewable_pct>=20?'rag-amber':'rag-red' },
    { label:'Industrial tariff vs avg', val: ragText(e.tariff_index_pct), rag: indexRag(e.tariff_index_pct) },
    { label:'DC power feasibility', val: e.dc_feasibility||'N/A', rag: e.dc_feasibility==='high'?'rag-green':e.dc_feasibility==='medium'?'rag-amber':'rag-red' }
  ])

  // Water
  html += tpStatCard('Water', [
    { label:'Annual rainfall', val: w.rainfall_mm ? w.rainfall_mm+' mm' : 'N/A', rag: w.rainfall_mm>=800?'rag-green':w.rainfall_mm>=400?'rag-amber':'rag-red' },
    { label:'Stress index', val: w.stress_index||'N/A', rag: w.stress_index==='low'?'rag-green':w.stress_index==='medium'?'rag-amber':'rag-red' },
    { label:'Rivers', val: (w.perennial_rivers||[]).slice(0,3).join(', ')||'N/A', rag:'' },
    { label:'DC cooling', val: w.dc_cooling||'N/A', rag: w.dc_cooling==='high'?'rag-green':w.dc_cooling==='medium'?'rag-amber':'rag-red' },
    { label:'Water cost vs avg', val: ragText(w.water_cost_index_pct), rag: indexRag(w.water_cost_index_pct) }
  ])

  // Land
  html += tpStatCard('Land (Acres)', [
    { label:'Area', val: l.area_sqkm ? Number(l.area_sqkm).toLocaleString('en-IN')+' km ' : 'N/A', rag:'' },
    { label:'Topography', val: l.topography||'N/A', rag: l.topography==='plains'?'rag-green':l.topography==='mixed'?'rag-amber':'rag-red' },
    { label:'Industrial parks / SEZs', val: (l.industrial_parks||0)+' / '+(l.sez_count||0), rag: (l.industrial_parks||0)>2?'rag-green':(l.industrial_parks||0)>0?'rag-amber':'rag-red' },
    { label:'Govt land avail.', val: l.govt_land||'N/A', rag: l.govt_land==='high'?'rag-green':l.govt_land==='medium'?'rag-amber':'rag-red' },
    { label:'Construction ease', val: l.construction_ease||'N/A', rag: l.construction_ease==='easy'?'rag-green':l.construction_ease==='moderate'?'rag-amber':'rag-red' },
    { label:'Land cost vs avg', val: ragText(l.land_cost_index_pct), rag: indexRag(l.land_cost_index_pct) }
  ])

  // Workers
  html += tpStatCard('Workers', [
    { label:'Population', val: k.population_lakh ? k.population_lakh+' lakh' : 'N/A', rag:'' },
    { label:'Literacy', val: k.literacy_pct ? k.literacy_pct+'%' : 'N/A', rag: k.literacy_pct>=80?'rag-green':k.literacy_pct>=65?'rag-amber':'rag-red' },
    { label:'Engineers/yr', val: k.engineers_per_year ? Number(k.engineers_per_year).toLocaleString('en-IN') : 'N/A', rag: k.engineers_per_year>=5000?'rag-green':k.engineers_per_year>=1000?'rag-amber':'rag-red' },
    { label:'Migration', val: k.migration||'N/A', rag: k.migration==='net_in'?'rag-green':k.migration==='balanced'?'rag-amber':'rag-red' },
    { label:'Skilled labour', val: k.skilled_labour||'N/A', rag: k.skilled_labour==='abundant'?'rag-green':k.skilled_labour==='adequate'?'rag-amber':'rag-red' },
    { label:'Salary vs avg', val: ragText(k.salary_index_pct), rag: indexRag(k.salary_index_pct) }
  ])

  // Digital
  html += tpStatCard('Digital', [
    { label:'Internet penetration', val: d.internet_pct ? d.internet_pct+'%' : 'N/A', rag: d.internet_pct>=60?'rag-green':d.internet_pct>=35?'rag-amber':'rag-red' },
    { label:'OFC backbone', val: d.ofc_km ? Number(d.ofc_km).toLocaleString('en-IN')+' km' : 'N/A', rag: d.ofc_km>=10000?'rag-green':d.ofc_km>=2000?'rag-amber':'rag-red' },
    { label:'NKN presence', val: d.nkn?'Yes':'No', rag: d.nkn?'rag-green':'rag-red' },
    { label:'Smart cities', val: d.smart_cities||'0', rag: d.smart_cities>0?'rag-green':'rag-amber' },
    { label:'BharatNet coverage', val: d.bharatnet_pct ? d.bharatnet_pct+'%' : 'N/A', rag: d.bharatnet_pct>=70?'rag-green':d.bharatnet_pct>=40?'rag-amber':'rag-red' },
    { label:'Govt DCs', val: d.govt_dcs||'0', rag: d.govt_dcs>0?'rag-green':'rag-amber' }
  ])

  html += '</div>'

  // Geography
  if ((geo.advantages||[]).length || (geo.constraints||[]).length) {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
    if ((geo.advantages||[]).length) {
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px">'
        + '<div style="font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;margin-bottom:8px">&#9989; Geography Advantages</div>'
        + (geo.advantages||[]).map(function(a){ return '<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">'+esc(a)+'</div>' }).join('')
        + '</div>'
    }
    if ((geo.constraints||[]).length) {
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px">'
        + '<div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;margin-bottom:8px">&#9888; Constraints</div>'
        + (geo.constraints||[]).map(function(a){ return '<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">'+esc(a)+'</div>' }).join('')
        + '</div>'
    }
    html += '</div>'
  }

  //    POLICY                                                                  
  html += tpSectionHeader('POLICY', 'Named policies converted to AI deployment enablers', '#5B21B6')
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">'
  var polItems = (pol.useable||[])
  if (polItems.length) {
    html += polItems.map(function(item){
      var impCol = item.impact==='high'?'var(--teal)':item.impact==='medium'?'var(--amber)':'var(--mid)'
      return '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:11px 14px;border-left:3px solid '+impCol+'">'
        + '<div style="font-size:11px;color:var(--mid);margin-bottom:3px">Source: '+esc(item.source||'')+'</div>'
        + '<div style="font-size:12px;line-height:1.4">'+esc(item.point||'')+'</div>'
        + '<div style="font-size:10px;color:'+impCol+';font-weight:700;margin-top:4px;text-transform:uppercase">'+esc(item.impact||'')+'</div>'
        + '</div>'
    }).join('')
  } else {
    html += '<div style="font-size:12px;color:var(--mid);grid-column:1/-1">No policy data available</div>'
  }
  html += '</div>'

  //    PROGRAMMES                                                              
  html += tpSectionHeader('PROGRAMMES', 'Central and state schemes converted to AI leverage points', '#065A82')
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px">'
  var prgItems = (prg.useable||[])
  if (prgItems.length) {
    var typeCol = { funding:'var(--teal)', infrastructure:'var(--blue)', mandate:'var(--orange)', capacity:'var(--amber)' }
    html += prgItems.map(function(item){
      var col = typeCol[item.type] || 'var(--mid)'
      return '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:11px 14px;border-left:3px solid '+col+'">'
        + '<div style="font-size:10px;font-weight:700;color:'+col+';text-transform:uppercase;margin-bottom:3px">'+esc(item.type||'programme')+'</div>'
        + '<div style="font-size:11px;color:var(--mid);margin-bottom:3px">'+esc(item.source||'')+'</div>'
        + '<div style="font-size:12px;line-height:1.4">'+esc(item.point||'')+'</div>'
        + '</div>'
    }).join('')
  } else {
    html += '<div style="font-size:12px;color:var(--mid);grid-column:1/-1">No programme data available</div>'
  }
  html += '</div>'

  // CTA
  html += '<div style="background:#E1F5EE;border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between">'
    + '<div><div style="font-size:13px;font-weight:700;color:var(--navy)">Stage 1 complete. Set your objectives to generate the territory profile.</div>'
    + '<div style="font-size:11px;color:var(--mid)">Select up to 5 objectives. Gemini will auto-profile the territory against them.</div></div>'
    + '<button onclick="tpGoS2()" style="padding:9px 18px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0">Set Objectives &#8594;</button>'
    + '</div>'

  html += '</div>'
  return html
}

function tpSectionHeader(title, sub, col) {
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+(col||'var(--border)')+'">'
    + '<div style="width:4px;height:28px;background:'+(col||'var(--navy)')+';border-radius:2px"></div>'
    + '<div><div style="font-size:12px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:'+(col||'var(--navy)')+'">'+title+'</div>'
    + '<div style="font-size:10px;color:var(--mid)">'+sub+'</div></div>'
    + '</div>'
}

function tpCostTile(label, value, indexPct, detail, direction) {
  var rag = indexRag(indexPct)
  var bgMap = { 'rag-green':'#E1F5EE', 'rag-amber':'#FFF8E7', 'rag-red':'#FEE2E2', 'rag-grey':'var(--light)' }
  var colMap = { 'rag-green':'var(--teal)', 'rag-amber':'var(--amber)', 'rag-red':'var(--orange)', 'rag-grey':'var(--mid)' }
  var bg  = bgMap[rag]  || 'var(--light)'
  var col = colMap[rag] || 'var(--mid)'
  return '<div style="background:'+bg+';border-radius:8px;padding:12px 14px;border-left:4px solid '+col+'">'
    + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:4px">'+label+'</div>'
    + '<div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px">'+esc(value)+'</div>'
    + (indexPct ? '<div style="font-size:11px;font-weight:700;color:'+col+'">'+arrow(indexPct)+indexPct+'% of national avg</div>' : '')
    + (detail ? '<div style="font-size:10px;color:var(--mid);margin-top:3px">'+esc(detail)+'</div>' : '')
    + '</div>'
}

function tpStatCard(title, rows) {
  return '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px">'+esc(title)+'</div>'
    + rows.map(function(r){
        var dot = r.rag ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+
          (r.rag==='rag-green'?'var(--teal)':r.rag==='rag-amber'?'var(--amber)':r.rag==='rag-red'?'var(--orange)':'var(--mid)')+
          ';margin-right:5px;flex-shrink:0;margin-top:2px"></span>' : ''
        return '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;border-bottom:1px solid var(--border);gap:8px">'
          + '<span style="font-size:11px;color:var(--mid);flex-shrink:0">'+esc(r.label)+'</span>'
          + '<span style="font-size:11px;font-weight:500;text-align:right;display:flex;align-items:flex-start">'+dot+esc(String(r.val))+'</span>'
          + '</div>'
      }).join('')
    + '</div>'
}

function tpGoS2() { TP.stage = 's2_form'; switchTab('profile') }
