<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS &mdash; Second Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#FF5539;--navy:#002870;--blue:#1C38F5;--teal:#00B290;--amber:#FFB600;--white:#FFF;--light:#F5F5F7;--mid:#B4B4BE;--dark:#282832;--r:8px;--shadow:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{font-size:16px;font-weight:900;color:var(--white);letter-spacing:3px;}
.hdr-brand span{color:var(--orange);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-badge{background:rgba(255,85,57,0.2);color:var(--orange);font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--orange);color:var(--white);}
.btn-primary:hover{background:#e6421f;}
.btn-ghost{background:rgba(255,255,255,0.15);color:var(--white);border:1px solid rgba(255,255,255,0.3);}
.btn-ghost:hover{background:rgba(255,255,255,0.25);}
.btn-outline{background:transparent;color:var(--navy);border:1px solid #d0d0d8;}
.btn-outline:hover{background:var(--navy);color:var(--white);}
.btn-teal{background:var(--teal);color:var(--white);}
.btn-teal:hover{background:#009a7c;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}
.btn-danger{background:transparent;color:#DC2626;border:1px solid #DC2626;}
.btn-danger:hover{background:#DC2626;color:var(--white);}
.shell{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
.sidebar{width:230px;background:var(--navy);overflow-y:auto;flex-shrink:0;padding:8px 0;}
.sb-section{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;padding:14px 16px 4px;}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;font-size:12px;color:rgba(255,255,255,0.65);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;}
.sb-item:hover,.sb-item.active{color:var(--white);background:rgba(255,255,255,0.08);border-left-color:var(--orange);}
.sb-item-label{display:flex;align-items:center;gap:7px;flex:1;}
.sb-count{font-size:10px;font-weight:700;background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:8px;color:rgba(255,255,255,0.4);flex-shrink:0;}
.sb-count.live{background:rgba(0,178,144,0.2);color:var(--teal);}
/* DEF umbrella */
.sb-cluster{padding:5px 16px 2px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.sb-cluster:hover{color:rgba(255,255,255,0.6);}
.sb-sub{padding-left:12px;}
.sb-sub .sb-item{font-size:11px;padding:5px 16px 5px 28px;color:rgba(255,255,255,0.5);}
.sb-sub .sb-item:hover,.sb-sub .sb-item.active{color:var(--white);}
/* Main */
.main{flex:1;overflow-y:auto;}
.domain-hdr{padding:20px 24px 0;border-bottom:1px solid #e0e0e8;background:var(--white);position:sticky;top:0;z-index:10;}
.domain-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.domain-sub{font-size:12px;color:var(--mid);margin-bottom:14px;}
.tabs{display:flex;gap:0;}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--mid);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.tab:hover{color:var(--navy);}
.tab.active{color:var(--navy);border-bottom-color:var(--orange);}
.tab-content{padding:20px 24px;display:none;}
.tab-content.active{display:block;}
/* Filter bar */
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #d0d0d8;background:var(--white);color:var(--mid);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--navy);color:var(--navy);}
.filter-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.filter-btn.mp.active{background:var(--orange);border-color:var(--orange);}
.filter-btn.di.active{background:var(--navy);border-color:var(--navy);}
.filter-btn.tw.active{background:var(--teal);border-color:var(--teal);}
/* Intel cards */
.intel-grid{display:flex;flex-direction:column;gap:10px;}
.intel-card{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);}
.intel-card:hover{border-color:#c0c0cc;}
.intel-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.intel-title{font-size:13px;font-weight:700;color:var(--dark);line-height:1.4;flex:1;}
.intel-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:0.3px;display:inline-block;}
.badge-mp{background:rgba(255,85,57,0.1);color:var(--orange);}
.badge-di{background:rgba(0,40,112,0.08);color:var(--navy);}
.badge-tw{background:rgba(0,178,144,0.1);color:var(--teal);}
.badge-high{background:rgba(255,85,57,0.1);color:var(--orange);}
.badge-medium{background:rgba(255,182,0,0.1);color:#9a7000;}
.badge-low{background:rgba(180,180,190,0.15);color:var(--mid);}
.badge-depth{background:rgba(28,56,245,0.08);color:var(--blue);}
.intel-summary{font-size:12px;color:#555;line-height:1.6;margin-bottom:6px;}
.intel-expanded{display:none;border-top:1px solid #f0f0f5;margin-top:8px;padding-top:8px;}
.intel-expanded.open{display:block;}
.intel-field{margin-bottom:8px;}
.intel-field-label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;}
.intel-field-val{font-size:12px;color:var(--dark);line-height:1.5;}
.intel-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--light);color:var(--mid);}
.tag-opp{background:rgba(0,178,144,0.08);color:var(--teal);}
.tag-comp{background:rgba(255,85,57,0.08);color:var(--orange);}
.intel-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
/* UC cards */
.uc-card{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;}
.uc-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;}
.uc-cluster{font-size:11px;color:var(--mid);margin-bottom:6px;}
.uc-rationale{font-size:12px;color:#555;line-height:1.5;margin-bottom:8px;}
.uc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;}
.uc-status.pending{background:rgba(255,182,0,0.15);color:#9a7000;}
.uc-status.accepted{background:rgba(0,178,144,0.15);color:var(--teal);}
.uc-status.rejected{background:rgba(180,180,190,0.2);color:var(--mid);}
/* Action cards */
.action-card{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--mid);}
.action-card.new{border-left-color:var(--blue);}
.action-card.in_progress{border-left-color:var(--amber);}
.action-card.converted{border-left-color:var(--teal);}
.action-card.closed{opacity:0.6;}
.action-title{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;}
.action-meta{font-size:11px;color:var(--mid);margin-bottom:6px;}
.action-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;}
.action-status.new{background:rgba(28,56,245,0.1);color:var(--blue);}
.action-status.in_progress{background:rgba(255,182,0,0.15);color:#9a7000;}
.action-status.converted{background:rgba(0,178,144,0.15);color:var(--teal);}
.action-status.closed{background:rgba(180,180,190,0.2);color:var(--mid);}
/* Empty state */
.empty-state{text-align:center;padding:60px 24px;color:var(--mid);}
.empty-state .icon{font-size:36px;margin-bottom:12px;}
.empty-state h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.empty-state p{font-size:12px;line-height:1.6;}
/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;}
label.lbl{display:block;font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;margin-top:10px;}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid #d0d0d8;border-radius:6px;font-size:13px;font-family:inherit;color:var(--dark);background:var(--white);outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
/* Config card */
.config-card{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r);padding:16px 24px;margin:0;border-bottom:1px solid #e0e0e8;}
.config-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.config-field{flex:1;min-width:160px;}
/* Loading */
.loading{display:flex;align-items:center;gap:8px;color:var(--mid);font-size:13px;padding:40px 24px;}
.spin{width:16px;height:16px;border:2px solid #e0e0e8;border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Welcome */
.welcome{padding:40px 24px;max-width:600px;}
.welcome h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.welcome p{font-size:13px;color:#555;line-height:1.7;margin-bottom:16px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-brand">ATL<span>A</span>S &mdash; Second Brain</div>
  <div class="hdr-right">
    <span class="hdr-badge">v2.2</span>
    <button class="btn btn-ghost btn-sm" onclick="toggleConfig()">&#9881; Config</button>
    <button class="btn btn-ghost btn-sm" onclick="window.history.back()">&#8592; Portal</button>
  </div>
</div>

<div id="configCard" class="config-card" style="display:none">
  <div class="config-row">
    <div class="config-field">
      <label class="lbl" style="margin-top:0">Supabase URL</label>
      <input type="text" id="sbUrl" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="config-field" style="flex:2">
      <label class="lbl" style="margin-top:0">Supabase Anon Key</label>
      <input type="password" id="sbKey" placeholder="eyJ...">
    </div>
    <div>
      <button class="btn btn-primary btn-sm" onclick="saveConfig()">Save &amp; Connect</button>
    </div>
  </div>
</div>

<div class="shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="welcome" id="welcome">
      <h2>&#129504; Second Brain v2.1</h2>
      <p>Configure your Supabase connection to explore intelligence across 17 domains and 5 market news topics. Select a domain from the sidebar to begin.</p>
    </div>
  </div>
</div>

<!-- Create Action Modal -->
<div class="modal-overlay" id="actionModal">
  <div class="modal">
    <div class="modal-title">&#9889; Create Sales Action</div>
    <input type="hidden" id="actIntelId">
    <input type="hidden" id="actIntelTitle">
    <input type="hidden" id="actDomain">
    <label class="lbl">Action Title *</label>
    <input type="text" id="actTitle" placeholder="e.g. Follow up on DRDO edge AI RFP">
    <label class="lbl">Description</label>
    <textarea id="actDesc" placeholder="What needs to be done..."></textarea>
    <label class="lbl">Suggested Approach</label>
    <input type="text" id="actApproach" placeholder="e.g. Schedule demo, send white paper">
    <label class="lbl">Assign To</label>
    <input type="text" id="actAssignee" placeholder="Salesperson name" list="teamDL">
    <datalist id="teamDL"></datalist>
    <div style="display:flex;gap:12px;margin-top:4px">
      <div style="flex:1">
        <label class="lbl">Priority</label>
        <select id="actPriority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div style="flex:1">
        <label class="lbl">Due Date</label>
        <input type="date" id="actDue">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('actionModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveAction()">Create Action</button>
    </div>
  </div>
</div>

<!-- Enrich UC Modal -->
<div class="modal-overlay" id="enrichModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-title">&#128161; Enrich Use Case</div>
    <input type="hidden" id="enrichUCId">
    <input type="hidden" id="enrichQueueId">
    <div style="background:var(--light);border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--mid)" id="enrichSourceInfo"></div>
    <label class="lbl">UC Name *</label>
    <input type="text" id="enrichName" placeholder="Specific, actionable use case name">
    <label class="lbl">Cluster / Category</label>
    <input type="text" id="enrichCluster" placeholder="e.g. Border Surveillance, Crop Analytics">
    <div style="display:flex;gap:12px">
      <div style="flex:1">
        <label class="lbl">Domain Codes</label>
        <input type="text" id="enrichDomains" placeholder="e.g. DEF-MIL, GEO-SPA">
      </div>
      <div style="flex:1">
        <label class="lbl">Maturity</label>
        <select id="enrichMaturity">
          <option value="theoretical">Theoretical</option>
          <option value="emerging" selected>Emerging</option>
          <option value="piloted">Piloted</option>
          <option value="proven">Proven</option>
        </select>
      </div>
    </div>
    <label class="lbl">Problem Statement</label>
    <textarea id="enrichProblem" placeholder="What specific problem does this solve?"></textarea>
    <label class="lbl">Benefit</label>
    <input type="text" id="enrichBenefit" placeholder="Quantified benefit if known (cost saving, efficiency gain...)">
    <label class="lbl">How It Works</label>
    <textarea id="enrichDescription" placeholder="Plain language description of the AI approach"></textarea>
    <label class="lbl">Process Steps (one per line)</label>
    <textarea id="enrichSteps" placeholder="1. Ingest satellite imagery&#10;2. Run change detection model&#10;3. Flag anomalies for review"></textarea>
    <label class="lbl">Key Actors</label>
    <input type="text" id="enrichActors" placeholder="e.g. DRDO, Indian Army, ISRO (comma separated)">
    <label class="lbl">Data Requirements</label>
    <textarea id="enrichData" placeholder="What data is needed, format, volume, frequency"></textarea>
    <label class="lbl">Technical Requirements</label>
    <textarea id="enrichTech" placeholder="Compute, connectivity, latency, air-gap requirements"></textarea>
    <div style="display:flex;gap:12px">
      <div style="flex:1">
        <label class="lbl">Model Type</label>
        <input type="text" id="enrichModelType" placeholder="e.g. Vision, NLP, Multimodal">
      </div>
      <div style="flex:1">
        <label class="lbl">Hardware Profile</label>
        <input type="text" id="enrichHardware" placeholder="e.g. Edge GPU, Air-gapped cluster">
      </div>
    </div>
    <label class="lbl">Regulatory / Compliance Notes</label>
    <input type="text" id="enrichRegulatory" placeholder="e.g. MoD clearance, DPDP Act, data sovereignty">
    <label class="lbl">Reference Deployments</label>
    <input type="text" id="enrichRefs" placeholder="Where has this been done? (comma separated)">
    <label class="lbl">Estimated Effort</label>
    <input type="text" id="enrichEffort" placeholder="e.g. 3-6 months, Medium complexity">
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('enrichModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveEnrichedUC()">Save to UC Library</button>
    </div>
  </div>
</div>

<!-- Convert to Engagement Modal -->
<div class="modal-overlay" id="engModal">
  <div class="modal">
    <div class="modal-title">&#128640; Convert to Engagement</div>
    <input type="hidden" id="engActId">
    <label class="lbl">Engagement ID</label>
    <input type="text" id="engId" placeholder="ENG-2026-DEF-001">
    <label class="lbl">Notes</label>
    <textarea id="engNotes" placeholder="Context for the engagement team..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('engModal')">Cancel</button>
      <button class="btn btn-teal btn-sm" onclick="convertToEng()">Convert</button>
    </div>
  </div>
</div>

<script charset="utf-8">
// \u2500\u2500 Domain taxonomy \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var DOMAINS = [

var NEWS_TOPICS = [

]

// \u2500\u2500 State \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var currentEntry = null
var currentTab = 'intel'
var currentFilter = 'all'
var cachedIntel = []
var cachedUC = []
var cachedActions = []
var showAllAges = false
var counts = {}

// \u2500\u2500 Config \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function getCfg(){ try{ return JSON.parse(localStorage.getItem('atlas_sb2_cfg')||'{}') }catch(e){ return {} } }
function setCfg(c){ localStorage.setItem('atlas_sb2_cfg', JSON.stringify(c)) }
function getTeam(){ try{ return JSON.parse(localStorage.getItem('atlas_sb2_team')||'[]') }catch(e){ return [] } }

function saveConfig(){
  var url = document.getElementById('sbUrl').value.trim()
  var key = document.getElementById('sbKey').value.trim()
  if(!url||!key){ alert('Enter both URL and key.'); return }
  setCfg({url:url, key:key})
  document.getElementById('configCard').style.display = 'none'
  init()
}

function toggleConfig(){
  var el = document.getElementById('configCard')
  el.style.display = el.style.display === 'none' ? 'block' : 'none'
  var cfg = getCfg()
  if(cfg.url) document.getElementById('sbUrl').value = cfg.url
  if(cfg.key) document.getElementById('sbKey').value = cfg.key
}

// \u2500\u2500 Supabase helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function sbFetch(table, params, limit){
  var cfg = getCfg()
  if(!cfg.url||!cfg.key){ console.warn('SB fetch: no config'); return [] }
  var url = cfg.url+'/rest/v1/'+table+'?'+params+'&limit='+(limit||100)
  console.log('SB fetch:', url.slice(0,80))
  try{
    var r = await fetch(url, {headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}})
    if(r.ok){
      var data = await r.json()
      console.log('SB fetch ok:', data.length, 'rows from', table)
      return data
    } else {
      var t = await r.text()
      console.error('SB fetch error '+r.status+': '+t.slice(0,200))
      return []
    }
  }catch(e){ console.error('SB fetch exception:',e); return [] }
}

async function sbCount(table, filter){
  var cfg = getCfg()
  if(!cfg.url||!cfg.key){ console.warn('SB: no config'); return 0 }
  try{
    var r = await fetch(cfg.url+'/rest/v1/'+table+'?'+filter+'&limit=1', {
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Prefer':'count=exact'}
    })
    if(r.ok){
      var cr = r.headers.get('content-range')
      if(cr) return parseInt(cr.split('/')[1])||0
      return 0
    } else {
      var t = await r.text()
      console.error('SB count error '+r.status+': '+t.slice(0,200))
      return 0
    }
  }catch(e){ console.error('SB count exception:',e); return 0 }
}

async function sbPatch(table, filter, data){
  var cfg = getCfg()
  if(!cfg.url||!cfg.key) return false
  try{
    var r = await fetch(cfg.url+'/rest/v1/'+table+'?'+filter, {
      method:'PATCH',
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(data)
    })
    return r.ok
  }catch(e){ return false }
}

async function sbInsert(table, data){
  var cfg = getCfg()
  if(!cfg.url||!cfg.key) return false
  try{
    var r = await fetch(cfg.url+'/rest/v1/'+table, {
      method:'POST',
      headers:{'apikey':cfg.key,'Authorization':'Bearer '+cfg.key,'Content-Type':'application/json','Prefer':'resolution=ignore-duplicates,return=minimal'},
      body:JSON.stringify(data)
    })
    return r.ok
  }catch(e){ return false }
}

// \u2500\u2500 Init & Sidebar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function init(){
  var cfg = getCfg()
  if(!cfg.url||!cfg.key){
    document.getElementById('welcome').innerHTML = '<div class="welcome"><h2>&#9888; Config Required</h2><p>Click the Config button above and enter your Supabase URL and anon key, then click Save &amp; Connect.</p></div>'
    return
  }
  console.log('SB init with url:', cfg.url.slice(0,40))
  document.getElementById('welcome').innerHTML = '<div class="loading"><div class="spin"></div> Loading domain counts...</div>'
  // Load counts for all domains + news
  var allCodes = DOMAINS.map(function(d){return d.code}).concat(NEWS_TOPICS.map(function(t){return t.code}))
  for(var i=0; i<allCodes.length; i++){
    counts[allCodes[i]] = await sbCount('intelligence_items','domain_code=eq.'+allCodes[i])
  }
  var totalItems = Object.values(counts).reduce(function(s,c){return s+c},0)
  console.log('SB init complete. Total counts:', counts)
  renderSidebar()
  document.getElementById('welcome').innerHTML = '<div class="welcome"><h2>&#129504; Second Brain v2.1</h2><p>'+totalItems+' intelligence items across all domains. Select a domain from the sidebar to explore.</p>'+(totalItems===0?'<p style="color:var(--orange);margin-top:8px">&#9888; No items found. Check your Supabase connection or run the Intelligence Scraper first.</p>':'')+'</div>'
}

function renderSidebar(){
  var html = ''

  // GOV-GOV standalone
  html += '<div class="sb-section">Intelligence Domains</div>'
  html += sidebarItem(DOMAINS[0])

  // DEF umbrella
  html += '<div class="sb-cluster" onclick="toggleDef()">&#128737; Defence <span style="font-size:9px;opacity:0.5;margin-left:4px" id="defArrow">&#9660;</span></div>'
  html += '<div id="defSubs" class="sb-sub">'
  DOMAINS.filter(function(d){return d.cluster==='DEF'}).forEach(function(d){ html += sidebarItem(d) })
  html += '</div>'

  // Rest of standalone domains
  DOMAINS.filter(function(d){return d.cluster==='standalone' && d.code!=='GOV-GOV'}).forEach(function(d){
    html += sidebarItem(d)
  })

  // News topics
  html += '<div class="sb-section" style="margin-top:8px">Market News</div>'
  NEWS_TOPICS.forEach(function(t){ html += sidebarItem(t, true) })

  document.getElementById('sidebar').innerHTML = html
}

function sidebarItem(entry, isNews){
  var c = counts[entry.code]||0
  var isActive = currentEntry && currentEntry.code === entry.code
  return '<div class="sb-item'+(isActive?' active':'')+'" data-code="'+entry.code+'" onclick="selectEntry(this.dataset.code)">'
    +'<div class="sb-item-label">'+entry.icon+' '+entry.name+'</div>'
    +'<span class="sb-count'+(c>0?' live':'')+'">'+c+'</span>'
    +'</div>'
}

var defOpen = true
function toggleDef(){
  defOpen = !defOpen
  var subs = document.getElementById('defSubs')
  var arrow = document.getElementById('defArrow')
  if(subs) subs.style.display = defOpen ? 'block' : 'none'
  if(arrow) arrow.innerHTML = defOpen ? '&#9660;' : '&#9654;'
}

async function selectEntry(code){
  var entry = DOMAINS.find(function(d){return d.code===code}) || NEWS_TOPICS.find(function(t){return t.code===code})
  if(!entry) return
  currentEntry = entry
  currentTab = 'intel'
  currentFilter = 'all'
  cachedIntel = []; cachedUC = []; cachedActions = []; showAllAges = false
  document.querySelectorAll('.sb-item').forEach(function(el){el.classList.remove('active')})
  document.querySelectorAll('.sb-item[data-code="'+code+'"]').forEach(function(el){el.classList.add('active')})
  await renderDomainView()
}

// \u2500\u2500 Domain View \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function renderDomainView(){
  var e = currentEntry
  var intelCount = counts[e.code]||0
  var ucCount = await sbCount('uc_queue','domain_code=eq.'+e.code+'&status=eq.pending')
  var actionCount = await sbCount('sales_actions','domain_code=eq.'+e.code+'&status=neq.closed')

  document.getElementById('main').innerHTML =
    '<div class="domain-hdr">'
    +'<div class="domain-title">'+e.icon+' '+e.name+'</div>'
    +'<div class="domain-sub" id="domSub">'+intelCount+' intelligence items</div>'
    +'<div class="tabs">'
    +'<div class="tab'+(currentTab==='intel'?' active':'')+'" data-tab="intel" onclick="switchTab(this.dataset.tab)">Intelligence <span style="font-size:10px;opacity:0.6">('+intelCount+')</span></div>'
    +'<div class="tab'+(currentTab==='uc'?' active':'')+'" data-tab="uc" onclick="switchTab(this.dataset.tab)">Use Cases <span style="font-size:10px;opacity:0.6">('+ucCount+')</span></div>'
    +'<div class="tab'+(currentTab==='actions'?' active':'')+'" data-tab="actions" onclick="switchTab(this.dataset.tab)">Sales Actions <span style="font-size:10px;opacity:0.6">('+actionCount+')</span></div>'
    +'</div></div>'
    +'<div id="tabIntel" class="tab-content'+(currentTab==='intel'?' active':'')+'">'
    +'<div class="loading"><div class="spin"></div> Loading intelligence...</div>'
    +'</div>'
    +'<div id="tabUc" class="tab-content'+(currentTab==='uc'?' active':'')+'">'
    +'<div class="loading"><div class="spin"></div> Loading use cases...</div>'
    +'</div>'
    +'<div id="tabActions" class="tab-content'+(currentTab==='actions'?' active':'')+'">'
    +'<div class="loading"><div class="spin"></div> Loading actions...</div>'
    +'</div>'

  if(currentTab==='intel') await loadIntel()
  else if(currentTab==='uc') await loadUC()
  else await loadActions()
}

function switchTab(tab){
  currentTab = tab
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')})
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')})
  var tabEl = document.querySelector('.tab[data-tab="'+tab+'"]')
  var contentEl = document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1))
  if(tabEl) tabEl.classList.add('active')
  if(contentEl) contentEl.classList.add('active')
  var needsLoad = !contentEl || contentEl.innerHTML.indexOf('Loading') >= 0 || contentEl.innerHTML.trim() === ''
  if(needsLoad){
    if(tab==='intel') loadIntel()
    else if(tab==='uc') loadUC()
    else loadActions()
  }
}

// \u2500\u2500 Intelligence Tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function loadIntel(){
  var e = currentEntry
  var el = document.getElementById('tabIntel')
  if(!el) return
  if(cachedIntel.length === 0){
    // Default: last 18 months only
    var cutoff = new Date()
    cutoff.setMonth(cutoff.getMonth() - 18)
    var cutoffStr = cutoff.toISOString()
    var params = 'domain_code=eq.'+e.code+'&order=scraped_at.desc'
    if(!showAllAges) params += '&scraped_at=gte.'+cutoffStr
    cachedIntel = await sbFetch('intelligence_items', params, 100)
  }
  renderIntelTab()
}

function renderIntelTab(){
  var el = document.getElementById('tabIntel')
  if(!el) return
  var all = cachedIntel
  var items = currentFilter==='all' ? all : all.filter(function(i){return i.intelligence_stream===currentFilter})
  var mp = all.filter(function(i){return i.intelligence_stream==='market_pulse'}).length
  var di = all.filter(function(i){return i.intelligence_stream==='domain_intel'}).length
  var tw = all.filter(function(i){return i.intelligence_stream==='tech_watch'}).length

  var ageLabel = showAllAges ? 'All time' : 'Last 18 months'
  el.innerHTML = '<div class="filter-bar" id="intelFilterBar">'
    +'<span style="font-size:11px;color:var(--mid);font-weight:600">Filter:</span>'
    +'<button class="filter-btn'+(currentFilter==='all'?' active':'')+'" data-filter="all" onclick="setFilter(this.dataset.filter)">All ('+all.length+')</button>'
    +'<button class="filter-btn mp'+(currentFilter==='market_pulse'?' active':'')+'" data-filter="market_pulse" onclick="setFilter(this.dataset.filter)">Market Pulse ('+mp+')</button>'
    +'<button class="filter-btn di'+(currentFilter==='domain_intel'?' active':'')+'" data-filter="domain_intel" onclick="setFilter(this.dataset.filter)">Domain Intel ('+di+')</button>'
    +'<button class="filter-btn tw'+(currentFilter==='tech_watch'?' active':'')+'" data-filter="tech_watch" onclick="setFilter(this.dataset.filter)">Tech Watch ('+tw+')</button>'
    +'<button class="filter-btn" style="margin-left:auto;font-size:10px;opacity:0.7" onclick="toggleAge()">&#128337; '+ageLabel+'</button>'
    +'</div><div id="intelItems"></div>'

  renderIntelItems(items)
}

function toggleAge(){
  showAllAges = !showAllAges
  cachedIntel = []
  loadIntel()
}

function setFilter(f){
  currentFilter = f
  document.querySelectorAll('#intelFilterBar .filter-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.filter===f)
  })
  var items = f==='all' ? cachedIntel : cachedIntel.filter(function(i){return i.intelligence_stream===f})
  renderIntelItems(items)
}

function renderIntelItems(items){
  var c = document.getElementById('intelItems')
  if(!c) return
  if(!items.length){
    c.innerHTML = '<div class="empty-state"><div class="icon">&#128270;</div><h3>No items</h3><p>No intelligence items for this filter.</p></div>'
    return
  }
  c.innerHTML = '<div class="intel-grid">'+items.map(function(item){
    var sc = item.intelligence_stream==='market_pulse'?'badge-mp':item.intelligence_stream==='domain_intel'?'badge-di':'badge-tw'
    var sl = item.intelligence_stream ? item.intelligence_stream.replace(/_/g,' ') : ''
    var vc = 'badge-'+(item.intelligence_value||'medium')
    var exp = ''
    if(item.problem_statement) exp+='<div class="intel-field"><div class="intel-field-label">Problem Statement</div><div class="intel-field-val">'+esc(item.problem_statement)+'</div></div>'
    if(item.technical_context) exp+='<div class="intel-field"><div class="intel-field-label">Technical Context</div><div class="intel-field-val">'+esc(item.technical_context)+'</div></div>'
    if(item.opportunity) exp+='<div class="intel-field"><div class="intel-field-label">Opportunity</div><div class="intel-field-val"><span class="tag tag-opp">'+esc(item.opportunity)+'</span></div></div>'
    if(item.competitor_signals) exp+='<div class="intel-field"><div class="intel-field-label">Competitor Signals</div><div class="intel-field-val"><span class="tag tag-comp">'+esc(item.competitor_signals)+'</span></div></div>'
    var infra = Array.isArray(item.infrastructure_signals)?item.infrastructure_signals:[]
    if(infra.length) exp+='<div class="intel-field"><div class="intel-field-label">Infrastructure</div><div class="intel-tags">'+infra.map(function(s){return '<span class="tag">'+esc(s)+'</span>'}).join('')+'</div></div>'
    var uc = item.uc_extracted||{}
    if(uc.uc_name) exp+='<div class="intel-field"><div class="intel-field-label">UC Signal</div><div class="intel-field-val" style="color:var(--teal);font-weight:600">'+esc(uc.uc_name)+'</div></div>'
    var tags = Array.isArray(item.tags)?item.tags:[]
    var th = tags.slice(0,4).map(function(t){return '<span class="tag">'+esc(t)+'</span>'}).join('')
    return '<div class="intel-card">'
      +'<div class="intel-card-hdr"><div class="intel-title">'+esc(item.title||'')+'</div>'
      +'<div class="intel-badges">'+(sl?'<span class="badge '+sc+'">'+sl+'</span> ':'')+'<span class="badge '+vc+'">'+(item.intelligence_value||'medium')+'</span>'+(item.depth_score?'<span class="badge badge-depth"> d'+item.depth_score+'</span>':'')+'</div></div>'
      +'<div class="intel-summary">'+esc(item.summary||'')+'</div>'
      +(th?'<div class="intel-tags">'+th+'</div>':'')
      +(exp?'<div class="intel-expanded" id="exp-'+item.id+'">'+exp+'</div>':'')
      +'<div class="intel-actions">'
      +(exp?'<button class="btn btn-outline btn-xs" data-eid="'+item.id+'" onclick="toggleExp(this.dataset.eid)" id="expbtn-'+item.id+'">&#9660; More</button>':'')
      +'<button class="btn btn-teal btn-xs" data-id="'+item.id+'" data-title="'+(item.title||'').replace(/"/g,'&quot;')+'" data-domain="'+(item.domain_code||'')+'" onclick="openActionModal(this.dataset.id,this.dataset.title,this.dataset.domain)">&#9889; Action</button>'
      +'</div></div>'
  }).join('')+'</div>'
}

function toggleExp(id){
  var el = document.getElementById('exp-'+id)
  var btn = document.getElementById('expbtn-'+id)
  if(!el) return
  el.classList.toggle('open')
  btn.innerHTML = el.classList.contains('open') ? '&#9650; Less' : '&#9660; More'
}

// \u2500\u2500 Use Cases Tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function loadUC(){
  var e = currentEntry
  var el = document.getElementById('tabUc')
  if(!el) return
  if(cachedUC.length === 0){
    // Fetch from both uc_queue (auto-suggested) and uc_library (curated)
    var queueItems = await sbFetch('uc_queue','domain_code=eq.'+e.code+'&order=suggested_at.desc')
    // Fetch all library items and filter client-side (avoids complex jsonb query)
    var allLibraryItems = await sbFetch('uc_library','order=created_at.desc',200)
    var libraryItems = allLibraryItems.filter(function(i){
      var codes = Array.isArray(i.domain_codes) ? i.domain_codes : []
      return codes.indexOf(e.code) >= 0 || codes.length === 0
    })
    // Tag source type for rendering
    queueItems.forEach(function(i){ i._source = 'queue' })
    libraryItems.forEach(function(i){ i._source = 'library' })
    cachedUC = libraryItems.concat(queueItems)
  }
  renderUCItems()
}

function renderUCItems(){
  var el = document.getElementById('tabUc')
  if(!el) return
  var items = cachedUC
  var libraryItems = items.filter(function(i){return i._source==='library'})
  var queueItems = items.filter(function(i){return i._source==='queue'})
  // Add UC + manual button header
  var headerHtml = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div style="font-size:13px;font-weight:700;color:var(--navy)">Use Cases &mdash; '+currentEntry.name+'</div>'
    +'<button class="btn btn-primary btn-sm" onclick="openManualUC()">+ Add UC Manually</button>'
    +'</div>'

  if(!items.length){
    el.innerHTML = headerHtml + '<div class="empty-state"><div class="icon">&#128161;</div><h3>No Use Cases Yet</h3><p>Use cases are suggested automatically during enrichment, or can be added manually using the button above.</p></div>'
    return
  }
  var html = headerHtml
  if(libraryItems.length){
    html += '<div style="font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">&#128218; UC Library ('+libraryItems.length+')</div>'
    html += libraryItems.map(function(item){
      var matBadge = item.maturity ? '<span class="badge" style="background:rgba(0,178,144,0.1);color:var(--teal)">'+item.maturity+'</span>' : ''
      var hwBadge = item.hardware_profile ? '<span class="badge badge-di">'+esc(item.hardware_profile.slice(0,30))+'</span>' : ''
      var expanded = ''
      // Always show source domain + AI model + processing if available (imported UCs)
      if(item.source_domain) expanded += '<div class="intel-field"><div class="intel-field-label">Source Domain</div><div class="intel-field-val">'+esc(item.source_domain)+'</div></div>'
      if(item.ai_model) expanded += '<div class="intel-field"><div class="intel-field-label">AI Model</div><div class="intel-field-val">'+esc(item.ai_model)+'</div></div>'
      if(item.processing_type) expanded += '<div class="intel-field"><div class="intel-field-label">Processing Type</div><div class="intel-field-val">'+esc(item.processing_type)+'</div></div>'
      if(item.hardware_profile) expanded += '<div class="intel-field"><div class="intel-field-label">Hardware Profile</div><div class="intel-field-val">'+esc(item.hardware_profile)+'</div></div>'
      if(item.problem_statement) expanded += '<div class="intel-field"><div class="intel-field-label">Problem</div><div class="intel-field-val">'+esc(item.problem_statement)+'</div></div>'
      if(item.benefit) expanded += '<div class="intel-field"><div class="intel-field-label">Benefit</div><div class="intel-field-val">'+esc(item.benefit)+'</div></div>'
      if(item.description) expanded += '<div class="intel-field"><div class="intel-field-label">How It Works</div><div class="intel-field-val">'+esc(item.description)+'</div></div>'
      var steps = Array.isArray(item.process_steps) ? item.process_steps : []
      if(steps.length) expanded += '<div class="intel-field"><div class="intel-field-label">Process</div><div class="intel-field-val">'+steps.map(function(s,i){return (i+1)+'. '+esc(s)}).join('<br>')+'</div></div>'
      var actors = Array.isArray(item.key_actors) ? item.key_actors : []
      if(actors.length) expanded += '<div class="intel-field"><div class="intel-field-label">Key Actors</div><div class="intel-field-val">'+actors.map(esc).join(' &middot; ')+'</div></div>'
      if(item.data_requirements) expanded += '<div class="intel-field"><div class="intel-field-label">Data Requirements</div><div class="intel-field-val">'+esc(item.data_requirements)+'</div></div>'
      if(item.technical_requirements) expanded += '<div class="intel-field"><div class="intel-field-label">Technical Requirements</div><div class="intel-field-val">'+esc(item.technical_requirements)+'</div></div>'
      if(item.model_type) expanded += '<div class="intel-field"><div class="intel-field-label">Model Type</div><div class="intel-field-val">'+esc(item.model_type)+'</div></div>'
      if(item.regulatory) expanded += '<div class="intel-field"><div class="intel-field-label">Regulatory</div><div class="intel-field-val">'+esc(item.regulatory)+'</div></div>'
      var refs = Array.isArray(item.reference_deployments) ? item.reference_deployments : []
      if(refs.length) expanded += '<div class="intel-field"><div class="intel-field-label">Reference Deployments</div><div class="intel-field-val">'+refs.map(esc).join(', ')+'</div></div>'
      if(item.estimated_effort) expanded += '<div class="intel-field"><div class="intel-field-label">Estimated Effort</div><div class="intel-field-val">'+esc(item.estimated_effort)+'</div></div>'
      return '<div class="uc-card">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px">'
        +'<div><div class="uc-name">'+esc(item.uc_name||'')+'</div>'
        +'<div class="uc-cluster" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">'+esc(item.cluster||'')+(matBadge?' '+matBadge:'')+(hwBadge?' '+hwBadge:'')+'</div></div>'
        +'<span class="uc-status accepted">library</span>'
        +'</div>'
        +(item.problem_statement?'<div style="font-size:12px;color:#555;line-height:1.5;margin-bottom:8px">'+esc(item.problem_statement.slice(0,120))+'</div>':'')
        +'<div class="intel-expanded" id="ucexp-'+item.id+'">'+(expanded||'<em style="font-size:11px;color:var(--mid)">Basic entry &#8212; click Enrich to add full details.</em>')+'</div>'
        +'<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">'
        +'<button class="btn btn-outline btn-xs" data-eid="ucexp-'+item.id+'" onclick="toggleExpLib(this.dataset.eid)">&#9660; Details</button>'
        +'<button class="btn btn-primary btn-xs" data-id="'+item.id+'" data-name="'+(item.uc_name||'').replace(/"/g,'&quot;')+'" data-domain="'+(Array.isArray(item.domain_codes)&&item.domain_codes.length?item.domain_codes[0]:'')+'" onclick="openEnrichLibUC(this.dataset.id,this.dataset.name,this.dataset.domain)">&#9999; Enrich</button>'
        +'<button class="btn btn-teal btn-xs" data-id="'+item.id+'" data-name="'+(item.uc_name||'').replace(/"/g,'&quot;')+'" data-domain="'+(currentEntry.code||'')+'" onclick="openActionModal(this.dataset.id,this.dataset.name,this.dataset.domain)">&#9889; Use in Engagement</button>'
        +'</div></div>'
    }).join('')
  }
  if(queueItems.length){
    html += '<div style="font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;margin:'+(libraryItems.length?'20px':'0')+'px 0 10px">&#128161; Suggested from Intelligence ('+queueItems.length+')</div>'
    html += queueItems.map(function(item){
      return '<div class="uc-card">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px">'
        +'<div><div class="uc-name">'+esc(item.uc_name||'')+'</div>'
        +'<div class="uc-cluster">'+esc(item.cluster||'Auto-suggested')+'</div></div>'
        +'<span class="uc-status '+(item.status||'pending')+'">'+( item.status||'pending')+'</span>'
        +'</div>'
        +'<div class="uc-rationale">'+esc(item.rationale||'')+'</div>'
        +(item.source_title?'<div style="font-size:11px;color:var(--mid);margin-bottom:8px">Source: '+esc(item.source_title.slice(0,60))+'</div>':'')
        +'<div style="display:flex;gap:6px">'
        +(item.status==='pending'?'<button class="btn btn-teal btn-xs" data-id="'+item.id+'" data-status="accepted" onclick="updateUC(this.dataset.id,this.dataset.status)">&#10003; Accept</button>':'')
        +(item.status==='pending'?'<button class="btn btn-danger btn-xs" data-id="'+item.id+'" data-status="rejected" onclick="updateUC(this.dataset.id,this.dataset.status)">&#10007; Reject</button>':'')
        +(item.status==='accepted'?'<button class="btn btn-outline btn-xs" data-id="'+item.id+'" data-name="'+(item.uc_name||'').replace(/"/g,'&quot;')+'" data-domain="'+(currentEntry.code||'')+'" onclick="openActionModal(this.dataset.id,this.dataset.name,this.dataset.domain)">&#9889; Action</button>':'')
        +'</div></div>'
    }).join('')
  }
  el.innerHTML = html
}

function toggleExpLib(id){
  var el = document.getElementById(id)
  if(!el) return
  el.classList.toggle('open')
  var isOpen = el.classList.contains('open')
  // Find the button that triggered this
  var btn = document.querySelector('[data-eid="'+id+'"]')
  if(btn) btn.innerHTML = isOpen ? '\u25B2 Hide' : '\u25BC Details'
}

function openEnrichModal(queueId, ucName, rationale, sourceTitle, sourceIntelId, domainCode){
  document.getElementById('enrichUCId').value = ''
  document.getElementById('enrichQueueId').value = queueId||''
  document.getElementById('enrichName').value = ucName||''
  document.getElementById('enrichCluster').value = ''
  document.getElementById('enrichDomains').value = domainCode||''
  document.getElementById('enrichMaturity').value = 'emerging'
  document.getElementById('enrichProblem').value = ''
  document.getElementById('enrichBenefit').value = ''
  document.getElementById('enrichDescription').value = ''
  document.getElementById('enrichSteps').value = ''
  document.getElementById('enrichActors').value = ''
  document.getElementById('enrichData').value = ''
  document.getElementById('enrichTech').value = ''
  document.getElementById('enrichModelType').value = ''
  document.getElementById('enrichHardware').value = ''
  document.getElementById('enrichRegulatory').value = ''
  document.getElementById('enrichRefs').value = ''
  document.getElementById('enrichEffort').value = ''
  // Show source context
  var info = ''
  if(sourceTitle) info += '<strong>Source:</strong> ' + esc(sourceTitle.slice(0,80))
  if(rationale) info += '<br><strong>Rationale:</strong> ' + esc(rationale.slice(0,120))
  document.getElementById('enrichSourceInfo').innerHTML = info || 'Manual entry'
  // If we have a source intel item, try to pre-fill from its enrichment
  if(sourceIntelId) prefillFromIntel(sourceIntelId)
  document.getElementById('enrichModal').classList.add('open')
}

async function prefillFromIntel(intelId){
  var items = await sbFetch('intelligence_items','id=eq.'+intelId,1)
  if(!items.length) return
  var item = items[0]
  if(item.problem_statement && !document.getElementById('enrichProblem').value)
    document.getElementById('enrichProblem').value = item.problem_statement
  if(item.technical_context && !document.getElementById('enrichTech').value)
    document.getElementById('enrichTech').value = item.technical_context
  var infra = Array.isArray(item.infrastructure_signals) ? item.infrastructure_signals : []
  if(infra.length && !document.getElementById('enrichHardware').value)
    document.getElementById('enrichHardware').value = infra.join(', ')
}

async function openEnrichLibUC(libId, ucName, domainCode){
  // Fetch full item from uc_library
  var items = await sbFetch('uc_library','id=eq.'+libId,1)
  if(!items.length){ alert('Could not load UC.'); return }
  var item = items[0]
  
  document.getElementById('enrichUCId').value = libId
  document.getElementById('enrichQueueId').value = ''
  document.getElementById('enrichName').value = item.uc_name||''
  document.getElementById('enrichCluster').value = item.cluster||''
  var codes = Array.isArray(item.domain_codes) ? item.domain_codes : []
  document.getElementById('enrichDomains').value = codes.join(', ')
  document.getElementById('enrichMaturity').value = item.maturity||'emerging'
  document.getElementById('enrichProblem').value = item.problem_statement||''
  document.getElementById('enrichBenefit').value = item.benefit||''
  document.getElementById('enrichDescription').value = item.description||''
  var steps = Array.isArray(item.process_steps) ? item.process_steps : []
  document.getElementById('enrichSteps').value = steps.join('\n')
  var actors = Array.isArray(item.key_actors) ? item.key_actors : []
  document.getElementById('enrichActors').value = actors.join(', ')
  document.getElementById('enrichData').value = item.data_requirements||''
  document.getElementById('enrichTech').value = item.technical_requirements||''
  document.getElementById('enrichModelType').value = item.model_type||item.ai_model||''
  document.getElementById('enrichHardware').value = item.hardware_profile||''
  document.getElementById('enrichRegulatory').value = item.regulatory||''
  var refs = Array.isArray(item.reference_deployments) ? item.reference_deployments : []
  document.getElementById('enrichRefs').value = refs.join(', ')
  document.getElementById('enrichEffort').value = item.estimated_effort||''
  document.getElementById('enrichSourceInfo').innerHTML = '<strong>Editing library UC:</strong> '+esc(item.uc_name||'')+(item.source_domain?' | Source: '+esc(item.source_domain):'')
  document.getElementById('enrichModal').classList.add('open')
}

async function saveEnrichedUC(){
  var name = document.getElementById('enrichName').value.trim()
  if(!name){ alert('UC Name is required.'); return }
  
  var domainsRaw = document.getElementById('enrichDomains').value.trim()
  var domainCodes = domainsRaw ? domainsRaw.split(',').map(function(s){return s.trim()}).filter(Boolean) : []
  
  var stepsRaw = document.getElementById('enrichSteps').value.trim()
  var steps = stepsRaw ? stepsRaw.split('\n').map(function(s){return s.replace(/^\d+\.\s*/,'').trim()}).filter(Boolean) : []
  
  var actorsRaw = document.getElementById('enrichActors').value.trim()
  var actors = actorsRaw ? actorsRaw.split(',').map(function(s){return s.trim()}).filter(Boolean) : []
  
  var refsRaw = document.getElementById('enrichRefs').value.trim()
  var refs = refsRaw ? refsRaw.split(',').map(function(s){return s.trim()}).filter(Boolean) : []
  
  var queueId = document.getElementById('enrichQueueId').value
  var ucId = 'uclib-' + Date.now() + '-' + Math.floor(Math.random()*9999)
  
  var ucRow = {
    id: ucId,
    uc_name: name,
    cluster: document.getElementById('enrichCluster').value.trim()||null,
    domain_codes: domainCodes,
    source: queueId ? 'enriched_from_queue' : 'manual',
    status: 'active',
    problem_statement: document.getElementById('enrichProblem').value.trim()||null,
    benefit: document.getElementById('enrichBenefit').value.trim()||null,
    description: document.getElementById('enrichDescription').value.trim()||null,
    process_steps: steps,
    key_actors: actors,
    data_requirements: document.getElementById('enrichData').value.trim()||null,
    technical_requirements: document.getElementById('enrichTech').value.trim()||null,
    model_type: document.getElementById('enrichModelType').value.trim()||null,
    hardware_profile: document.getElementById('enrichHardware').value.trim()||null,
    regulatory: document.getElementById('enrichRegulatory').value.trim()||null,
    reference_deployments: refs,
    estimated_effort: document.getElementById('enrichEffort').value.trim()||null,
    maturity: document.getElementById('enrichMaturity').value,
    created_by: 'ATLAS',
    created_at: new Date().toISOString(),
    source_intel_id: null
  }
  
  var libId = document.getElementById('enrichUCId').value
  var ok = false
  if(libId){
    // Update existing library item
    ok = await sbPatch('uc_library','id=eq.'+libId, ucRow)
  } else {
    // Insert new library item
    ok = await sbInsert('uc_library', ucRow)
    if(ok && queueId) await sbPatch('uc_queue','id=eq.'+queueId,{status:'accepted'})
  }
  if(ok){
    closeModal('enrichModal')
    cachedUC = []
    await loadUC()
  } else {
    alert('Failed to save. Check Supabase connection.')
  }
}

async function openManualUC(){
  openEnrichModal('','','','','', currentEntry ? currentEntry.code : '')
}

async function updateUC(id, status){
  await sbPatch('uc_queue','id=eq.'+id,{status:status})
  cachedUC = []; loadUC()
}

// \u2500\u2500 Sales Actions Tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function loadActions(){
  var e = currentEntry
  var el = document.getElementById('tabActions')
  if(!el) return
  if(cachedActions.length === 0)
    cachedActions = await sbFetch('sales_actions','domain_code=eq.'+e.code+'&order=created_at.desc')
  renderActionItems()
}

function renderActionItems(){
  var el = document.getElementById('tabActions')
  if(!el) return
  var items = cachedActions
  var newBtn = '<div style="display:flex;justify-content:flex-end;margin-bottom:14px">'
    +'<button class="btn btn-primary btn-sm" data-domain="'+(currentEntry.code||'')+'" onclick="newAction(this.dataset.domain)">+ New Action</button>'
    +'</div>'
  if(!items.length){
    el.innerHTML = newBtn+'<div class="empty-state"><div class="icon">&#9889;</div><h3>No Actions Yet</h3><p>Create actions from intelligence items or use cases, or click New Action above.</p></div>'
    return
  }
  el.innerHTML = newBtn + items.map(function(item){
    var st = item.status||'new'
    var assigned = item.assigned_to ? 'Assigned to: <strong>'+esc(item.assigned_to)+'</strong>' : 'Unassigned'
    var due = item.due_date ? ' &middot; Due: '+item.due_date : ''
    return '<div class="action-card '+st+'">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px">'
      +'<div><div class="action-title">'+esc(item.action_title||'')+'</div>'
      +'<div class="action-meta">'+assigned+due+'</div></div>'
      +'<span class="action-status '+st+'">'+st.replace('_',' ')+'</span>'
      +'</div>'
      +(item.action_description?'<div style="font-size:12px;color:#555;margin-bottom:8px;line-height:1.5">'+esc(item.action_description)+'</div>':'')
      +(item.source_title?'<div style="font-size:11px;color:var(--mid);margin-bottom:8px">From: '+esc(item.source_title.slice(0,60))+'</div>':'')
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
      +(st==='new'?'<button class="btn btn-outline btn-xs" data-id="'+item.id+'" data-status="in_progress" onclick="updateAction(this.dataset.id,this.dataset.status)">Start</button>':'')
      +(st==='in_progress'?'<button class="btn btn-teal btn-xs" data-aid="'+item.id+'" onclick="openEngModal(this.dataset.aid)">&#128640; Convert to Engagement</button>':'')
      +(st!=='closed'&&st!=='converted'?'<button class="btn btn-danger btn-xs" data-id="'+item.id+'" data-status="closed" onclick="updateAction(this.dataset.id,this.dataset.status)">Close</button>':'')
      +'</div></div>'
  }).join('')
}

async function updateAction(id, status){
  await sbPatch('sales_actions','id=eq.'+id,{status:status})
  cachedActions = []; loadActions()
}

// \u2500\u2500 Modals \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function newAction(dc){ openActionModal('','',dc) }

function openActionModal(intelId, intelTitle, domainCode){
  document.getElementById('actIntelId').value = intelId||''
  document.getElementById('actIntelTitle').value = intelTitle||''
  document.getElementById('actDomain').value = domainCode||''
  document.getElementById('actTitle').value = ''
  document.getElementById('actDesc').value = ''
  document.getElementById('actApproach').value = ''
  document.getElementById('actAssignee').value = ''
  document.getElementById('actPriority').value = 'medium'
  document.getElementById('actDue').value = ''
  var team = getTeam()
  document.getElementById('teamDL').innerHTML = team.map(function(m){return '<option value="'+m+'">'}).join('')
  document.getElementById('actionModal').classList.add('open')
}

async function saveAction(){
  var title = document.getElementById('actTitle').value.trim()
  if(!title){ alert('Enter an action title.'); return }
  var ok = await sbInsert('sales_actions',{
    id: 'act-'+Date.now()+'-'+Math.floor(Math.random()*9999),
    source_intel_id: document.getElementById('actIntelId').value||null,
    source_title: document.getElementById('actIntelTitle').value||null,
    domain_code: document.getElementById('actDomain').value||null,
    action_title: title,
    action_description: document.getElementById('actDesc').value.trim()||null,
    suggested_approach: document.getElementById('actApproach').value.trim()||null,
    assigned_to: document.getElementById('actAssignee').value.trim()||null,
    priority: document.getElementById('actPriority').value,
    status: 'new',
    created_at: new Date().toISOString(),
    created_by: 'ATLAS'
  })
  if(ok){
    closeModal('actionModal')
    cachedActions = []
    await loadActions()
    if(currentTab!=='actions') switchTab('actions')
  } else {
    alert('Failed to save. Check Supabase connection.')
  }
}

function openEngModal(actionId){
  document.getElementById('engActId').value = actionId
  document.getElementById('engId').value = ''
  document.getElementById('engNotes').value = ''
  document.getElementById('engModal').classList.add('open')
}

async function convertToEng(){
  var id = document.getElementById('engActId').value
  var engId = document.getElementById('engId').value.trim()
  if(!engId){ alert('Enter an Engagement ID.'); return }
  await sbPatch('sales_actions','id=eq.'+id,{
    status:'converted',
    converted_to_eng_id: engId,
    converted_at: new Date().toISOString(),
    notes: document.getElementById('engNotes').value.trim()
  })
  closeModal('engModal')
  cachedActions = []; loadActions()
}

function closeModal(id){ document.getElementById(id).classList.remove('open') }

// \u2500\u2500 Utils \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
