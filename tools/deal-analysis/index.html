var D = newDeal();
var AT = 0;
var _charts = {};

/* ============ CALC ============ */
function calc(){
  var d=D;
  var tm=d.deliveryMonths+d.implMonths+d.amcMonths;
  var tAMC=d.amcAnnual*(d.amcMonths/12);
  var tCV=d.deliveryValue+tAMC;
  var amcCost=d.amcAnnual*0.6*(d.amcMonths/12);
  var dc=d.costHW+d.costSW+d.costNetwork+d.costImpl+d.costDC+d.costTransport;
  var risk=tCV*d.riskPct/100;
  var bgc=tCV*d.bgCommPct/100;
  var tCost=dc+amcCost+risk+bgc;
  var pm=tCV-tCost;
  var pmP=tCV>0?pm/tCV*100:0;
  var siA=d.siApplicable?tCV*d.siMarginPct/100:0;
  var diA=d.distApplicable?tCV*d.distCommPct/100:0;
  var chT=siA+diA;
  var gm=pm-chT;
  var gmP=tCV>0?gm/tCV*100:0;
  var advA=d.deliveryValue*d.advancePct/100;
  var bgPct=tCV>0?d.bgAmount/tCV*100:0;
  var bgCom=d.bgAmount*d.bgCommRate/100*(d.bgValidity/12);
  var ldMax=tCV*d.ldCapPct/100;
  var ciT=d.ci.reduce(function(s,m){return s+m.p},0);
  var coT=d.co.reduce(function(s,m){return s+m.p},0);

  var mos=[];
  for(var mi=1;mi<=tm;mi++){
    var cin=0,cout=0;
    d.ci.forEach(function(ms){if(ms.m===mi)cin+=d.deliveryValue*ms.p/100});
    if(mi>d.deliveryMonths+d.implMonths&&mi<=tm)cin+=d.amcAnnual/12;
    d.co.forEach(function(ms){if(ms.m===mi)cout+=tCost*ms.p/100});
    if(mi>d.deliveryMonths+d.implMonths&&mi<=tm)cout+=d.amcAnnual*0.6/12;
    var nt=cin-cout;
    var cu=(mos.length>0?mos[mos.length-1].cu:0)+nt;
    mos.push({m:mi,ci:cin,co:cout,nt:nt,cu:cu});
  }
  var peak=mos.length>0?Math.min.apply(null,mos.map(function(m){return m.cu})):0;
  var negQ=mos.reduce(function(s,m){return s+(m.nt<0?m.nt:0)},0);
  var negD=mos.filter(function(m){return m.cu<0}).length;
  var bep=0;for(var bi=1;bi<mos.length;bi++){if(mos[bi].cu>=0){bep=bi+1;break}}

  var delays=d.dels.map(function(dl){
    if(!dl.ae)return{d:dl.d,dd:null,dw:0,st:"Pending"};
    var diff=Math.max(0,Math.round((new Date(dl.ae)-new Date(dl.pe))/86400000));
    var wk=Math.ceil(diff/7);
    var st=diff===0?"On Time":diff<=7?"Minor Delay":diff<=21?"Moderate Delay":"Critical Delay";
    return{d:dl.d,dd:diff,dw:wk,st:st};
  });
  var maxDD=Math.max.apply(null,[0].concat(delays.map(function(x){return x.dd||0})));
  var maxDW=Math.max.apply(null,[0].concat(delays.map(function(x){return x.dw})));
  var estLD=Math.min(Math.max(0,maxDW-d.gracePeriodWeeks)*d.ldRatePct/100*tCV,ldMax);

  var rScores=d.risks.map(function(r){return r.l*r.i});
  var avgR=rScores.length>0?rScores.reduce(function(a,b){return a+b},0)/rScores.length:0;
  var hiR=rScores.filter(function(s){return s>=12}).length;

  var ragItems=[
    {k:"Project Margin %",v:pmP,g:15,a:10,r:5,hb:true,f:function(v){return v.toFixed(1)+"%"}},
    {k:"Gross Margin %",v:gmP,g:12,a:8,r:3,hb:true,f:function(v){return v.toFixed(1)+"%"}},
    {k:"Peak Cash / CV",v:tCV>0?Math.abs(peak)/tCV*100:0,g:25,a:40,r:50,hb:false,f:function(v){return v.toFixed(1)+"%"}},
    {k:"Risk Score",v:avgR,g:6,a:10,r:15,hb:false,f:function(v){return v.toFixed(1)}},
    {k:"Delivery Delay",v:maxDD,g:7,a:21,r:42,hb:false,f:function(v){return v+" days"}},
    {k:"LD Exposure/Margin",v:pm>0?estLD/pm*100:0,g:5,a:15,r:30,hb:false,f:function(v){return v.toFixed(1)+"%"}}
  ];
  ragItems.forEach(function(ri){
    if(ri.hb)ri.rag=ri.v>=ri.g?"green":ri.v>=ri.a?"amber":"red";
    else ri.rag=ri.v<=ri.g?"green":ri.v<=ri.a?"amber":"red";
  });
  var redCt=ragItems.filter(function(r){return r.rag==="red"}).length;
  var rec=redCt>2?"DO NOT APPROVE — High Risk":redCt>0?"CONDITIONAL APPROVAL — Mitigate Red Items":"RECOMMENDED FOR APPROVAL";

  return{tm:tm,tAMC:tAMC,tCV:tCV,amcCost:amcCost,dc:dc,risk:risk,bgc:bgc,tCost:tCost,
    pm:pm,pmP:pmP,siA:siA,diA:diA,chT:chT,gm:gm,gmP:gmP,advA:advA,bgPct:bgPct,bgCom:bgCom,ldMax:ldMax,
    ciT:ciT,coT:coT,mos:mos,peak:peak,negQ:negQ,negD:negD,bep:bep,
    delays:delays,maxDD:maxDD,maxDW:maxDW,estLD:estLD,
    rScores:rScores,avgR:avgR,hiR:hiR,ragItems:ragItems,rec:rec,redCt:redCt};
}

/* ============ TABS ============ */
var tabNames=["Dashboard","Deal Overview","Channel","Key Financials","Milestones","Cash Flow","Profitability","Penalty","Delivery Planning","Risk Analysis","IFRS 15","Forex","Settings"];

/* ============ RENDER ============ */
function render(){
  var c=calc();
  var fns=[rDash,rOverview,rChannel,rFin,rMile,rCF,rProf,rPen,rDel,rRisk,rIFRS,rFX,rSettings];

function FR(lbl,id,type,val,opts){
  opts=opts||{};
  var cls=opts.cf?'cf':'';
  var ro=opts.cf?'readonly':'';
  var suf=opts.suf||'';
  var oc=opts.cf?'':'onchange="uf(\''+id+'\',this.'+(type==='checkbox'?'checked':'value')+',\''+type+'\')"';
  if(type==='select'){
    var os=(opts.os||[]).map(function(o){return'<option'+(o===val?' selected':'')+'>'+o+'</option>'}).join('');
    return'<div class="fr"><label>'+lbl+'</label><select '+oc+'>'+os+'</select>'+(suf?'<span class="u">'+suf+'</span>':'')+'</div>';
  }
  if(type==='checkbox'){
    return'<div class="fr"><label>'+lbl+'</label><input type="checkbox"'+(val?' checked':'')+' '+oc+' style="width:18px;height:18px"></div>';
  }
  var it=type==='number'?'number':type==='date'?'date':'text';
  return'<div class="fr"><label>'+lbl+'</label><input type="'+it+'" value="'+(val!=null?val:'')+'" step="any" class="'+cls+'" '+ro+' '+oc+'>'+(suf?'<span class="u">'+suf+'</span>':'')+'</div>';
}

function uf(path,val,type){
  if(type==='number')val=parseFloat(val)||0;
  else if(type==='checkbox')val=!!val;
  var parts=path.split('.');var obj=D;
  for(var i=0;i<parts.length-1;i++)obj=obj[parts[i]];
  obj[parts[parts.length-1]]=val;
  render();
}

function KC(lbl,val,sub,cls){
  return'<div class="kc '+(cls||'')+'"><div class="kl">'+lbl+'</div><div class="kv">'+val+'</div>'+(sub?'<div class="ks">'+sub+'</div>':'')+'</div>';
}

  return'<div class="sec"><div class="st">What-If Delay Scenarios</div><table class="dt"><thead><tr><th>Delay (Wks)</th><th>Net Wks</th><th>LD Amount</th><th>LD %</th><th>Revised Margin</th><th>Impact</th></tr></thead><tbody>'+

/* ============ FOREX ============ */
function rFX(c){
  var ms=[];var base=new Date(D.startDate);
  for(var m=1;m<=Math.min(c.tm,51);m++){
    var dt=new Date(base.getFullYear(),base.getMonth()+m-1,1);
    var rate=D.dealToReportRate*Math.pow(1+D.annualDeprecPct/100/12,m-1);
    ms.push({m:m,dt:dt.toLocaleDateString('en-US',{month:'short',year:'numeric'}),rate:rate.toFixed(2),
      sd:D.supplyToDealRate.toFixed(2),sr:(rate*D.supplyToDealRate).toFixed(2),
      buf:(rate*(1+D.volatilityBuffer/100)).toFixed(2)});
  }
  return'<div class="fg"><div class="fc"><div class="sec"><div class="st">Assumptions</div>'+
    FR("Annual Depreciation","annualDeprecPct","number",D.annualDeprecPct,{suf:"%"})+
    FR("Volatility Buffer","volatilityBuffer","number",D.volatilityBuffer,{suf:"%"})+
    FR("Current Rate","","text",D.dealToReportRate.toFixed(2)+" "+D.dealCcy+"/"+D.reportCcy,{cf:true})+
    '</div></div></div><div class="sec"><div class="st">Projected Rates ('+D.dealCcy+'/'+D.reportCcy+')</div>'+
    '<div class="cfs"><table class="dt"><thead><tr><th>Mo</th><th>Date</th><th>'+D.dealCcy+'/'+D.reportCcy+'</th><th>'+D.supplyCcy+'/'+D.dealCcy+'</th><th>'+D.supplyCcy+'/'+D.reportCcy+'</th><th>With Buffer</th></tr></thead><tbody>'+
    ms.map(function(m){return'<tr><td>M'+m.m+'</td><td>'+m.dt+'</td><td class="n">'+m.rate+'</td><td class="n">'+m.sd+'</td><td class="n">'+m.sr+'</td><td class="n">'+m.buf+'</td></tr>'}).join('')+
    '</tbody></table></div></div>';
}

function initPC(c){

/* ============ SAVE / LOAD ============ */
function doSave(){
  var name=D.customer+' - '+D.projectName;
  document.getElementById('MD').innerHTML=
    '<div class="md-h">Save Deal<button class="md-c" onclick="closeMo()">&times;</button></div>'+
    '<div class="md-b"><div class="fr"><label>Deal Name</label><input type="text" id="sName" value="'+name+'" style="flex:1"></div>'+
    '<p style="margin-top:12px;color:var(--gray);font-size:12px">Downloads as JSON file. Also saved in-memory for this session.</p></div>'+
    '<div class="md-f"><button class="btn btn-o" onclick="closeMo()">Cancel</button><button class="btn btn-n" onclick="execSave()">Save</button></div>';
  document.getElementById('MO').style.display='flex';
}
function execSave(){
  D.savedAt=new Date().toISOString();
  var name=document.getElementById('sName').value||D.dealRef;
  _savedDeals[D.id]={name:name,data:JSON.parse(JSON.stringify(D)),savedAt:D.savedAt};
  var blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=name.replace(/[^a-zA-Z0-9]/g,'_')+'.json';a.click();
  URL.revokeObjectURL(url);
  closeMo();
}
function doLoad(){
  var keys=Object.keys(_savedDeals);
  var list=keys.length>0?'<p style="font-weight:600;margin-bottom:8px">Session-saved deals:</p><div style="max-height:250px;overflow-y:auto">'+
    keys.map(function(k){var d=_savedDeals[k];return'<div class="di" onclick="loadD(\''+k+'\')"><div class="di-n">'+d.name+'</div><div class="di-m">Saved: '+new Date(d.savedAt).toLocaleString()+'</div></div>'}).join('')+'</div>':'<p style="color:var(--gray)">No session-saved deals.</p>';
  document.getElementById('MD').innerHTML=
    '<div class="md-h">Load Deal<button class="md-c" onclick="closeMo()">&times;</button></div>'+
    '<div class="md-b"><div style="margin-bottom:16px"><label class="btn btn-o" style="cursor:pointer">📁 Import JSON file'+
    '<input type="file" accept=".json" style="display:none" onchange="loadFile(this.files[0])"></label></div>'+list+'</div>'+
    '<div class="md-f"><button class="btn btn-o" onclick="closeMo()">Cancel</button></div>';
  document.getElementById('MO').style.display='flex';
}
function loadD(k){if(_savedDeals[k]){D=JSON.parse(JSON.stringify(_savedDeals[k].data));closeMo();AT=0;renderTabs();render();restoreLogo()}}
function loadFile(file){if(!file)return;var r=new FileReader();r.onload=function(e){try{D=JSON.parse(e.target.result);closeMo();AT=0;renderTabs();render();restoreLogo()}catch(err){alert('Invalid JSON')}};r.readAsText(file)}
function closeMo(){document.getElementById('MO').style.display='none'}

  var s2=p.addSlide();hdr(s2,'KEY FINANCIALS');
  kpi(s2,.3,1,'Total Contract Value',fS(c.tCV),N);kpi(s2,2.7,1,'Project Margin',fP(c.pmP),T);
  kpi(s2,5.1,1,'Total Cost',fS(c.tCost),A);kpi(s2,7.5,1,'Gross Margin',fP(c.gmP),B);

  kpi(s3,5.1,.95,'Neg. Duration',c.negD+' months',A);kpi(s3,7.5,.95,'Neg. Quantum',fS(Math.abs(c.negQ)),N);
  var cfH=[[''].concat(c.mos.slice(0,12).map(function(m){return'M'+m.m}))];

  s5.addTable(rTbl,{x:.3,y:1,w:9.4,colW:[3.5,2,2],rowH:Array(rT.length).fill(.3)});

function uploadLogo(file){
  if(!file)return;
  if(file.size>2*1024*1024){alert('Logo file too large. Please use an image under 2MB.');return}
  var r=new FileReader();
  r.onload=function(e){
    D._logoData=e.target.result;
    updateHeader();
    render();
  };
  r.readAsDataURL(file);
}

function removeLogo(){
  D._logoData=null;
  updateHeader();
  render();
}

function updateHeader(){
  var box=document.getElementById('logoBox');
  if(!box)return;
  if(D._logoData){
    box.innerHTML='<img src="'+D._logoData+'" style="max-width:110px;max-height:36px;object-fit:contain;display:block">';
    box.title='Click to change logo';
  } else {
    box.innerHTML='[LOGO]';
    box.title='Click to upload logo';
  }
  var nameEl=document.getElementById('headerTitle');
  if(nameEl) nameEl.textContent=D.companyName?D.companyName+' — DEAL ANALYSIS TOOL':'DEAL ANALYSIS TOOL';
}
