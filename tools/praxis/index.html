<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Solution, Size & Price — ATLAS</title>
<link rel="stylesheet" id="atlas-css-link" href="">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOOL IDENTITY — change TOOL_NAME/TOOL_SHORT in JS, nothing here ── */
:root {
  --orange:#FF5539; --navy:#002870; --blue:#1C38F5;
  --teal:#00B290; --amber:#FFB600; --purple:#6C47FF;
  --white:#FFF; --light:#F5F6FA; --mid:#8892A4; --dark:#0D1F4E;
  --border:#E0E4EF; --shadow:0 2px 8px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.11);
  --r:8px; --r-sm:5px; --r-lg:12px;
  --font:'Roboto',sans-serif; --mono:'Roboto Mono',monospace;
  --sp:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--light);color:var(--dark);min-height:100vh;font-size:13px}

/* ── CONTEXT BAR ── */
.ctx{background:#001d5c;border-bottom:2px solid var(--orange);height:32px;
  display:flex;align-items:center;padding:0 20px;gap:0;font-size:11px}
.ctx-back{color:rgba(255,255,255,.7);text-decoration:none;font-weight:600;
  padding:0 12px 0 0;border-right:1px solid rgba(255,255,255,.15);
  margin-right:12px;transition:color .15s}
.ctx-back:hover{color:var(--orange)}
.ctx-lbl{color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;font-size:9px}
.ctx-val{color:rgba(255,255,255,.85);font-weight:600;margin-left:5px}
.ctx-sep{color:rgba(255,255,255,.25);margin:0 8px}
.ctx-tool{margin-left:auto;color:rgba(255,255,255,.45);font-size:10px;
  font-weight:700;text-transform:uppercase;letter-spacing:1px}

/* ── HEADER ── */
.hdr{background:var(--navy);padding:0 20px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-md)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:3px}
.hdr-brand span{color:var(--orange)}
.hdr-tool{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);
  border-left:1px solid rgba(255,255,255,.2);padding-left:12px}
.hdr-eng{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);
  border-left:1px solid rgba(255,255,255,.15);padding-left:12px;
  max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── MODE TOGGLE ── */
.mode-toggle{display:flex;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px}
.mode-btn{padding:4px 14px;border-radius:16px;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border:none;
  background:transparent;font-family:var(--font)}
.mode-btn.act{background:#fff;color:var(--navy)}

/* ── KPI BAR ── */
.kpi-bar{background:var(--dark);padding:0 20px;height:40px;
  display:flex;align-items:center;gap:0;border-bottom:1px solid rgba(255,255,255,.08)}
.kpi-item{display:flex;align-items:center;gap:6px;padding:0 16px;
  border-right:1px solid rgba(255,255,255,.08)}
.kpi-item:first-child{padding-left:0}
.kpi-lbl{font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:rgba(255,255,255,.4)}
.kpi-val{font-size:13px;font-weight:700;color:#fff;font-family:var(--mono)}
.kpi-val.ok{color:var(--teal)}
.kpi-val.warn{color:var(--amber)}
.kpi-val.err{color:var(--orange)}
.kpi-save{margin-left:auto;font-size:10px;color:rgba(255,255,255,.4);
  display:flex;align-items:center;gap:8px}
.kpi-save-btn{background:var(--orange);color:#fff;border:none;
  border-radius:var(--r-sm);padding:4px 12px;font-size:11px;font-weight:700;
  font-family:var(--font);cursor:pointer;transition:opacity .15s}
.kpi-save-btn:hover{opacity:.85}

/* ── ENGAGEMENT SELECTOR ── */
.eng-selector{background:#fff;border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:12px}
.eng-sel-label{font-size:11px;font-weight:700;color:var(--mid);
  text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.eng-select{flex:1;max-width:320px;padding:7px 10px;border:1px solid var(--border);
  border-radius:var(--r-sm);font-family:var(--font);font-size:12px;
  color:var(--dark);background:#fff;cursor:pointer}
.eng-select:focus{outline:none;border-color:var(--blue)}
.action-select{flex:1;max-width:360px;padding:7px 10px;border:1px solid var(--border);
  border-radius:var(--r-sm);font-family:var(--font);font-size:12px;
  color:var(--dark);background:#fff;cursor:pointer}
.action-badge{display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,178,144,.1);border:1px solid rgba(0,178,144,.25);
  border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--teal)}
.eng-new-btn{background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);
  padding:7px 14px;font-size:11px;font-weight:700;font-family:var(--font);
  cursor:pointer;white-space:nowrap}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid var(--border);
  padding:0 20px;display:flex;gap:0}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--mid);
  cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;
  white-space:nowrap;transition:all .15s}
.tab.act{color:var(--navy);border-bottom-color:var(--orange)}
.tab:hover:not(.act){color:var(--dark)}
.tab.soon{opacity:.5;cursor:default}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;background:var(--orange);color:#fff;
  border-radius:8px;font-size:9px;font-weight:700;margin-left:4px;padding:0 4px}

/* ── PAGE ── */
.page{padding:16px 20px;max-width:1440px;margin:0 auto}

/* ── WORKLOAD CATEGORY ── */
.wl-category{background:#fff;border:1px solid var(--border);
  border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden}
.wl-cat-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--light);border-bottom:1px solid var(--border);cursor:pointer}
.wl-cat-hdr:hover{background:#ECEEF4}
.wl-cat-icon{font-size:16px}
.wl-cat-title{font-size:13px;font-weight:800;color:var(--navy);flex:1}
.wl-cat-subtitle{font-size:10px;color:var(--mid)}
.wl-cat-count{background:var(--navy);color:#fff;border-radius:10px;
  padding:2px 8px;font-size:10px;font-weight:700}
.wl-cat-add{background:var(--orange);color:#fff;border:none;
  border-radius:var(--r-sm);padding:5px 12px;font-size:11px;font-weight:700;
  font-family:var(--font);cursor:pointer;margin-left:4px}
.wl-cat-arrow{color:var(--mid);transition:transform .2s;font-size:12px}
.wl-cat-body{display:none}
.wl-cat-body.open{display:block}

/* ── WORKLOAD TABLE ── */
.wl-table{width:100%;border-collapse:collapse}
.wl-table th{background:var(--light);padding:8px 12px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--mid);border-bottom:1px solid var(--border)}
.wl-table td{padding:10px 12px;border-bottom:1px solid var(--border);
  vertical-align:middle;font-size:12px}
.wl-table tr:last-child td{border-bottom:none}
.wl-table tr.row-main{cursor:pointer;transition:background .1s}
.wl-table tr.row-main:hover td{background:rgba(0,40,112,.02)}
.wl-table tr.row-main.open td{background:rgba(0,40,112,.03)}
.wl-table .num{text-align:right;font-family:var(--mono)}
.wl-name{font-weight:700;color:var(--dark)}
.wl-arrow{color:var(--mid);font-size:10px;transition:transform .2s}
.row-main.open .wl-arrow{transform:rotate(90deg)}

/* ── EXPAND ROW ── */
.expand-row td{padding:0;background:var(--light)}
.expand-inner{max-height:0;overflow:hidden;transition:max-height .25s ease}
.expand-inner.open{max-height:9000px}
.expand-pad{padding:16px}

/* ── MODE BADGE ── */
.mode-badge-express{display:inline-flex;align-items:center;gap:3px;
  background:rgba(0,178,144,.1);border:1px solid rgba(0,178,144,.25);
  border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;color:var(--teal)}
.mode-badge-deep{display:inline-flex;align-items:center;gap:3px;
  background:rgba(28,56,245,.1);border:1px solid rgba(28,56,245,.25);
  border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;color:var(--blue)}

/* ── FORM ── */
.formgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.4px;color:var(--mid)}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:1px solid var(--border);
  border-radius:var(--r-sm);font-family:var(--font);font-size:12px;
  color:var(--dark);background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
.fg-hint{font-size:10px;color:var(--mid);margin-top:2px}
.fg-hint.warn{color:var(--orange)}

/* ── DERIVED PANEL ── */
.derived{background:rgba(0,40,112,.04);border:1px solid rgba(0,40,112,.1);
  border-radius:var(--r);padding:10px 14px;margin-bottom:12px}
.derived-row{display:flex;gap:0;flex-wrap:wrap}
.derived-item{padding:4px 16px;border-right:1px solid rgba(0,40,112,.1);
  text-align:center}
.derived-item:first-child{padding-left:0}
.derived-item:last-child{border-right:none}
.derived-val{font-size:18px;font-weight:900;color:var(--navy);font-family:var(--mono)}
.derived-lbl{font-size:9px;color:var(--mid);text-transform:uppercase;
  letter-spacing:.4px;margin-top:2px}

/* ── DEEP SECTION ── */
.deep-section{border-top:1px dashed var(--border);padding-top:12px;margin-top:12px}
.deep-section-title{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--blue);margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.deep-section-title::before{content:'';display:inline-block;width:3px;
  height:12px;background:var(--blue);border-radius:2px}

/* ── ACTIONS ROW ── */
.actions-row{display:flex;gap:8px;padding-top:8px;
  border-top:1px solid var(--border);margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;
  border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:var(--font);
  border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:#001d5c}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--navy)}
.btn-danger-text{background:none;color:#DC2626;border:none;padding:7px 8px}
.btn-danger-text:hover{background:rgba(220,38,38,.08)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-ghost-white{background:rgba(255,255,255,.12);color:#fff;
  border:1px solid rgba(255,255,255,.2);font-size:11px;padding:5px 12px}

/* ── EMPTY STATE ── */
.empty-cat{padding:24px;text-align:center;color:var(--mid)}
.empty-cat-icon{font-size:28px;margin-bottom:8px}
.empty-cat-title{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:4px}
.empty-cat-sub{font-size:11px;line-height:1.5}

/* ── SLA BADGES ── */
.sla-gold{background:rgba(255,182,0,.15);color:#9a6e00;border-radius:10px;
  padding:2px 8px;font-size:10px;font-weight:700}
.sla-silver{background:rgba(136,146,164,.15);color:#5a6476;border-radius:10px;
  padding:2px 8px;font-size:10px;font-weight:700}
.sla-bronze{background:rgba(180,83,9,.12);color:#b45309;border-radius:10px;
  padding:2px 8px;font-size:10px;font-weight:700}

/* ── COMING SOON ── */
.coming-soon-tab{padding:48px 24px;text-align:center;color:var(--mid)}
.coming-soon-tab h3{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:6px}
.coming-soon-tab p{font-size:12px;line-height:1.6}

/* ── SLIDER ── */
.slider-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px}
.slider-row input[type=range]{width:100%;accent-color:var(--orange);height:4px;cursor:pointer}
.slider-row input[type=number]{width:72px;text-align:right;padding:5px 6px;
  border:1px solid var(--border);border-radius:var(--r-sm);font-family:var(--mono);font-size:11px}
.preset-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  background:var(--light);border:1px solid var(--border);border-radius:20px;
  font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--dark)}
.preset-chip:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.preset-chip.act{background:var(--navy);color:#fff;border-color:var(--navy)}
.src-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:20px;font-size:10px;font-weight:700}
.src-onprem{background:rgba(0,40,112,.1);color:var(--navy)}
.src-api{background:rgba(28,56,245,.1);color:var(--blue)}
.src-hybrid{background:rgba(0,178,144,.1);color:var(--teal)}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;
  border-radius:var(--r);font-size:12px;font-weight:600;color:#fff;
  opacity:0;transition:opacity .25s;z-index:9999;pointer-events:none}
#toast.show{opacity:1}
#toast.success{background:var(--teal)}
#toast.info{background:var(--navy)}
#toast.warning{background:var(--amber);color:var(--dark)}
#toast.error{background:var(--orange)}

/* ── VERSION BANNER ── */
.version-banner{background:rgba(0,40,112,.06);border:1px solid rgba(0,40,112,.12);
  border-radius:var(--r);padding:8px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;font-size:11px}
.version-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
.version-label{font-weight:700;color:var(--navy)}
.version-meta{color:var(--mid)}
.version-dirty{color:var(--amber);font-weight:600}

/* ── IF-compatible CSS classes ─────────────────────────────────────── */
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.st{text-align:center;padding:6px 3px}
.v{font-size:20px;font-weight:700}
.l{font-size:9px;color:var(--mid);margin-top:2px}
.cc{position:relative;width:100%;height:280px}
.cc.t{height:360px}
.ib{padding:8px 10px;border-radius:6px;font-size:10px}
.ib.s{background:rgba(0,178,144,.08)}
.ib.i{background:rgba(0,40,112,.04)}
.ibg{background:rgba(28,56,245,.06);border-radius:6px;padding:8px}
.sbg{background:rgba(0,178,144,.08);border-radius:6px;padding:8px}
.dbg{background:rgba(255,85,57,.06);border-radius:6px;padding:8px}
.wbg{background:rgba(255,182,0,.08);border-radius:6px;padding:8px}
.txM{color:var(--mid)}
.s2{color:var(--teal)}
.s1{color:var(--blue)}
.p1{color:var(--orange)}
.p2{color:var(--navy)}
.s3{color:var(--amber)}
table{width:100%;border-collapse:collapse;font-size:11px}
table th{padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mid);text-align:left;background:var(--light)}
table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
table tr:last-child td{border-bottom:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ATLAS CONTEXT BAR -->
<div class="ctx">
  <a class="ctx-back" href="../../tools/engagement-docket/index-v3.html" id="ctx-back-link">&#8592; Docket</a>
  <span class="ctx-lbl">Tool</span>
  <span class="ctx-val" id="ctx-tool-name">—</span>
  <span class="ctx-sep">|</span>
  <span class="ctx-lbl">Engagement</span>
  <span class="ctx-val" id="ctx-eng-name">—</span>
  <span class="ctx-sep">|</span>
  <span class="ctx-lbl">Version</span>
  <span class="ctx-val" id="ctx-version">New</span>
  <span class="ctx-tool">ATLAS</span>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-brand">ATL<span>A</span>S</div>
    <div class="hdr-tool" id="hdr-tool-name">—</div>
    <div class="hdr-eng" id="hdr-eng-name">No engagement selected</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="mode-toggle">
      <button class="mode-btn act" id="btn-express" onclick="C.setMode('express')">&#9654; Express</button>
      <button class="mode-btn" id="btn-deep" onclick="C.setMode('deep')">&#9881; Deep</button>
    </div>
    <button class="btn btn-ghost-white btn-sm" onclick="C.saveVersion()">&#128190; Save version</button>
  </div>
</div>

<!-- KPI BAR -->
<div class="kpi-bar">
  <div class="kpi-item">
    <span class="kpi-lbl">Workloads</span>
    <span class="kpi-val" id="kpi-wl">0</span>
  </div>
  <div class="kpi-item">
    <span class="kpi-lbl">GPUs</span>
    <span class="kpi-val" id="kpi-gpus">0</span>
  </div>
  <div class="kpi-item">
    <span class="kpi-lbl">Power</span>
    <span class="kpi-val" id="kpi-power">0 kW</span>
  </div>
  <div class="kpi-item">
    <span class="kpi-lbl">Capex est.</span>
    <span class="kpi-val" id="kpi-capex">$0</span>
  </div>
  <div class="kpi-item">
    <span class="kpi-lbl">Blended $/Mtok</span>
    <span class="kpi-val" id="kpi-mtok">—</span>
  </div>
  <div class="kpi-item">
    <span class="kpi-lbl">SLA</span>
    <span class="kpi-val ok" id="kpi-sla">—</span>
  </div>
  <div class="kpi-save">
    <span id="kpi-save-status">No changes</span>
  </div>
</div>

<!-- ENGAGEMENT SELECTOR -->
<div class="eng-selector" id="eng-selector">
  <span class="eng-sel-label">Engagement</span>
  <select class="eng-select" id="eng-select" onchange="C.selectEngagement(this.value)">
    <option value="">— Select engagement —</option>
  </select>
  <span class="eng-sel-label" style="margin-left:8px">Action / context</span>
  <select class="action-select" id="action-select" onchange="C.selectAction(this.value)" disabled>
    <option value="">— New solution (no action) —</option>
  </select>
  <span id="action-badge-wrap"></span>
</div>

<!-- TABS -->
<div class="tabs" id="main-tabs">
  <div class="tab act" onclick="C.switchTab('scope')" data-tab="scope">Project Scope</div>
  <div class="tab" onclick="C.switchTab('workloads')" data-tab="workloads">
    Workloads <span class="tab-badge" id="tab-badge-wl">0</span>
  </div>
  <div class="tab" onclick="C.switchTab('arch')" data-tab="arch">Architecture</div>
  <div class="tab" onclick="C.switchTab('perf')" data-tab="perf">Performance</div>
  <div class="tab" onclick="C.switchTab('tok')" data-tab="tok">Tokenomics</div>
  <div class="tab" onclick="C.switchTab('bom')" data-tab="bom">BOM</div>
  <div class="tab" onclick="C.switchTab('yield')" data-tab="yield">Fleet Yield</div>
  <div class="tab" onclick="C.switchTab('report')" data-tab="report">Report</div>
</div>

<!-- PAGE CONTENT -->
<div class="page" id="main-page">
  <div id="tab-scope"></div>
  <div id="tab-workloads" style="display:none"></div>
  <div id="tab-arch"  style="display:none"></div>
  <div id="tab-perf"  style="display:none"></div>
  <div id="tab-tok"   style="display:none"></div>
  <div id="tab-bom"   style="display:none"></div>
  <div id="tab-yield" style="display:none"></div>
  <div id="tab-report"style="display:none"></div>
</div>

<div id="toast"></div>

<script>
// ── CFG — same pattern as all ATLAS tools ────────────────────────────────
var CFG = {
  baseUrl: (function() {
    var origin = window.location.origin
    var path   = window.location.pathname
    var m = path.match(/^(\/[^/]+\/atlas-platform\/)/)
    return m ? (origin + m[1]) : 'https://arvindbajaj5.github.io/atlas-platform/'
  })()
}
document.getElementById('atlas-css-link').href = CFG.baseUrl + 'shared/atlas.css'
</script>

  s.onload = function() { loadScripts(files, i+1) }

  document.head.appendChild(s)
})(['shared/atlas-tokens.js','shared/atlas-db.js','shared/atlas-solution.js'], 0)

<script>
'use strict'

// ════════════════════════════════════════════════════════════════════════════
// TOOL IDENTITY — change these three variables to rename the tool everywhere
// ════════════════════════════════════════════════════════════════════════════
var TOOL_NAME    = 'Solution, Size & Price'
var TOOL_SHORT   = 'SSP'
var TOOL_TAGLINE = 'Unified workload sizing, architecture & commercial pricing'
var TOOL_BUILD   = '20260708h'

// ════════════════════════════════════════════════════════════════════════════
// MODEL — single source of truth
// ════════════════════════════════════════════════════════════════════════════
var M = {
  // Tool identity
  toolName:  TOOL_NAME,
  toolShort: TOOL_SHORT,

  // Mode
  mode: 'express',   // 'express' | 'deep'

  // Active tab
  activeTab: 'workloads',

  // Engagement & action context
  engagements: [],
  currentEng:  null,
  actions:     [],
  currentAction: null,

  // Workloads — 4 categories
  workloads: { uc:[], maas:[], gpuaas:[], bmaas:[] },

  // GPU & model reference data (loaded from Supabase)
  gpuConfigs:     [],
  gpuMap:         {},     // id → config
  modelCatalogue: [],
  modelMap:       {},     // id → model
  benchmarkMap:   {},     // gpuId+modelId → benchmark

  // Tenants
  tenantsList: {},

  // Open expand rows
  openRows: {},

  // Versioning
  solutionVersionId: null,
  versionLabel: null,
  versionNumber: null,
  isDirty: false,

  // Price overrides (editable MSRP)
  priceOverrides: {},

  // Default GPU (first in list)
  defaultGpu: null,
  defaultModel: 'llama-3.1-8b'
}

// ════════════════════════════════════════════════════════════════════════════
// VIEW — pure render functions
// ════════════════════════════════════════════════════════════════════════════
var V = {

  init: function() {
    // Set tool name everywhere from TOOL_NAME variable
    document.title = TOOL_NAME + ' — ATLAS'
    document.getElementById('ctx-tool-name').textContent = TOOL_SHORT
    document.getElementById('hdr-tool-name').textContent = TOOL_NAME
    this.renderEngagementSelect()
    this.renderWorkloadsTab()
    this.updateKpiBar()
  },

  toast: function(msg, type) {
    var t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'show ' + (type||'info')
    clearTimeout(t._timer)
    t._timer = setTimeout(function(){ t.className = '' }, 2800)
  },

  updateKpiBar: function() {
    var w = M.workloads
    var totalWl = w.uc.length + w.maas.length + w.gpuaas.length + w.bmaas.length
    var totalGpus = 0, totalPower = 0, totalCapex = 0

    w.uc.forEach(function(wl) {
      try {
        var sz = (typeof AtlasSolution !== 'undefined') ? AtlasSolution.sizeWorkload(wl,'uc',M) : null
        if (sz && !sz.error) {
          totalGpus  += sz.total||0
          totalPower += sz.powerKw||0
          totalCapex += (sz.total||0) * 30000
        }
      } catch(e) {}
    })
    w.maas.forEach(function(wl) {
      try {
        var provGpus = wl.provisionedGpus || 0
        var sz = (typeof AtlasSolution !== 'undefined') ? AtlasSolution.sizeWorkload(wl,'maas',M) : null
        var gpus = provGpus || (sz && !sz.error ? sz.total||0 : 0)
        totalGpus  += gpus
        totalPower += (sz && !sz.error ? sz.powerKw||0 : 0)
        totalCapex += gpus * 30000
      } catch(e) {}
    })
    w.gpuaas.forEach(function(wl) {
      totalGpus  += wl.gpuCount||0
      totalPower += (wl.gpuCount||0) * 0.7
      totalCapex += (wl.gpuCount||0) * 30000
    })
    w.bmaas.forEach(function(wl) {
      var g = M.gpuMap[wl.gpu]
      var gpus = wl.serverCount * (wl.gpusPerServer||(g&&g.gpus_in_unit)||8)
      totalGpus  += gpus
      totalPower += wl.serverCount * ((g&&g.tdp_kw)||5.6)
      totalCapex += gpus * 30000
    })

    document.getElementById('kpi-wl').textContent    = totalWl
    document.getElementById('kpi-gpus').textContent  = totalGpus
    document.getElementById('kpi-power').textContent = Math.round(totalPower*10)/10 + ' kW'
    document.getElementById('tab-badge-wl').textContent = totalWl

    var capexM = totalCapex/1e6
    document.getElementById('kpi-capex').textContent = capexM >= 1
      ? '$' + capexM.toFixed(1) + 'M'
      : '$' + Math.round(totalCapex/1000) + 'K'

    // SLA pass count
    var slaEl = document.getElementById('kpi-sla')
    if (totalWl === 0) { slaEl.textContent = '—'; slaEl.className = 'kpi-val' }
    else { slaEl.textContent = totalWl + '/' + totalWl + ' ✓'; slaEl.className = 'kpi-val ok' }

    // Version banner
    document.getElementById('kpi-save-status').textContent = M.isDirty
      ? '● Unsaved changes'
      : M.versionLabel ? '✓ Saved: ' + M.versionLabel : 'No changes'

    // Context bar version
    document.getElementById('ctx-version').textContent = M.versionLabel || 'New'
  },

  renderEngagementSelect: function() {
    var sel = document.getElementById('eng-select')
    var cur = sel.value
    sel.innerHTML = '<option value="">— Select engagement —</option>'
    M.engagements.forEach(function(e) {
      var opt = document.createElement('option')
      opt.value = e.id
      opt.textContent = e.name + (e.territory ? ' · ' + e.territory : '')
      if (e.id === cur) opt.selected = true
      sel.appendChild(opt)
    })
  },

  renderActionSelect: function() {
    var sel = document.getElementById('action-select')
    sel.innerHTML = '<option value="">— New solution (no action) —</option>'
    M.actions.forEach(function(a) {
      var opt = document.createElement('option')
      opt.value = a.id
      var ctx = a.context || {}
      opt.textContent = (a.title||'Action') + (ctx.customer_type ? ' · ' + ctx.customer_type : '')
      if (a.id === (M.currentAction && M.currentAction.id)) opt.selected = true
      sel.appendChild(opt)
    })
    sel.disabled = M.actions.length === 0
  },

  renderWorkloadsTab: function() {
    var el = document.getElementById('tab-workloads')
    if (!el) return
    var h = ''

    // Version banner if saved
    if (M.versionLabel) {
      h += '<div class="version-banner">'
        + '<div class="version-dot"></div>'
        + '<span class="version-label">' + M.versionLabel + '</span>'
        + '<span class="version-meta">· ' + M.mode + ' mode'
        + (M.isDirty ? ' · <span class="version-dirty">Unsaved changes</span>' : ' · All saved')
        + '</span></div>'
    }

    h += V._renderCategory('uc',     '🏛', 'Use Cases', 'On-prem inference workloads', M.workloads.uc)
    h += V._renderCategory('maas',   '🔌', 'MaaS Pools', 'Shared API inference pools', M.workloads.maas)
    h += V._renderCategory('gpuaas', '⚡', 'GPUaaS Blocks', 'Reserved raw compute blocks', M.workloads.gpuaas)
    h += V._renderCategory('bmaas',  '🖥', 'BMaaS Blocks', 'Bare-metal server allocations', M.workloads.bmaas)

    el.innerHTML = h
  },

  _renderCategory: function(type, icon, title, subtitle, items) {
    var isOpen = M.openRows['_cat_' + type] !== false  // open by default
    var h = '<div class="wl-category">'
    h += '<div class="wl-cat-hdr" onclick="C.toggleCategory(\'' + type + '\')">'
      + '<span class="wl-cat-icon">' + icon + '</span>'
      + '<span class="wl-cat-title">' + title + '</span>'
      + '<span class="wl-cat-subtitle">' + subtitle + '</span>'
      + '<span class="wl-cat-count">' + items.length + '</span>'
      + '<button class="wl-cat-add" onclick="event.stopPropagation();C.addWorkload(\'' + type + '\')">+ Add</button>'
      + '<span class="wl-cat-arrow">' + (isOpen ? '&#9660;' : '&#9654;') + '</span>'
      + '</div>'
    h += '<div class="wl-cat-body' + (isOpen ? ' open' : '') + '" id="cat-body-' + type + '">'

    if (items.length === 0) {
      h += '<div class="empty-cat">'
        + '<div class="empty-cat-icon">' + icon + '</div>'
        + '<div class="empty-cat-title">No ' + title.toLowerCase() + ' yet</div>'
        + '<div class="empty-cat-sub">Click + Add to define a ' + title.slice(0,-1).toLowerCase() + '</div>'
        + '</div>'
    } else {
      h += V._renderWorkloadTable(type, items)
    }
    h += '</div></div>'
    return h
  },

  _renderWorkloadTable: function(type, items) {
    var isDeep = M.mode === 'deep'
    var cols = V._getTableCols(type, isDeep)
    var h = '<table class="wl-table"><thead><tr>'
    cols.forEach(function(c) {
      h += '<th' + (c.num ? ' class="num"' : '') + '>' + c.label + '</th>'
    })
    h += '<th></th></tr></thead><tbody>'

    items.forEach(function(wl) {
      var isOpen = !!M.openRows[wl.id]
      var cells  = V._getTableCells(type, wl, isDeep)
      h += '<tr class="row-main' + (isOpen?' open':'') + '" onclick="C.toggleRow(\'' + wl.id + '\')">'
      cells.forEach(function(cell) {
        h += '<td' + (cell.num ? ' class="num"' : '') + '>' + cell.html + '</td>'
      })
      h += '<td><span class="wl-arrow">&#9654;</span></td></tr>'

      // Expand row
      h += '<tr class="expand-row"><td colspan="' + (cols.length+1) + '">'
        + '<div class="expand-inner' + (isOpen?' open':'') + '">'
        + (isOpen ? '<div class="expand-pad">' + V._renderWorkloadForm(type, wl) + '</div>' : '')
        + '</div></td></tr>'
    })
    h += '</tbody></table>'
    return h
  },

  _getTableCols: function(type, isDeep) {
    var base = [{ label:'Name' }]
    if (type === 'uc' || type === 'maas') {
      base.push({ label:'Model' })
      base.push({ label:'GPU' })
      if (isDeep) base.push({ label:'Precision' }, { label:'Engine' })
      base.push({ label:'GPUs', num:true })
      base.push({ label:'Power', num:true })
      base.push({ label:'Capex est.', num:true })
      if (type === 'maas') base.push({ label:'$/Mtok', num:true })
      base.push({ label:'SLA' })
    } else if (type === 'gpuaas') {
      base.push({ label:'GPU' }, { label:'Count', num:true })
      base.push({ label:'Rate tier' }, { label:'Monthly est.', num:true })
      base.push({ label:'SLA' })
    } else if (type === 'bmaas') {
      base.push({ label:'GPU' }, { label:'Servers', num:true })
      base.push({ label:'GPUs/srv', num:true }, { label:'Monthly est.', num:true })
      base.push({ label:'SLA' })
    }
    return base
  },

  _getTableCells: function(type, wl, isDeep) {
    var gpuConf = M.gpuMap[wl.gpu]
    var gpuName = (gpuConf && gpuConf.name) || (wl.gpu ? wl.gpu.slice(0,12) : '—')
    var modObj = M.modelMap[wl.model] || (M.modelById && M.modelById[wl.model]); var modName = (modObj && modObj.name) || (wl.model && wl.model.length < 30 ? wl.model : '—')
    var slaHtml = '<span class="sla-' + (wl.commercialSla||wl.sla||'bronze') + '">'
      + (wl.commercialSla||wl.sla||'bronze').charAt(0).toUpperCase()
      + (wl.commercialSla||wl.sla||'bronze').slice(1) + '</span>'

    if (type === 'uc' || type === 'maas') {
      var sz = null
      try {
        if (typeof AtlasSolution !== 'undefined') sz = AtlasSolution.sizeWorkload(wl, type, M)
      } catch(e) {}
      var gpus  = (sz && !sz.error) ? (sz.total||0) : '—'
      var power = (sz && !sz.error) ? (Math.round((sz.powerKw||0)*10)/10 + ' kW') : '—'
      var capex = (sz && !sz.error && sz.total) ? ('$' + Math.round(sz.total*30000/1000) + 'K') : '—'
      if (wl.provisionedGpus) gpus = wl.provisionedGpus + ' ⬆'
      var cells = [
        { html: '<span class="wl-name">' + atlasDB.esc(wl.name) + '</span>' },
        { html: '<span style="font-size:11px">' + modName.slice(0,20) + '</span>' },
        { html: '<span style="font-size:11px">' + gpuName.slice(0,18) + '</span>' }
      ]
      if (isDeep) {
        cells.push({ html: wl.precision||'int4' })
        cells.push({ html: wl.engine||'vllm' })
      }
      cells.push({ html: gpus, num:true })
      cells.push({ html: power, num:true })
      cells.push({ html: capex, num:true })
      if (type === 'maas') cells.push({ html: '$' + (wl.pricePerMtok||0.75) + '/Mtok', num:true })
      cells.push({ html: slaHtml })
      return cells
    }
    if (type === 'gpuaas') {
      var monthly = Math.round((wl.gpuCount||0) * 3.5 * 730)
      return [
        { html: '<span class="wl-name">' + atlasDB.esc(wl.name) + '</span>' },
        { html: gpuName.slice(0,18) },
        { html: wl.gpuCount||0, num:true },
        { html: wl.rateTier||'12mo' },
        { html: '$' + monthly.toLocaleString() + '/mo', num:true },
        { html: slaHtml }
      ]
    }
    if (type === 'bmaas') {
      var gpusPerSrv = wl.gpusPerServer || (gpuConf&&gpuConf.gpus_in_unit) || 8
      var monthly2 = wl.serverCount * 35000
      return [
        { html: '<span class="wl-name">' + atlasDB.esc(wl.name) + '</span>' },
        { html: gpuName.slice(0,18) },
        { html: wl.serverCount||1, num:true },
        { html: gpusPerSrv, num:true },
        { html: '$' + monthly2.toLocaleString() + '/mo', num:true },
        { html: slaHtml }
      ]
    }
    return [{ html: wl.name }]
  },

    _renderWorkloadForm: function(type, wl) {
    var isDeep = M.mode === 'deep'
    var id = wl.id
    var gpuConf = M.gpuMap[wl.gpu]
    var h = ''

    // ROW 1 — Name + Model + GPU + SLA + Tenant
    h += '<div class="formgrid" style="grid-template-columns:1.4fr 1.4fr 1.4fr 0.8fr 0.9fr">'
    h += V._fg('Name', '<input type="text" value="' + atlasDB.esc(wl.name) + '" ' + V._u(id,type,'name') + '>')
    if (type === 'uc' || type === 'maas') {
      h += V._fg('Model', V._renderModelDropdown(wl.model, id, type))
      h += V._fg('GPU Architecture', V._renderGpuDropdown(wl.gpu, id, type))
    } else {
      h += '<div class="fg"></div><div class="fg"></div>'
    }
    h += V._fg('SLA', '<select ' + V._u(id,type,'commercialSla') + '>'
      + V._opts([['gold','Gold SLA'],['silver','Silver SLA'],['bronze','Bronze SLA']], wl.commercialSla||wl.sla||'bronze')
      + '</select>')
    h += V._tenantDropdown(wl, id, type)
    h += '</div>'

    // ROW 2 — Presets + data source
    if (type === 'uc' || type === 'maas') {
      h += V._renderPresetBar(wl, type)
      h += '<div class="formgrid" style="grid-template-columns:1fr 1fr 3fr;margin-bottom:8px">'
      h += V._fg('Data source',
        '<select ' + V._u(id,type,'src') + '>'
        + V._opts([['onprem','🏢 On-Prem inference'],['api','☁️ API / MaaS'],['hybrid','🔀 Hybrid']], wl.src||'onprem')
        + '</select>', 'Where this workload runs')
      h += V._fg('Chargeout model',
        '<select ' + V._u(id,type,'chargeoutModel') + '>'
        + V._opts([['per_token','Per token / consumption'],['flat','Flat rate / subscription'],['hybrid','Hybrid']], wl.chargeoutModel||'per_token')
        + '</select>', 'Commercial billing model')
      h += '</div>'

      // Sizing inputs with sliders
      h += '<div class="formgrid">'
      h += V._sNum(id, type, 'dau', wl.dau||10000, 1000, 5000000, 1000, 'Daily Active Users')
      h += V._sNum(id, type, 'reqPerDay', wl.reqPerDay||20, 1, 200, 1, 'Requests / user / day')
      h += V._sNum(id, type, 'peakMult', wl.peakMult||3, 1, 20, 0.5, 'Peak multiplier')
      h += V._sNum(id, type, 'peakConcPct', wl.peakConcPct||5, 1, 100, 1, 'Peak concurrency %')
      h += '</div>'

      // Token inputs with sliders
      h += '<div class="formgrid">'
      h += V._sNum(id, type, 'avgInputTokens', wl.avgInputTokens||512, 50, 128000, 50, 'Avg input tokens')
      h += V._sNum(id, type, 'avgOutputTokens', wl.avgOutputTokens||256, 10, 32000, 10, 'Avg output tokens')
      h += V._sNum(id, type, 'gpuUtilTarget', wl.gpuUtilTarget||75, 10, 95, 5, 'GPU util target %')
      h += V._fg('Context percentile',
        '<select ' + V._u(id,type,'contextPct') + '>'
        + V._opts([['p50','P50 — median'],['p75','P75 — busy'],['p95','P95 — near-peak'],['p99','P99 — tail']], wl.contextPct||'p95')
        + '</select>')
      h += '</div>'
    }

    // MaaS — price + provisioning + demand planner
    if (type === 'maas') {
      h += '<div class="formgrid" style="grid-template-columns:1fr 1fr 2fr">'
      h += V._fg('Price $/Mtok',
        '<input type="number" min="0.01" step="0.01" value="' + (wl.pricePerMtok||0.75) + '" ' + V._uNum(id,type,'pricePerMtok') + '>',
        'Revenue per million tokens')
      h += V._fg('Provisioned GPUs',
        '<input type="number" min="1" step="1" value="' + (wl.provisionedGpus||'') + '" placeholder="Auto from sizing" ' + V._uNum(id,type,'provisionedGpus') + '>',
        'Override to size for future demand')
      h += V._fg('Provisioning note',
        '<input type="text" value="' + atlasDB.esc(wl.provisioningReason||'') + '" placeholder="e.g. Sized for Year 3 demand" ' + V._u(id,type,'provisioningReason') + '>')
      h += '</div>'
      h += V._renderDemandPlanner(wl)
    }

    // GPUaaS fields
    if (type === 'gpuaas') {
      h += '<div class="formgrid">'
      h += V._fg('GPU Architecture', V._renderGpuDropdown(wl.gpu, id, type))
      h += V._fg('GPU Count', '<input type="number" min="1" step="1" value="' + (wl.gpuCount||8) + '" ' + V._uNum(id,type,'gpuCount') + '>')
      h += V._fg('Rate Tier', '<select ' + V._u(id,type,'rateTier') + '>'
        + V._opts([['ondemand','On-demand — $5.00/GPU/hr'],['12mo','12-mo reserved — $3.50/GPU/hr'],['24mo','24-mo reserved — $2.75/GPU/hr'],['spot','Spot — $1.50/GPU/hr']], wl.rateTier||'12mo')
        + '</select>')
      h += V._fg('Commitment period', '<select ' + V._u(id,type,'contractMonths') + '>'
        + V._opts([['0','Month-to-month'],['6','6 months'],['12','12 months'],['24','24 months'],['36','36 months']], String(wl.contractMonths||12))
        + '</select>')
      h += '</div>'
      h += '<div class="formgrid">'
      h += V._fg('Dedication model', '<select ' + V._u(id,type,'dedicationModel') + '>'
        + V._opts([['dedicated','Dedicated — single tenant'],['shared','Shared pool — multi-tenant']], wl.dedicationModel||'dedicated')
        + '</select>')
      h += V._fg('Interconnect', '<select ' + V._u(id,type,'interconnect') + '>'
        + V._opts([['standalone','Standalone'],['nvlink','NVLink — same chassis'],['infiniband','InfiniBand — multi-server']], wl.interconnect||'standalone')
        + '</select>')
      h += V._tenantDropdown(wl, id, type)
      h += '</div>'
    }

    // BMaaS fields
    if (type === 'bmaas') {
      var defaultGpuPerSrv = (gpuConf && gpuConf.gpus_in_unit) || 8
      h += '<div class="formgrid">'
      h += V._fg('GPU Architecture', V._renderGpuDropdown(wl.gpu, id, type))
      h += V._fg('Server Count', '<input type="number" min="1" step="1" value="' + (wl.serverCount||1) + '" ' + V._uNum(id,type,'serverCount') + '>')
      h += V._fg('GPUs per server', '<input type="number" min="1" step="1" value="' + (wl.gpusPerServer||defaultGpuPerSrv) + '" ' + V._uNum(id,type,'gpusPerServer') + '>', 'Auto from gpu_configs')
      h += V._fg('SLA Tier', '<select ' + V._u(id,type,'commercialSla') + '>'
        + V._opts([['gold','Gold — dedicated bare metal'],['silver','Silver — guaranteed'],['bronze','Bronze — best effort']], wl.commercialSla||'gold')
        + '</select>')
      h += '</div>'
      h += '<div class="formgrid">'
      h += V._fg('Guest OS', '<select ' + V._u(id,type,'guestOs') + '>'
        + V._opts([['ubuntu','Ubuntu 22.04 LTS'],['rhel','RHEL 8/9'],['custom','Customer image']], wl.guestOs||'ubuntu')
        + '</select>')
      h += V._fg('Interconnect', '<select ' + V._u(id,type,'interconnect') + '>'
        + V._opts([['standalone','Standalone'],['nvlink','NVLink — same chassis'],['infiniband','InfiniBand — multi-server']], wl.interconnect||'standalone')
        + '</select>')
      h += V._tenantDropdown(wl, id, type)
      h += '</div>'
    }

    // Derived panel
    if (type === 'uc' || type === 'maas') {
      h += V._renderDerived(type, wl)
    }

    // Deep mode — UC + MaaS
    if (isDeep && (type === 'uc' || type === 'maas')) {
      h += '<div class="deep-section">'
        + '<div class="deep-section-title">Latency &amp; Performance</div>'
        + '<div class="formgrid">'
        + V._fg('Precision', '<select ' + V._u(id,type,'precision') + '>'
          + V._opts([['int4','INT4 — best throughput'],['int8','INT8'],['fp8','FP8'],['fp16','FP16 — best quality']], wl.precision||'int4')
          + '</select>')
        + V._fg('Inference Engine', '<select ' + V._u(id,type,'engine') + '>'
          + V._opts([['vllm','vLLM (standard)'],['trt_llm','TRT-LLM (+30%)'],['sglang','SGLang (+10%)']], wl.engine||'vllm')
          + '</select>')
        + V._fg('TTFT target (ms)', '<input type="number" min="50" step="50" value="' + (wl.ttft||500) + '" ' + V._uNum(id,type,'ttft') + '>', 'Time to first token')
        + V._fg('TBT target (ms)', '<input type="number" min="5" step="5" value="' + (wl.tbt||30) + '" ' + V._uNum(id,type,'tbt') + '>', 'Time between tokens')

  // Form helper — field group wrapper
  _fg: function(label, control, hint) {

      return '<option value="' + v[0] + '"' + (v[0] === current ? ' selected' : '') + '>' + v[1] + '</option>'
    }).join('')
  },

  // onclick/quote helpers — avoids all escaping issues in event handlers
  _q: function(val) { return "'" + val + "'" },                          // wrap in single quotes

    var args = Array.prototype.slice.call(arguments, 1)
      .map(function(a){ return "'" + a + "'" }).join(',')
    return 'onclick="C.' + fn + '(' + args + ')"'

  _uNum: function(id, type, field) {

  // Demand planner for MaaS
  _renderDemandPlanner: function(wl) {
    var id = wl.id
    var sources = wl.demandSources || []
    var tokPerSec = 15417
    var provGpus = wl.provisionedGpus || 1
    var supplyB = provGpus * tokPerSec * 730 * 3600 / 1e9

    // All interactive elements use data-* attributes — event delegation handles clicks/changes
    var h = '<div id="dp-' + id + '" data-wlid="' + id + '" '
      + 'style="background:rgba(0,178,144,.05);border:1px solid rgba(0,178,144,.2);'
      + 'border-radius:var(--r);padding:14px;margin-bottom:12px">'
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      + '<div style="font-size:11px;font-weight:700;color:var(--teal)">&#128200; Demand Planner'
      + (wl.provisionedGpus ? ' <span style="font-size:10px;color:var(--mid);font-weight:400">Supply: '
        + supplyB.toFixed(1) + ' B tok/mo</span>' : '') + '</div>'
      + '<button class="btn btn-outline btn-sm" data-action="addSource" data-wlid="' + id + '">+ Source</button>'
      + '</div>'

    if (!sources.length) {
      h += '<div style="color:var(--mid);font-size:11px;padding:4px 0">'
        + 'No demand sources yet. Click + Source to add a customer segment.</div>'
    } else {
      var custTypes = [['tsap','TSAP'],['isv','ISV'],['enterprise','Enterprise'],
                       ['gov','Government'],['consumer','Consumer'],['other','Other']]

      sources.forEach(function(src) {
        h += '<div style="background:#fff;border:1px solid var(--border);'
          + 'border-radius:var(--r);padding:10px;margin-bottom:8px">'
          + '<div class="formgrid" style="grid-template-columns:1.5fr 1fr 1fr 1fr 1fr 1fr auto">'

          // All inputs use data-* for delegation — no inline event handlers
          + '<div class="fg"><label>Label</label>'
          + '<input type="text" value="' + atlasDB.esc(src.label||'') + '" '
          + 'data-action="updSource" data-wlid="' + id + '" data-srcid="' + src.id + '" data-field="label" data-isnum="0">'
          + '</div>'

          + '<div class="fg"><label>Type</label>'
          + '<select data-action="updSource" data-wlid="' + id + '" data-srcid="' + src.id + '" data-field="customerType" data-isnum="0">'
          + custTypes.map(function(v) {
              return '<option value="' + v[0] + '"' + (src.customerType===v[0]?' selected':'') + '>' + v[1] + '</option>'
            }).join('')
          + '</select></div>'

          + '<div class="fg"><label>Customers Y1</label>'
          + '<input type="number" min="1" value="' + (src.customersY1||10) + '" '
          + 'data-action="updSource" data-wlid="' + id + '" data-srcid="' + src.id + '" data-field="customersY1" data-isnum="1">'
          + '</div>'

          + '<div class="fg"><label>Growth %/yr</label>'
          + '<input type="number" min="0" value="' + (src.customerGrowthPct||30) + '" '
          + 'data-action="updSource" data-wlid="' + id + '" data-srcid="' + src.id + '" data-field="customerGrowthPct" data-isnum="1">'
          + '</div>'

          + '<div class="fg"><label>Tok/cust/mo (M)</label>'
          + '<input type="number" min="0.01" step="0.1" value="' + (src.tokensPerCustomerM||5) + '" '
          + 'data-action="updSource" data-wlid="' + id + '" data-srcid="' + src.id + '" data-field="tokensPerCustomerM" data-isnum="1">'
          + '</div>'

          + '<div class="fg"><label>Token growth %</label>'
          + '<input type="number" min="0" value="' + (src.tokenGrowthPct||20) + '" '
          + 'data-action="updSource" data-wlid="' + id + '" data-srcid="' + src.id + '" data-field="tokenGrowthPct" data-isnum="1">'
          + '</div>'

          + '<div class="fg" style="align-self:flex-end">'
          + '<button class="btn btn-danger-text btn-sm" '
          + 'data-action="removeSource" data-wlid="' + id + '" data-srcid="' + src.id + '">&#10005;</button>'
          + '</div>'
          + '</div></div>'
      })

      // 6-year projection table (read-only derived output)
      h += '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px">'
        + '<thead><tr style="background:var(--light)">'
      ;['Year','Customers','Demand B tok/mo','Supply B tok/mo','Util %','Revenue/yr','Status'].forEach(function(col){
        h += '<th style="padding:5px 8px;font-size:9px;font-weight:700;text-transform:uppercase;'
          + 'color:var(--mid);text-align:' + (col==='Year'||col==='Status'?'left':'right') + '">' + col + '</th>'
      })
      h += '</tr></thead><tbody id="dp-table-' + id + '">'
      for (var yr = 1; yr <= 6; yr++) {
        var tc = 0, tb = 0
        sources.forEach(function(src) {
          var custs = (src.customersY1||0) * Math.pow(1 + (src.customerGrowthPct||0)/100, yr-1)
          tc += custs
          tb += custs * ((src.tokensPerCustomerM||0) * Math.pow(1 + (src.tokenGrowthPct||0)/100, yr-1)) / 1000
        })
        var util = supplyB > 0 ? tb / supplyB : 0
        var rev  = tb * 12 * 1000 * (wl.pricePerMtok || 0.75)
        var col  = util > 1 ? 'var(--orange)' : util > 0.85 ? 'var(--amber)' : 'var(--teal)'
        var st   = util > 1 ? '&#128308; Under' : util > 0.85 ? '&#129000; Near full'
                 : util > 0.3 ? '&#128994; Healthy' : '&#9898; Low'
        h += '<tr style="border-top:1px solid var(--border)">'
          + '<td style="padding:5px 8px">Y' + yr + '</td>'
          + '<td style="padding:5px 8px;text-align:right">' + Math.round(tc).toLocaleString() + '</td>'
          + '<td style="padding:5px 8px;text-align:right">' + tb.toFixed(2) + '</td>'
          + '<td style="padding:5px 8px;text-align:right">' + supplyB.toFixed(1) + '</td>'
          + '<td style="padding:5px 8px;text-align:right;font-weight:700;color:' + col + '">'
            + Math.min(util*100,999).toFixed(1) + '%</td>'
          + '<td style="padding:5px 8px;text-align:right">$' + Math.round(rev).toLocaleString() + '</td>'
          + '<td style="padding:5px 8px;font-size:10px">' + st + '</td>'
          + '</tr>'
      }
      h += '</tbody></table>'
    }
    h += '</div>'
    return h
  },


  _renderDerived: function(type, wl) {
    var sz = null
    try {
      if (typeof AtlasSolution !== 'undefined') sz = AtlasSolution.sizeWorkload(wl, type, M)
    } catch(e) {}
    if (!sz || sz.error) return ''
    var gpuConf = M.gpuMap[sz.gpu||wl.gpu]
    var gpuName = (gpuConf && gpuConf.name) || '—'
    var provGpus = wl.provisionedGpus || sz.total || 0
    return '<div class="derived"><div class="derived-row">'
      + V._di(sz.total||0, 'Min GPUs')
      + (wl.provisionedGpus && wl.provisionedGpus > sz.total ? V._di(wl.provisionedGpus, 'Provisioned ⬆') : '')
      + V._di(Math.round((sz.powerKw||0)*10)/10 + ' kW', 'Power')
      + V._di('$' + Math.round((provGpus)*30000/1000) + 'K', 'Capex est.')
      + V._di(gpuName, 'GPU')
      + '</div></div>'
  },

  _di: function(val, lbl) {
    return '<div class="derived-item">'
      + '<div class="derived-val">' + val + '</div>'
      + '<div class="derived-lbl">' + lbl + '</div>'
      + '</div>'
  },

  _renderGpuDropdown: function(currentGpu, wlId, type, fieldOverride, cpuOnly) {
    var h = '<select onchange="C.updWorkload(\'' + wlId + '\',\'' + type + '\',\'gpu\',this.value)">'
    if (cpuOnly) {
      // Filter to CPU/ASIC only (for disaggregated decode node)
      var filtered = M.gpuConfigs.filter(function(g){ return g.processor_type === 'CPU' || g.processor_type === 'ASIC' })
      if (!filtered.length) return '<select><option>No CPU configs</option></select>'
      var h2 = '<select onchange="C.updWorkload(\'' + wlId + '\',\'' + type + '\',\'' + (fieldOverride||'gpu') + '\',this.value)">'
      filtered.forEach(function(g) {
        h2 += '<option value="' + g.id + '"' + (g.id === currentGpu ? ' selected' : '') + '>' + g.name + '</option>'
      })
      return h2 + '</select>'
    }
    if (M.gpuConfigs.length === 0) {
      h += '<option value="">Loading GPUs...</option>'
    } else {
      // Group by tier
      var tiers = {}
      M.gpuConfigs.forEach(function(g) {
        var t = g.tier || 'other'
        if (!tiers[t]) tiers[t] = []
        tiers[t].push(g)
      })
      var tierOrder = ['premium','nextgen','high','mid','light','decode','other']
      tierOrder.forEach(function(tier) {
        if (!tiers[tier]) return
        h += '<optgroup label="' + tier.charAt(0).toUpperCase() + tier.slice(1) + '">'
        tiers[tier].forEach(function(g) {
          h += '<option value="' + g.id + '"' + (g.id === currentGpu ? ' selected' : '') + '>'
            + g.name
            + (g.vram_per_gpu_gb ? ' · ' + g.vram_per_gpu_gb + 'GB' : '')
            + (g.fp8_tflops ? ' · ' + g.fp8_tflops + ' FP8T' : '')
            + '</option>'
        })
        h += '</optgroup>'
      })
    }
    h += '</select>'
    return h
  },

  _renderModelDropdown: function(currentModel, wlId, type) {
    var h = '<select onchange="C.updWorkload(\'' + wlId + '\',\'' + type + '\',\'model\',this.value)">'
    if (M.modelCatalogue.length === 0) {
      h += '<option value="">Loading models...</option>'
    } else {
      var families = {}
      M.modelCatalogue.forEach(function(m) {
        var f = m.family || 'Other'
        if (!families[f]) families[f] = []
        families[f].push(m)
      })
      Object.keys(families).sort().forEach(function(fam) {
        h += '<optgroup label="' + fam + '">'
        families[fam].forEach(function(m) {
          h += '<option value="' + m.model_id + '"' + (m.model_id === currentModel || m.id === currentModel ? ' selected' : '') + '>'
            + m.name + (m.params_b ? ' (' + m.params_b + 'B)' : '')
            + '</option>'
        })
        h += '</optgroup>'
      })
    }
    h += '</select>'
    return h
  }
}

var C = {

  setMode: function(mode) {
    M.mode = mode
    document.getElementById('btn-express').className = 'mode-btn' + (mode==='express'?' act':'')
    document.getElementById('btn-deep').className    = 'mode-btn' + (mode==='deep'   ?' act':'')
    V.renderWorkloadsTab()
    V.updateKpiBar()
  },

  switchTab: function(tab) {
    M.activeTab = tab
    document.querySelectorAll('.tab').forEach(function(el) {
      el.classList.toggle('act', el.dataset.tab === tab)
    })
    var tabs = ['scope','workloads','arch','perf','tok','bom','yield','report']
    tabs.forEach(function(t) {
      var el = document.getElementById('tab-' + t)
      if (el) el.style.display = t === tab ? '' : 'none'
    })
    if      (tab === 'scope')    V.renderScopeTab()
    else if (tab === 'workloads') V.renderWorkloadsTab()
    else if (tab === 'arch')     { V.renderArchTab();  setTimeout(praxisRebuildCharts, 300) }
    else if (tab === 'perf')     { V.renderPerfTab();  setTimeout(praxisRebuildCharts, 300) }
    else if (tab === 'tok')      { V.renderTokTab();   setTimeout(praxisRebuildCharts, 300) }
    else if (tab === 'bom')      V.renderBOMTab()
    else if (tab === 'yield')    V.renderYieldTab()
    else if (tab === 'report')   V.renderReportTab()
  },

  toggleCategory: function(type) {
    var key = '_cat_' + type
    M.openRows[key] = M.openRows[key] === false ? true : false
    var body = document.getElementById('cat-body-' + type)
    if (body) body.classList.toggle('open', M.openRows[key] !== false)
    var hdr = body && body.previousElementSibling
    if (hdr) {
      var arrow = hdr.querySelector('.wl-cat-arrow')
      if (arrow) arrow.innerHTML = M.openRows[key] !== false ? '&#9660;' : '&#9654;'
    }
  },

  toggleRow: function(id) {
    M.openRows[id] = !M.openRows[id]
    V.renderWorkloadsTab()
  },

  addWorkload: function(type) {
    var id = type + '-' + Date.now()
    var defaultGpu = M.gpuConfigs.length ? M.gpuConfigs[0].id : ''
    var defaults = {
      uc:     { id:id, name:'Use Case '     +(M.workloads.uc.length+1),     model:M.defaultModel, gpu:defaultGpu, precision:'int4', dau:10000, reqPerDay:20, peakMult:3, peakConcPct:5, contextPct:'p95', commercialSla:'gold',   engine:'vllm', securityTier:'standard', isAgentic:false, isMultimodal:false, src:'onprem', chargeoutModel:'per_token', avgInputTokens:512, avgOutputTokens:256, gpuUtilTarget:75 },
      maas:   { id:id, name:'MaaS Pool '    +(M.workloads.maas.length+1),   model:M.defaultModel, gpu:defaultGpu, precision:'int4', dau:50000, reqPerDay:20, peakMult:3, peakConcPct:5, contextPct:'p95', commercialSla:'bronze', engine:'vllm', pricePerMtok:0.75, provisionedGpus:null, provisioningReason:'', demandSources:[], src:'onprem', chargeoutModel:'per_token', avgInputTokens:512, avgOutputTokens:256, gpuUtilTarget:75 },
      gpuaas: { id:id, name:'GPUaaS Block ' +(M.workloads.gpuaas.length+1), gpu:defaultGpu, gpuCount:8, rateTier:'12mo', commercialSla:'gold' },
      bmaas:  { id:id, name:'BMaaS Block '  +(M.workloads.bmaas.length+1),  gpu:defaultGpu, serverCount:1, gpusPerServer:8, commercialSla:'gold', guestOs:'ubuntu', interconnect:'standalone' }
    }
    M.workloads[type].push(defaults[type])
    M.openRows[id] = true
    M.isDirty = true
    V.renderWorkloadsTab()
    V.updateKpiBar()
    C.scheduleSave()
  },

  updWorkload: function(id, type, field, val) {
    var wl = M.workloads[type].find(function(w){ return w.id === id })
    if (!wl) return
    wl[field] = val
    // Auto-update gpus per server when GPU changes on BMaaS
    if (field === 'gpu' && type === 'bmaas') {
      var g = M.gpuMap[val]
      if (g && g.gpus_in_unit) wl.gpusPerServer = g.gpus_in_unit
    }
    M.isDirty = true
    V.renderWorkloadsTab()
    V.updateKpiBar()
    C.scheduleSave()
  },

  removeWorkload: function(id, type) {
    M.workloads[type] = M.workloads[type].filter(function(w){ return w.id !== id })
    delete M.openRows[id]
    M.isDirty = true
    V.renderWorkloadsTab()
    V.updateKpiBar()
    C.scheduleSave()
  },

  addDemandSource: function(wlId) {
    var wl = M.workloads.maas.find(function(w){ return w.id === wlId })
    if (!wl) return
    if (!wl.demandSources) wl.demandSources = []
    wl.demandSources.push({ id:'ds-'+Date.now(), label:'Source '+(wl.demandSources.length+1),
      customerType:'tsap', customersY1:10, customerGrowthPct:30,
      tokensPerCustomerM:5.0, tokenGrowthPct:20 })
    M.isDirty = true; C._refreshDemandPlanner(wlId, wl); C.scheduleSave()
  },

  updDemandSource: function(wlId, srcId, field, val) {
    var wl = M.workloads.maas.find(function(w){ return w.id === wlId })
    if (!wl || !wl.demandSources) return
    var src = wl.demandSources.find(function(s){ return s.id === srcId })
    if (src) { src[field] = val; M.isDirty = true; C._refreshDemandPlanner(wlId, wl); C.scheduleSave() }
  },

  updDemandSourceSilent: function(wlId, srcId, field, val) {
    var wl = M.workloads.maas.find(function(w){ return w.id === wlId })
    if (!wl || !wl.demandSources) return
    var src = wl.demandSources.find(function(s){ return s.id === srcId })
    if (!src) return
    src[field] = val
    M.isDirty = true
    C.scheduleSave()
    // Update only the projection tbody — inputs stay focused
    var tbody = document.getElementById('dp-table-' + wlId)
    if (!tbody) return
    var sources = wl.demandSources
    var supplyB = (wl.provisionedGpus||1) * 15417 * 730 * 3600 / 1e9
    var rows = ''
    for (var yr = 1; yr <= 6; yr++) {
      var tc=0, tb=0
      sources.forEach(function(s){
        var custs = (s.customersY1||0)*Math.pow(1+(s.customerGrowthPct||0)/100,yr-1)
        tc+=custs; tb+=custs*((s.tokensPerCustomerM||0)*Math.pow(1+(s.tokenGrowthPct||0)/100,yr-1))/1000
      })
      var util=supplyB>0?tb/supplyB:0
      var rev=tb*12*1000*(wl.pricePerMtok||0.75)
      var col=util>1?'var(--orange)':util>0.85?'var(--amber)':'var(--teal)'
      var st=util>1?'&#128308; Under':util>0.85?'&#129000; Near full':util>0.3?'&#128994; Healthy':'&#9898; Low'
      rows+='<tr style="border-top:1px solid var(--border)">'
        +'<td style="padding:5px 8px">Y'+yr+'</td>'
        +'<td style="padding:5px 8px;text-align:right">'+Math.round(tc).toLocaleString()+'</td>'
        +'<td style="padding:5px 8px;text-align:right">'+tb.toFixed(2)+'</td>'
        +'<td style="padding:5px 8px;text-align:right">'+supplyB.toFixed(1)+'</td>'
        +'<td style="padding:5px 8px;text-align:right;font-weight:700;color:'+col+'">'+Math.min(util*100,999).toFixed(1)+'%</td>'
        +'<td style="padding:5px 8px;text-align:right">$'+Math.round(rev).toLocaleString()+'</td>'
        +'<td style="padding:5px 8px;font-size:10px">'+st+'</td></tr>'
    }
    tbody.innerHTML = rows
    V.updateKpiBar()
  },

  removeDemandSource: function(wlId, srcId) {
    var wl = M.workloads.maas.find(function(w){ return w.id === wlId })
    if (!wl || !wl.demandSources) return
    wl.demandSources = wl.demandSources.filter(function(s){ return s.id !== srcId })
    M.isDirty = true; C._refreshDemandPlanner(wlId, wl); C.scheduleSave()
  },

  selectEngagement: function(engId) {
    if (!engId) {
      M.currentEng = null
      M.actions = []
      document.getElementById('ctx-eng-name').textContent = '—'
      document.getElementById('hdr-eng-name').textContent = 'No engagement selected'
      V.renderActionSelect()
      return
    }
    M.currentEng = M.engagements.find(function(e){ return e.id === engId }) || null
    if (M.currentEng) {
      document.getElementById('ctx-eng-name').textContent = M.currentEng.name
      document.getElementById('hdr-eng-name').textContent = M.currentEng.name
    }
    // Load actions for this engagement
    C.loadActions(engId)
    // Load existing solution version if any
    C.loadLatestVersion(engId)
  },

  selectAction: function(actionId) {
    if (!actionId) { M.currentAction = null; document.getElementById('action-badge-wrap').innerHTML = ''; return }
    M.currentAction = M.actions.find(function(a){ return a.id === actionId }) || null
    if (M.currentAction) {
      document.getElementById('action-badge-wrap').innerHTML =
        '<span class="action-badge">&#128206; ' + (M.currentAction.title||'Action') + ' loaded</span>'
      C.populateFromAction(M.currentAction)
    }
  },

  populateFromAction: function(action) {
    var ctx = action.context || {}
    // Pre-populate workloads from action context
    if (ctx.use_cases && ctx.use_cases.length) {
      ctx.use_cases.forEach(function(uc) {
        var id = 'uc-' + Date.now() + '-' + Math.random().toString(36).slice(2,6)
        M.workloads.uc.push({
          id: id, name: uc.name || uc,
          model: M.defaultModel,
          gpu: M.gpuConfigs.length ? M.gpuConfigs[0].id : '',
          precision:'int4', dau:10000, reqPerDay:20, peakMult:3,
          peakConcPct:5, contextPct:'p95', commercialSla:'gold',
          engine:'vllm', securityTier:'standard'
        })
      })
    }
    if (ctx.maas_pools && ctx.maas_pools.length) {
      ctx.maas_pools.forEach(function(pool) {
        var id = 'maas-' + Date.now() + '-' + Math.random().toString(36).slice(2,6)
        M.workloads.maas.push(Object.assign({
          id: id, model: M.defaultModel,
          gpu: M.gpuConfigs.length ? M.gpuConfigs[0].id : '',
          precision:'int4', dau:50000, reqPerDay:20, peakMult:3,
          peakConcPct:5, contextPct:'p95', commercialSla:'bronze',
          engine:'vllm', pricePerMtok:0.75, demandSources:[]
        }, pool))
      })
    }
    // Set mode based on action type
    if (ctx.mode === 'deep' || action.item_subtype === 'presales_handover') C.setMode('deep')
    V.renderWorkloadsTab()
    V.updateKpiBar()
    V.toast('Action context loaded — ' + (M.workloads.uc.length + M.workloads.maas.length) + ' workloads pre-populated', 'success')
  },

  loadEngagements: async function() {
    try {
      var data = await atlasDB.get('engagements', 'order=updated_at.desc&limit=50')
      M.engagements = data || []
      V.renderEngagementSelect()
      // Auto-select from URL param
      var params = new URLSearchParams(window.location.search)
      var engParam = params.get('eng')
      if (engParam) {
        document.getElementById('eng-select').value = engParam
        C.selectEngagement(engParam)
      }
    } catch(e) { console.warn('loadEngagements:', e) }
  },

  loadActions: async function(engId) {
    try {
      var data = await atlasDB.get('docket_items',
        'engagement_id=eq.' + engId + '&item_type=eq.action&status=eq.open&order=created_at.desc')
      M.actions = (data||[]).filter(function(a) {
        return a.content && (a.content.type === 'presales_handover' || a.item_subtype === 'presales_handover')
      })
      V.renderActionSelect()
      // Also load existing solution versions
      C.loadVersionHistory(engId)
    } catch(e) { console.warn('loadActions:', e) }
  },

  loadVersionHistory: async function(engId) {
    try {
      var data = await atlasDB.get('solution_versions',
        'engagement_id=eq.' + engId + '&order=version_number.desc&limit=10')
      M.versionHistory = data || []
    } catch(e) { console.warn('loadVersionHistory:', e) }
  },

  loadLatestVersion: async function(engId) {
    try {
      var data = await atlasDB.get('solution_versions',
        'engagement_id=eq.' + engId + '&order=version_number.desc&limit=1')
      if (data && data[0]) {
        var sv = data[0]
        M.solutionVersionId = sv.id
        M.versionLabel = sv.version_label || ('v' + sv.version_number)
        M.versionNumber = sv.version_number
        var snap = sv.bom_snapshot || {}
        // Restore mode
        if (snap.mode) M.mode = snap.mode
        // Restore workloads
        if (snap.workload_configs) {
          M.workloads = {
            uc:     snap.workload_configs.uc     || [],
            maas:   snap.workload_configs.maas   || [],
            gpuaas: snap.workload_configs.gpuaas || [],
            bmaas:  snap.workload_configs.bmaas  || []
          }
        }
        M.isDirty = false
        C.setMode(M.mode)
        V.renderWorkloadsTab()
        V.updateKpiBar()
        V.toast('Loaded ' + M.versionLabel, 'info')
      }
    } catch(e) { console.warn('loadLatestVersion:', e) }
  },

  loadRefData: async function() {
    try {
      var gpus = await atlasDB.get('gpu_configs', 'active=eq.true&order=tier.asc,name.asc')
      M.gpuConfigs = gpus || []
      M.gpuMap = {}
      M.gpuConfigs.forEach(function(g) { M.gpuMap[g.id] = g })
      if (M.gpuConfigs.length) M.defaultGpu = M.gpuConfigs[0].id
    } catch(e) { console.warn('loadRefData gpus:', e) }

    try {
      var mods = await atlasDB.get('model_catalogue', 'enabled=eq.true&order=family.asc,name.asc&limit=200')
      M.modelCatalogue = mods || []
      M.modelMap = {}; M.modelById = {}
      M.modelCatalogue.forEach(function(m) {
        M.modelMap[m.model_id] = m   // lookup by slug e.g. 'llama-3.1-8b'
        M.modelById[m.id]      = m   // lookup by UUID (from saved solution_versions)
      })
    } catch(e) { console.warn('loadRefData models:', e) }

    try {
      var tens = await atlasDB.get('tenants', 'active=eq.true&order=name.asc')
      M.tenantsList = {}
      ;(tens||[]).forEach(function(t){ M.tenantsList[t.id] = t })
    } catch(e) { console.warn('loadRefData tenants:', e) }

    V.renderWorkloadsTab()
    V.updateKpiBar()
  },

  saveVersion: async function() {
    if (!M.currentEng) { V.toast('Select an engagement first', 'warning'); return }

    var totalGpus = 0, totalPower = 0, totalCapex = 0
    M.workloads.uc.concat(M.workloads.maas).forEach(function(wl) {
      try {
        var t = M.workloads.maas.indexOf(wl) >= 0 ? 'maas' : 'uc'
        var sz = (typeof AtlasSolution !== 'undefined') ? AtlasSolution.sizeWorkload(wl, t, M) : null
        if (sz && !sz.error) {
          var gpus = wl.provisionedGpus || sz.total || 0
          totalGpus += gpus; totalPower += sz.powerKw||0; totalCapex += gpus*30000
        }
      } catch(e) {}
    })
    M.workloads.gpuaas.forEach(function(w){ totalGpus+=w.gpuCount||0; totalCapex+=(w.gpuCount||0)*30000 })
    M.workloads.bmaas.forEach(function(w){
      var g=M.gpuMap[w.gpu]; var gpus=w.serverCount*(w.gpusPerServer||(g&&g.gpus_in_unit)||8)
      totalGpus+=gpus; totalCapex+=gpus*30000
    })

    var wlCount = M.workloads.uc.length+M.workloads.maas.length+M.workloads.gpuaas.length+M.workloads.bmaas.length
    var nextVer  = (M.versionNumber||0) + 1
    var verLabel = M.mode === 'express' ? 'v'+nextVer+' Express' : 'v'+nextVer+' Deep'

    var payload = {
      engagement_id:  M.currentEng.id,
      version_number: nextVer,
      version_label:  verLabel,
      status:         'draft',
      bom_snapshot: {
        tool:        TOOL_SHORT,
        tool_name:   TOOL_NAME,
        mode:        M.mode,
        workload_configs: M.workloads,
        price_overrides:  M.priceOverrides,
        key_metrics: {
          total_gpus:  totalGpus,
          capex_usd:   totalCapex,
          power_kw:    Math.round(totalPower*10)/10,
          workloads:   wlCount
        }
      }
    }

    try {
      var result
      if (M.solutionVersionId) {
        result = await atlasDB.patch('solution_versions', 'id=eq.'+M.solutionVersionId, payload)
      } else {
        result = await atlasDB.post('solution_versions', payload)
        if (result && result[0]) M.solutionVersionId = result[0].id
      }
      M.versionLabel  = verLabel
      M.versionNumber = nextVer
      M.isDirty = false
      V.updateKpiBar()
      V.toast('Saved ' + verLabel, 'success')
    } catch(e) { V.toast('Save failed — ' + e.message, 'error') }
  },

  addTenant: async function() {
    var name = prompt('Tenant name:')
    if (!name || !name.trim()) return
    if (!M.currentEng) { V.toast('Select an engagement first', 'warning'); return }
    try {
      var result = await atlasDB.post('tenants', {
        name: name.trim(),
        engagement_id: M.currentEng.id,
        active: true
      })
      if (result && result[0]) {
        M.tenantsList[result[0].id] = result[0]
        V.renderWorkloadsTab()
        V.toast('Tenant created: ' + name.trim(), 'success')
      }
    } catch(e) {
      // Fallback: create in local state only
      var tempId = 'tenant-' + Date.now()
      M.tenantsList[tempId] = { id: tempId, name: name.trim() }
      V.renderWorkloadsTab()
      V.toast('Tenant added locally: ' + name.trim(), 'info')
    }
  },

  // Targeted demand planner refresh — avoids full tab re-render (preserves scroll + focus)
  _refreshDemandPlanner: function(wlId, wl) {
    var el = document.getElementById('dp-' + wlId)
    if (!el) { V.renderWorkloadsTab(); return }  // fallback if not found
    var newHtml = V._renderDemandPlanner(wl)
    // Replace just the demand planner div content
    var tmp = document.createElement('div')
    tmp.innerHTML = newHtml
    var newEl = tmp.firstElementChild
    if (newEl) el.parentNode.replaceChild(newEl, el)
    V.updateKpiBar()
  },

  _saveTimer: null,
  scheduleSave: function() {
    clearTimeout(C._saveTimer)
    C._saveTimer = setTimeout(function() {
      if (M.currentEng && M.isDirty) C.saveVersion()
    }, 4000)
  }
}

// ════════════════════════════════════════════════════════════════════════════
// INIT — called after shared scripts load
// ════════════════════════════════════════════════════════════════════════════

function onScriptsReady() {
  V.init()
  C.loadEngagements()
  C.loadRefData()
  // Default to scope tab on load
  C.switchTab('scope')

  // ── Event delegation for demand planner (data-action pattern) ──────────
  // Handles addSource / updSource / removeSource without inline event handlers
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-action]')
    if (!btn) return
    var action = btn.dataset.action
    var wlId  = btn.dataset.wlid
    var srcId = btn.dataset.srcid
    if (action === 'addSource')    C.addDemandSource(wlId)
    if (action === 'removeSource') C.removeDemandSource(wlId, srcId)
  })

  document.addEventListener('change', function(e) {
    var el = e.target.closest('[data-action="updSource"]')
    if (!el) return
    var wlId  = el.dataset.wlid
    var srcId = el.dataset.srcid
    var field = el.dataset.field
    var isNum = el.dataset.isnum === '1'
    var val   = isNum ? +el.value : el.value
    C.updDemandSourceSilent(wlId, srcId, field, val)
  })
}
