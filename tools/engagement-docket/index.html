<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS Engagement Docket v2.3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#002870;--orange:#FF5539;--teal:#00B290;--amber:#FFB600;--blue:#1C38F5;
  --dark:#111827;--mid:#6B7280;--light:#F8F9FA;--white:#fff;--border:#E5E7EB;
  --r:8px;--r-sm:5px
}
body{font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:#F0F2F5;min-height:100vh;display:flex;flex-direction:column}

/*    Masthead                                                                */
.atlas-hdr{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.15);flex-shrink:0}
.atlas-hdr-left{display:flex;align-items:center;gap:12px}
.atlas-brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:3px}
.atlas-brand span{color:var(--orange)}
.atlas-tool-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);padding:3px 8px;background:rgba(255,255,255,0.1);border-radius:var(--r-sm)}
.atlas-nav-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:600;font-family:inherit;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.8);cursor:pointer;white-space:nowrap}
.atlas-nav-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.atlas-ver{font-size:10px;font-weight:700;color:var(--orange);padding:2px 7px;background:rgba(255,85,57,0.15);border-radius:10px}

/*    Layout                                                                  */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:260px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/*    Sidebar                                                                 */
.sb-search{padding:12px 14px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;background:var(--light);color:var(--dark)}
.sb-section{padding:8px 14px 4px;font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.sb-section button{font-size:18px;font-weight:400;color:var(--mid);background:none;border:none;cursor:pointer;line-height:1}
.sb-section button:hover{color:var(--navy)}
.sb-item{padding:8px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:8px}
.sb-item:hover{background:var(--light)}
.sb-item.active{border-left-color:var(--orange);background:rgba(255,85,57,0.04)}
.sb-item-name{font-size:13px;font-weight:500;color:var(--dark);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-meta{font-size:10px;color:var(--mid)}
.sb-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;flex-shrink:0}
.badge-tsap{background:#E6F1FB;color:#0C447C}
.badge-active{background:#EAF3DE;color:#3B6D11}
.badge-new{background:#FFF3CD;color:#856404}
.eng-sub{padding:2px 14px 2px 30px;cursor:pointer;font-size:12px;color:var(--mid);display:flex;align-items:center;gap:6px}
.eng-sub:hover{color:var(--navy);background:var(--light)}
.eng-sub.active{color:var(--navy);font-weight:600}
.sb-empty{padding:16px 14px;font-size:12px;color:var(--mid);font-style:italic}

/*    Docket view                                                             */
.docket-hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 24px;flex-shrink:0}
.docket-hdr-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.docket-name{font-size:18px;font-weight:600;color:var(--dark)}
.docket-meta{font-size:12px;color:var(--mid);margin-top:3px;display:flex;gap:10px;align-items:center}
.docket-badges{display:flex;gap:6px;margin-top:6px}
.docket-hdr-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/*    Tabs                                                                    */
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0}
.tab-btn{padding:10px 16px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:var(--mid);font-family:inherit;white-space:nowrap;margin-bottom:-1px}
.tab-btn:hover{color:var(--navy)}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600}
.tab-count{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--light);color:var(--mid);margin-left:4px;font-weight:600}

/*    Tab content                                                             */
.tab-content{padding:20px 24px;flex:1}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px}

/*    Cards                                                                   */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px}

/*    UC pills                                                                */
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.uc-card{background:var(--light);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px}
.uc-code{font-size:9px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:3px}
.uc-name{font-size:12px;font-weight:500;color:var(--dark);margin-bottom:5px;line-height:1.4}
.uc-badges{display:flex;gap:4px;flex-wrap:wrap}
.uc-status{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.uc-agreed{background:#E1F5EE;color:#085041}
.uc-proposed{background:#FFF3CD;color:#856404}
.uc-scratched{background:#F1EFE8;color:#5F5E5A;text-decoration:line-through}
.uc-complexity{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--light);color:var(--mid)}

/*    Actions                                                                 */
.action-list{border:1px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.action-item:last-child{border-bottom:none}
.action-item.done .action-text{color:var(--mid);text-decoration:line-through}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-open{background:var(--amber)}
.dot-done{background:var(--teal)}
.dot-blocked{background:var(--orange)}
.action-text{flex:1;font-size:13px;line-height:1.5}
.action-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.owner-badge{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--light);color:var(--mid);font-weight:500}
.due-label{font-size:11px;color:var(--mid)}
.due-overdue{color:var(--orange);font-weight:600}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--mid);padding:2px 4px;border-radius:3px;font-size:14px;line-height:1}
.icon-btn:hover{color:var(--navy);background:var(--light)}

/*    Strategy                                                                */
.strat-block{border-left:2px solid var(--border);padding:6px 12px;margin-bottom:10px}
.strat-label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.strat-text{font-size:13px;color:var(--dark);line-height:1.65}
.strat-empty{font-size:12px;color:var(--mid);font-style:italic}

/*    Outputs                                                                 */
.output-list{border:1px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden}
.output-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.output-item:last-child{border-bottom:none}
.output-item:hover{background:var(--light)}
.output-icon{font-size:20px;color:var(--mid);width:24px;text-align:center;flex-shrink:0}
.output-info{flex:1}
.output-name{font-size:13px;font-weight:500;color:var(--dark)}
.output-meta{font-size:11px;color:var(--mid);margin-top:2px}
.output-action{font-size:11px;color:var(--blue);white-space:nowrap}

/*    Overview grid                                                           */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center}
.kpi-val{font-size:20px;font-weight:700;color:var(--navy)}
.kpi-lbl{font-size:11px;color:var(--mid);margin-top:2px}

/*    Profile grid                                                            */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.profile-row{padding:6px 0;border-bottom:1px solid var(--border)}
.profile-row:last-child{border-bottom:none}
.profile-label{font-size:10px;color:var(--mid);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.profile-val{font-size:13px;color:var(--dark)}

/*    Forms                                                                   */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{display:block;font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
input,select,textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;color:var(--dark);background:var(--white)}
textarea{resize:vertical;min-height:60px}

/*    Buttons                                                                 */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--dark)}
.btn-primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-primary:hover{background:#e04530}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-outline{background:transparent;color:var(--navy);border-color:var(--navy)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--mid)}
.btn-ghost:hover{color:var(--navy);background:var(--light)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{color:var(--orange);border-color:var(--orange);background:transparent}

/*    Empty state                                                             */
.empty{padding:32px;text-align:center;color:var(--mid)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--dark)}
.empty-sub{font-size:12px}

/*    Modal                                                                   */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r);padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/*    History                                                                 */
.hist-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:5px}
.hist-dot.recent{background:var(--teal)}
.hist-text{font-size:12px;color:var(--dark);flex:1;line-height:1.5}
.hist-date{font-size:11px;color:var(--mid);white-space:nowrap}

/*    Toast                                                                   */
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:var(--orange)}

/* ── New tab additions ─────────────────────────────────────────────────── */
.req-block{background:linear-gradient(135deg,#EFF3FF,#E8F5FF);border:1px solid #BDD7FF;border-radius:8px;padding:14px 18px;margin-bottom:14px}
.req-block-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#1C38F5;margin-bottom:8px}
.req-obj{font-size:13px;font-weight:600;color:var(--navy);line-height:1.6;margin-bottom:8px}
.req-meta{font-size:11px;color:var(--mid);line-height:1.5;margin-bottom:8px}
.req-chips{display:flex;flex-wrap:wrap;gap:5px}
.req-chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.intel-item{padding:10px 12px;border-left:3px solid var(--border);margin-bottom:8px;background:var(--light);border-radius:0 6px 6px 0;cursor:pointer;transition:all .15s}
.intel-item:hover{border-left-color:#1C38F5;background:#EFF3FF}
.intel-item.on{border-left-color:var(--teal);background:#E1F5EE}
.intel-tier{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.intel-title{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:3px;line-height:1.3}
.intel-meta{font-size:10px;color:var(--mid)}
.intel-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(0,178,144,.15);color:#047857;font-weight:600;margin-top:4px}
.pi-sec{margin-bottom:14px}
.pi-sec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mid);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.pi-grid{display:flex;flex-wrap:wrap;gap:6px}
.pi-item{border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s;background:#fff;display:flex;align-items:center;gap:5px}
.pi-item:hover{border-color:var(--mid)}.pi-item.on{border-color:var(--teal);background:#E1F5EE;font-weight:600}
.pi-item.ai{border-color:#1C38F5;background:#EFF3FF}
.pi-ck{width:13px;height:13px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.pi-item.on .pi-ck{background:var(--teal);border-color:var(--teal);color:#fff}
.pi-item.ai .pi-ck{background:#1C38F5;border-color:#1C38F5;color:#fff}
.pi-sz{font-size:9px;color:var(--mid);padding:1px 4px;background:var(--light);border-radius:3px}
.pi-item.on .pi-sz,.pi-item.ai .pi-sz{background:rgba(0,178,144,.15);color:#047857}
.ai-map-btn{background:#1C38F5;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:opacity .15s}
.ai-map-btn:hover{opacity:.85}
.ai-map-note{background:#EFF3FF;border:1px solid #BDD7FF;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#1C38F5;display:none}
.ucl-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.ucl-item{border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer;transition:all .15s;background:#fff;display:flex;align-items:center;gap:8px}
.ucl-item:hover{border-color:var(--mid)}.ucl-item.on{border-color:var(--teal);background:#E1F5EE}
.ucl-icon{font-size:16px;flex-shrink:0}
.ucl-name{font-size:11px;font-weight:600;color:var(--navy)}
.ucl-dom{font-size:10px;color:var(--mid)}
.arch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.arch-card{border:2px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;background:#fff;text-align:center}
.arch-card:hover{border-color:var(--mid)}.arch-card.on{border-color:var(--orange);background:#FFF3F1}
.arch-icon{font-size:22px;margin-bottom:5px}
.arch-name{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:2px}
.arch-cnt{font-size:10px;color:var(--mid)}
.mc-table{width:100%;border-collapse:collapse;font-size:11px}
.mc-table th{text-align:left;padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--mid);border-bottom:2px solid var(--border);background:var(--light);white-space:nowrap;position:sticky;top:0}
.mc-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.mc-table tr:hover td{background:#FAFBFF}.mc-table tr.on td{background:#E1F5EE}
.mc-name{font-weight:700;color:var(--navy)}.mc-vendor{font-size:10px;color:var(--mid)}
.mc-arch{font-size:9px;padding:1px 5px;border-radius:8px;background:#EFF3FF;color:#1C38F5;font-weight:600;margin-right:2px}
.mc-bench{font-size:11px;font-weight:600}
.mc-bench.hi{color:#065F46}.mc-bench.md{color:#92400E}.mc-bench.lo{color:var(--mid)}
.mc-lic{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600}
.mc-lic.open{background:#E1F5EE;color:#065F46}.mc-lic.comm{background:#FFF8E7;color:#92400E}
.mc-toggle{width:28px;height:16px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block}
.mc-toggle.on{background:var(--teal)}
.mc-toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.mc-toggle.on::after{left:14px}
.agent-toggle{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--light);border-radius:8px;margin-bottom:12px;cursor:pointer}
.toggle-sw{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:var(--teal)}
.toggle-sw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-sw.on::after{left:18px}
.agent-cfg{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:none}
.agent-cfg.on{display:block}
.gpu-est{background:var(--navy);border-radius:8px;padding:14px 18px;color:#fff;margin-top:14px}
.gpu-est-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gpu-est-item{padding:8px;background:rgba(255,255,255,.08);border-radius:6px;text-align:center}
.gpu-est-val{font-size:18px;font-weight:700;margin-bottom:2px}
.gpu-est-lbl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px}
.terr-status{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--light);border-radius:6px;margin-bottom:12px}
.terr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.q-sel{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;font-family:inherit;outline:none;background:#fff}
.sla-sel{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px;font-family:inherit;outline:none;background:#fff}
.mc-filter{padding:5px 9px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:#fff}
.req-chip-opt{transition:all .15s}
.req-chip-opt.req-chip-on{border-color:var(--navy)!important;background:var(--navy)!important;color:#fff!important}
</style>
  <!-- atlasExport.js CDN dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="../../shared/atlasExport.js"></script>
  <script src="../../shared/atlasAI.js"></script>
</head>
<body>

<!-- Masthead -->
<div class="atlas-hdr">
  <div class="atlas-hdr-left">
    <div class="atlas-brand">ATL<span>A</span>S</div>
    <div class="atlas-tool-name">Engagement Docket</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="atlas-ver">v2.3</span>
    <button class="atlas-nav-btn" onclick="window.location.href='../../'">&#8592; Portal</button>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->

// -- Config                               
function getSB() {
  try {
    var g = JSON.parse(localStorage.getItem('atlas_global_cfg') || '{}')
    return { url: g.sbUrl || g.sb_url || '', key: g.sbKey || g.sb_key || '' }
  } catch(e) { return { url: '', key: '' } }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function genId(pfx) { return (pfx||'ID') + '-' + Date.now() + '-' + Math.floor(Math.random()*9999) }
function fmtDate(d) {
  if (!d) return ''
  var dt = new Date(d)
  return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function showToast(msg, type) {
  var t = document.getElementById('toast')
  t.textContent = msg
  t.className = 'toast show' + (type === 'err' ? ' err' : '')
  setTimeout(function(){ t.className = 'toast' }, 2800)
}

//    Supabase                                                                   
async function sbGet(table, params, limit) {
  var sb = getSB(); if (!sb.url) return []
  try {
    var url = sb.url + '/rest/v1/' + table + '?' + (params||'') + (limit ? '&limit='+limit : '&limit=200')
    var r = await fetch(url, { headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key } })
    return r.ok ? r.json() : []
  } catch(e) { return [] }
}
async function sbPost(table, data, prefer) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table, {
      method: 'POST',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key, 'Content-Type': 'application/json', Prefer: prefer || 'return=minimal' },
      body: JSON.stringify(data)
    })
    return r.ok
  } catch(e) { return false }
}
async function sbPatch(table, match, data) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table + '?' + match, {
      method: 'PATCH',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(data)
    })
    return r.ok
  } catch(e) { return false }
}
async function sbDelete(table, match) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table + '?' + match, {
      method: 'DELETE', headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key }
    })
    return r.ok
  } catch(e) { return false }
}

// ── INTELLIGENCE TAB ─────────────────────────────────────────────────────────
async function renderProfileTab() {
  var eng  = CURRENT_ENG || {}
  var engType  = eng.engagement_type || eng.type || ''
  var isTSAP   = engType === 'TSAP' || engType === 'tsap'
  var territory = eng.territory || ''
  var custName  = (eng._cust && eng._cust.name) || eng.customer_name || 'Organisation'

  // Load intel items
  if (!INTEL_ITEMS.length) {
    var sb = getSB()
    if (sb.url) {
      try {
        var r = await fetch(sb.url + '/rest/v1/intelligence_items?order=published_at.desc&limit=30', {
          headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key }
        })
        if (r.ok) INTEL_ITEMS = await r.json()
      } catch(e) {}
    }
  }

  // Load profile from SB if not cached
  if (window.PROFILE_DATA === null || window.PROFILE_DATA === undefined) {
    await loadProfileFromSB()
  }

  var html = ''

  if (isTSAP) {
    // ── TSAP: Territory profile status card ──────────────────────────────────
    if (!territory) {
      html += '<div style="background:var(--light);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px">'
        + '<div style="font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px">📍 No territory set</div>'
        + '<div style="font-size:12px;color:var(--mid);margin-bottom:12px">Set the territory in the Territory tab to enable territory intelligence.</div>'
        + '<button onclick="switchTab(\'territory\')" style="padding:7px 14px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Set Territory →</button>'
        + '</div>'
    } else {
      // Check TP state — has S1 been generated?
      var tpS1Exists = (TP.territory === territory && TP.s1)
      var sbProfile = window.PROFILE_DATA
      var hasS3 = (TP.territory === territory && TP.s2) || (sbProfile && sbProfile.session && sbProfile.session.s2)
      var hasS1SB = sbProfile && (sbProfile.profile || (sbProfile.session && sbProfile.session.s1))
      var genDate = sbProfile && sbProfile.generated_at ? fmtDate(sbProfile.generated_at) : null

      var statusBadge = (!tpS1Exists && !hasS1SB)
        ? '<span style="background:#FFF8E7;color:#92400E;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">NOT GENERATED</span>'
        : hasS3
        ? '<span style="background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">✓ S1 + S3 COMPLETE</span>'
        : '<span style="background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">✓ S1 GENERATED</span>'

      html += '<div style="background:var(--light);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px">'
        + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'
        + '<div>'
        + '<div style="font-size:17px;font-weight:700;color:var(--navy)">📍 ' + esc(territory) + '</div>'
        + '<div style="font-size:11px;color:var(--mid);margin-top:3px">Territory Profile ' + statusBadge + (genDate?' · '+genDate:'') + '</div>'
        + '</div>'
        + '<div style="margin-left:auto">'
        + '<button onclick="openIntelModal()" style="padding:9px 18px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">🔬 Open Territory Intelligence →</button>'
        + '</div></div>'

      // S3 summary preview if available
      if (hasS3) {
        var s2data = (TP.territory===territory && TP.s2) ? TP.s2
          : (sbProfile && sbProfile.session && sbProfile.session.s2) || null
        var twoByTwo = (TP.territory===territory && TP._2x2) ? TP._2x2
          : (sbProfile && sbProfile.session && sbProfile.session.twoByTwo) || null
        if (s2data && s2data.headline_recommendation) {
          html += '<div style="background:var(--navy);color:#fff;border-radius:8px;padding:12px 16px;margin-top:4px;font-size:12px;line-height:1.5">'
            + '<div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Strategic Recommendation</div>'
            + esc(s2data.headline_recommendation) + '</div>'
        }
        if (twoByTwo && twoByTwo.quadrant) {
          var qColors = { Q1:'var(--teal)', Q2:'var(--blue)', Q3:'var(--navy)', Q4:'var(--amber)' }
          var qLabels = { Q1:'Green AI Hub', Q2:'Knowledge Exporter', Q3:'Governance Moderniser', Q4:'Heritage Renaissance' }
          html += '<div style="margin-top:8px;display:flex;gap:8px;align-items:center">'
            + '<span style="font-size:10px;color:var(--mid)">2×2 Position:</span>'
            + '<span style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:' + (qColors[twoByTwo.quadrant]||'var(--mid)') + ';color:#fff">'
            + (twoByTwo.quadrant||'') + ' ' + (qLabels[twoByTwo.quadrant]||'') + '</span>'
            + (twoByTwo.confidence ? '<span style="font-size:10px;color:var(--mid)">' + Math.round(twoByTwo.confidence*100) + '% confidence</span>' : '')
            + '</div>'
        }
      } else {
        html += '<div style="font-size:12px;color:var(--mid)">Click "Open Territory Intelligence" to generate the S1 intelligence profile and S3 strategic assessment.</div>'
      }
      html += '</div>'
    }
  } else {
    // ── Non-TSAP: PEI organisation profile ────────────────────────────────────
    html += renderOrgProfileWiki(custName, eng)
  }

  // ── Intel items ──────────────────────────────────────────────────────────────
  html += '<div class="section-hdr" style="margin-top:16px;margin-bottom:10px">'
    + '<div class="section-title">Relevant Intelligence (' + INTEL_ITEMS.length + ')</div>'
    + '<button class="btn btn-sm btn-ghost" onclick="INTEL_ITEMS=[];window.PROFILE_DATA=null;loadAndRenderProfile()">↻ Refresh</button>'
    + '</div>'

  if (!INTEL_ITEMS.length) {
    html += '<div class="empty"><div class="empty-icon">🔍</div>'
      + '<div class="empty-title">No intelligence loaded</div>'
      + '<div class="empty-sub">Run the Intel Scraper to populate. Items tagged to this customer/territory will appear here.</div></div>'
  } else {
    var tierColors = { direct_opportunity:'var(--orange)', technology_signal:'var(--blue)', market_signal:'var(--mid)', model_release:'var(--teal)' }
    var tierLabels = { direct_opportunity:'Direct Opportunity', technology_signal:'Technology Signal', market_signal:'Market Signal', model_release:'Model Release' }
    INTEL_ITEMS.forEach(function(item, i) {
      var tier = item.tier || item.signal_tier || 'market_signal'
      html += '<div class="intel-item" onclick="toggleIntel(' + i + ')">'
        + '<div class="intel-tier" style="color:' + (tierColors[tier]||'var(--mid)') + '">● ' + (tierLabels[tier]||tier) + '</div>'
        + '<div class="intel-title">' + esc(item.title||item.headline||'') + '</div>'
        + '<div class="intel-meta">' + esc(item.source||'') + (item.published_at?' · '+fmtDate(item.published_at):'') + '</div>'
        + '</div>'
    })
  }

  return html
}

// ── Load profile data from Supabase ─────────────────────────────────────────
async function loadProfileFromSB() {
  var eng = CURRENT_ENG || {}
  var engType = eng.engagement_type || eng.type || ''
  var isTSAP = engType === 'TSAP' || engType === 'tsap'
  var sb = getSB()
  if (!sb.url) return
  window.PROFILE_DATA = null
  // Reset TP state for new engagement
  TP.stage='home'; TP.territory=''; TP.s1=null; TP.s2=null
  TP.objectives=[]; TP.freeText=''; TP._2x2=null; TP.s4=null
  TP.overrides={working:[],attention:[]}
  try {
    if (isTSAP) {
      var territory = eng.territory || ''
      if (!territory) return
      // territory_profiles schema: id, territory, profile, session, generated_at, expires_at
      // Load by territory name — this is the key the TSAP FM uses
      var r = await fetch(sb.url + '/rest/v1/territory_profiles?territory=eq.' + encodeURIComponent(territory) + '&order=generated_at.desc&limit=1', {
        headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key }
      })
      if (r.ok) {
        var rows = await r.json()
        if (rows.length) {
          var row = rows[0]
          // Normalise: session may be full S1-S4 data or our simple profile
          // If session has s1/s2/s3/s4 structure (from TSAP FM), extract s1
          var profileData = row.session
          if (profileData && profileData.s1) {
            // TSAP FM ran S1 — extract S1 wiki sections into _wiki
            row._source = 'tsap_fm'
            row._wiki = profileData.s1
          } else if (profileData && (profileData.s2 || profileData.s3 || profileData.s4) && !profileData.s1) {
            // TSAP FM has S2+ data but S1 not generated yet
            // Do NOT set _wiki — renderTerritoryProfileWiki shows hasTSAPFMData message
            row._source = 'tsap_fm_no_s1'
          } else if (profileData && profileData.docket) {
            // Generated from Docket — nested under .docket key
            row._source = 'docket'
            row._wiki = profileData.docket
          } else if (profileData && typeof profileData === 'object' && !profileData.s2) {
            // Generated from Docket — flat structure
            row._source = 'docket'
            row._wiki = profileData
          }
          window.PROFILE_DATA = row
          console.log('[Profile] Territory profile loaded:', territory, 'source:', row._source, 'keys:', Object.keys(row._wiki||{}))
        }
      }
    } else {
      // PEI — stored in intelligence_items with tier='pei_profile'
      if (!eng.id) return
      var r2 = await fetch(sb.url + '/rest/v1/intelligence_items?engagement_id=eq.' + eng.id + '&tier=eq.pei_profile&order=created_at.desc&limit=1', {
        headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key }
      })
      if (r2.ok) {
        var rows2 = await r2.json()
        if (rows2.length) {
          var item = rows2[0]
          if (!item.data && item.content) {
            try { item.data = JSON.parse(item.content) } catch(e2) { item.data = { _raw: item.content } }
          } else if (item.data && typeof item.data === 'string') {
            try { item.data = JSON.parse(item.data) } catch(e3) { item.data = { _raw: item.data } }
          }
          window.PROFILE_DATA = item
          console.log('[Profile] PEI loaded:', item.title)
        }
      }
    }
  } catch(e) { console.warn('[Profile] load error:', e.message) }
}

// ── Territory Profile Wiki (TSAP) ────────────────────────────────────────────
function renderTerritoryProfileWiki(territory, eng) {
  var pd = window.PROFILE_DATA
  var session = null
  var hasTSAPFMData = false
  if (pd) {
    if (pd._wiki) session = pd._wiki
    else if (pd.session && pd.session.docket) session = pd.session.docket
    else if (pd.session && pd.session.s1) session = pd.session.s1
    else if (pd.session && pd.session.s2 && !pd.session.s1) { hasTSAPFMData = true }
    else if (pd.profile && typeof pd.profile === 'object') session = pd.profile
  }
  var generatedDate = pd && pd.updated_at ? fmtDate(pd.updated_at) : null
  var isStale = generatedDate && (new Date() - new Date(pd.updated_at)) > 90*24*60*60*1000

  var statusBadge = !pd
    ? '<span style="background:#FFF8E7;color:#92400E;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">NOT GENERATED</span>'
    : hasTSAPFMData
    ? '<span style="background:#EFF3FF;color:#1C38F5;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">S1 PENDING</span>'
    : isStale
    ? '<span style="background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">STALE</span>'
    : '<span style="background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">✓ GENERATED</span>'

  var html = '<div style="background:var(--light);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    + '<div><div style="font-size:17px;font-weight:700;color:var(--navy)">📍 ' + esc(territory||'Territory not set') + '</div>'
    + '<div style="font-size:11px;color:var(--mid);margin-top:2px">Territory Profile ' + statusBadge
    + (generatedDate ? ' · Generated ' + generatedDate : '') + '</div></div>'
    + '<div style="margin-left:auto;display:flex;gap:8px">'
    + (territory
        ? '<button onclick="generateTerritoryProfile()" style="padding:7px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">'
          + (hasTSAPFMData ? '⚡ Generate S1 Profile' : pd ? '↻ Regenerate Profile' : '⚡ Generate Profile') + '</button>'
        : '<button onclick="switchTab(\'territory\')" style="padding:7px 14px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Set Territory First →</button>')
    + '</div></div>'

  if (!territory) {
    html += '<div style="padding:14px;background:#FFF8E7;border-radius:6px;font-size:12px;color:#92400E">Set the territory in the Territory tab to enable profile generation.</div>'
    return html + '</div>'
  }

  // TSAP FM has run S2+ but not S1 — S1 is the territory intelligence wiki
  if (hasTSAPFMData) {
    html += '<div style="padding:16px;background:#EFF3FF;border:1px solid #BDD7FF;border-radius:8px;font-size:12px;line-height:1.6">'

async function generateTerritoryProfile() {
  var eng = CURRENT_ENG || {}
  if (!eng.territory) { showToast('Set territory first in Territory tab'); return }
  var sb = getSB()
  var el = document.getElementById('tab-body')

  // Show loading immediately so user sees something
  if (el) el.innerHTML = '<div style="padding:48px;text-align:center;color:var(--mid)">'
    + '<div style="font-size:36px;margin-bottom:12px">⚡</div>'
    + '<div style="font-weight:700;color:var(--navy);font-size:15px;margin-bottom:8px">Generating Territory Profile for ' + esc(eng.territory) + '</div>'
    + '<div style="font-size:12px;margin-bottom:6px">Running Gemini search grounding — energy, land, workforce, connectivity, government programmes.</div>'
    + '<div style="font-size:11px;color:var(--mid)">15–30 seconds. Profile cached in Supabase — tokens used once only.</div>'
    + '</div>'

  // Get atlasAI — init if needed
  var ai = (typeof atlasAI !== 'undefined') ? atlasAI : null
  if (!ai) {
    if (el) el.innerHTML = '<div style="padding:32px;text-align:center"><div style="font-size:32px;margin-bottom:12px">⚠️</div>'
      + '<div style="font-weight:700;color:#991B1B;margin-bottom:8px">atlasAI not loaded</div>'
      + '<div style="font-size:12px;color:var(--mid)">Ensure atlasAI.js is deployed to atlas-platform/shared/atlasAI.js and the page is refreshed.</div></div>'
    return
  }
  // Init if not yet ready
  if (!ai.ready && ai.init) {
    try {
      await ai.init(sb.url, sb.key)
    } catch(initErr) {
      if (el) el.innerHTML = '<div style="padding:32px;text-align:center"><div style="font-size:32px;margin-bottom:12px">⚠️</div>'
        + '<div style="font-weight:700;color:#991B1B;margin-bottom:8px">atlasAI init failed</div>'
        + '<div style="font-size:12px;color:var(--mid)">' + esc(initErr.message||'Unknown error') + '<br>Check Gemini API key in Settings.</div></div>'
      return
    }
  }

  try {
    var prompt = 'Generate a territory intelligence profile for ' + eng.territory + ', India for AI infrastructure investment planning. '
      + 'Return ONLY a valid JSON object with no markdown, no code fences, just raw JSON, with exactly these string-valued keys: '
      + '{"energy":"","geography":"","workforce":"","connectivity":"","programmes":"","economy":"","positioning":""}'
      + ' where each value is a descriptive paragraph. Keys: energy=power tariffs and renewable potential, '
      + 'geography=climate and terrain, workforce=skills and salaries, connectivity=internet and transport, '
      + 'programmes=state govt AI and tech initiatives, economy=GSDP and industries, '
      + 'positioning=2x2 quadrant recommendation (Q1 Green AI Hub / Q2 Knowledge Exporter / Q3 Governance Moderniser / Q4 Heritage Renaissance) with rationale.'

    var rawResp1 = await ai.call(prompt, { tool: 'territory-profile-s1', _timeout: 60000 })
    if (!rawResp1) throw new Error('Empty response from AI')

    // Extract text — atlasAI.call() may return string OR object {ok, text, raw, tokens}
    var raw = typeof rawResp1 === 'string' ? rawResp1
      : (rawResp1.text || rawResp1.raw || rawResp1.content || '')
    if (!raw) throw new Error('No text in AI response — got: ' + JSON.stringify(rawResp1).substring(0,80))

    // Strip markdown fences if present, then parse
    var parsed = null
    try {
      var clean = raw.replace(/^```json\s*/m,'').replace(/^```\s*/m,'').replace(/```\s*$/m,'').trim()
      // Find JSON object boundaries
      var jStart = clean.indexOf('{')
      var jEnd   = clean.lastIndexOf('}')
      if (jStart >= 0 && jEnd > jStart) clean = clean.substring(jStart, jEnd+1)
      parsed = JSON.parse(clean)
    } catch(pe) {
      console.warn('[generateTerritoryProfile] JSON parse failed, storing raw:', pe.message)
      parsed = { _raw: raw }
    }

    // Save to territory_profiles (correct schema)
    if (sb.url) {
      var slug = eng.territory.toLowerCase().replace(/[^a-z0-9]+/g,'-')
      var saveResp = await fetch(sb.url + '/rest/v1/territory_profiles', {
        method: 'POST',
        headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key,
          'Content-Type': 'application/json',
          Prefer: 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({
          id: slug, territory: eng.territory,
          profile: parsed, session: { docket: parsed },
          generated_at: new Date().toISOString(),
          expires_at: new Date(Date.now() + 90*24*60*60*1000).toISOString()
        })
      })
      if (!saveResp.ok) console.warn('[generateTerritoryProfile] Save failed:', saveResp.status)
    }

    window.PROFILE_DATA = {
      territory: eng.territory, _source: 'docket',
      session: { docket: parsed }, _wiki: parsed,
      updated_at: new Date().toISOString()
    }
    showToast('Territory profile generated')
    loadAndRenderProfile()
  } catch(e) {
    console.error('[generateTerritoryProfile]', e)
    if (el) el.innerHTML = '<div style="padding:32px;text-align:center"><div style="font-size:32px;margin-bottom:12px">⚠️</div>'
      + '<div style="font-weight:700;color:#991B1B;margin-bottom:8px">Generation failed</div>'
      + '<div style="font-size:12px;color:var(--mid)">' + esc(e.message||'Unknown error') + '</div>'
      + '<div style="margin-top:12px"><button onclick="loadAndRenderProfile()" style="padding:6px 14px;background:var(--light);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px">← Back</button></div></div>'
  }
}

  DOCKET_ITEMS.forEach(function(item) {
    if (item.section==='uc') counts.uc++
    else if (item.section==='action') counts.action++
    else if (item.section==='output') counts.output++
  })
  var tabBar = document.querySelector('.tab-bar')
  if (!tabBar) return
  tabBar.innerHTML = tabs.map(function(t) {
    var cnt = t==='uc' ? counts.uc : t==='actions' ? counts.action : t==='outputs' ? counts.output : 0
    return '<button class="tab-btn' + (ACTIVE_TAB===t?' active':'') + '" onclick="switchTab(\'' + t + '\')">'
      + labels[t]
      + (cnt > 0 ? '<span class="tab-count">' + cnt + '</span>' : '')
      + '</button>'
  }).join('')
}

function getTerritoryConfig() {
  try { return JSON.parse(localStorage.getItem('atlas_territory_config_' + (CURRENT_ENG&&CURRENT_ENG.id||'')) || '{}') } catch(e) { return {} }
}

function saveTerritoryConfig(key, val) {
  var tc = getTerritoryConfig()
  if (!val || !val.trim()) { delete tc[key] } else { tc[key] = parseFloat(val) }
  localStorage.setItem('atlas_territory_config_' + (CURRENT_ENG&&CURRENT_ENG.id||''), JSON.stringify(tc))
  // Also sync to Supabase app_config if possible
  var sb = getSB()
  if (sb.url) {
    fetch(sb.url + '/rest/v1/app_config?key=eq.territory_config_' + (CURRENT_ENG&&CURRENT_ENG.id||''), {
      method: 'POST',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key,
        'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ key: 'territory_config_' + (CURRENT_ENG&&CURRENT_ENG.id||''), value: JSON.stringify(tc) })
    }).catch(function(){})
  }
}

async function generateVisionDoc() {
  var eng = CURRENT_ENG || {}
  var req = eng.requirements || {}
  if (!req.objective) {
    showToast('Add requirements first — click Edit Requirements')
    return
  }
  showToast('📄 Generating Vision Document...')
  // Build doc using atlasExport.js
  if (typeof atlasExport === 'undefined') {
    showToast('Export library not loaded — check network')
    return
  }
  var b = atlasExport.getBrand()
  var custName = (eng._cust && eng._cust.name) || 'Customer'
  var engName  = eng.name || eng.opportunity_name || 'Engagement'
  var territory = eng.territory || ''

  var sections = []

  // Overview section
  sections.push({
    heading: 'Engagement Overview',
    color: '#002870',
    metadata: {
      'Customer':    custName,
      'Engagement':  engName,
      'Type':        eng.engagement_type || eng.type || '—',
      'Stage':       eng.stage || '—',
      'Territory':   territory || '—',
      'Date':        new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' })
    }
  })

  // Objective
  if (req.objective) {
    sections.push({ heading: 'Objective', color: '#00B290', body: req.objective })
  }

  // Problem Statement
  if (req.problem) {
    sections.push({ heading: 'Problem Statement', color: '#1C38F5', body: req.problem })
  }

  // Scope — Portfolio selection
  if (PORTFOLIO_SELECTION.length) {
    sections.push({
      heading: 'Scope of Work',
      color: '#002870',
      bullets: PORTFOLIO_SELECTION,
      body: 'The following portfolio items have been agreed upon as the scope of this engagement:'
    })
  }

  // Budget & Timeline
  if (req.budget_range || req.timeline || (req.constraints && req.constraints.length)) {
    var meta = {}
    if (req.budget_range) meta['Budget Range'] = req.budget_range
    if (req.timeline)     meta['Timeline']     = req.timeline
    if (req.constraints && req.constraints.length) meta['Constraints'] = req.constraints.join(' · ')
    sections.push({ heading: 'Investment & Timeline', color: '#FFB600', metadata: meta })
  }

  // Success Criteria
  if (req.success_criteria) {
    sections.push({ heading: 'Success Criteria', color: '#00B290', body: req.success_criteria })
  }

  // Next Steps
  var openActions = DOCKET_ITEMS.filter(function(i){ return i.section==='action' && i.status!=='done' })
  if (openActions.length) {
    sections.push({
      heading: 'Next Steps',
      color: '#FF5539',
      table: {
        headers: ['Action', 'Owner', 'Due Date', 'Status'],
        rows: openActions.map(function(a) {
          return [a.title||a.text||'', a.assigned_to||'—', a.due_date||'—', (a.status||'open').toUpperCase()]
        })
      }
    })
  }

function buildSectionPrompt(name, rawText, territory) {
  var hint = SECTION_HINTS[name] ? '\nIMPORTANT - ' + SECTION_HINTS[name] + '\n' : ''
  return 'Extract ONLY the ' + name + ' data from this research about ' + territory + ', India.\n'
    + 'Output ONLY valid JSON matching this schema exactly. No explanation. No markdown.\n'
    + 'CRITICAL: Use null for genuinely missing values. Do NOT use 0 unless the actual value is truly zero.\n'
    + 'Numbers as plain decimals. Strings in double quotes.\n'
    + hint + '\n'
    + 'Schema: ' + SECTION_SCHEMAS[name] + '\n\nResearch (read the entire text carefully for numbers):\n'
    + rawText.substring(0, 12000)
}

//    Parse section response                                                     

async function tpExtractOneSection(sectionName, rawText, territory) {
  var maxTok = atlasAI.sectionMaxTokens(sectionName)
  var prompt = buildSectionPrompt(sectionName, rawText, territory)
  var result = await atlasAI.call(prompt, {
    maxTokens: maxTok,
    tool: 'tsap-territory-profiler',
    callType: 's1_extract_' + sectionName
  })
  if (!result.ok) return { ok: false, section: sectionName, error: result.error }
  TP_TOKENS.s1_extract += (result.tokens || 0)
  var parsed = atlasAI.parseJSON(result.text)
  if (!parsed.ok) {
    console.log('[TP] ' + sectionName + ' parse fail [' + parsed.error + '] raw:', result.text.substring(0, 100))
    return { ok: false, section: sectionName, error: parsed.error, raw_response: result.text }
  }
  return { ok: true, section: sectionName, data: parsed.data }
}


//    Build TP.s1 from sections                                                  
function buildS1FromSections(results, territory) {
  var sections={}, failed={}
  results.forEach(function(r){ if(r.ok) sections[r.section]=r.data; else failed[r.section]={error:r.error,raw_response:r.raw_response||''} })
  var m=sections.macro||{}, e=sections.energy||{}, w=sections.water||{}
  var l=sections.land||{}, k=sections.workers||{}, d=sections.digital||{}
  var op=sections.opportunities||{}
  var dem=sections.demographics||{}, inf=sections.infrastructure||{}
  return {
    territory:territory, headline:op.headline||null,
    hard_stats:{ macro:m, energy:e, water:w, land:l, workers:k, digital:d },
    policy:sections.policy||{}, programmes:sections.programmes||{},
    geography:sections.geography||{}, ai_opportunities:op.ai_opportunities||[],
    demographics:dem, infrastructure:inf,
    _sections:sections, _failed:failed, _complete:Object.keys(failed).length===0
  }
}

//    Retry / skip section                                                       
async function tpRetrySection(sectionName) {
  if (!TP.s1||!TP._rawIntel) return
  var result = await tpExtractOneSection(sectionName, TP._rawIntel, TP.territory)
  if (result.ok) {
    delete TP.s1._failed[sectionName]
    TP.s1._sections[sectionName] = result.data
    var hs = {macro:1,energy:1,water:1,land:1,workers:1,digital:1}
    if (hs[sectionName]) TP.s1.hard_stats[sectionName] = result.data
    if (sectionName==='policy')       TP.s1.policy       = result.data
    if (sectionName==='programmes')   TP.s1.programmes   = result.data
    if (sectionName==='geography')    TP.s1.geography    = result.data
    if (sectionName==='opportunities'){ TP.s1.ai_opportunities=result.data.ai_opportunities||[]; TP.s1.headline=result.data.headline }
    TP.s1._complete = Object.keys(TP.s1._failed).length===0
    tpSaveProfile()
  } else { TP.s1._failed[sectionName].error = result.error }
  tpRender()
}

function tpSkipSection(sectionName) {
  if (TP.s1&&TP.s1._failed) { delete TP.s1._failed[sectionName]; TP.s1._sections[sectionName]={} }
  tpRender()
}

//    Save profile                                                               
async function tpRefreshIntel() {
  var territory = TP.territory
  if (!territory) return
  if (!confirm('Refresh will re-search and clear S2/S3/S4 for '+territory+'. Continue?')) return
  var slug=territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  var sb=getSB()
  if (sb.url) { try { await fetch(sb.url+'/rest/v1/territory_profiles?id=eq.'+encodeURIComponent(slug),{method:'DELETE',headers:{apikey:sb.key,Authorization:'Bearer '+sb.key,'Content-Type':'application/json',Prefer:'return=minimal'}}) } catch(e){} }
  TP.s1=null; TP._rawIntel=null; TP.s2=null; TP._2x2=null; TP.s4=null
  TP.overrides={working:[],attention:[]}; TP.objectives=[]
  TP_TOKENS={s1_raw:0,s1_extract:0,s2_prompt:0,s2_response:0}
  if (!TP.archetypes.length) await loadTPData()
  // atlasAI handles model loading
  var prompt=buildRawIntelPrompt(territory)
  TP.stage='s1_loading'; tpRender(); tpTimerStart(Math.round(prompt.length/4))
  var result=await geminiCall(prompt,true,4096); tpTimerStop()
  if (!result.ok){TP.stage='home';tpRender();setTimeout(function(){alert('Search failed: '+result.error)},100);return}
  TP_TOKENS.s1_raw=result.tokens; TP._rawIntel=result.text
  TP._sources = result.sources || []  // grounding sources from Gemini search
  await sbInsert('territory_profiles',{id:slug,territory:territory,raw_intel:result.text,raw_cached_at:new Date().toISOString(),profile:null,generated_at:new Date().toISOString(),expires_at:new Date(Date.now()+90*24*60*60*1000).toISOString()})
  await tpRunExtraction(territory,result.text,slug)
}

async function tpSaveProfile() {
  // tpSaveProfile now saves full session (S1 profile + S2 result + objectives + overrides + stage)
  if (!TP.s1) return
  var slug = TP.territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  var session = TP.s2 ? {
    objectives: TP.objectives,
    freeText:   TP.freeText,
    s2:         TP.s2,
    overrides:  TP.overrides,
    stage:      TP.stage,
    twoByTwo:   TP._2x2    || null,
    s4:         TP.s4      || null,
    sources:    TP._sources || [],
    saved_at:   new Date().toISOString()
  } : null
  await sbInsert('territory_profiles', {
    id:           slug,
    territory:    TP.territory,
    profile:      TP.s1,
    raw_intel:    TP._rawIntel || null,
    session:      session,
    generated_at: new Date().toISOString(),
    expires_at:   new Date(Date.now() + 90*24*60*60*1000).toISOString()
  })

//    tpLoadPast + tpLoadCached + tpStartS1 + tpRunExtraction                  
async function tpLoadPast() {
  var el = document.getElementById('tp-past-list'); if (!el) return

  if (!rows||!rows.length){ el.innerHTML='<span style="font-size:11px;color:var(--mid)">No profiles yet</span>'; return }

    var date = r.generated_at ? new Date(r.generated_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : ''
    var stale = r.expires_at && new Date(r.expires_at) < new Date()
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="tpLoadCached(this.dataset.id)" data-id="'+esc(r.id)+'">'

      +'<span style="font-size:12px;color:var(--mid)">&#8250;</span></div>'
  }).join('')
}

async function tpLoadCached(id) {
  var rows = await sbFetch('territory_profiles', 'id=eq.' + encodeURIComponent(id), 1)
  if (!rows || !rows[0]) return
  var row = rows[0]
  TP.territory   = row.territory
  TP._rawIntel   = row.raw_intel || null

  // Restore S1
  if (row.profile && row.profile._sections) {
    TP.s1 = row.profile
  }

  // Restore full session (S2 + objectives + overrides + stage)
  if (row.session && row.session.s2) {
    var sess = row.session
    TP.objectives       = sess.objectives  || []
    TP.freeText         = sess.freeText    || ''
    TP.s2               = sess.s2
    TP.overrides        = sess.overrides   || { working:[], attention:[] }
    TP._2x2             = sess.twoByTwo    || null
    TP.s4               = sess.s4          || null
    TP._sources         = sess.sources     || []
    // Restore to S3 if we have a full session, otherwise S1
    TP.stage = (TP.s1 && TP.s2) ? 's3' : (TP.s1 ? 's1_done' : 'home')
    MODEL.territory = row.territory; updateHeader()
    showToast('\u21ba Session restored: ' + row.territory)
    tpRender()
    return
  }

  // No S2 session — go to S1 if we have it
  if (TP.s1) {
    TP.stage = 's1_done'
    tpRender()
    return
  }

  // Only raw intel — re-extract
  if (row.raw_intel) {
    await tpRunExtraction(row.territory, row.raw_intel, id)
    return
  }

  TP.stage = 'home'
  tpRender()
}


async function tpStartS1() {
  var inp = document.getElementById('tp-territory-input')
  var sel = document.getElementById('tp-territory-select')
  var territory = (inp ? inp.value.trim() : '') || (sel && sel.value ? sel.value : '')
  if (!territory) { showToast('Enter or select a territory', 'error'); return }
  TP.territory=territory; TP._rawIntel=null
  TP_TOKENS = { s1_raw:0, s1_extract:0, s2_prompt:0, s2_response:0 }
  if (!TP.archetypes.length) await loadTPData()
  // atlasAI handles model loading
  var slug = territory.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')
  var cached = await sbFetch('territory_profiles','id=eq.'+encodeURIComponent(slug),1)
  if (cached&&cached[0]&&cached[0].raw_intel) {
    var exp = cached[0].expires_at ? new Date(cached[0].expires_at) : null
    if (!exp||exp>new Date()) {
      TP._rawIntel=cached[0].raw_intel
      if (cached[0].profile && cached[0].profile._sections) {
        TP.s1 = cached[0].profile
        // Restore session if available
        if (cached[0].session && cached[0].session.s2) {
          var sess = cached[0].session
          TP.objectives = sess.objectives || []
          TP.freeText   = sess.freeText   || ''
          TP.s2         = sess.s2
          TP.overrides  = sess.overrides  || { working:[], attention:[] }
          TP._2x2       = sess.twoByTwo   || null
          TP.s4         = sess.s4          || null
          TP._sources   = sess.sources     || []
          TP.stage      = 's3'
          MODEL.territory = territory; updateHeader()
          showToast('\u21ba Session restored: ' + territory)
        } else {
          TP.stage = 's1_done'
        }
        tpRender(); return
      }
      await tpRunExtraction(territory, TP._rawIntel, slug); return
    }
  }
  var prompt = buildRawIntelPrompt(territory)
  TP.stage='s1_loading'; tpRender()
  tpTimerStart(Math.round(prompt.length/4))
  var result = await geminiCall(prompt,true,4096)
  tpTimerStop()
  if (!result.ok){ TP.stage='home'; tpRender(); setTimeout(function(){ alert('Search failed: '+result.error) },100); return }
  TP_TOKENS.s1_raw=result.tokens; TP._rawIntel=result.text
  TP._sources = result.sources || []  // grounding sources from Gemini search
  await sbInsert('territory_profiles',{id:slug,territory:territory,raw_intel:result.text,
    raw_cached_at:new Date().toISOString(),profile:null,
    generated_at:new Date().toISOString(),expires_at:new Date(Date.now()+90*24*60*60*1000).toISOString()})
  await tpRunExtraction(territory,result.text,slug)
}

async function tpRunExtraction(territory, rawText, slug) {
  var SECS=['macro','energy','water','land','workers','digital','policy','programmes','geography','opportunities','demographics','infrastructure']
  TP._extracting={}; SECS.forEach(function(s){ TP._extracting[s]='pending' })
  TP.stage='s1_extracting'; tpRender(); tpTimerStart(0)
  function updateDot(name,status){
    TP._extracting[name]=status
    var el=document.getElementById('tp-sec-'+name); if (!el) return
    var dots={pending:'&#9711;',loading:'&#9680;',done:'&#9989;',error:'&#10060;'}
    var cols={pending:'var(--mid)',loading:'var(--navy)',done:'var(--teal)',error:'var(--orange)'}
    el.innerHTML='<span style="font-size:14px">'+dots[status]+'</span>'
      +'<span style="font-size:12px;color:'+cols[status]+'">'+el.dataset.label+'</span>'
  }
  var B1=SECS.slice(0,5); B1.forEach(function(s){ updateDot(s,'loading') })
  var r1=await Promise.all(B1.map(function(s){
    return tpExtractOneSection(s,rawText,territory).then(function(r){ updateDot(s,r.ok?'done':'error'); return r })
  }))
  await new Promise(function(res){ setTimeout(res,500) })
  var B2=SECS.slice(5); B2.forEach(function(s){ updateDot(s,'loading') })
  var r2=await Promise.all(B2.map(function(s){
    return tpExtractOneSection(s,rawText,territory).then(function(r){ updateDot(s,r.ok?'done':'error'); return r })
  }))
  tpTimerStop()
  TP.s1=buildS1FromSections(r1.concat(r2),territory); TP.stage='s1_done'
  MODEL.territory = TP.territory
  updateHeader()
  tpSaveProfile(); tpRender()
}

function ragClass(val, lo, hi) {
  // val: actual value, lo: green threshold, hi: red threshold
  if (val === null || val === undefined) return 'rag-grey'
  if (val <= lo) return 'rag-green'
  if (val >= hi) return 'rag-red'
  return 'rag-amber'
}
function indexRag(pct) {
  // pct vs national avg: <85% = green (cheaper), 85-115% = amber, >115% = red (costlier)
  if (!pct) return 'rag-grey'
  if (pct <= 85) return 'rag-green'
  if (pct >= 115) return 'rag-red'
  return 'rag-amber'
}
function arrow(pct) {
  if (!pct) return ''
  if (pct <= 85) return '&#9660; '
  if (pct >= 115) return '&#9650; '
  return '&#8212; '
}
function ragText(pct) {
  if (!pct) return 'N/A'
  return arrow(pct) + pct + '% of natl avg'
}
