<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS &mdash; Engagement Docket</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF5539;--navy:#002870;--blue:#1C38F5;--teal:#00B290;--amber:#FFB600;
  --white:#FFF;--light:#F5F5F7;--mid:#B4B4BE;--dark:#282832;
  --r:8px;--r-sm:6px;--r-lg:12px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-md:0 4px 16px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
/* Header */
.hdr{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-md);position:sticky;top:0;z-index:200;}
.hdr-brand{font-size:16px;font-weight:900;color:var(--white);letter-spacing:3px;}
.hdr-brand span{color:var(--orange);}
.hdr-badge{background:rgba(255,85,57,0.2);color:var(--orange);font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
/* Layout */
.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:280px;flex-shrink:0;background:var(--white);border-right:1px solid #e0e0e8;display:flex;flex-direction:column;height:calc(100vh - 52px);position:sticky;top:52px;overflow-y:auto;}
.main{flex:1;padding:24px;overflow-y:auto;}
/* Sidebar */
.sb-section{padding:12px 16px 6px;font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:space-between;}
.sb-item{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--dark);display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:all 0.15s;}
.sb-item:hover{background:var(--light);}
.sb-item.active{background:rgba(0,40,112,0.06);border-left-color:var(--orange);font-weight:600;color:var(--navy);}
.sb-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-item-count{font-size:10px;background:var(--light);color:var(--mid);padding:1px 6px;border-radius:8px;}
.sb-item-status{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-active{background:var(--teal);}
.status-paused{background:var(--amber);}
.status-won{background:var(--blue);}
.status-lost{background:#DC2626;}
.status-closed{background:var(--mid);}
.sb-add-btn{margin:8px 16px;padding:7px 12px;background:var(--orange);color:var(--white);border:none;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;width:calc(100% - 32px);font-family:inherit;}
.sb-add-btn:hover{background:#e6421f;}
.sb-search{margin:8px 16px 4px;position:relative;}
.sb-search input{width:100%;padding:7px 10px 7px 30px;border:1px solid #e0e0e8;border-radius:var(--r-sm);font-size:12px;background:var(--light);font-family:inherit;}
.sb-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--mid);}
/* Cards */
.card{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.card-sub{font-size:11px;color:var(--mid);margin-bottom:16px;line-height:1.6;}
/* Docket header */
.docket-hdr{background:var(--navy);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:16px;color:var(--white);}
.docket-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.docket-meta{font-size:11px;color:rgba(255,255,255,0.55);display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;}
.docket-pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase;}
.pill-active{background:rgba(0,178,144,0.2);color:var(--teal);}
.pill-paused{background:rgba(255,182,0,0.2);color:var(--amber);}
.pill-won{background:rgba(28,56,245,0.2);color:var(--blue);}
.pill-lost{background:rgba(220,38,38,0.15);color:#DC2626;}
.pill-customer{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);}
/* Items */
.item-type-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.type-filter{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #e0e0e8;background:var(--white);cursor:pointer;color:var(--mid);font-family:inherit;}
.type-filter.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.docket-item{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.15s;}
.docket-item:hover{border-color:var(--teal);}
.item-icon{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.icon-action{background:rgba(255,182,0,0.1);}
.icon-intel{background:rgba(0,40,112,0.08);}
.icon-pei{background:rgba(28,56,245,0.08);}
.icon-uc{background:rgba(0,178,144,0.1);}
.icon-rfp{background:rgba(220,38,38,0.08);}
.icon-pitch{background:rgba(255,85,57,0.1);}
.icon-solution{background:rgba(0,40,112,0.1);}
.icon-bom{background:rgba(40,40,50,0.06);}
.icon-proposal{background:rgba(28,56,245,0.1);}
.icon-pricing{background:rgba(0,178,144,0.08);}
.icon-exec_doc{background:rgba(255,85,57,0.08);}
.item-body{flex:1;min-width:0;}
.item-title{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:3px;}
.item-meta{font-size:10px;color:var(--mid);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.item-notes{font-size:11px;color:#555;line-height:1.5;}
.item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.item-status{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;}
.is-pending{background:rgba(180,180,190,0.15);color:var(--mid);}
.is-in_progress{background:rgba(255,182,0,0.12);color:#9a7000;}
.is-done{background:rgba(0,178,144,0.12);color:var(--teal);}
.is-closed{background:rgba(40,40,50,0.08);color:var(--mid);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--orange);color:var(--white);}
.btn-primary:hover{background:#e6421f;}
.btn-navy{background:var(--navy);color:var(--white);}
.btn-navy:hover{background:#001d5c;}
.btn-teal{background:var(--teal);color:var(--white);}
.btn-outline{background:transparent;color:var(--navy);border:1px solid var(--navy);}
.btn-outline:hover{background:var(--navy);color:var(--white);}
.btn-ghost{background:var(--light);color:var(--dark);border:1px solid #e0e0e8;}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
.btn-danger{background:rgba(220,38,38,0.08);color:#DC2626;border:1px solid rgba(220,38,38,0.2);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:2px 8px;font-size:10px;}
/* Forms */
label{display:block;font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px;margin-top:12px;}
label:first-child{margin-top:0;}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #d0d0d8;border-radius:var(--r-sm);font-size:13px;font-family:inherit;color:var(--dark);background:var(--white);outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:80px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-hint{font-size:10px;color:var(--mid);margin-top:4px;}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--r-lg);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.dash-stat{background:var(--white);border:1px solid #e0e0e8;border-radius:var(--r-lg);padding:16px 20px;}
.dash-stat-val{font-size:28px;font-weight:700;color:var(--navy);}
.dash-stat-lbl{font-size:11px;color:var(--mid);margin-top:2px;}
/* Empty */
.empty{text-align:center;padding:48px 24px;color:var(--mid);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.6;}
/* Action docket */
.action-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #e0e0e8;border-radius:var(--r);margin-bottom:8px;background:var(--white);}
.action-row.done{opacity:0.5;}
.action-check{width:18px;height:18px;border-radius:4px;border:2px solid #d0d0d8;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.action-check.checked{background:var(--teal);border-color:var(--teal);color:var(--white);}
.action-text{flex:1;font-size:12px;color:var(--dark);}
.action-domain{font-size:10px;background:var(--light);color:var(--mid);padding:1px 6px;border-radius:4px;}
/* Upload zone */
.upload-zone{border:2px dashed #d0d0d8;border-radius:var(--r-lg);padding:32px;text-align:center;cursor:pointer;transition:all 0.15s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:rgba(0,178,144,0.03);}
.upload-zone-icon{font-size:32px;margin-bottom:8px;}
.upload-zone-text{font-size:13px;color:var(--mid);}
/* Tags */
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--light);color:var(--mid);margin:2px;}
/* Responsive */
@media(max-width:768px){.layout{flex-direction:column;}.sidebar{width:100%;height:auto;position:static;}.dash-grid{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">ATL<span>A</span>S</div>
  <div style="font-size:11px;color:rgba(255,255,255,0.5)">Engagement Docket</div>
  <div class="hdr-right">
    <span class="hdr-badge">Docket v1.0</span>
    <button class="btn btn-outline btn-sm" style="color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.3)" onclick="window.history.back()">&#8592; Portal</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-search">
      <span class="sb-search-icon">&#128269;</span>
      <input type="text" id="sbSearch" placeholder="Search dockets..." oninput="renderSidebar()">
    </div>
    <button class="sb-add-btn" onclick="openNewDocketModal()">+ New Customer Docket</button>
    <div class="sb-section">
      <span>Customer Dockets</span>
      <span id="sbCustCount">0</span>
    </div>
    <div id="sbCustomerList"></div>
    <div class="sb-section" style="margin-top:8px">
      <span>My Action Docket</span>
    </div>
    <div id="sbMyDocket"></div>
  </div>

  <!-- Main -->
  <div class="main" id="mainPanel">
    <!-- Dashboard shown by default -->
  </div>
</div>

<!-- New Docket Modal -->
<div class="modal-overlay" id="newDocketModal">
  <div class="modal">
    <div class="modal-title">&#128193; New Customer Docket</div>
    <label>Customer Name *</label>
    <input type="text" id="nd-customer" placeholder="e.g. Indian Army">
    <label>Engagement Name *</label>
    <input type="text" id="nd-engagement" placeholder="e.g. Border Surveillance AI 2026">
    <div class="form-grid">
      <div>
        <label>Sector</label>
        <select id="nd-sector">
          <option value="">— Select —</option>
          <option>Defence &amp; Armed Forces</option>
          <option>Governance &amp; e-Governance</option>
          <option>Intelligence &amp; Signals</option>
          <option>Homeland Security</option>
          <option>Geospatial &amp; Earth Observation</option>
          <option>Space &amp; Aerospace</option>
          <option>Critical Infrastructure</option>
          <option>Natural Resources</option>
          <option>Energy &amp; Utilities</option>
          <option>Telecom &amp; Networks</option>
          <option>BFSI &amp; Financial Services</option>
          <option>Health &amp; Life Sciences</option>
          <option>Manufacturing &amp; Industry</option>
          <option>Regional AI Programmes</option>
          <option>General Enterprise</option>
        </select>
      </div>
      <div>
        <label>Country</label>
        <select id="nd-country">
          <option value="India" selected>India</option>
          <option>UAE</option><option>Saudi Arabia</option><option>Qatar</option>
          <option>Singapore</option><option>Malaysia</option><option>Australia</option>
          <option>United Kingdom</option><option>France</option><option>Germany</option>
          <option>United States</option>
        </select>
      </div>
    </div>
    <label>Estimated Deal Value</label>
    <input type="text" id="nd-deal" placeholder="e.g. INR 50 Cr, USD 5M">
    <label>Source</label>
    <select id="nd-source">
      <option value="manual">Manual</option>
      <option value="sales_action">Sales Action</option>
      <option value="pei">PEI Output</option>
      <option value="rfp">RFP</option>
      <option value="inbound">Inbound Enquiry</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('newDocketModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createCustomerDocket()">Create Docket</button>
    </div>
  </div>
</div>

<!-- Add Item Modal -->
<div class="modal-overlay" id="addItemModal">
  <div class="modal">
    <div class="modal-title" id="addItemTitle">&#43; Add Item to Docket</div>
    <input type="hidden" id="ai-docket-id">
    <input type="hidden" id="ai-preset-type">
    <input type="hidden" id="ai-source-id">
    <label>Item Type</label>
    <select id="ai-type" onchange="updateItemTypeHints()">
      <option value="action">&#9889; Action</option>
      <option value="intel">&#128202; Intelligence Item</option>
      <option value="pei">&#128269; PEI Brief</option>
      <option value="uc">&#128161; Use Case</option>
      <option value="rfp">&#128196; RFP / Tender</option>
      <option value="pitch">&#128202; Pitch Report</option>
      <option value="solution">&#9881; Technical Solution</option>
      <option value="bom">&#128220; Bill of Materials</option>
      <option value="proposal">&#128196; Proposal</option>
      <option value="pricing">&#128176; Pricing</option>
      <option value="exec_doc">&#127891; Executive Document</option>
    </select>
    <label>Title *</label>
    <input type="text" id="ai-title" placeholder="Descriptive title for this item">
    <label>Notes / Summary</label>
    <textarea id="ai-notes" placeholder="Key details, decisions, or context..."></textarea>
    <div class="form-grid">
      <div>
        <label>Assigned To</label>
        <input type="text" id="ai-assigned" placeholder="Name or team">
      </div>
      <div>
        <label>Due Date</label>
        <input type="date" id="ai-due">
      </div>
    </div>
    <div id="ai-hint" style="font-size:11px;color:var(--mid);margin-top:10px;padding:8px 12px;background:var(--light);border-radius:var(--r-sm);display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addItemModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Add to Docket</button>
    </div>
  </div>
</div>

<!-- Add to Docket Trigger Modal (called from other tools) -->
<div class="modal-overlay" id="triggerModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-title">&#128193; Add to Docket</div>
    <div style="font-size:12px;color:var(--mid);margin-bottom:12px" id="trigger-item-desc"></div>
    <label>Select Docket</label>
    <select id="trigger-docket-select">
      <option value="__new__">+ Create New Customer Docket</option>
    </select>
    <div id="trigger-new-fields" style="display:none">
      <label>Customer Name</label>
      <input type="text" id="trigger-customer" placeholder="e.g. Indian Army">
      <label>Engagement Name</label>
      <input type="text" id="trigger-engagement" placeholder="e.g. Border Surveillance AI">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('triggerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddToDocket()">Add to Docket</button>
    </div>
  </div>
</div>

<!-- View Item Modal -->
<div class="modal-overlay" id="viewItemModal">
  <div class="modal" style="max-width:600px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div class="modal-title" style="margin-bottom:0" id="vi-title">Item Detail</div>
      <button class="btn btn-ghost btn-xs" onclick="closeModal('viewItemModal')">&#10005;</button>
    </div>
    <div id="vi-body"></div>
  </div>
</div>

function atlasGetGlobal(){
  try{ return JSON.parse(localStorage.getItem('atlas_global_cfg')||'{}') }catch(e){ return {} }
}

// Returns only providers that have a key configured
function atlasGetConfiguredProviders(){
  var g = atlasGetGlobal()
  return ATLAS_MODEL_REGISTRY.filter(function(p){
    if(p.alwaysAvailable) return true
    var key = g[p.cfgKey] || (p.legacyKey ? localStorage.getItem(p.legacyKey) : '') || ''
    return key.length > 0
  })
}

// Returns flat list of {modelId, modelLabel, providerId, providerName, flag, cost} for configured providers
function atlasGetAvailableModels(){
  var providers = atlasGetConfiguredProviders()
  var models = []
  providers.forEach(function(p){
    p.models.forEach(function(m){
      models.push({
        modelId: m.id,
        modelLabel: m.label,
        cost: m.cost,
        tier: m.tier,
        providerId: p.id,
        providerName: p.name,
        flag: p.flag,
      })
    })
  })
  return models
}

// Build a <select> innerHTML grouped by provider \u2014 only configured providers shown
// selectedModel: current model ID to pre-select
function atlasBuildModelSelect(selectedModel){
  var providers = atlasGetConfiguredProviders()
  if(!providers.length) return '<option value="">No providers configured in Settings</option>'
  var html = ''
  providers.forEach(function(p){
    html += '<optgroup label="'+p.flag+' '+p.name+'">'
    p.models.forEach(function(m){
      var sel = m.id === selectedModel ? ' selected' : ''
      html += '<option value="'+m.id+'"'+sel+'>'+m.label+' ('+m.cost+')</option>'
    })
    html += '</optgroup>'
  })
  return html
}

// Get the API key for a given model ID
function atlasGetKeyForModel(modelId){
  var g = atlasGetGlobal()
  var provider = null
  ATLAS_MODEL_REGISTRY.forEach(function(p){
    p.models.forEach(function(m){ if(m.id === modelId) provider = p })
  })
  if(!provider) return ''
  return g[provider.cfgKey] || (provider.legacyKey ? localStorage.getItem(provider.legacyKey) : '') || ''
}

// Universal model call \u2014 routes to correct provider API
async function atlasCallModel(modelId, prompt, systemPrompt, maxTokens){
  maxTokens = maxTokens || 4096
  var g = atlasGetGlobal()
  var provider = null
  ATLAS_MODEL_REGISTRY.forEach(function(p){
    p.models.forEach(function(m){ if(m.id === modelId) provider = p })
  })
  if(!provider) throw new Error('Unknown model: '+modelId)

  var key = atlasGetKeyForModel(modelId)
  if(!key && !provider.alwaysAvailable) throw new Error(provider.name+' API key not configured in ATLAS Settings.')

  // Gemini
  if(provider.authStyle === 'gemini'){
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/'+modelId+':generateContent?key='+key
    var body = {
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.2, maxOutputTokens:maxTokens, thinkingConfig:{thinkingBudget:0}}
    }
    if(systemPrompt) body.system_instruction = {parts:[{text:systemPrompt}]}
    var r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    if(!r.ok){var e=await r.json();throw new Error(e.error?.message||'Gemini error '+r.status)}
    var d = await r.json()
    return d.candidates?.[0]?.content?.parts?.[0]?.text || ''
  }

  // Anthropic
  if(provider.authStyle === 'anthropic'){
    var msgs = [{role:'user',content:prompt}]
    var body = {model:modelId, max_tokens:maxTokens, messages:msgs}
    if(systemPrompt) body.system = systemPrompt
    var r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify(body)
    })
    if(!r.ok){var e=await r.json();throw new Error(e.error?.message||'Claude error '+r.status)}
    var d = await r.json()
    return d.content?.[0]?.text || ''
  }

  // Sarvam
  if(provider.authStyle === 'sarvam'){
    var msgs = systemPrompt ? [{role:'system',content:systemPrompt},{role:'user',content:prompt}] : [{role:'user',content:prompt}]
    var r = await fetch(provider.endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json','api-subscription-key':key},
      body:JSON.stringify({model:modelId,messages:msgs,max_tokens:maxTokens,temperature:0.2})
    })
    if(!r.ok) throw new Error('Sarvam error '+r.status)
    var d = await r.json()
    return d.choices?.[0]?.message?.content || ''
  }

  // Ollama (local)
  if(provider.authStyle === 'none'){
    var endpoint = g['endpoint_ollama'] || 'http://localhost:11434/v1/chat/completions'
    var msgs = systemPrompt ? [{role:'system',content:systemPrompt},{role:'user',content:prompt}] : [{role:'user',content:prompt}]
    var r = await fetch(endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:modelId,messages:msgs,max_tokens:maxTokens,temperature:0.2})
    })
    if(!r.ok) throw new Error('Ollama error '+r.status)
    var d = await r.json()
    return d.choices?.[0]?.message?.content || ''
  }

  // OpenAI-compatible (Mistral, OpenAI, Qwen)
  var msgs = systemPrompt ? [{role:'system',content:systemPrompt},{role:'user',content:prompt}] : [{role:'user',content:prompt}]
  var r = await fetch(provider.endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:modelId,messages:msgs,max_tokens:maxTokens,temperature:0.2})
  })
  if(!r.ok){var e=await r.json();throw new Error(e.error?.message||provider.name+' error '+r.status)}
  var d = await r.json()
  return d.choices?.[0]?.message?.content || ''
}

function getSB(){

// \u2500\u2500 Supabase helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function sbFetch(table, params, limit){
  var sb = getSB()
  if(!sb.url||!sb.key) return []
  var url = sb.url+'/rest/v1/'+table+'?'+params+(limit?'&limit='+limit:'')
  var r = await fetch(url, {headers:{'apikey':sb.key,'Authorization':'Bearer '+sb.key}})
  if(!r.ok) return []
  return await r.json()
}

async function sbInsert(table, data){
  var sb = getSB()
  if(!sb.url||!sb.key) return false
  var r = await fetch(sb.url+'/rest/v1/'+table, {
    method:'POST',
    headers:{'apikey':sb.key,'Authorization':'Bearer '+sb.key,'Content-Type':'application/json','Prefer':'resolution=ignore-duplicates,return=minimal'},
    body:JSON.stringify(data)
  })
  return r.ok
}

async function sbPatch(table, filter, data){
  var sb = getSB()
  if(!sb.url||!sb.key) return false
  var r = await fetch(sb.url+'/rest/v1/'+table+'?'+filter, {
    method:'PATCH',
    headers:{'apikey':sb.key,'Authorization':'Bearer '+sb.key,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  })
  return r.ok
}

async function sbDelete(table, filter){
  var sb = getSB()
  if(!sb.url||!sb.key) return false
  var r = await fetch(sb.url+'/rest/v1/'+table+'?'+filter, {
    method:'DELETE',
    headers:{'apikey':sb.key,'Authorization':'Bearer '+sb.key}
  })
  return r.ok
}

    +'<div class="item-type-bar">'+typeBar+'</div>'
    +itemsHtml
}

function renderItem(item){
  var tc = ITEM_TYPES[item.item_type] || {icon:'\uD83D\uDCCC',label:item.item_type}
  var content = item.content || {}
  var preview = item.notes || content.summary || content.problem_statement || ''
  return '<div class="docket-item">'
    +'<div class="item-icon icon-'+item.item_type+'">'+tc.icon+'</div>'
    +'<div class="item-body">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">'
    +'<div class="item-title">'+esc(item.title)+'</div>'
    +'<span class="item-status is-'+item.status+'">'+item.status.replace('_',' ')+'</span>'
    +'</div>'
    +'<div class="item-meta">'
    +'<span class="tag">'+tc.label+'</span>'
    +(item.assigned_to?'<span>\uD83D\uDC64 '+esc(item.assigned_to)+'</span>':'')
    +(item.due_date?'<span>\uD83D\uDCC5 '+fmtDate(item.due_date)+'</span>':'')
    +'<span>'+fmtDate(item.created_at)+'</span>'
    +'</div>'
    +(preview?'<div class="item-notes">'+esc(preview.slice(0,150))+(preview.length>150?'\u2026':'')+'</div>':'')
    +'<div class="item-actions">'
    +'<button class="btn btn-ghost btn-xs" data-id="'+item.id+'" onclick="viewItem(this.dataset.id)">\uD83D\uDC41 View</button>'
    +buildStatusButtons(item)
    +'<button class="btn btn-danger btn-xs" data-id="'+item.id+'" onclick="deleteItem(this.dataset.id)">&#10007;</button>'
    +'</div></div></div>'
}

function buildStatusButtons(item){
  var btns = ''
  if(item.status==='pending') btns += '<button class="btn btn-ghost btn-xs" data-id="'+item.id+'" onclick="setItemStatus(this.dataset.id,\'in_progress\')">&#9654; Start</button>'
  if(item.status==='in_progress') btns += '<button class="btn btn-teal btn-xs" data-id="'+item.id+'" onclick="setItemStatus(this.dataset.id,\'done\')">&#10003; Done</button>'
  if(item.status==='done') btns += '<button class="btn btn-ghost btn-xs" data-id="'+item.id+'" onclick="setItemStatus(this.dataset.id,\'closed\')">&#8679; Close</button>'
  return btns
}

function setFilter(f){
  ACTIVE_FILTER = f
  var docket = ALL_DOCKETS.find(function(d){ return d.id===CURRENT_DOCKET_ID })
  if(docket) renderDocketDetail(docket)
}

// \u2500\u2500 Create docket \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function openNewDocketModal(){
  document.getElementById('nd-customer').value=''
  document.getElementById('nd-engagement').value=''
  document.getElementById('nd-deal').value=''
  document.getElementById('nd-source').value='manual'
  document.getElementById('newDocketModal').classList.add('open')
}

async function createCustomerDocket(opts){
  opts = opts || {}
  var customer = opts.customer || document.getElementById('nd-customer').value.trim()
  var engagement = opts.engagement || document.getElementById('nd-engagement').value.trim()
  if(!customer||!engagement){ alert('Customer name and engagement name are required.'); return null }
  var sector = opts.sector || document.getElementById('nd-sector').value
  var country = opts.country || document.getElementById('nd-country').value
  var deal = opts.deal || document.getElementById('nd-deal').value.trim()
  var source = opts.source || document.getElementById('nd-source').value

  var id = 'ENG-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+Math.floor(Math.random()*9999)
  var docket = {
    id:id, type:'customer',
    name: customer+' \u2014 '+engagement,
    customer_name: customer,
    owner: '',
    status:'active',
    sector: sector,
    country: country,
    deal_value: deal,
    source: source,
    metadata:{},
  }
  var ok = await sbInsert('engagement_dockets', docket)
  if(ok){
    closeModal('newDocketModal')
    await loadDockets()
    openDocket(id)
    return id
  } else {
    alert('Failed to create docket. Check Supabase connection in Settings.')
    return null
  }
}

async function getOrCreateSalespersonDocket(){
  var existing = ALL_DOCKETS.find(function(d){ return d.type==='salesperson' })
  if(existing) return existing.id
  // Auto-create
  var g = atlasGetGlobal()
  var ownerName = g.owner_name || 'My'
  var id = 'SP-'+Date.now()
  var ok = await sbInsert('engagement_dockets',{
    id:id, type:'salesperson',
    name: ownerName,
    status:'active',
    metadata:{}
  })
  if(ok){
    await loadDockets()
    return id
  }
  return null
}

// \u2500\u2500 Add Item \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function openAddItemModal(docketId, presetType, presetTitle, presetNotes, sourceId){
  document.getElementById('ai-docket-id').value = docketId
  document.getElementById('ai-preset-type').value = presetType||''
  document.getElementById('ai-source-id').value = sourceId||''
  document.getElementById('ai-title').value = presetTitle||''
  document.getElementById('ai-notes').value = presetNotes||''
  document.getElementById('ai-assigned').value = ''
  document.getElementById('ai-due').value = ''
  if(presetType) document.getElementById('ai-type').value = presetType
  updateItemTypeHints()
  document.getElementById('addItemModal').classList.add('open')
}

function updateItemTypeHints(){
  var t = document.getElementById('ai-type').value
  var tc = ITEM_TYPES[t]
  var hint = document.getElementById('ai-hint')
  if(tc && tc.hint){
    hint.textContent = tc.hint
    hint.style.display = 'block'
  } else {
    hint.style.display = 'none'
  }
}

async function saveItem(){
  var docketId = document.getElementById('ai-docket-id').value
  var type = document.getElementById('ai-type').value
  var title = document.getElementById('ai-title').value.trim()
  var notes = document.getElementById('ai-notes').value.trim()
  var assigned = document.getElementById('ai-assigned').value.trim()
  var due = document.getElementById('ai-due').value
  var sourceId = document.getElementById('ai-source-id').value

  if(!title){ alert('Title is required.'); return }

  var item = {
    id: genId('DI'),
    docket_id: docketId,
    item_type: type,
    title: title,
    content: {},
    source_id: sourceId||null,
    status: 'pending',
    assigned_to: assigned||null,
    due_date: due||null,
    notes: notes||null,
    created_by: 'ATLAS',
  }

  var ok = await sbInsert('docket_items', item)
  if(ok){
    closeModal('addItemModal')
    CURRENT_ITEMS.push(item)
    var docket = ALL_DOCKETS.find(function(d){ return d.id===docketId })
    if(docket) renderDocketDetail(docket)
  } else {
    alert('Failed to add item. Check Supabase connection.')
  }
}

// \u2500\u2500 Status changes \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function setItemStatus(itemId, newStatus){
  var ok = await sbPatch('docket_items','id=eq.'+itemId,{status:newStatus})
  if(ok){
    var item = CURRENT_ITEMS.find(function(i){ return i.id===itemId })
    if(item) item.status = newStatus
    var docket = ALL_DOCKETS.find(function(d){ return d.id===CURRENT_DOCKET_ID })
    if(docket) renderDocketDetail(docket)
  }
}

async function changeDocketStatus(docketId, newStatus){
  var ok = await sbPatch('engagement_dockets','id=eq.'+docketId,{status:newStatus})
  if(ok){
    var docket = ALL_DOCKETS.find(function(d){ return d.id===docketId })
    if(docket){
      docket.status = newStatus
      renderDocketDetail(docket)
      renderSidebar()
    }
  }
}

async function deleteItem(itemId){
  if(!confirm('Delete this item? This cannot be undone.')) return
  var ok = await sbDelete('docket_items','id=eq.'+itemId)
  if(ok){
    CURRENT_ITEMS = CURRENT_ITEMS.filter(function(i){ return i.id!==itemId })
    var docket = ALL_DOCKETS.find(function(d){ return d.id===CURRENT_DOCKET_ID })
    if(docket) renderDocketDetail(docket)
  }
}

// \u2500\u2500 View Item \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function viewItem(itemId){
  var item = CURRENT_ITEMS.find(function(i){ return i.id===itemId })
  if(!item) return
  var tc = ITEM_TYPES[item.item_type]||{icon:'\uD83D\uDCCC',label:item.item_type}
  var content = item.content||{}

  function field(label, val){
    if(!val) return ''
    return '<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px">'+label+'</div>'
      +'<div style="font-size:12px;color:var(--dark);line-height:1.6">'+esc(String(val))+'</div></div>'
  }

  var body = ''
  body += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'
    +'<span class="tag">'+tc.icon+' '+tc.label+'</span>'
    +'<span class="item-status is-'+item.status+'" style="font-size:10px">'+item.status.replace('_',' ')+'</span>'
    +(item.assigned_to?'<span class="tag">\uD83D\uDC64 '+esc(item.assigned_to)+'</span>':'')
    +(item.due_date?'<span class="tag">\uD83D\uDCC5 '+fmtDate(item.due_date)+'</span>':'')
    +'</div>'
  body += field('Notes', item.notes)

  // Show content fields
  var FIELD_LABELS = {
    summary:'Summary',problem_statement:'Problem',organisation_summary:'Org Summary',
    our_positioning:'Positioning',uc_name:'UC Name',cluster:'Cluster',
    problem_statement:'Problem Statement',benefit:'Benefit',
    hardware_profile:'Hardware Profile',maturity:'Maturity',
  }
  Object.keys(FIELD_LABELS).forEach(function(k){
    if(content[k]) body += field(FIELD_LABELS[k], content[k])
  })

  body += '<div style="display:flex;gap:8px;margin-top:16px">'
    +'<button class="btn btn-ghost btn-sm" onclick="closeModal(\'viewItemModal\')">Close</button>'
    +buildStatusButtons(item).replace(/btn-xs/g,'btn-sm')
    +'</div>'

  document.getElementById('vi-title').textContent = item.title
  document.getElementById('vi-body').innerHTML = body
  document.getElementById('viewItemModal').classList.add('open')
}

// \u2500\u2500 Add to Docket trigger (called from other tools via postMessage or direct) \u2500
// This function is exposed globally so Second Brain, PEI etc. can call it
async function atlasAddToDocket(item){
  // item: {type, title, notes, content, source_id}
  PENDING_TRIGGER_ITEM = item

  // Build docket dropdown
  var customerDockets = ALL_DOCKETS.filter(function(d){ return d.type==='customer' && d.status==='active' })
  var opts = '<option value="__new__">+ Create New Customer Docket</option>'
  opts += '<option value="__sp__">My Action Docket</option>'
  customerDockets.forEach(function(d){
    opts += '<option value="'+d.id+'">'+esc(d.name)+'</option>'
  })
  document.getElementById('trigger-docket-select').innerHTML = opts
  document.getElementById('trigger-item-desc').textContent = 'Adding: "'+item.title+'" ('+item.type+')'
  document.getElementById('trigger-new-fields').style.display = 'none'
  document.getElementById('trigger-docket-select').onchange = function(){
    document.getElementById('trigger-new-fields').style.display = this.value==='__new__'?'block':'none'
  }
  document.getElementById('triggerModal').classList.add('open')
}

async function confirmAddToDocket(){
  var sel = document.getElementById('trigger-docket-select').value
  var item = PENDING_TRIGGER_ITEM
  if(!item) return

  var docketId = null

  if(sel === '__new__'){
    var customer = document.getElementById('trigger-customer').value.trim()
    var engagement = document.getElementById('trigger-engagement').value.trim()
    if(!customer||!engagement){ alert('Please enter customer and engagement name.'); return }
    docketId = await createCustomerDocket({customer:customer,engagement:engagement,source:item.type})
    if(!docketId) return
  } else if(sel === '__sp__'){
    docketId = await getOrCreateSalespersonDocket()
    if(!docketId){ alert('Could not create action docket.'); return }
  } else {
    docketId = sel
  }

  var newItem = {
    id: genId('DI'),
    docket_id: docketId,
    item_type: item.type || 'action',
    title: item.title,
    content: item.content || {},
    source_id: item.source_id || null,
    status: 'pending',
    assigned_to: null,
    due_date: null,
    notes: item.notes || null,
    created_by: 'ATLAS',
  }

  var ok = await sbInsert('docket_items', newItem)
  if(ok){
    closeModal('triggerModal')
    PENDING_TRIGGER_ITEM = null
    await loadDockets()
    openDocket(docketId)
  } else {
    alert('Failed to add item.')
  }
}

// \u2500\u2500 Word Export \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function exportWordDoc(docketId){
  var docket = ALL_DOCKETS.find(function(d){ return d.id===docketId })
  if(!docket){ alert('Docket not found.'); return }

  // Fetch all items
  var items = await sbFetch('docket_items','docket_id=eq.'+docketId+'&order=item_type.asc,created_at.asc',200)

  // Build plain text document content
  var lines = []
  lines.push('ATLAS ENGAGEMENT DOCKET')
  lines.push('=======================')
  lines.push('')
  lines.push('Engagement: '+docket.name)
  if(docket.customer_name) lines.push('Customer: '+docket.customer_name)
  if(docket.sector) lines.push('Sector: '+docket.sector)
  if(docket.country) lines.push('Country: '+docket.country)
  if(docket.deal_value) lines.push('Deal Value: '+docket.deal_value)
  lines.push('Status: '+docket.status)
  lines.push('Exported: '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}))
  lines.push('')
  lines.push('ITEMS ('+items.length+')')
  lines.push('---------------')

  var typeGroups = {}
  items.forEach(function(item){
    if(!typeGroups[item.item_type]) typeGroups[item.item_type] = []
    typeGroups[item.item_type].push(item)
  })

  var typeOrder = ['intel','pei','uc','rfp','solution','bom','pricing','proposal','pitch','exec_doc','action']
  typeOrder.forEach(function(t){
    var group = typeGroups[t]
    if(!group||!group.length) return
    var tc = ITEM_TYPES[t]||{label:t}
    lines.push('')
    lines.push(tc.label.toUpperCase()+' ('+group.length+')')
    lines.push('---')
    group.forEach(function(item){
      lines.push('')
      lines.push(item.title)
      lines.push('Status: '+item.status+(item.assigned_to?' | Assigned: '+item.assigned_to:'')+(item.due_date?' | Due: '+fmtDate(item.due_date):''))
      if(item.notes) lines.push(item.notes)
      var c = item.content||{}
      if(c.organisation_summary) lines.push('Summary: '+c.organisation_summary)
      if(c.our_positioning) lines.push('Positioning: '+c.our_positioning)
      if(c.problem_statement) lines.push('Problem: '+c.problem_statement)
      if(c.benefit) lines.push('Benefit: '+c.benefit)
    })
  })

  var blob = new Blob([lines.join('\n')],{type:'text/plain'})
  var url = URL.createObjectURL(blob)
  var a = document.createElement('a')
  a.href=url; a.download='Docket-'+docket.customer_name.replace(/\s+/g,'-')+'-'+new Date().toISOString().slice(0,10)+'.txt'
  a.click()
  URL.revokeObjectURL(url)
  // Note: Full .docx export will use the docx skill in next iteration
}

// \u2500\u2500 Init \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
window.addEventListener('DOMContentLoaded', function(){
  loadDockets().then(function(){
    // Check if opened from another tool with a pending item
    var params = new URLSearchParams(window.location.search)
    if(params.get('addItem')==='1'){
      try{
        var pending = JSON.parse(localStorage.getItem('atlas_pending_docket_item')||'null')
        if(pending){
          localStorage.removeItem('atlas_pending_docket_item')
          atlasAddToDocket(pending)
        }
      }catch(e){}
    }
  })
})
