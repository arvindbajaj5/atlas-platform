    { label:'Debt / GSDP', val: m.debt_to_gsdp_pct ? m.debt_to_gsdp_pct+'%' : 'N/A', rag: m.debt_to_gsdp_pct<=25?'rag-green':m.debt_to_gsdp_pct<=35?'rag-amber':'rag-red' },
    { label:'Own revenue', val: m.own_revenue_cr ? 'Rs '+Number(m.own_revenue_cr).toLocaleString('en-IN')+' Cr' : 'N/A', rag:'' },
    { label:'Central transfers', val: m.central_transfers_pct ? m.central_transfers_pct+'%' : 'N/A', rag:'' }
  ]
  // Sectoral composition bar
  var agri = m.sectoral_agri_pct||0, ind = m.sectoral_industry_pct||0, svc = m.sectoral_services_pct||0
  var sectorBar = (agri||ind||svc) ? '<div style="margin:8px 0 4px">'
    + '<div style="font-size:10px;color:var(--mid);margin-bottom:3px">Sectoral mix</div>'
    + '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden">'
    + (agri?'<div style="width:'+agri+'%;background:#059669" title="Agriculture '+agri+'%"></div>':'')
    + (ind ?'<div style="width:'+ind +'%;background:var(--blue)" title="Industry '+ind+'%"></div>':'')
    + (svc ?'<div style="width:'+svc +'%;background:var(--amber)" title="Services '+svc+'%"></div>':'')
    + '</div>'
    + '<div style="display:flex;gap:8px;margin-top:3px">'
    + (agri?'<span style="font-size:9px;color:#059669">Agri '+agri+'%</span>':'')
    + (ind ?'<span style="font-size:9px;color:var(--blue)">Ind '+ind+'%</span>':'')
    + (svc ?'<span style="font-size:9px;color:var(--amber)">Svc '+svc+'%</span>':'')
    + '</div></div>' : ''

  html += tpStatCard('Macroeconomics', macroItems, sparkline + sectorBar)

  // Energy
  html += tpStatCard('Energy (Watts)', [
    { label:'Installed capacity', val: e.installed_mw ? Number(e.installed_mw).toLocaleString('en-IN')+' MW' : 'N/A', rag:'' },
    { label:'Status', val: e.status||'N/A', rag: e.status==='surplus'?'rag-green':e.status==='balanced'?'rag-amber':'rag-red' },
    { label:'Grid reliability', val: e.grid_hrs ? e.grid_hrs+'h/day' : 'N/A', rag: e.grid_hrs>=22?'rag-green':e.grid_hrs>=18?'rag-amber':'rag-red' },
    { label:'Renewable mix', val: e.renewable_pct ? e.renewable_pct+'%' : 'N/A', rag: e.renewable_pct>=40?'rag-green':e.renewable_pct>=20?'rag-amber':'rag-red' },
    { label:'Hydel / Solar / Wind', val: [e.hydel_mw?e.hydel_mw+'MW H':null, e.solar_mw?e.solar_mw+'MW S':null, e.wind_mw?e.wind_mw+'MW W':null].filter(Boolean).join(' · ')||'N/A', rag:'' },
    { label:'Stranded renewable', val: e.stranded_renewable_mw ? Number(e.stranded_renewable_mw).toLocaleString('en-IN')+' MW' : 'N/A', rag: e.stranded_renewable_mw>500?'rag-green':e.stranded_renewable_mw>0?'rag-amber':'' },
    { label:'Industrial tariff vs avg', val: ragText(e.tariff_index_pct), rag: indexRag(e.tariff_index_pct) },
    { label:'DC power feasibility', val: e.dc_feasibility||'N/A', rag: e.dc_feasibility==='high'?'rag-green':e.dc_feasibility==='medium'?'rag-amber':'rag-red' }
  ])

  // Water
  html += tpStatCard('Water', [
    { label:'Annual rainfall', val: w.rainfall_mm ? w.rainfall_mm+' mm' : 'N/A', rag: w.rainfall_mm>=800?'rag-green':w.rainfall_mm>=400?'rag-amber':'rag-red' },
    { label:'Stress index', val: w.stress_index||'N/A', rag: w.stress_index==='low'?'rag-green':w.stress_index==='medium'?'rag-amber':'rag-red' },
    { label:'Rivers', val: (w.perennial_rivers||[]).slice(0,3).join(', ')||'N/A', rag:'' },
    { label:'DC cooling', val: w.dc_cooling||'N/A', rag: w.dc_cooling==='high'?'rag-green':w.dc_cooling==='medium'?'rag-amber':'rag-red' },
    { label:'Water cost vs avg', val: ragText(w.water_cost_index_pct), rag: indexRag(w.water_cost_index_pct) }
  ])

  // Land
  html += tpStatCard('Land', [
    { label:'Area', val: l.area_sqkm ? Number(l.area_sqkm).toLocaleString('en-IN')+' km\u00b2' : 'N/A', rag:'' },
    { label:'Topography', val: l.topography||'N/A', rag: l.topography==='plains'?'rag-green':l.topography==='mixed'?'rag-amber':'rag-red' },
    { label:'Industrial parks / SEZs', val: (l.industrial_parks||0)+' / '+(l.sez_count||0), rag: (l.industrial_parks||0)>2?'rag-green':(l.industrial_parks||0)>0?'rag-amber':'rag-red' },
    { label:'Govt land avail.', val: l.govt_land||'N/A', rag: l.govt_land==='high'?'rag-green':l.govt_land==='medium'?'rag-amber':'rag-red' },
    { label:'Construction ease', val: l.construction_ease||'N/A', rag: l.construction_ease==='easy'?'rag-green':l.construction_ease==='moderate'?'rag-amber':'rag-red' },
    { label:'Land cost vs avg', val: ragText(l.land_cost_index_pct), rag: indexRag(l.land_cost_index_pct) }
  ])

  // Workers
  html += tpStatCard('Workers', [
    { label:'Population', val: k.population_lakh ? k.population_lakh+' lakh' : 'N/A', rag:'' },
    { label:'Literacy', val: k.literacy_pct ? k.literacy_pct+'%' : 'N/A', rag: k.literacy_pct>=80?'rag-green':k.literacy_pct>=65?'rag-amber':'rag-red' },
    { label:'Urbanisation', val: k.urban_pct ? k.urban_pct+'%' : 'N/A', rag: k.urban_pct>=40?'rag-green':k.urban_pct>=25?'rag-amber':'rag-red' },
    { label:'Engineers/yr', val: k.engineers_per_year ? Number(k.engineers_per_year).toLocaleString('en-IN') : 'N/A', rag: k.engineers_per_year>=5000?'rag-green':k.engineers_per_year>=1000?'rag-amber':'rag-red' },
    { label:'Migration', val: k.migration||'N/A', rag: k.migration==='net_in'?'rag-green':k.migration==='balanced'?'rag-amber':'rag-red' },
    { label:'Skilled labour', val: k.skilled_labour||'N/A', rag: k.skilled_labour==='abundant'?'rag-green':k.skilled_labour==='adequate'?'rag-amber':'rag-red' },
    { label:'Salary vs avg', val: ragText(k.salary_index_pct), rag: indexRag(k.salary_index_pct) }
  ])

  // Digital
  html += tpStatCard('Digital', [
    { label:'Internet penetration', val: d.internet_pct ? d.internet_pct+'%' : 'N/A', rag: d.internet_pct>=60?'rag-green':d.internet_pct>=35?'rag-amber':'rag-red' },
    { label:'OFC backbone', val: d.ofc_km ? Number(d.ofc_km).toLocaleString('en-IN')+' km' : 'N/A', rag: d.ofc_km>=10000?'rag-green':d.ofc_km>=2000?'rag-amber':'rag-red' },
    { label:'NKN presence', val: d.nkn?'Yes':'No', rag: d.nkn?'rag-green':'rag-red' },
    { label:'Smart cities', val: d.smart_cities||'0', rag: d.smart_cities>0?'rag-green':'rag-amber' },
    { label:'BharatNet coverage', val: d.bharatnet_pct ? d.bharatnet_pct+'%' : 'N/A', rag: d.bharatnet_pct>=70?'rag-green':d.bharatnet_pct>=40?'rag-amber':'rag-red' },
    { label:'Govt DCs', val: d.govt_dcs||'0', rag: d.govt_dcs>0?'rag-green':'rag-amber' }
  ])

  html += '</div>'

  // ── AI OPPORTUNITIES ───────────────────────────────────────────────────────
  if (opp.length) {
    html += tpSectionHeader('AI OPPORTUNITIES', 'Territory-specific AI deployment opportunities ranked by relevance', '#059669')
    html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">'
    opp.forEach(function(op) {
      var relCol = op.relevance==='high'?'var(--teal)':op.relevance==='medium'?'var(--amber)':'var(--mid)'
      var score  = op.score || 0
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;border-left:4px solid '+relCol+'">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        + '<div style="font-size:12px;font-weight:700;color:var(--navy)">' + esc(op.domain||'') + '</div>'
        + '<div style="display:flex;align-items:center;gap:6px">'
        + '<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:'+relCol+';color:#fff;font-weight:700;text-transform:uppercase">' + esc(op.relevance||'') + '</span>'
        + '<span style="font-size:12px;font-weight:700;color:var(--navy)">' + score + '</span>'
        + '</div></div>'
        + '<div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:8px">'
        + '<div style="width:'+score+'%;height:100%;background:'+relCol+';border-radius:2px"></div></div>'
        + '<div style="font-size:11px;color:var(--mid);margin-bottom:6px;line-height:1.4">' + esc(op.rationale||'') + '</div>'
        + ((op.example_ucs||[]).length ? '<div style="display:flex;flex-wrap:wrap;gap:4px">'
          + op.example_ucs.map(function(uc){ return '<span style="font-size:9px;padding:1px 6px;background:var(--light);border-radius:8px;color:var(--mid)">' + esc(uc) + '</span>' }).join('')
          + '</div>' : '')
        + '</div>'
    })
    html += '</div>'
  }

  // ── DEMOGRAPHICS ──────────────────────────────────────────────────────────
  if (dem.population_lakh || dem.urban_pct || dem.working_age_pct) {
    html += tpSectionHeader('DEMOGRAPHICS', 'Population structure and workforce potential', '#7C3AED')
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
    var demStats = [
      { l:'Population',    v: dem.population_lakh ? dem.population_lakh+' lakh' : 'N/A' },
      { l:'Urban',         v: dem.urban_pct ? dem.urban_pct+'%' : 'N/A' },
      { l:'Working age',   v: dem.working_age_pct ? dem.working_age_pct+'%' : 'N/A' },
      { l:'Youth (15-29)', v: dem.youth_pct ? dem.youth_pct+'%' : 'N/A' },
      { l:'Dependency',    v: dem.dependency_ratio ? dem.dependency_ratio : 'N/A' },
      { l:'Female workforce', v: dem.female_workforce_pct ? dem.female_workforce_pct+'%' : 'N/A' }
    ]
    demStats.forEach(function(st) {
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center">'
        + '<div style="font-size:10px;color:var(--mid);margin-bottom:4px">' + esc(st.l) + '</div>'
        + '<div style="font-size:16px;font-weight:700;color:var(--navy)">' + esc(String(st.v)) + '</div>'
        + '</div>'
    })
    if ((dem.major_districts||[]).length) {
      html += '<div style="grid-column:1/-1;background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 14px">'
        + '<div style="font-size:10px;color:var(--mid);margin-bottom:6px">Major Districts</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:5px">'
        + dem.major_districts.map(function(d){ return '<span style="font-size:11px;padding:2px 8px;background:var(--light);border-radius:10px;color:var(--navy)">'+esc(d)+'</span>' }).join('')
        + '</div></div>'
    }
    html += '</div>'
  }

  // ── INFRASTRUCTURE ────────────────────────────────────────────────────────
  if (inf.road_km || inf.rail_km || inf.airports || inf.logistics_index) {
    html += tpSectionHeader('INFRASTRUCTURE', 'Physical connectivity and logistics backbone', '#065A82')
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
    var infStats = [
      { l:'Roads',        v: inf.road_km ? Number(inf.road_km).toLocaleString('en-IN')+' km' : 'N/A', rag: inf.road_km>=50000?'rag-green':inf.road_km>=20000?'rag-amber':'' },
      { l:'National Highways', v: inf.nh_km ? Number(inf.nh_km).toLocaleString('en-IN')+' km' : 'N/A', rag:'' },
      { l:'Rail network', v: inf.rail_km ? Number(inf.rail_km).toLocaleString('en-IN')+' km' : 'N/A', rag: inf.rail_km>=5000?'rag-green':inf.rail_km>=1000?'rag-amber':'' },
      { l:'Airports',     v: inf.airports ? inf.airports : 'N/A', rag: inf.airports>=3?'rag-green':inf.airports>=1?'rag-amber':'rag-red' },
      { l:'Logistics Index', v: inf.logistics_index ? inf.logistics_index+'/5' : 'N/A', rag: inf.logistics_index>=3.5?'rag-green':inf.logistics_index>=2.5?'rag-amber':'rag-red' },
      { l:'Logistics rank', v: inf.logistics_index_rank ? '#'+inf.logistics_index_rank : 'N/A', rag:'' },
      { l:'T&D losses', v: inf.power_transmission_loss_pct ? inf.power_transmission_loss_pct+'%' : 'N/A', rag: inf.power_transmission_loss_pct<=15?'rag-green':inf.power_transmission_loss_pct<=25?'rag-amber':'rag-red' },
      { l:'EV charging', v: inf.ev_charging_stations ? Number(inf.ev_charging_stations).toLocaleString('en-IN') : 'N/A', rag:'' }
    ]
    infStats.forEach(function(st) {
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 12px">'
        + '<div style="font-size:10px;color:var(--mid);margin-bottom:3px">' + esc(st.l) + '</div>'
        + '<div style="font-size:13px;font-weight:700;color:var(--navy)">' + esc(String(st.v)) + '</div>'
        + '</div>'
    })
    html += '</div>'
  }

  // ── GEOGRAPHY ─────────────────────────────────────────────────────────────
  if ((geo.advantages||[]).length || (geo.constraints||[]).length) {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'
    if ((geo.advantages||[]).length) {
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px">'
        + '<div style="font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;margin-bottom:8px">&#9989; Geography Advantages</div>'
        + (geo.advantages||[]).map(function(a){ return '<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">'+esc(a)+'</div>' }).join('')
        + '</div>'
    }
    if ((geo.constraints||[]).length) {
      html += '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px">'
        + '<div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;margin-bottom:8px">&#9888; Constraints</div>'
        + (geo.constraints||[]).map(function(a){ return '<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">'+esc(a)+'</div>' }).join('')
        + '</div>'
    }
    html += '</div>'
  }

  // ── POLICY ────────────────────────────────────────────────────────────────
  html += tpSectionHeader('POLICY', 'Named policies converted to AI deployment enablers', '#5B21B6')
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">'
  var polItems = (pol.useable||[])
  if (polItems.length) {
    html += polItems.map(function(item){
      var impCol = item.impact==='high'?'var(--teal)':item.impact==='medium'?'var(--amber)':'var(--mid)'
      return '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:11px 14px;border-left:3px solid '+impCol+'">'
        + '<div style="font-size:11px;color:var(--mid);margin-bottom:3px">Source: '+esc(item.source||'')+'</div>'
        + '<div style="font-size:12px;line-height:1.4">'+esc(item.point||'')+'</div>'
        + '<div style="font-size:10px;color:'+impCol+';font-weight:700;margin-top:4px;text-transform:uppercase">'+esc(item.impact||'')+'</div>'
        + '</div>'
    }).join('')
  } else {
    html += '<div style="font-size:12px;color:var(--mid);grid-column:1/-1">No policy data available</div>'
  }
  html += '</div>'

  // ── PROGRAMMES ────────────────────────────────────────────────────────────
  html += tpSectionHeader('PROGRAMMES', 'Central and state schemes converted to AI leverage points', '#065A82')
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px">'
  var prgItems = (prg.useable||[])
  if (prgItems.length) {
    var typeCol = { funding:'var(--teal)', infrastructure:'var(--blue)', mandate:'var(--orange)', capacity:'var(--amber)' }
    html += prgItems.map(function(item){
      var col = typeCol[item.type] || 'var(--mid)'
      return '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:11px 14px;border-left:3px solid '+col+'">'
        + '<div style="font-size:10px;font-weight:700;color:'+col+';text-transform:uppercase;margin-bottom:3px">'+esc(item.type||'programme')+'</div>'
        + '<div style="font-size:11px;color:var(--mid);margin-bottom:3px">'+esc(item.source||'')+'</div>'
        + '<div style="font-size:12px;line-height:1.4">'+esc(item.point||'')+'</div>'
        + '</div>'
    }).join('')
  } else {
    html += '<div style="font-size:12px;color:var(--mid);grid-column:1/-1">No programme data available</div>'
  }
  html += '</div>'

  // CTA
  html += '<div style="background:#E1F5EE;border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between">'
    + '<div><div style="font-size:13px;font-weight:700;color:var(--navy)">Stage 1 complete. Set your objectives to generate the territory profile.</div>'
    + '<div style="font-size:11px;color:var(--mid)">Select objectives \u2014 no limit. Gemini will auto-profile the territory against them.</div></div>'
    + '<button onclick="tpGoS2()" style="padding:9px 18px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0">Set Objectives &#8594;</button>'
    + '</div>'

  html += '</div>'
  return html
}

function tpSectionHeader(title, sub, col) {
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid '+(col||'var(--border)')+'">'
    + '<div style="width:4px;height:28px;background:'+(col||'var(--navy)')+';border-radius:2px"></div>'
    + '<div><div style="font-size:12px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:'+(col||'var(--navy)')+'">'+title+'</div>'
    + '<div style="font-size:10px;color:var(--mid)">'+sub+'</div></div>'
    + '</div>'
}

function tpCostTile(label, value, indexPct, detail, direction) {
  var rag = indexRag(indexPct)
  var bgMap = { 'rag-green':'#E1F5EE', 'rag-amber':'#FFF8E7', 'rag-red':'#FEE2E2', 'rag-grey':'var(--light)' }
  var colMap = { 'rag-green':'var(--teal)', 'rag-amber':'var(--amber)', 'rag-red':'var(--orange)', 'rag-grey':'var(--mid)' }
  var bg  = bgMap[rag]  || 'var(--light)'
  var col = colMap[rag] || 'var(--mid)'
  return '<div style="background:'+bg+';border-radius:8px;padding:12px 14px;border-left:4px solid '+col+'">'
    + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:4px">'+label+'</div>'
    + '<div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px">'+esc(value)+'</div>'
    + (indexPct ? '<div style="font-size:11px;font-weight:700;color:'+col+'">'+arrow(indexPct)+indexPct+'% of national avg</div>' : '')
    + (detail ? '<div style="font-size:10px;color:var(--mid);margin-top:3px">'+esc(detail)+'</div>' : '')
    + '</div>'
}

function tpStatCard(title, rows, extraHtml) {
  return '<div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 14px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px">'+esc(title)+'</div>'
    + rows.map(function(r){
        var dot = r.rag ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+
          (r.rag==='rag-green'?'var(--teal)':r.rag==='rag-amber'?'var(--amber)':r.rag==='rag-red'?'var(--orange)':'var(--mid)')+
          ';margin-right:5px;flex-shrink:0;margin-top:2px"></span>' : ''
        return '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;border-bottom:1px solid var(--border);gap:8px">'
          + '<span style="font-size:11px;color:var(--mid);flex-shrink:0">'+esc(r.label)+'</span>'
          + '<span style="font-size:11px;font-weight:500;text-align:right;display:flex;align-items:flex-start">'+dot+esc(String(r.val))+'</span>'
          + '</div>'
      }).join('')
    + '</div>'
}

function tpGoS2() { TP.stage = 's2_form'; tpRender() }


//                                                                               
// Stage 2: Objectives + AI Profile Form
//                                                                               

function tpS2Form() {
  var sel = TP.objectives || []
  var html = '<div style="padding:16px 0">'

  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
    + '<button onclick="TP.stage=\'s1_done\';switchTab(\'profile\')" style="padding:5px 12px;border:1px solid var(--border);background:transparent;border-radius:5px;font-size:12px;cursor:pointer">&#8592; Back to intelligence</button>'
    + '<div style="font-size:14px;font-weight:700;color:var(--navy)">' + esc(TP.territory) + '   Set Objectives</div>'
    + '<div style="font-size:11px;color:var(--mid)">Select objectives   no limit</div>'
    + '<span style="margin-left:auto;font-size:12px;font-weight:700;color:' + 'var(--teal)' + '">' + sel.length + ' selected</span>'
    + '</div>'

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'

  // Objectives panel
  html += '<div>'

function tpToggleObj(name) {
  var idx = TP.objectives.indexOf(name)
  if (idx >= 0) {
    TP.objectives.splice(idx, 1)
  } else {
    TP.objectives.push(name)
  }
  tpRender()
  // Auto-save objectives selection (debounced)
  if (TP.s1) setTimeout(tpSaveProfile, 500)
}

async function tpRunS2() {
  var ft = document.getElementById('tp-free-text')
  TP.freeText = ft ? ft.value : ''

  // No-spend check: if S2 already generated for same objectives, reuse it
  if (TP.s2 && TP.s2._objectives_fingerprint) {
    var currentFP = JSON.stringify(TP.objectives.slice().sort())
    if (currentFP === TP.s2._objectives_fingerprint) {
      TP.stage = 's3'
      tpRender()
      showToast('\u21a9 Using saved profile \u2014 objectives unchanged')
      return
    }
  }

  TP.stage = 's2_loading'
  tpRender()

  var result = await callS2(TP.territory, TP.s1, TP.objectives, TP.freeText)
  if (!result.ok) {
    TP.stage = 's2_form'; tpRender()
    setTimeout(function(){ alert('Stage 2 failed: ' + result.error) }, 100)
    return
  }
  TP.s2 = result.data
  // Store objectives fingerprint so we can avoid re-generating for same objectives
  TP.s2._objectives_fingerprint = JSON.stringify(TP.objectives.slice().sort())
  TP.overrides.working   = (TP.s2.working_in_favour || []).map(function(p){ return { text: p.point, metric: p.metric, confidence: p.confidence, removed: false } })
  TP.overrides.attention = (TP.s2.needs_attention   || []).map(function(p){ return { text: p.point, severity: p.severity, mitigation: p.mitigation, removed: false } })
  TP.stage = 's3'
  tpRender()
  // Auto-save full session (objectives + S2 result + overrides)
  setTimeout(tpSaveProfile, 300)
}

function tp2x2Compute(dimScores) {
  // Map dim_scores (0-100) to 2x2 quadrant weights
  var ir = dimScores.infrastructure_readiness  || 50   // infra axis
  var fc = dimScores.fiscal_capacity           || 50
  var ao = dimScores.ai_opportunity_density    || 50   // domain axis
  var wr = dimScores.workforce_readiness       || 50
  var pc = dimScores.political_commercial      || 50
  var cs = dimScores.central_strategic_value   || 50

  // Supplier score: central strategic value + infrastructure readiness → tendency to serve others
  var supplierScore    = (cs * 0.55 + ir * 0.45)
  // Consumer score: political+commercial drive + fiscal capacity → tendency to consume/deploy
  var consumerScore    = (pc * 0.55 + fc * 0.45)
  // Infrastructure advantage: IR + low fiscal pressure (low cost = high advantage)
  var infraAdvantage   = (ir * 0.6 + (100 - fc) * 0.4)
  // Domain advantage: opportunity density + workforce
  var domainAdvantage  = (ao * 0.55 + wr * 0.45)

  // Normalise to 0-1
  var totalRole   = supplierScore + consumerScore  || 1
  var totalAdv    = infraAdvantage + domainAdvantage || 1
  var sS = supplierScore  / totalRole
  var cS = consumerScore  / totalRole
  var iA = infraAdvantage / totalAdv
  var dA = domainAdvantage / totalAdv

  // Quadrant weights = role × advantage
  var q = {
    1: Math.round(sS * iA * 100),   // Supplier × Infra   = Green AI Hub
    2: Math.round(sS * dA * 100),   // Supplier × Domain  = Knowledge Exporter
    3: Math.round(cS * iA * 100),   // Consumer × Infra   = Governance Moderniser
    4: Math.round(cS * dA * 100)    // Consumer × Domain  = Heritage Renaissance
  }

  // Normalise to 100%
  var total = q[1]+q[2]+q[3]+q[4] || 1
  q[1]=Math.round(q[1]/total*100); q[2]=Math.round(q[2]/total*100)
  q[3]=Math.round(q[3]/total*100); q[4]=Math.round(q[4]/total*100)
  // Fix rounding
  var diff = 100 - (q[1]+q[2]+q[3]+q[4])
  var maxQ = Object.keys(q).reduce(function(a,b){ return q[a]>q[b]?a:b }, '1')
  q[maxQ] = (q[maxQ]||0) + diff

  // Sort by weight
  var sorted = [1,2,3,4].map(function(k){ return {q:k, pct:q[k]} }).sort(function(a,b){ return b.pct-a.pct })
  return { weights: q, sorted: sorted, dominant: sorted[0].q, supporting: sorted[1].q }
}

  var viabBg  = { excellent:'#E1F5EE',strong:'#E1F5EE',viable:'#FFF8E7',challenging:'#FEE2E2',not_recommended:'#FEE2E2' }

  // Compute archetype match
  var dimScores = TP.s2.dim_scores || {}
  var dims = Object.keys(dimScores)
  var archVecs = {}
  TP.archetypes.forEach(function(a){
    var key = a.code || a.id
    archVecs[key]={}; dims.forEach(function(d){ archVecs[key][d]=0 })
  })
  TP.archetype_dims.forEach(function(d){
    var dk = d.archetype_code || d.archetype_id; if(archVecs[dk]) archVecs[dk][d.dimension]=parseFloat(d.score)||0
  })
  var matches = TP.archetypes.map(function(a){
    var key = a.code || a.id
    var ssq=0
    dims.forEach(function(d){
      var av=((parseFloat(dimScores[d])||0)/100)*4+1
      var bv=parseFloat((archVecs[key]&&archVecs[key][d]))||3
      ssq+=Math.pow(av-bv,2)
    })
    var mxd=Math.sqrt(dims.length*16),dist=Math.sqrt(ssq)
    var score=mxd>0?Math.max(0,1-dist/mxd):0
    return {arch:a,score:isNaN(score)?0:score}
  }).sort(function(a,b){return b.score-a.score})

//    Feasibility grid                                                           
function tpFeasibilityGrid() {
  var p = TP.s1
  if (!p || !TP.objectives.length) return ''

  // Situation signals (from Stage 1 data)
  var e = p.hard_stats && p.hard_stats.energy  || {}
  var w = p.hard_stats && p.hard_stats.water   || {}
  var l = p.hard_stats && p.hard_stats.land    || {}
  var k = p.hard_stats && p.hard_stats.workers || {}
  var d = p.hard_stats && p.hard_stats.digital || {}

  var signals = [
    { label:'Power supply', val: e.status, enabler: 'surplus', risk: 'deficit' },
    { label:'Power cost', val: e.tariff_index_pct<=85?'competitive':e.tariff_index_pct>=115?'expensive':'average', enabler:'competitive',risk:'expensive' },
    { label:'Water stress', val: w.stress_index, enabler:'low', risk:'critical' },
    { label:'DC cooling', val: w.dc_cooling, enabler:'high', risk:'low' },
    { label:'Land availability', val: l.govt_land, enabler:'high', risk:'low' },
    { label:'Skilled labour', val: k.skilled_labour, enabler:'abundant', risk:'scarce' },
    { label:'Digital infra', val: d.internet_pct>=60?'strong':d.internet_pct>=35?'adequate':'weak', enabler:'strong',risk:'weak' },
  ]

  // Objective   signal relevance map (which signals matter for which objectives)
  var relevanceMap = {
    'Sovereign AI Centre of Excellence':         ['Power supply','Power cost','Water stress','DC cooling','Land availability','Skilled labour','Digital infra'],
    'High-Performance Computing Hub':            ['Power supply','Power cost','Water stress','DC cooling','Land availability'],
    'Edge AI & Rural Connectivity':              ['Digital infra','Power supply'],
    'Agricultural Modernisation & Food Security':['Skilled labour','Digital infra','Water stress'],
    'Industrial & Manufacturing AI':             ['Power supply','Power cost','Skilled labour'],
    'e-Governance & Citizen Service Delivery':   ['Digital infra','Skilled labour'],
    'Disaster & Emergency Management':           ['Digital infra','Power supply'],
    'Water Resource Management':                 ['Water stress','Digital infra'],
    'Healthcare AI & Telemedicine':              ['Digital infra','Skilled labour'],
  }

  function cellRag(signal, objName) {
    var relMap = relevanceMap[objName]
    if (!relMap || relMap.indexOf(signal.label) < 0) {
      return { bg:'#f9f9f9', col:'var(--mid)', text:'' }  // not relevant
    }
    var v = signal.val
    if (v === signal.enabler) return { bg:'#E1F5EE', col:'var(--teal)', text:'&#9679;' }
    if (v === signal.risk)    return { bg:'#FEE2E2', col:'var(--orange)', text:'&#9675;' }
    return { bg:'#FFF8E7', col:'var(--amber)', text:'&#9677;' }
  }

  var html = '<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;overflow-x:auto">'
    + '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px">Feasibility Matrix   Situation vs Objectives</div>'
    + '<div style="font-size:10px;color:var(--mid);margin-bottom:8px">&#9679; Enabler &nbsp; &#9677; Neutral &nbsp; &#9675; Risk &nbsp; Grey = not directly relevant</div>'

  // Header row
  html += '<table style="width:100%;border-collapse:collapse;font-size:10px">'
    + '<tr><th style="text-align:left;padding:5px 8px;background:var(--navy);color:#fff;border-radius:4px 0 0 0;min-width:120px">Situation Signal</th>'
    + '<th style="text-align:center;padding:4px 6px;background:var(--navy);color:#fff;font-size:9px">Value</th>'
    + TP.objectives.map(function(o){
        return '<th style="text-align:center;padding:4px 6px;background:var(--navy);color:#fff;font-size:9px;max-width:80px">'
          + esc(o.length>20?o.substring(0,18)+'..':o) + '</th>'
      }).join('')
    + '</tr>'

  // Signal rows
  signals.forEach(function(sig, ri){
    html += '<tr style="background:'+(ri%2===0?'#fff':'var(--light)')+'">'
      + '<td style="padding:6px 8px;font-size:11px;border-bottom:1px solid var(--border)">' + esc(sig.label) + '</td>'
      + '<td style="text-align:center;padding:6px 4px;font-size:10px;font-weight:600;border-bottom:1px solid var(--border);color:'
        + (sig.val===sig.enabler?'var(--teal)':sig.val===sig.risk?'var(--orange)':'var(--mid)') + '">'
        + esc(String(sig.val||'N/A')) + '</td>'
      + TP.objectives.map(function(obj){
          var c = cellRag(sig, obj)
          return '<td style="text-align:center;padding:6px;background:'+c.bg+';border-bottom:1px solid var(--border);font-size:14px;color:'+c.col+'">'+c.text+'</td>'
        }).join('')
      + '</tr>'
  })

  html += '</table></div>'
  return html
}

function tpAddPoint(type) {

  if (!text || !text.trim()) return
  TP.overrides[type].push({ text: text.trim(), removed: false, confidence: 'medium', severity: 'moderate' })
  tpRender()
  if (TP.s2) setTimeout(tpSaveProfile, 300)
}

async function init() {
  var sb = getSB()
  // Init atlasAI for inline profile generation
  if (typeof atlasAI !== 'undefined' && atlasAI.init) {
    try { await atlasAI.init(sb.url, sb.key) } catch(e) { console.warn('[ATLAS] atlasAI init failed:', e.message) }
  }
  // Pre-load TP archetypes
  if (typeof loadTPData === 'function') {
    loadTPData().catch(function(e){ console.warn('[TP] archetypes load failed:', e.message) })
  }
  if (!sb.url) {
    document.getElementById('sb-customers').innerHTML = '<div class="sb-empty">Configure Supabase in Settings first</div>'
    return
  }
  var [custs, engs, ucs] = await Promise.all([
    sbGet('customers', 'order=name.asc'),
    sbGet('engagements', 'order=name.asc'),
    sbGet('uc_library', 'status=eq.active&order=cluster.asc,uc_name.asc')
  ])
  ALL_CUSTOMERS    = custs || []
  ALL_ENGAGEMENTS  = engs  || []
  UC_LIBRARY       = ucs   || []
  renderSidebar('')

  // Auto-open from URL param
  var params = new URLSearchParams(window.location.search)
  var engId = params.get('eng')
  if (engId) {
    var eng = ALL_ENGAGEMENTS.find(function(e){ return e.id === engId })
    if (eng) openEngagement(eng)
  }
}

function filterSidebar(q) { renderSidebar(q) }

function renderSidebar(q) {
  var el = document.getElementById('sb-customers')
  q = (q||'').toLowerCase()
  var custs = ALL_CUSTOMERS.filter(function(c){
    return !q || c.name.toLowerCase().includes(q)
  })
  if (!custs.length) {
    el.innerHTML = '<div class="sb-empty">No customers found</div>'
    return
  }
  var html = ''
  custs.forEach(function(c) {
    var cEngs = ALL_ENGAGEMENTS.filter(function(e){ return e.customer_id === c.id })
    var isActive = CURRENT_ENG && cEngs.some(function(e){ return e.id === CURRENT_ENG.id })
    html += '<div class="sb-section" style="margin-top:4px">'
      + '<span style="font-size:11px;font-weight:600;color:var(--dark)">' + esc(c.name) + '</span>'
      + '<button onclick="openNewEngModal(\'' + c.id + '\')" title="New engagement">+</button>'
      + '</div>'
    if (!cEngs.length) {
      html += '<div class="sb-empty" style="padding:4px 14px">No engagements yet</div>'
    }
    cEngs.forEach(function(e) {
      var active = CURRENT_ENG && CURRENT_ENG.id === e.id
      var typeLabel = { tsap:'TSAP', vertical:'Vertical', enterprise:'Enterprise', csp:'CSP', generic:'Generic' }[e.type] || e.type || ''
      html += '<div class="sb-item' + (active?' active':'') + '" onclick="openEngagement(' + JSON.stringify(e).replace(/"/g,'&quot;') + ')">'

        + (typeLabel ? '<span class="sb-badge badge-tsap">' + esc(typeLabel) + '</span>' : '')
        + '</div>'
    })
  })
  el.innerHTML = html
}

//    Open Engagement                                                            
async function openEngagement(eng) {
  CURRENT_ENG = eng
  ACTIVE_TAB = 'overview'

  // Get docket_id from engagements.docket_id or engagement_dockets table
  var docketId = eng.docket_id
  if (!docketId) {
    var dockets = await sbGet('engagement_dockets', 'engagement_id=eq.' + eng.id + '&order=created_at.desc', 1)
    if (dockets && dockets[0]) docketId = dockets[0].id
  }
  CURRENT_DOCKET_ID = docketId

  // Load docket items
  DOCKET_ITEMS = docketId
    ? (await sbGet('docket_items', 'docket_id=eq.' + docketId + '&order=sort_order.asc,created_at.asc')) || []
    : []

  // Derive territory preset key from stored states
  if (eng.territory_states && eng.territory_states.length) {
    var stateStr = JSON.stringify(eng.territory_states.slice().sort())
    if (typeof atlasMap !== 'undefined') {
      Object.keys(atlasMap.PRESETS).forEach(function(k) {
        var pStates = JSON.stringify(atlasMap.PRESETS[k].states.slice().sort())
        if (pStates === stateStr) eng._territoryPreset = k
      })
    }
  }

  // Load customer
  var cust = ALL_CUSTOMERS.find(function(c){ return c.id === eng.customer_id }) || {}
  CURRENT_ENG._cust = cust

  // Reset new tab state when opening a new engagement
  PORTFOLIO_SELECTION = []
  MAAS_MODELS_SELECTED = []
  INTEL_ITEMS = []
  MC_ROWS_D = []
  MC_LOAD_D = ''
  AGENT_ON = false
  window.MAAS_ARCHS = []
  window.PROFILE_DATA = null
  // Load portfolio selection if saved as docket_item
  if (CURRENT_DOCKET_ID) {
    var piItems = DOCKET_ITEMS.filter(function(i){ return i.item_subtype === 'portfolio_selection' || i.item_type === 'portfolio_selection' })
    if (piItems.length) {
      try { var d = JSON.parse(piItems[0].data||'{}'); PORTFOLIO_SELECTION = d.items || [] } catch(e) {}
    }
    var maasItems = DOCKET_ITEMS.filter(function(i){ return i.item_subtype === 'maas_config' || i.item_type === 'maas_config' })
    if (maasItems.length) {
      try {
        var md = JSON.parse(maasItems[0].data||'{}')
        window.MAAS_ARCHS = md.archetypes || []
        AGENT_ON = md.agent_enabled || false
        MAAS_MODELS_SELECTED = md.models || []
      } catch(e) {}
    }
  }
  renderSidebar(document.getElementById('sb-search').value)
  renderDocket()
}

  var cust = eng._cust || {}

  var statusClass = statusLabel === 'active' ? 'badge-active' : 'badge-new'

  // Count items by section
  var counts = { uc:0, action:0, output:0 }
  DOCKET_ITEMS.forEach(function(item) {

    if (s === 'uc') counts.uc++
    else if (s === 'action') counts.action++
    else if (s === 'output') counts.output++

    + (cust.location ? '<span>&#128205; ' + esc(cust.location) + '</span>' : '')

    + '</div></div>'
    + '<div class="docket-hdr-actions">'
    + '<button class="btn btn-sm btn-outline" onclick="openSASC()">&#9881; SASC</button>'
    + '<button class="btn btn-sm btn-teal" onclick="openFM()">&#128184; Financial Model</button>'

    // Tab bar

    + (function() {
        var tabs = ['overview','profile','portfolio']
        var eng = CURRENT_ENG || {}
        var _et = eng.engagement_type || eng.type || ''
        // UC tab — visible when portfolio has any non-service items
        var hasUCScope = PORTFOLIO_SELECTION.some(function(p){ return !['L2-MAAS','L2-GPUAAS','L2-BMAAS'].includes(p) })
        if (hasUCScope || !PORTFOLIO_SELECTION.length) tabs.push('uc')
        // Service Model tab — visible when any service offering selected
        var hasSvc = ['L2-MAAS','L2-GPUAAS','L2-BMAAS'].some(function(p){ return PORTFOLIO_SELECTION.includes(p) })
        if (hasSvc) tabs.push('svcmodel')
        // Territory tab — TSAP only
        if (_et==='TSAP'||_et==='tsap') tabs.push('territory')
        tabs = tabs.concat(['actions','outputs','history'])
        return tabs
      }()).map(function(t) {
        var labels = { overview:'Overview', profile:'Profile & Intelligence', portfolio:'Portfolio', uc:'Use Cases', svcmodel:'Service Model', territory:'Territory', actions:'Actions', outputs:'Outputs', history:'History' }
        var cnt = t === 'uc' ? counts.uc : t === 'actions' ? counts.action : t === 'outputs' ? counts.output : 0
        return '<button class="tab-btn' + (ACTIVE_TAB===t?' active':'') + '" onclick="switchTab(\'' + t + '\')">'
          + labels[t]
          + (cnt > 0 ? '<span class="tab-count">' + cnt + '</span>' : '')
          + '</button>'
      }).join('')
    + '</div>'

    // Tab content
    + '<div class="tab-content" id="tab-body">'
    + renderTab(ACTIVE_TAB)
    + '</div>'

  var _ma = document.getElementById('main-area'); _ma.innerHTML = html; _ma.scrollTop = 0; setTimeout(function() {
    var btn = document.getElementById('btn-fill-req')
    if (btn) {
      btn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); editRequirements(); return false; }
    }
  }, 100)
}

function switchTab(tab) {
  ACTIVE_TAB = tab
  var el = document.getElementById('tab-body')
  if (el) { el.innerHTML = renderTab(tab); setTimeout(wireTabEvents, 50) }
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.className = 'tab-btn' + (b.textContent.trim().toLowerCase().startsWith(tab) ? ' active' : '')
  })
  // Re-render full docket to update tab active states
  renderDocket()
}
function wireTabEvents() {
  var btn = document.getElementById('btn-fill-req')
  if (btn) {
    btn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); editRequirements(); return false; }
  }
}

  return ''
}

function getStrategyItems() {
  var strat = DOCKET_ITEMS.filter(function(i){ return i.section === 'strategy' })

  var obj = {}
  strat.forEach(function(i){ obj[i.item_type] = i.notes || i.title || '' })

function renderStrategyPreview() {
  var strat = getStrategyItems()

  var html = ''
  if (strat.position) html += '<div class="strat-block"><div class="strat-label">Our position</div><div class="strat-text">' + esc(strat.position) + '</div></div>'
  if (strat.pitch)    html += '<div class="strat-block"><div class="strat-label">Key pitch</div><div class="strat-text">' + esc(strat.pitch) + '</div></div>'

function openStrategyModal() {
  var strat = getStrategyItems() || {}
  document.getElementById('strat-position').value = strat.position || ''
  document.getElementById('strat-pitch').value    = strat.pitch    || ''
  document.getElementById('strat-watch').value    = strat.watch    || ''
  openModal('modal-strategy')
}

async function saveStrategy() {
  var position = document.getElementById('strat-position').value.trim()
  var pitch    = document.getElementById('strat-pitch').value.trim()
  var watch    = document.getElementById('strat-watch').value.trim()
  var docketId = CURRENT_DOCKET_ID
  if (!docketId) { showToast('No docket found for this engagement', 'err'); return }

  // Upsert each strategy item
  var items = [
    { type: 'position', text: position },
    { type: 'pitch',    text: pitch },
    { type: 'watch',    text: watch },
  ]
  for (var i = 0; i < items.length; i++) {
    var it = items[i]
    var existing = DOCKET_ITEMS.find(function(d){ return d.section === 'strategy' && d.item_type === it.type })
    if (existing) {
      await sbPatch('docket_items', 'id=eq.' + existing.id, { notes: it.text, updated_at: new Date().toISOString() })
    } else if (it.text) {
      var row = { id: genId('DI'), docket_id: docketId, section: 'strategy', item_type: it.type, title: 'Strategy   ' + it.type, notes: it.text, status: 'active', created_by: 'ATLAS' }
      await sbPost('docket_items', row)
    }
  }
  closeModal('modal-strategy')
  await refreshItems()
  showToast('Strategy saved')
  renderDocket()
}

function openUCModal() {
  UC_MODAL_FILTER = 'all'
  renderUCModalContent('')
  openModal('modal-uc')
}

function filterUCModal(q) { renderUCModalContent(q) }

function renderUCModalContent(q) {
  var already = DOCKET_ITEMS.filter(function(i){ return i.section === 'uc' }).map(function(i){ return i.ref_id })
  var clusters = []
  UC_LIBRARY.forEach(function(u){ if(u.cluster && clusters.indexOf(u.cluster)<0) clusters.push(u.cluster) })
  clusters.sort()

  // Cluster filter
  var clusterHtml = '<button onclick="UC_MODAL_FILTER=\'all\';renderUCModalContent(document.getElementById(\'uc-search\').value)" style="padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:' + (UC_MODAL_FILTER==='all'?700:500) + ';border:1px solid ' + (UC_MODAL_FILTER==='all'?'var(--navy)':'var(--border)') + ';background:' + (UC_MODAL_FILTER==='all'?'var(--navy)':'transparent') + ';color:' + (UC_MODAL_FILTER==='all'?'#fff':'var(--mid)') + '">All</button>'
  clusters.forEach(function(c) {
    var on = UC_MODAL_FILTER === c
    clusterHtml += '<button onclick="UC_MODAL_FILTER=\'' + esc(c) + '\';renderUCModalContent(document.getElementById(\'uc-search\').value)" style="padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:' + (on?700:500) + ';border:1px solid ' + (on?'var(--navy)':'var(--border)') + ';background:' + (on?'var(--navy)':'transparent') + ';color:' + (on?'#fff':'var(--mid)') + '">' + esc(c) + '</button>'
  })
  document.getElementById('uc-modal-clusters').innerHTML = clusterHtml

  // UC list
  var filtered = UC_LIBRARY.filter(function(u) {
    if (UC_MODAL_FILTER !== 'all' && u.cluster !== UC_MODAL_FILTER) return false
    if (q && !u.uc_name.toLowerCase().includes(q.toLowerCase())) return false
    return true
  })
  var listHtml = ''
  filtered.forEach(function(u) {
    var inDocket = already.indexOf(u.id) >= 0
    var cmap = { simple:'var(--teal)', medium:'var(--mid)', complex:'var(--orange)', research:'#8B5CF6' }
    var cc = u.complexity ? (cmap[u.complexity]||'var(--mid)') : 'var(--mid)'
    listHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer" onclick="' + (inDocket ? '' : 'addUCToDocket(\'' + u.id + '\')') + '">'
      + '<div style="flex:1">'
      + '<div style="font-size:13px;font-weight:500' + (inDocket?';color:var(--mid)':'') + '">' + esc(u.uc_name) + '</div>'
      + '<div style="font-size:11px;color:var(--mid);margin-top:2px">' + esc(u.cluster||'') + (u.complexity ? ' &bull; <span style="color:'+cc+'">'+u.complexity+'</span>' : '') + '</div>'
      + '</div>'
      + (inDocket
          ? '<span style="font-size:11px;color:var(--teal);font-weight:600">&#10003; Added</span>'
          : '<button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="event.stopPropagation();addUCToDocket(\'' + u.id + '\')">+ Add</button>')
      + '</div>'
  })
  if (!listHtml) listHtml = '<div class="empty"><div class="empty-sub">No UCs match</div></div>'
  document.getElementById('uc-modal-list').innerHTML = listHtml
}

async function addUCToDocket(ucId) {
  if (!CURRENT_DOCKET_ID) { showToast('No docket for this engagement', 'err'); return }
  var uc = UC_LIBRARY.find(function(u){ return u.id === ucId }) || {}
  var row = {
    id: genId('DI'), docket_id: CURRENT_DOCKET_ID,
    section: 'uc', item_type: 'use_case',
    title: uc.uc_name || ucId,
    ref_table: 'uc_library', ref_id: ucId,
    status: 'proposed', created_by: 'ATLAS'
  }
  var ok = await sbPost('docket_items', row)
  if (ok) {
    DOCKET_ITEMS.push(row)
    showToast('UC added to docket')
    renderUCModalContent(document.getElementById('uc-search').value)
    refreshItems()
  } else {
    showToast('Failed to add UC', 'err')
  }
}

async function setUCStatus(itemId, status) {
  await sbPatch('docket_items', 'id=eq.' + itemId, { status: status })
  var item = DOCKET_ITEMS.find(function(i){ return i.id === itemId })
  if (item) item.status = status
  renderDocket()
}

async function removeUC(itemId) {
  await sbDelete('docket_items', 'id=eq.' + itemId)
  DOCKET_ITEMS = DOCKET_ITEMS.filter(function(i){ return i.id !== itemId })
  renderDocket()
}

function renderActionRows() {
  var tbody = document.getElementById('actions-tbody')
  if (!tbody) return
  var actions = DOCKET_ITEMS.filter(function(i){ return i.section === 'action' })
  tbody.innerHTML = actions.map(function(item) {
    var rag    = item.rag || 'amber'
    var status = item.status || 'open'
    var isDone = status === 'done'
    var isOverdue = item.due_date && !isDone && new Date(item.due_date) < new Date()
    var ragColors  = { red:['#FEE2E2','#991B1B'], amber:['#FFF8E7','#92400E'], green:['#D1FAE5','#065F46'] }
    var statColors = { open:['#EFF3FF','#1C38F5'], wip:['#FFF8E7','#92400E'], done:['#D1FAE5','#065F46'], blocked:['#FEE2E2','#991B1B'] }
    var rc = ragColors[rag]  || ragColors.amber
    var sc = statColors[status] || statColors.open
    return '<tr data-id="' + esc(item.id) + '" style="border-bottom:1px solid var(--border);' + (isDone?'opacity:.55':'') + '">'
      + '<td style="padding:10px;max-width:320px">'
      + '<div style="font-size:12px;color:var(--dark);line-height:1.4;' + (isDone?'text-decoration:line-through;color:var(--mid)':'') + '">' + esc(item.title||item.text||'') + '</div>'
      + (item.notes ? '<div style="font-size:10px;color:var(--mid);margin-top:3px">' + esc(item.notes) + '</div>' : '')
      + '</td>'
      + '<td style="padding:10px;white-space:nowrap;font-size:11px;color:var(--mid)">' + esc(item.assigned_to||item.owner||'—') + '</td>'
      + '<td style="padding:10px;white-space:nowrap;font-size:11px;' + (isOverdue?'color:#991B1B;font-weight:600':'color:var(--mid)') + '">'
      + (item.due_date ? (isOverdue?'⚠ ':'') + fmtDate(item.due_date) : '—') + '</td>'
      + '<td style="padding:10px">'
      + '<select data-id="' + esc(item.id) + '" onchange="setActionStatus(this.dataset.id,this.value)" style="padding:3px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:' + sc[0] + ';color:' + sc[1] + ';font-weight:600;cursor:pointer">'
      + ['open','wip','done','blocked'].map(function(v){ return '<option value="' + v + '"' + (status===v?' selected':'') + '>' + v.toUpperCase() + '</option>' }).join('')
      + '</select></td>'
      + '<td style="padding:10px;text-align:center">'
      + '<div data-id="' + esc(item.id) + '" onclick="cycleRAG(this.dataset.id)" title="Click to cycle R/A/G" style="width:28px;height:28px;border-radius:50%;background:' + rc[0] + ';display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid ' + rc[1] + ';font-size:11px;font-weight:700;color:' + rc[1] + '">' + rag.charAt(0).toUpperCase() + '</div></td>'
      + '<td style="padding:10px;text-align:right;white-space:nowrap">'
      + '<button data-id="' + esc(item.id) + '" onclick="editAction(this.dataset.id)" style="padding:3px 8px;background:var(--light);border:1px solid var(--border);border-radius:4px;font-size:10px;cursor:pointer;margin-right:4px">&#9998;</button>'
      + '<button data-id="' + esc(item.id) + '" onclick="deleteAction(this.dataset.id)" style="padding:3px 8px;background:var(--light);border:1px solid var(--border);border-radius:4px;font-size:10px;cursor:pointer;color:#991B1B">&#10005;</button>'
      + '</td></tr>'
  }).join('')
}







async function setActionStatus(id, status) {
  var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
  if (!item) return
  item.status = status
  await sbPatch('docket_items', 'id=eq.'+id, { status: status })
  switchTab('actions')
}

async function cycleRAG(id) {
  var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
  if (!item) return
  var cycle = { amber:'green', green:'red', red:'amber' }
  item.rag = cycle[item.rag||'amber'] || 'amber'
  await sbPatch('docket_items', 'id=eq.'+id, { rag: item.rag })
  switchTab('actions')
}

function exportActionsExcel() {
  var eng = CURRENT_ENG || {}
  var actions = DOCKET_ITEMS.filter(function(i){ return i.section === 'action' })
  if (!actions.length) { showToast('No actions to export'); return }
  if (typeof atlasExport === 'undefined') { showToast('Export library not loaded'); return }
  atlasExport.actionsExcel(actions.map(function(a) {
    return {
      title:       a.title || a.text || '',
      owner:       a.assigned_to || a.owner || '',
      target_date: a.due_date || a.target_date || '',
      status:      (a.status||'open').toUpperCase(),
      rag:         (a.rag||'Amber').charAt(0).toUpperCase() + (a.rag||'amber').slice(1),
      notes:       a.notes || ''
    }
  }), eng.name || eng.opportunity_name || 'Engagement')
  showToast('✓ Actions exported to Excel')
}

function renderActionList(actions) {
  if (!actions.length) return '<div style="font-size:12px;color:var(--mid);padding:8px 0">None</div>'
  var now = new Date()
  var html = '<div class="action-list">'
  actions.forEach(function(item) {
    var done = item.status === 'done'
    var blocked = item.status === 'blocked'
    var dotClass = done ? 'dot-done' : blocked ? 'dot-blocked' : 'dot-open'
    var due = item.due_date ? new Date(item.due_date) : null
    var overdue = due && due < now && !done
    html += '<div class="action-item' + (done?' done':'') + '">'
      + '<div class="status-dot ' + dotClass + '"></div>'
      + '<div class="action-text">' + esc(item.title||item.notes||'')
      + (item.notes && item.title && item.notes !== item.title ? '<div style="font-size:11px;color:var(--mid);margin-top:2px">' + esc(item.notes) + '</div>' : '')
      + '</div>'
      + '<div class="action-meta">'
      + (item.assigned_to ? '<span class="owner-badge">' + esc(item.assigned_to) + '</span>' : '')
      + (due ? '<span class="due-label' + (overdue?' due-overdue':'') + '">' + fmtDate(item.due_date) + (overdue?' &#9888;':'') + '</span>' : '')
      + (!done ? '<button class="icon-btn" onclick="completeAction(\'' + item.id + '\')" title="Mark done">&#10003;</button>' : '')
      + '<button class="icon-btn" onclick="editAction(\'' + item.id + '\')" title="Edit">&#9998;</button>'
      + '<button class="icon-btn" onclick="deleteAction(\'' + item.id + '\')" title="Delete" style="color:var(--orange)">&#215;</button>'
      + '</div></div>'
  })
  html += '</div>'
  return html
}

function openActionModal(prefill) {
  document.getElementById('action-modal-title').textContent = 'Add Action'
  document.getElementById('action-id').value = ''
  document.getElementById('action-text').value = prefill || ''
  document.getElementById('action-owner').value = ''
  document.getElementById('action-due').value = ''
  document.getElementById('action-notes').value = ''
  openModal('modal-action')
}

function editAction(id) {
  var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
  if (!item) return
  document.getElementById('action-modal-title').textContent = 'Edit Action'
  document.getElementById('action-id').value = id
  document.getElementById('action-text').value = item.title || ''
  document.getElementById('action-owner').value = item.assigned_to || ''
  document.getElementById('action-due').value = item.due_date ? item.due_date.slice(0,10) : ''
  document.getElementById('action-notes').value = item.notes || ''
  openModal('modal-action')
}

async function saveAction() {
  var id = document.getElementById('action-id').value
  var title = document.getElementById('action-text').value.trim()
  if (!title) { showToast('Action text is required', 'err'); return }
  var data = {
    title: title,
    assigned_to: document.getElementById('action-owner').value.trim() || null,
    due_date: document.getElementById('action-due').value || null,
    rag: 'amber',
    notes: document.getElementById('action-notes').value.trim() || null
  }
  if (id) {
    await sbPatch('docket_items', 'id=eq.' + id, data)
    var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
    if (item) Object.assign(item, data)
    showToast('Action updated')
  } else {
    if (!CURRENT_DOCKET_ID) { showToast('No docket', 'err'); return }
    var row = Object.assign({ id: genId('DI'), docket_id: CURRENT_DOCKET_ID, section: 'action', item_type: 'action', status: 'open', created_by: 'ATLAS' }, data)
    await sbPost('docket_items', row)
    DOCKET_ITEMS.push(row)
    showToast('Action added')
  }
  closeModal('modal-action')
  renderDocket()
}

async function completeAction(id) {
  await sbPatch('docket_items', 'id=eq.' + id, { status: 'done' })
  var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
  if (item) item.status = 'done'
  renderDocket()
}

async function deleteAction(id) {
  await sbDelete('docket_items', 'id=eq.' + id)
  DOCKET_ITEMS = DOCKET_ITEMS.filter(function(i){ return i.id !== id })
  renderDocket()
}

//    Outputs                                                                    
function renderOutputsTab() {
  var outputs = DOCKET_ITEMS.filter(function(i){ return i.section === 'output' })
  var html = '<div class="section-hdr"><div class="section-title">Outputs & documents (' + outputs.length + ')</div></div>'

  if (!outputs.length) {
    return html + '<div class="empty"><div class="empty-icon">&#128196;</div>'
      + '<div class="empty-title">No outputs yet</div>'
      + '<div class="empty-sub">Outputs from SASC, FM, PEI, and documents appear here automatically</div></div>'
  }

  var iconMap = { solution:'&#9881;', pei:'&#129488;', tsap_fm:'&#128184;', exec_doc:'&#128196;', intel:'&#128270;', use_case:'&#128161;', default:'&#128196;' }
  var labelMap = { solution:'SASC Stack Config', pei:'Pre-Engagement Intelligence', tsap_fm:'TSAP Financial Model', exec_doc:'Document', intel:'Intelligence Signal', use_case:'Use Case' }

  html += '<div class="output-list">'
  outputs.forEach(function(item) {
    var icon = iconMap[item.item_type] || iconMap.default
    var typeLabel = labelMap[item.item_type] || item.item_type || 'Output'
    var done = item.status === 'done'
    var tool_url = getToolUrl(item)
    html += '<div class="output-item">'
      + '<div class="output-icon">' + icon + '</div>'
      + '<div class="output-info">'
      + '<div class="output-name' + (done?' uc-agreed':'')+'">' + esc(item.title||typeLabel) + (done?' <span style="font-size:10px;color:var(--teal)">&#10003; Done</span>' : '') + '</div>'
      + '<div class="output-meta">' + typeLabel + (item.created_at ? ' &bull; ' + fmtDate(item.created_at) : '') + (item.created_by ? ' &bull; ' + esc(item.created_by) : '') + '</div>'
      + '</div>'
      + (tool_url ? '<a href="' + tool_url + '" class="output-action">Open &rarr;</a>' : '')
      + '</div>'
  })
  html += '</div>'
  return html
}

function getToolUrl(item) {
  var eng = CURRENT_ENG
  var engParam = eng ? '?eng=' + eng.id : ''
  if (item.item_type === 'solution') return '../../tools/sasc/index.html' + engParam
  if (item.item_type === 'tsap_fm')  return '../../tools/tsap-financial-model/index.html' + engParam
  if (item.ref_table === 'pei_cache') return '../../tools/pei-tool/index.html'
  return ''
}

//    History                                                                    
function renderHistoryTab() {
  var sorted = DOCKET_ITEMS.slice().sort(function(a,b){ return new Date(b.created_at||0) - new Date(a.created_at||0) })
  if (!sorted.length) return '<div class="empty"><div class="empty-icon">&#128336;</div><div class="empty-title">No history yet</div></div>'
  var html = '<div class="card">'
  sorted.forEach(function(item) {
    var recent = item.created_at && (Date.now() - new Date(item.created_at)) < 7*24*3600*1000
    var sectionLabel = { uc:'Use Case', action:'Action', output:'Output', strategy:'Strategy', profile:'Profile', note:'Note' }[item.section] || item.section || ''
    html += '<div class="hist-item">'
      + '<div class="hist-dot' + (recent?' recent':'') + '"></div>'
      + '<div class="hist-text">' + (sectionLabel?'<strong>'+esc(sectionLabel)+':</strong> ':'') + esc(item.title||item.notes||'Item') + '</div>'
      + '<div class="hist-date">' + fmtDate(item.created_at) + '</div>'
      + '</div>'
  })
  html += '</div>'
  return html
}

//    Refresh                                                                    
async function refreshItems() {
  if (!CURRENT_DOCKET_ID) return
  DOCKET_ITEMS = (await sbGet('docket_items', 'docket_id=eq.' + CURRENT_DOCKET_ID + '&order=sort_order.asc,created_at.asc')) || []
}

//    Create customer                                                            
function openNewCustomerModal() {
  document.getElementById('cust-name').value = ''
  document.getElementById('cust-type').value = 'state_govt'
  document.getElementById('cust-location').value = ''
  document.getElementById('cust-contact').value = ''

}

async function saveCustomer() {
  var name = document.getElementById('cust-name').value.trim()
  if (!name) { showToast('Name required', 'err'); return }
  var row = {
    id: genId('CUST'),
    name: name,
    type: document.getElementById('cust-type').value,
    location: document.getElementById('cust-location').value.trim() || null,
    primary_contact: document.getElementById('cust-contact').value.trim() || null,
    created_at: new Date().toISOString()
  }
  var ok = await sbPost('customers', row)

//    Create engagement                                                          
function openNewEngModal(custId) {
  document.getElementById('eng-cust-id').value = custId
  document.getElementById('eng-name').value = ''
  document.getElementById('eng-type').value = 'tsap'
  document.getElementById('eng-owner').value = ''
  document.getElementById('eng-cover').value = ''
  openModal('modal-engagement')
}

async function saveEngagement() {
  var name = document.getElementById('eng-name').value.trim()
  if (!name) { showToast('Name required', 'err'); return }
  var custId = document.getElementById('eng-cust-id').value
  var docketId = genId('DOC')
  var row = {
    id: genId('ENG'),
    name: name,
    customer_id: custId,
    type: document.getElementById('eng-type').value,
    owner: document.getElementById('eng-owner').value.trim() || null,
    cover_note: document.getElementById('eng-cover').value.trim() || null,
    status: 'active',
    docket_id: docketId,
    version: 1,
    opened_at: new Date().toISOString()
  }
  var ok = await sbPost('engagements', row)
  if (ok) {
    // Create docket record
    await sbPost('engagement_dockets', { id: docketId, engagement_id: row.id, created_at: new Date().toISOString() })
    ALL_ENGAGEMENTS.push(row)
    closeModal('modal-engagement')
    var cust = ALL_CUSTOMERS.find(function(c){ return c.id === custId }) || {}
    row._cust = cust
    CURRENT_ENG = row
    CURRENT_DOCKET_ID = docketId
    DOCKET_ITEMS = []
    renderSidebar('')
    renderDocket()
    showToast('Engagement created')
  } else {
    showToast('Failed to create engagement', 'err')
  }
}

//    Tool shortcuts                                                             
function openSASC() {
  var eng = CURRENT_ENG
  if (!eng) { showToast('No engagement loaded'); return }
  var url = '../../tools/sasc/index.html?eng=' + eng.id
  if (CURRENT_DOCKET_ID) url += '&docket=' + CURRENT_DOCKET_ID

  window.location.href = url
}
function openFM() {
  var eng = CURRENT_ENG
  if (!eng) return
  window.location.href = '../../tools/tsap-financial-model/index.html?eng=' + eng.id
}

//    Modal helpers                                                              
function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }
function buildTypeDropdown(eng) {
  var engT = eng.engagement_type || eng.type || ''
  var types = ['TSAP','Domain','Generic']
  var isKnown = types.some(function(t){ return engT===t||engT===t.toLowerCase() })
  var col = isKnown ? 'var(--navy)' : 'var(--orange)'
  var lbl = isKnown ? (engT.charAt(0).toUpperCase()+engT.slice(1).toLowerCase()) : '⚠ Set Type'
  return '<select onchange="setEngagementType(this.value)" '
    + 'style="padding:3px 10px;border:1.5px solid '+col+';border-radius:6px;'
    + 'font-size:11px;font-weight:700;background:#fff;color:'+col+';'
    + 'cursor:pointer;font-family:inherit;outline:none;margin-right:6px">'
    + '<option value=""' + (!isKnown?' selected':'') + '>⚠ Set Type</option>'
    + types.map(function(v){
        var sel = (engT===v||engT===v.toLowerCase()) ? ' selected' : ''
        return '<option value="'+v+'"'+sel+'>'+v+'</option>'
      }).join('')
    + '</select>'
}

async function setEngagementType(val) {
  var eng = CURRENT_ENG
  if (!eng || !val) return
  var sb = getSB()
  if (!sb.url) { showToast('Supabase not configured'); return }
  var body = { engagement_type: val }
  // If TSAP and no territory set, ask for it now
  if (val === 'TSAP' && !eng.territory) {
    var terr = prompt('Enter territory name for this TSAP engagement:', '')
    if (terr && terr.trim()) body.territory = terr.trim()
  }
  try {
    await fetch(sb.url + '/rest/v1/engagements?id=eq.' + eng.id, {
      method: 'PATCH',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key,
        'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(body)
    })
    CURRENT_ENG.engagement_type = val
    if (body.territory) CURRENT_ENG.territory = body.territory
    window.PROFILE_DATA = null  // clear cached profile when type changes
    showToast('✓ Engagement type set to ' + val + (body.territory ? ' · ' + body.territory : ''))
    renderDocket()
  } catch(e) {
    showToast('Failed to update engagement type', 'error')
  }
}

document.querySelectorAll('.modal-overlay').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === el) el.classList.remove('open')
  })
})
