<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS   Engagement Docket</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#002870;--orange:#FF5539;--teal:#00B290;--amber:#FFB600;--blue:#1C38F5;
  --dark:#111827;--mid:#6B7280;--light:#F8F9FA;--white:#fff;--border:#E5E7EB;
  --r:8px;--r-sm:5px
}
body{font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:#F0F2F5;min-height:100vh;display:flex;flex-direction:column}

/*    Masthead                                                                */
.atlas-hdr{background:var(--navy);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.15);flex-shrink:0}
.atlas-hdr-left{display:flex;align-items:center;gap:12px}
.atlas-brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:3px}
.atlas-brand span{color:var(--orange)}
.atlas-tool-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);padding:3px 8px;background:rgba(255,255,255,0.1);border-radius:var(--r-sm)}
.atlas-nav-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:600;font-family:inherit;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.8);cursor:pointer;white-space:nowrap}
.atlas-nav-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.atlas-ver{font-size:10px;font-weight:700;color:var(--orange);padding:2px 7px;background:rgba(255,85,57,0.15);border-radius:10px}

/*    Layout                                                                  */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:260px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/*    Sidebar                                                                 */
.sb-search{padding:12px 14px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;background:var(--light);color:var(--dark)}
.sb-section{padding:8px 14px 4px;font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.sb-section button{font-size:18px;font-weight:400;color:var(--mid);background:none;border:none;cursor:pointer;line-height:1}
.sb-section button:hover{color:var(--navy)}
.sb-item{padding:8px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:8px}
.sb-item:hover{background:var(--light)}
.sb-item.active{border-left-color:var(--orange);background:rgba(255,85,57,0.04)}
.sb-item-name{font-size:13px;font-weight:500;color:var(--dark);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-meta{font-size:10px;color:var(--mid)}
.sb-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;flex-shrink:0}
.badge-tsap{background:#E6F1FB;color:#0C447C}
.badge-active{background:#EAF3DE;color:#3B6D11}
.badge-new{background:#FFF3CD;color:#856404}
.eng-sub{padding:2px 14px 2px 30px;cursor:pointer;font-size:12px;color:var(--mid);display:flex;align-items:center;gap:6px}
.eng-sub:hover{color:var(--navy);background:var(--light)}
.eng-sub.active{color:var(--navy);font-weight:600}
.sb-empty{padding:16px 14px;font-size:12px;color:var(--mid);font-style:italic}

/*    Docket view                                                             */
.docket-hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 24px;flex-shrink:0}
.docket-hdr-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.docket-name{font-size:18px;font-weight:600;color:var(--dark)}
.docket-meta{font-size:12px;color:var(--mid);margin-top:3px;display:flex;gap:10px;align-items:center}
.docket-badges{display:flex;gap:6px;margin-top:6px}
.docket-hdr-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/*    Tabs                                                                    */
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0}
.tab-btn{padding:10px 16px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:var(--mid);font-family:inherit;white-space:nowrap;margin-bottom:-1px}
.tab-btn:hover{color:var(--navy)}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600}
.tab-count{font-size:10px;padding:1px 5px;border-radius:8px;background:var(--light);color:var(--mid);margin-left:4px;font-weight:600}

/*    Tab content                                                             */
.tab-content{padding:20px 24px;flex:1}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px}

/*    Cards                                                                   */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px}

/*    UC pills                                                                */
.uc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.uc-card{background:var(--light);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px}
.uc-code{font-size:9px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:3px}
.uc-name{font-size:12px;font-weight:500;color:var(--dark);margin-bottom:5px;line-height:1.4}
.uc-badges{display:flex;gap:4px;flex-wrap:wrap}
.uc-status{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.uc-agreed{background:#E1F5EE;color:#085041}
.uc-proposed{background:#FFF3CD;color:#856404}
.uc-scratched{background:#F1EFE8;color:#5F5E5A;text-decoration:line-through}
.uc-complexity{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--light);color:var(--mid)}

/*    Actions                                                                 */
.action-list{border:1px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.action-item:last-child{border-bottom:none}
.action-item.done .action-text{color:var(--mid);text-decoration:line-through}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-open{background:var(--amber)}
.dot-done{background:var(--teal)}
.dot-blocked{background:var(--orange)}
.action-text{flex:1;font-size:13px;line-height:1.5}
.action-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.owner-badge{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--light);color:var(--mid);font-weight:500}
.due-label{font-size:11px;color:var(--mid)}
.due-overdue{color:var(--orange);font-weight:600}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--mid);padding:2px 4px;border-radius:3px;font-size:14px;line-height:1}
.icon-btn:hover{color:var(--navy);background:var(--light)}

/*    Strategy                                                                */
.strat-block{border-left:2px solid var(--border);padding:6px 12px;margin-bottom:10px}
.strat-label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.strat-text{font-size:13px;color:var(--dark);line-height:1.65}
.strat-empty{font-size:12px;color:var(--mid);font-style:italic}

/*    Outputs                                                                 */
.output-list{border:1px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden}
.output-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.output-item:last-child{border-bottom:none}
.output-item:hover{background:var(--light)}
.output-icon{font-size:20px;color:var(--mid);width:24px;text-align:center;flex-shrink:0}
.output-info{flex:1}
.output-name{font-size:13px;font-weight:500;color:var(--dark)}
.output-meta{font-size:11px;color:var(--mid);margin-top:2px}
.output-action{font-size:11px;color:var(--blue);white-space:nowrap}

/*    Overview grid                                                           */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:center}
.kpi-val{font-size:20px;font-weight:700;color:var(--navy)}
.kpi-lbl{font-size:11px;color:var(--mid);margin-top:2px}

/*    Profile grid                                                            */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.profile-row{padding:6px 0;border-bottom:1px solid var(--border)}
.profile-row:last-child{border-bottom:none}
.profile-label{font-size:10px;color:var(--mid);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.profile-val{font-size:13px;color:var(--dark)}

/*    Forms                                                                   */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{display:block;font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
input,select,textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;color:var(--dark);background:var(--white)}
textarea{resize:vertical;min-height:60px}

/*    Buttons                                                                 */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--dark)}
.btn-primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-primary:hover{background:#e04530}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-outline{background:transparent;color:var(--navy);border-color:var(--navy)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--mid)}
.btn-ghost:hover{color:var(--navy);background:var(--light)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{color:var(--orange);border-color:var(--orange);background:transparent}

/*    Empty state                                                             */
.empty{padding:32px;text-align:center;color:var(--mid)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--dark)}
.empty-sub{font-size:12px}

/*    Modal                                                                   */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--r);padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/*    History                                                                 */
.hist-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:5px}
.hist-dot.recent{background:var(--teal)}
.hist-text{font-size:12px;color:var(--dark);flex:1;line-height:1.5}
.hist-date{font-size:11px;color:var(--mid);white-space:nowrap}

/*    Toast                                                                   */
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:var(--orange)}
</style>
</head>
<body>

<!-- Masthead -->
<div class="atlas-hdr">
  <div class="atlas-hdr-left">
    <div class="atlas-brand">ATL<span>A</span>S</div>
    <div class="atlas-tool-name">Engagement Docket</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="atlas-ver">v2.0</span>
    <button class="atlas-nav-btn" onclick="window.location.href='../../'">&#8592; Portal</button>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-search">
      <input type="text" id="sb-search" placeholder="Search customers, engagements..." oninput="filterSidebar(this.value)">
    </div>
    <div style="flex:1;overflow-y:auto">
      <div class="sb-section">
        <span>Customers</span>
        <button onclick="openNewCustomerModal()" title="New customer">+</button>
      </div>
      <div id="sb-customers"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main-area">
    <div class="empty" style="margin:auto">
      <div class="empty-icon">&#128218;</div>
      <div class="empty-title">Select an engagement</div>
      <div class="empty-sub">Choose a customer and engagement from the left panel</div>
    </div>
  </div>

</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-customer">
  <div class="modal">
    <div class="modal-title">New Customer</div>
    <div class="form-row">
      <div><label>Organisation name</label><input type="text" id="cust-name" placeholder="e.g. Government of Himachal Pradesh"></div>
      <div><label>Type</label>
        <select id="cust-type">
          <option value="state_govt">State Government</option>
          <option value="central_govt">Central Government</option>
          <option value="defence">Defence</option>
          <option value="enterprise">Enterprise</option>
          <option value="csp">CSP / Cloud</option>
          <option value="ai_lab">AI Lab</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label>Location</label><input type="text" id="cust-location" placeholder="e.g. Shimla, India"></div>
      <div><label>Primary contact</label><input type="text" id="cust-contact" placeholder="e.g. Secretary IT"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-customer')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Create Customer</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-engagement">
  <div class="modal">
    <div class="modal-title">New Engagement</div>
    <input type="hidden" id="eng-cust-id">
    <div><label>Engagement name</label><input type="text" id="eng-name" placeholder="e.g. HAICE   HP Sovereign AI Programme"></div>
    <div style="margin-top:10px" class="form-row">
      <div><label>Type</label>
        <select id="eng-type">
          <option value="tsap">TSAP   Territory Sovereign AI</option>
          <option value="vertical">Domain Vertical</option>
          <option value="enterprise">Enterprise AI</option>
          <option value="csp">CSP / Inferencing</option>
          <option value="generic">Generic AI</option>
        </select>
      </div>
      <div><label>Owner</label><input type="text" id="eng-owner" placeholder="e.g. Arvind"></div>
    </div>
    <div style="margin-top:10px"><label>Cover note</label><textarea id="eng-cover" placeholder="Brief description of the engagement context and objective"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-engagement')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEngagement()">Create Engagement</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-action">
  <div class="modal">
    <div class="modal-title" id="action-modal-title">Add Action</div>
    <input type="hidden" id="action-id">
    <div><label>Action</label><input type="text" id="action-text" placeholder="What needs to happen?"></div>
    <div style="margin-top:10px" class="form-row">
      <div><label>Owner</label><input type="text" id="action-owner" placeholder="e.g. Arvind, Presales, BD"></div>
      <div><label>Due date</label><input type="date" id="action-due"></div>
    </div>
    <div style="margin-top:10px"><label>Notes</label><textarea id="action-notes" placeholder="Any additional context"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-action')">Cancel</button>
      <button class="btn btn-primary" onclick="saveAction()">Save Action</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-strategy">
  <div class="modal">
    <div class="modal-title">Edit Strategy</div>
    <div><label>Our position</label><textarea id="strat-position" rows="3" placeholder="What is our key differentiator for this engagement?"></textarea></div>
    <div style="margin-top:10px"><label>Key pitch</label><textarea id="strat-pitch" rows="3" placeholder="The headline value proposition   the CM/CEO one-liner"></textarea></div>
    <div style="margin-top:10px"><label>Watch points</label><textarea id="strat-watch" rows="3" placeholder="Key risks, blockers, or things to monitor"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-strategy')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStrategy()">Save Strategy</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-uc">
  <div class="modal" style="max-width:640px">
    <div class="modal-title">Add Use Case</div>
    <div style="margin-bottom:10px"><input type="text" id="uc-search" placeholder="Search UC library..." oninput="filterUCModal(this.value)"></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px" id="uc-modal-clusters"></div>
    <div id="uc-modal-list" style="max-height:320px;overflow-y:auto"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-uc')">Done</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="../../shared/atlas-doc-gen.js"></script>
<script charset="utf-8">
// -- Config                               
function getSB() {
  try {
    var g = JSON.parse(localStorage.getItem('atlas_global_cfg') || '{}')
    return { url: g.sbUrl || g.sb_url || '', key: g.sbKey || g.sb_key || '' }
  } catch(e) { return { url: '', key: '' } }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function genId(pfx) { return (pfx||'ID') + '-' + Date.now() + '-' + Math.floor(Math.random()*9999) }
function fmtDate(d) {
  if (!d) return ''
  var dt = new Date(d)
  return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}
function showToast(msg, type) {
  var t = document.getElementById('toast')
  t.textContent = msg
  t.className = 'toast show' + (type === 'err' ? ' err' : '')
  setTimeout(function(){ t.className = 'toast' }, 2800)
}

//    Supabase                                                                   
async function sbGet(table, params, limit) {
  var sb = getSB(); if (!sb.url) return []
  try {
    var url = sb.url + '/rest/v1/' + table + '?' + (params||'') + (limit ? '&limit='+limit : '&limit=200')
    var r = await fetch(url, { headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key } })
    return r.ok ? r.json() : []
  } catch(e) { return [] }
}
async function sbPost(table, data, prefer) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table, {
      method: 'POST',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key, 'Content-Type': 'application/json', Prefer: prefer || 'return=minimal' },
      body: JSON.stringify(data)
    })
    return r.ok
  } catch(e) { return false }
}
async function sbPatch(table, match, data) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table + '?' + match, {
      method: 'PATCH',
      headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify(data)
    })
    return r.ok
  } catch(e) { return false }
}
async function sbDelete(table, match) {
  var sb = getSB(); if (!sb.url) return false
  try {
    var r = await fetch(sb.url + '/rest/v1/' + table + '?' + match, {
      method: 'DELETE', headers: { apikey: sb.key, Authorization: 'Bearer ' + sb.key }
    })
    return r.ok
  } catch(e) { return false }
}

//    State                                                                      
var ALL_CUSTOMERS = []
var ALL_ENGAGEMENTS = []
var CURRENT_ENG = null       // current engagement object
var CURRENT_DOCKET_ID = null // current docket_id
var DOCKET_ITEMS = []        // all items for current engagement
var UC_LIBRARY = []          // all active UCs
var ACTIVE_TAB = 'overview'
var UC_MODAL_FILTER = 'all'

//    Load                                                                       
async function init() {
  var sb = getSB()
  if (!sb.url) {
    document.getElementById('sb-customers').innerHTML = '<div class="sb-empty">Configure Supabase in Settings first</div>'
    return
  }
  var [custs, engs, ucs] = await Promise.all([
    sbGet('customers', 'order=name.asc'),
    sbGet('engagements', 'order=name.asc'),
    sbGet('uc_library', 'status=eq.active&order=cluster.asc,uc_name.asc')
  ])
  ALL_CUSTOMERS    = custs || []
  ALL_ENGAGEMENTS  = engs  || []
  UC_LIBRARY       = ucs   || []
  renderSidebar('')

  // Auto-open from URL param
  var params = new URLSearchParams(window.location.search)
  var engId = params.get('eng')
  if (engId) {
    var eng = ALL_ENGAGEMENTS.find(function(e){ return e.id === engId })
    if (eng) openEngagement(eng)
  }
}

//    Sidebar                                                                    
function filterSidebar(q) { renderSidebar(q) }

function renderSidebar(q) {
  var el = document.getElementById('sb-customers')
  q = (q||'').toLowerCase()
  var custs = ALL_CUSTOMERS.filter(function(c){
    return !q || c.name.toLowerCase().includes(q)
  })
  if (!custs.length) {
    el.innerHTML = '<div class="sb-empty">No customers found</div>'
    return
  }
  var html = ''
  custs.forEach(function(c) {
    var cEngs = ALL_ENGAGEMENTS.filter(function(e){ return e.customer_id === c.id })
    var isActive = CURRENT_ENG && cEngs.some(function(e){ return e.id === CURRENT_ENG.id })
    html += '<div class="sb-section" style="margin-top:4px">'
      + '<span style="font-size:11px;font-weight:600;color:var(--dark)">' + esc(c.name) + '</span>'
      + '<button onclick="openNewEngModal(\'' + c.id + '\')" title="New engagement">+</button>'
      + '</div>'
    if (!cEngs.length) {
      html += '<div class="sb-empty" style="padding:4px 14px">No engagements yet</div>'
    }
    cEngs.forEach(function(e) {
      var active = CURRENT_ENG && CURRENT_ENG.id === e.id
      var typeLabel = { tsap:'TSAP', vertical:'Vertical', enterprise:'Enterprise', csp:'CSP', generic:'Generic' }[e.type] || e.type || ''
      html += '<div class="sb-item' + (active?' active':'') + '" onclick="openEngagement(' + JSON.stringify(e).replace(/"/g,'&quot;') + ')">'
        + '<span class="sb-item-name">' + esc(e.name||'Untitled') + '</span>'
        + (typeLabel ? '<span class="sb-badge badge-tsap">' + esc(typeLabel) + '</span>' : '')
        + '</div>'
    })
  })
  el.innerHTML = html
}

//    Open Engagement                                                            
async function openEngagement(eng) {
  CURRENT_ENG = eng
  ACTIVE_TAB = 'overview'

  // Get docket_id from engagements.docket_id or engagement_dockets table
  var docketId = eng.docket_id
  if (!docketId) {
    var dockets = await sbGet('engagement_dockets', 'engagement_id=eq.' + eng.id + '&order=created_at.desc', 1)
    if (dockets && dockets[0]) docketId = dockets[0].id
  }
  CURRENT_DOCKET_ID = docketId

  // Load docket items
  DOCKET_ITEMS = docketId
    ? (await sbGet('docket_items', 'docket_id=eq.' + docketId + '&order=sort_order.asc,created_at.asc')) || []
    : []

  // Load customer
  var cust = ALL_CUSTOMERS.find(function(c){ return c.id === eng.customer_id }) || {}
  CURRENT_ENG._cust = cust

  renderSidebar(document.getElementById('sb-search').value)
  renderDocket()
}

//    Render docket                                                              
function renderDocket() {
  var eng = CURRENT_ENG
  if (!eng) return
  var cust = eng._cust || {}

  var typeLabel = { tsap:'TSAP', vertical:'Domain Vertical', enterprise:'Enterprise AI', csp:'CSP / Inferencing', generic:'Generic AI' }[eng.type] || eng.type || ''
  var statusLabel = eng.status || 'active'
  var statusClass = statusLabel === 'active' ? 'badge-active' : 'badge-new'

  // Count items by section
  var counts = { uc:0, action:0, output:0 }
  DOCKET_ITEMS.forEach(function(item) {
    var s = item.section || ''
    if (s === 'uc') counts.uc++
    else if (s === 'action') counts.action++
    else if (s === 'output') counts.output++
  })
  var openActions = DOCKET_ITEMS.filter(function(i){ return i.section === 'action' && i.status !== 'done' }).length

  var html = '<div class="docket-hdr">'
    + '<div class="docket-hdr-row1">'
    + '<div><div class="docket-name">' + esc(eng.name||'Untitled') + '</div>'
    + '<div class="docket-meta">'
    + (cust.name ? '<span>' + esc(cust.name) + '</span>' : '')
    + (cust.location ? '<span>&#128205; ' + esc(cust.location) + '</span>' : '')
    + '<span>&#128100; ' + esc(eng.owner||'Unassigned') + '</span>'
    + '<span>Opened ' + fmtDate(eng.opened_at||eng.created_at) + '</span>'
    + '</div>'
    + '<div class="docket-badges">'
    + (typeLabel ? '<span class="sb-badge badge-tsap">' + esc(typeLabel) + '</span>' : '')
    + '<span class="sb-badge ' + statusClass + '">' + esc(statusLabel) + '</span>'
    + (openActions > 0 ? '<span class="sb-badge" style="background:#FEE2E2;color:#991B1B">' + openActions + ' open action' + (openActions>1?'s':'') + '</span>' : '')
    + '</div></div>'
    + '<div class="docket-hdr-actions">'
    + '<button class="btn btn-sm btn-outline" onclick="openSASC()">&#9881; SASC</button>'
    + '<button class="btn btn-sm btn-teal" onclick="openFM()">&#128184; Financial Model</button>'
    + '</div></div>'

    // Cover note
    + (eng.cover_note ? '<div style="font-size:12px;color:var(--mid);margin-top:8px;padding:8px 10px;background:var(--light);border-radius:var(--r-sm)">' + esc(eng.cover_note) + '</div>' : '')
    + '</div>'

    // Tab bar
    + '<div class="tab-bar">'
    + ['overview','uc','actions','strategy','outputs','history'].map(function(t) {
        var labels = { overview:'Overview', uc:'Use Cases', actions:'Actions', strategy:'Strategy', outputs:'Outputs', history:'History' }
        var cnt = t === 'uc' ? counts.uc : t === 'actions' ? counts.action : t === 'outputs' ? counts.output : 0
        return '<button class="tab-btn' + (ACTIVE_TAB===t?' active':'') + '" onclick="switchTab(\'' + t + '\')">'
          + labels[t]
          + (cnt > 0 ? '<span class="tab-count">' + cnt + '</span>' : '')
          + '</button>'
      }).join('')
    + '</div>'

    // Tab content
    + '<div class="tab-content" id="tab-body">'
    + renderTab(ACTIVE_TAB)
    + '</div>'

  document.getElementById('main-area').innerHTML = html
}

function switchTab(tab) {
  ACTIVE_TAB = tab
  var el = document.getElementById('tab-body')
  if (el) el.innerHTML = renderTab(tab)
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.className = 'tab-btn' + (b.textContent.trim().toLowerCase().startsWith(tab) ? ' active' : '')
  })
  // Re-render full docket to update tab active states
  renderDocket()
}

//    Tab renderers                                                              
function renderTab(tab) {
  if (tab === 'overview')  return renderOverview()
  if (tab === 'uc')        return renderUCTab()
  if (tab === 'actions')   return renderActionsTab()
  if (tab === 'strategy')  return renderStrategyTab()
  if (tab === 'outputs')   return renderOutputsTab()
  if (tab === 'history')   return renderHistoryTab()
  return ''
}

//    Overview                                                                   
function renderOverview() {
  var eng = CURRENT_ENG
  var cust = eng._cust || {}
  var ucs = DOCKET_ITEMS.filter(function(i){ return i.section === 'uc' })
  var actions = DOCKET_ITEMS.filter(function(i){ return i.section === 'action' })
  var outputs = DOCKET_ITEMS.filter(function(i){ return i.section === 'output' })
  var openActions = actions.filter(function(i){ return i.status !== 'done' })
  var strat = getStrategyItems()

  var html = '<div class="kpi-row">'
    + kpi(String(ucs.length), 'Use cases')
    + kpi(String(openActions.length), 'Open actions', openActions.length > 0 ? 'var(--orange)' : null)
    + kpi(String(outputs.length), 'Outputs')
    + kpi(strat ? 'Set' : 'Not set', 'Strategy', strat ? 'var(--teal)' : null)
    + '</div>'
    + '<div class="overview-grid">'

    // Customer profile
    + '<div class="card"><div class="card-title">Customer profile</div>'
    + '<div class="profile-grid">'
    + profRow('Organisation', cust.name || eng.name)
    + profRow('Type', formatType(cust.type || eng.type))
    + profRow('Location', cust.location || '')
    + profRow('Primary contact', cust.primary_contact || '')
    + profRow('Engagement type', formatType(eng.type))
    + profRow('Owner', eng.owner || '')
    + '</div></div>'

    // Strategy snapshot
    + '<div class="card"><div class="card-title">Strategy snapshot '
    + '<button class="btn btn-sm btn-ghost" onclick="openStrategyModal()" style="float:right">Edit</button></div>'
    + renderStrategyPreview()
    + '</div>'

    + '</div>'

    // Cover image card
    + '<div id="cover-img-card">' + (typeof atlasCoverImage !== 'undefined' ? atlasCoverImage.renderCoverImageCard(eng) : '<div class="card" style="margin-bottom:12px;padding:12px 14px"><div class="card-title">Engagement Cover Image</div><div style="font-size:12px;color:var(--mid)">Loading...</div></div>') + '</div>'

    // Recent actions
    + '<div class="section-hdr" style="margin-top:4px"><div class="section-title">Open actions</div>'
    + '<button class="btn btn-sm btn-primary" onclick="openActionModal()">+ Action</button></div>'
    + renderActionList(openActions.slice(0, 3))
    + (openActions.length > 3 ? '<div style="text-align:center;padding:8px"><button class="btn btn-sm btn-ghost" onclick="switchTab(\'actions\')">See all ' + openActions.length + ' actions &rarr;</button></div>' : '')

  return html
}

function kpi(val, label, color) {
  return '<div class="kpi-card"><div class="kpi-val" style="' + (color?'color:'+color:'') + '">' + esc(val) + '</div><div class="kpi-lbl">' + esc(label) + '</div></div>'
}
function profRow(label, val) {
  return '<div class="profile-row"><div class="profile-label">' + esc(label) + '</div><div class="profile-val">' + esc(val||' ') + '</div></div>'
}
function formatType(t) {
  return { tsap:'TSAP   Territory Sovereign AI', vertical:'Domain Vertical', enterprise:'Enterprise AI', csp:'CSP / Inferencing', generic:'Generic AI', state_govt:'State Government', central_govt:'Central Government', defence:'Defence', enterprise:'Enterprise', ai_lab:'AI Lab' }[t] || (t||'')
}

//    Strategy                                                                   
function getStrategyItems() {
  var strat = DOCKET_ITEMS.filter(function(i){ return i.section === 'strategy' })
  if (!strat.length) return null
  var obj = {}
  strat.forEach(function(i){ obj[i.item_type] = i.notes || i.title || '' })
  return obj
}

function renderStrategyPreview() {
  var strat = getStrategyItems()
  if (!strat) return '<div class="strat-empty">No strategy defined yet. Click Edit to add.</div>'
  var html = ''
  if (strat.position) html += '<div class="strat-block"><div class="strat-label">Our position</div><div class="strat-text">' + esc(strat.position) + '</div></div>'
  if (strat.pitch)    html += '<div class="strat-block"><div class="strat-label">Key pitch</div><div class="strat-text">' + esc(strat.pitch) + '</div></div>'
  if (strat.watch)    html += '<div class="strat-block"><div class="strat-label">Watch points</div><div class="strat-text">' + esc(strat.watch) + '</div></div>'
  return html || '<div class="strat-empty">No strategy defined yet.</div>'
}

function renderStrategyTab() {
  var html = '<div class="section-hdr"><div class="section-title">Engagement strategy</div>'
    + '<button class="btn btn-sm btn-primary" onclick="openStrategyModal()">Edit strategy</button></div>'
    + '<div class="card">' + renderStrategyPreview() + '</div>'
  return html
}

function openStrategyModal() {
  var strat = getStrategyItems() || {}
  document.getElementById('strat-position').value = strat.position || ''
  document.getElementById('strat-pitch').value    = strat.pitch    || ''
  document.getElementById('strat-watch').value    = strat.watch    || ''
  openModal('modal-strategy')
}

async function saveStrategy() {
  var position = document.getElementById('strat-position').value.trim()
  var pitch    = document.getElementById('strat-pitch').value.trim()
  var watch    = document.getElementById('strat-watch').value.trim()
  var docketId = CURRENT_DOCKET_ID
  if (!docketId) { showToast('No docket found for this engagement', 'err'); return }

  // Upsert each strategy item
  var items = [
    { type: 'position', text: position },
    { type: 'pitch',    text: pitch },
    { type: 'watch',    text: watch },
  ]
  for (var i = 0; i < items.length; i++) {
    var it = items[i]
    var existing = DOCKET_ITEMS.find(function(d){ return d.section === 'strategy' && d.item_type === it.type })
    if (existing) {
      await sbPatch('docket_items', 'id=eq.' + existing.id, { notes: it.text, updated_at: new Date().toISOString() })
    } else if (it.text) {
      var row = { id: genId('DI'), docket_id: docketId, section: 'strategy', item_type: it.type, title: 'Strategy   ' + it.type, notes: it.text, status: 'active', created_by: 'ATLAS' }
      await sbPost('docket_items', row)
    }
  }
  closeModal('modal-strategy')
  await refreshItems()
  showToast('Strategy saved')
  renderDocket()
}

//    Use Cases                                                                  
function renderUCTab() {
  var ucItems = DOCKET_ITEMS.filter(function(i){ return i.section === 'uc' })
  var html = '<div class="section-hdr"><div class="section-title">Use cases (' + ucItems.length + ')</div>'
    + '<button class="btn btn-sm btn-primary" onclick="openUCModal()">+ Add use case</button></div>'

  if (!ucItems.length) {
    html += '<div class="empty"><div class="empty-icon">&#128161;</div>'
      + '<div class="empty-title">No use cases yet</div>'
      + '<div class="empty-sub">Add use cases from the UC Library</div></div>'
    return html
  }

  html += '<div class="uc-grid">'
  ucItems.forEach(function(item) {
    // Find UC from library
    var uc = UC_LIBRARY.find(function(u){ return u.id === item.ref_id }) || {}
    var ucName = uc.uc_name || item.title || 'UC'
    var status = item.status || 'proposed'
    var statusClass = status === 'agreed' ? 'uc-agreed' : status === 'scratched' ? 'uc-scratched' : 'uc-proposed'
    var statusLabel = status.charAt(0).toUpperCase() + status.slice(1)
    var complexity = uc.complexity || ''
    var cluster = uc.cluster || ''

    html += '<div class="uc-card">'
      + (cluster ? '<div class="uc-code">' + esc(cluster) + '</div>' : '')
      + '<div class="uc-name' + (status==='scratched'?' uc-scratched':'') + '">' + esc(ucName) + '</div>'
      + '<div class="uc-badges">'
      + '<span class="uc-status ' + statusClass + '">' + statusLabel + '</span>'
      + (complexity ? '<span class="uc-complexity">' + complexity + '</span>' : '')
      + '</div>'
      + '<div style="margin-top:8px;display:flex;gap:5px">'
      + (status !== 'agreed' ? '<button class="btn btn-sm" style="font-size:10px;padding:2px 7px;background:var(--teal);color:#fff;border:none" onclick="setUCStatus(\'' + item.id + '\',\'agreed\')">&#10003; Agree</button>' : '')
      + (status !== 'scratched' ? '<button class="btn btn-sm btn-ghost" style="font-size:10px;padding:2px 7px" onclick="setUCStatus(\'' + item.id + '\',\'scratched\')">&#215; Scratch</button>' : '<button class="btn btn-sm btn-ghost" style="font-size:10px;padding:2px 7px" onclick="setUCStatus(\'' + item.id + '\',\'proposed\')">Restore</button>')
      + '<button class="btn btn-sm btn-ghost" style="font-size:10px;padding:2px 7px;color:var(--orange)" onclick="removeUC(\'' + item.id + '\')">Remove</button>'
      + '</div></div>'
  })
  html += '</div>'
  return html
}

function openUCModal() {
  UC_MODAL_FILTER = 'all'
  renderUCModalContent('')
  openModal('modal-uc')
}

function filterUCModal(q) { renderUCModalContent(q) }

function renderUCModalContent(q) {
  var already = DOCKET_ITEMS.filter(function(i){ return i.section === 'uc' }).map(function(i){ return i.ref_id })
  var clusters = []
  UC_LIBRARY.forEach(function(u){ if(u.cluster && clusters.indexOf(u.cluster)<0) clusters.push(u.cluster) })
  clusters.sort()

  // Cluster filter
  var clusterHtml = '<button onclick="UC_MODAL_FILTER=\'all\';renderUCModalContent(document.getElementById(\'uc-search\').value)" style="padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:' + (UC_MODAL_FILTER==='all'?700:500) + ';border:1px solid ' + (UC_MODAL_FILTER==='all'?'var(--navy)':'var(--border)') + ';background:' + (UC_MODAL_FILTER==='all'?'var(--navy)':'transparent') + ';color:' + (UC_MODAL_FILTER==='all'?'#fff':'var(--mid)') + '">All</button>'
  clusters.forEach(function(c) {
    var on = UC_MODAL_FILTER === c
    clusterHtml += '<button onclick="UC_MODAL_FILTER=\'' + esc(c) + '\';renderUCModalContent(document.getElementById(\'uc-search\').value)" style="padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:' + (on?700:500) + ';border:1px solid ' + (on?'var(--navy)':'var(--border)') + ';background:' + (on?'var(--navy)':'transparent') + ';color:' + (on?'#fff':'var(--mid)') + '">' + esc(c) + '</button>'
  })
  document.getElementById('uc-modal-clusters').innerHTML = clusterHtml

  // UC list
  var filtered = UC_LIBRARY.filter(function(u) {
    if (UC_MODAL_FILTER !== 'all' && u.cluster !== UC_MODAL_FILTER) return false
    if (q && !u.uc_name.toLowerCase().includes(q.toLowerCase())) return false
    return true
  })
  var listHtml = ''
  filtered.forEach(function(u) {
    var inDocket = already.indexOf(u.id) >= 0
    var cmap = { simple:'var(--teal)', medium:'var(--mid)', complex:'var(--orange)', research:'#8B5CF6' }
    var cc = u.complexity ? (cmap[u.complexity]||'var(--mid)') : 'var(--mid)'
    listHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer" onclick="' + (inDocket ? '' : 'addUCToDocket(\'' + u.id + '\')') + '">'
      + '<div style="flex:1">'
      + '<div style="font-size:13px;font-weight:500' + (inDocket?';color:var(--mid)':'') + '">' + esc(u.uc_name) + '</div>'
      + '<div style="font-size:11px;color:var(--mid);margin-top:2px">' + esc(u.cluster||'') + (u.complexity ? ' &bull; <span style="color:'+cc+'">'+u.complexity+'</span>' : '') + '</div>'
      + '</div>'
      + (inDocket
          ? '<span style="font-size:11px;color:var(--teal);font-weight:600">&#10003; Added</span>'
          : '<button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="event.stopPropagation();addUCToDocket(\'' + u.id + '\')">+ Add</button>')
      + '</div>'
  })
  if (!listHtml) listHtml = '<div class="empty"><div class="empty-sub">No UCs match</div></div>'
  document.getElementById('uc-modal-list').innerHTML = listHtml
}

async function addUCToDocket(ucId) {
  if (!CURRENT_DOCKET_ID) { showToast('No docket for this engagement', 'err'); return }
  var uc = UC_LIBRARY.find(function(u){ return u.id === ucId }) || {}
  var row = {
    id: genId('DI'), docket_id: CURRENT_DOCKET_ID,
    section: 'uc', item_type: 'use_case',
    title: uc.uc_name || ucId,
    ref_table: 'uc_library', ref_id: ucId,
    status: 'proposed', created_by: 'ATLAS'
  }
  var ok = await sbPost('docket_items', row)
  if (ok) {
    DOCKET_ITEMS.push(row)
    showToast('UC added to docket')
    renderUCModalContent(document.getElementById('uc-search').value)
    refreshItems()
  } else {
    showToast('Failed to add UC', 'err')
  }
}

async function setUCStatus(itemId, status) {
  await sbPatch('docket_items', 'id=eq.' + itemId, { status: status })
  var item = DOCKET_ITEMS.find(function(i){ return i.id === itemId })
  if (item) item.status = status
  renderDocket()
}

async function removeUC(itemId) {
  await sbDelete('docket_items', 'id=eq.' + itemId)
  DOCKET_ITEMS = DOCKET_ITEMS.filter(function(i){ return i.id !== itemId })
  renderDocket()
}

//    Actions                                                                    
function renderActionsTab() {
  var actions = DOCKET_ITEMS.filter(function(i){ return i.section === 'action' })
  var open   = actions.filter(function(i){ return i.status !== 'done' && i.status !== 'blocked' })
  var blocked = actions.filter(function(i){ return i.status === 'blocked' })
  var done   = actions.filter(function(i){ return i.status === 'done' })

  var html = '<div class="section-hdr"><div class="section-title">Actions (' + actions.length + ')</div>'
    + '<button class="btn btn-sm btn-primary" onclick="openActionModal()">+ Action</button></div>'

  if (!actions.length) {
    return html + '<div class="empty"><div class="empty-icon">&#9989;</div>'
      + '<div class="empty-title">No actions yet</div>'
      + '<div class="empty-sub">Track what needs to happen and who owns it</div></div>'
  }

  if (open.length)    html += '<div class="section-title" style="margin-bottom:8px;color:var(--amber)">Open (' + open.length + ')</div>' + renderActionList(open)
  if (blocked.length) html += '<div class="section-title" style="margin:12px 0 8px;color:var(--orange)">Blocked (' + blocked.length + ')</div>' + renderActionList(blocked)
  if (done.length)    html += '<div class="section-title" style="margin:12px 0 8px;color:var(--teal)">Done (' + done.length + ')</div>' + renderActionList(done)
  return html
}

function renderActionList(actions) {
  if (!actions.length) return '<div style="font-size:12px;color:var(--mid);padding:8px 0">None</div>'
  var now = new Date()
  var html = '<div class="action-list">'
  actions.forEach(function(item) {
    var done = item.status === 'done'
    var blocked = item.status === 'blocked'
    var dotClass = done ? 'dot-done' : blocked ? 'dot-blocked' : 'dot-open'
    var due = item.due_date ? new Date(item.due_date) : null
    var overdue = due && due < now && !done
    html += '<div class="action-item' + (done?' done':'') + '">'
      + '<div class="status-dot ' + dotClass + '"></div>'
      + '<div class="action-text">' + esc(item.title||item.notes||'')
      + (item.notes && item.title && item.notes !== item.title ? '<div style="font-size:11px;color:var(--mid);margin-top:2px">' + esc(item.notes) + '</div>' : '')
      + '</div>'
      + '<div class="action-meta">'
      + (item.assigned_to ? '<span class="owner-badge">' + esc(item.assigned_to) + '</span>' : '')
      + (due ? '<span class="due-label' + (overdue?' due-overdue':'') + '">' + fmtDate(item.due_date) + (overdue?' &#9888;':'') + '</span>' : '')
      + (!done ? '<button class="icon-btn" onclick="completeAction(\'' + item.id + '\')" title="Mark done">&#10003;</button>' : '')
      + '<button class="icon-btn" onclick="editAction(\'' + item.id + '\')" title="Edit">&#9998;</button>'
      + '<button class="icon-btn" onclick="deleteAction(\'' + item.id + '\')" title="Delete" style="color:var(--orange)">&#215;</button>'
      + '</div></div>'
  })
  html += '</div>'
  return html
}

function openActionModal(prefill) {
  document.getElementById('action-modal-title').textContent = 'Add Action'
  document.getElementById('action-id').value = ''
  document.getElementById('action-text').value = prefill || ''
  document.getElementById('action-owner').value = ''
  document.getElementById('action-due').value = ''
  document.getElementById('action-notes').value = ''
  openModal('modal-action')
}

function editAction(id) {
  var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
  if (!item) return
  document.getElementById('action-modal-title').textContent = 'Edit Action'
  document.getElementById('action-id').value = id
  document.getElementById('action-text').value = item.title || ''
  document.getElementById('action-owner').value = item.assigned_to || ''
  document.getElementById('action-due').value = item.due_date ? item.due_date.slice(0,10) : ''
  document.getElementById('action-notes').value = item.notes || ''
  openModal('modal-action')
}

async function saveAction() {
  var id = document.getElementById('action-id').value
  var title = document.getElementById('action-text').value.trim()
  if (!title) { showToast('Action text is required', 'err'); return }
  var data = {
    title: title,
    assigned_to: document.getElementById('action-owner').value.trim() || null,
    due_date: document.getElementById('action-due').value || null,
    notes: document.getElementById('action-notes').value.trim() || null
  }
  if (id) {
    await sbPatch('docket_items', 'id=eq.' + id, data)
    var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
    if (item) Object.assign(item, data)
    showToast('Action updated')
  } else {
    if (!CURRENT_DOCKET_ID) { showToast('No docket', 'err'); return }
    var row = Object.assign({ id: genId('DI'), docket_id: CURRENT_DOCKET_ID, section: 'action', item_type: 'action', status: 'open', created_by: 'ATLAS' }, data)
    await sbPost('docket_items', row)
    DOCKET_ITEMS.push(row)
    showToast('Action added')
  }
  closeModal('modal-action')
  renderDocket()
}

async function completeAction(id) {
  await sbPatch('docket_items', 'id=eq.' + id, { status: 'done' })
  var item = DOCKET_ITEMS.find(function(i){ return i.id === id })
  if (item) item.status = 'done'
  renderDocket()
}

async function deleteAction(id) {
  await sbDelete('docket_items', 'id=eq.' + id)
  DOCKET_ITEMS = DOCKET_ITEMS.filter(function(i){ return i.id !== id })
  renderDocket()
}

//    Outputs                                                                    
function renderOutputsTab() {
  var outputs = DOCKET_ITEMS.filter(function(i){ return i.section === 'output' })
  var html = '<div class="section-hdr"><div class="section-title">Outputs & documents (' + outputs.length + ')</div></div>'

  if (!outputs.length) {
    return html + '<div class="empty"><div class="empty-icon">&#128196;</div>'
      + '<div class="empty-title">No outputs yet</div>'
      + '<div class="empty-sub">Outputs from SASC, FM, PEI, and documents appear here automatically</div></div>'
  }

  var iconMap = { solution:'&#9881;', pei:'&#129488;', tsap_fm:'&#128184;', exec_doc:'&#128196;', intel:'&#128270;', use_case:'&#128161;', default:'&#128196;' }
  var labelMap = { solution:'SASC Stack Config', pei:'Pre-Engagement Intelligence', tsap_fm:'TSAP Financial Model', exec_doc:'Document', intel:'Intelligence Signal', use_case:'Use Case' }

  html += '<div class="output-list">'
  outputs.forEach(function(item) {
    var icon = iconMap[item.item_type] || iconMap.default
    var typeLabel = labelMap[item.item_type] || item.item_type || 'Output'
    var done = item.status === 'done'
    var tool_url = getToolUrl(item)
    html += '<div class="output-item">'
      + '<div class="output-icon">' + icon + '</div>'
      + '<div class="output-info">'
      + '<div class="output-name' + (done?' uc-agreed':'')+'">' + esc(item.title||typeLabel) + (done?' <span style="font-size:10px;color:var(--teal)">&#10003; Done</span>' : '') + '</div>'
      + '<div class="output-meta">' + typeLabel + (item.created_at ? ' &bull; ' + fmtDate(item.created_at) : '') + (item.created_by ? ' &bull; ' + esc(item.created_by) : '') + '</div>'
      + '</div>'
      + (tool_url ? '<a href="' + tool_url + '" class="output-action">Open &rarr;</a>' : '')
      + '</div>'
  })
  html += '</div>'
  return html
}

function getToolUrl(item) {
  var eng = CURRENT_ENG
  var engParam = eng ? '?eng=' + eng.id : ''
  if (item.item_type === 'solution') return '../../tools/sasc/index.html' + engParam
  if (item.item_type === 'tsap_fm')  return '../../tools/tsap-financial-model/index.html' + engParam
  if (item.ref_table === 'pei_cache') return '../../tools/pei-tool/index.html'
  return ''
}

//    History                                                                    
function renderHistoryTab() {
  var sorted = DOCKET_ITEMS.slice().sort(function(a,b){ return new Date(b.created_at||0) - new Date(a.created_at||0) })
  if (!sorted.length) return '<div class="empty"><div class="empty-icon">&#128336;</div><div class="empty-title">No history yet</div></div>'
  var html = '<div class="card">'
  sorted.forEach(function(item) {
    var recent = item.created_at && (Date.now() - new Date(item.created_at)) < 7*24*3600*1000
    var sectionLabel = { uc:'Use Case', action:'Action', output:'Output', strategy:'Strategy', profile:'Profile', note:'Note' }[item.section] || item.section || ''
    html += '<div class="hist-item">'
      + '<div class="hist-dot' + (recent?' recent':'') + '"></div>'
      + '<div class="hist-text">' + (sectionLabel?'<strong>'+esc(sectionLabel)+':</strong> ':'') + esc(item.title||item.notes||'Item') + '</div>'
      + '<div class="hist-date">' + fmtDate(item.created_at) + '</div>'
      + '</div>'
  })
  html += '</div>'
  return html
}

//    Refresh                                                                    
async function refreshItems() {
  if (!CURRENT_DOCKET_ID) return
  DOCKET_ITEMS = (await sbGet('docket_items', 'docket_id=eq.' + CURRENT_DOCKET_ID + '&order=sort_order.asc,created_at.asc')) || []
}

//    Create customer                                                            
function openNewCustomerModal() {
  document.getElementById('cust-name').value = ''
  document.getElementById('cust-type').value = 'state_govt'
  document.getElementById('cust-location').value = ''
  document.getElementById('cust-contact').value = ''
  openModal('modal-customer')
}

async function saveCustomer() {
  var name = document.getElementById('cust-name').value.trim()
  if (!name) { showToast('Name required', 'err'); return }
  var row = {
    id: genId('CUST'),
    name: name,
    type: document.getElementById('cust-type').value,
    location: document.getElementById('cust-location').value.trim() || null,
    primary_contact: document.getElementById('cust-contact').value.trim() || null,
    created_at: new Date().toISOString()
  }
  var ok = await sbPost('customers', row)
  if (ok) {
    ALL_CUSTOMERS.push(row)
    closeModal('modal-customer')
    renderSidebar('')
    showToast('Customer created')
  } else {
    showToast('Failed to create customer', 'err')
  }
}

//    Create engagement                                                          
function openNewEngModal(custId) {
  document.getElementById('eng-cust-id').value = custId
  document.getElementById('eng-name').value = ''
  document.getElementById('eng-type').value = 'tsap'
  document.getElementById('eng-owner').value = ''
  document.getElementById('eng-cover').value = ''
  openModal('modal-engagement')
}

async function saveEngagement() {
  var name = document.getElementById('eng-name').value.trim()
  if (!name) { showToast('Name required', 'err'); return }
  var custId = document.getElementById('eng-cust-id').value
  var docketId = genId('DOC')
  var row = {
    id: genId('ENG'),
    name: name,
    customer_id: custId,
    type: document.getElementById('eng-type').value,
    owner: document.getElementById('eng-owner').value.trim() || null,
    cover_note: document.getElementById('eng-cover').value.trim() || null,
    status: 'active',
    docket_id: docketId,
    version: 1,
    opened_at: new Date().toISOString()
  }
  var ok = await sbPost('engagements', row)
  if (ok) {
    // Create docket record
    await sbPost('engagement_dockets', { id: docketId, engagement_id: row.id, created_at: new Date().toISOString() })
    ALL_ENGAGEMENTS.push(row)
    closeModal('modal-engagement')
    var cust = ALL_CUSTOMERS.find(function(c){ return c.id === custId }) || {}
    row._cust = cust
    CURRENT_ENG = row
    CURRENT_DOCKET_ID = docketId
    DOCKET_ITEMS = []
    renderSidebar('')
    renderDocket()
    showToast('Engagement created')
  } else {
    showToast('Failed to create engagement', 'err')
  }
}

//    Tool shortcuts                                                             
function openSASC() {
  var eng = CURRENT_ENG
  if (!eng) return
  window.location.href = '../../tools/sasc/index.html?eng=' + eng.id
}
function openFM() {
  var eng = CURRENT_ENG
  if (!eng) return
  window.location.href = '../../tools/tsap-financial-model/index.html?eng=' + eng.id
}

//    Modal helpers                                                              
function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === el) el.classList.remove('open')
  })
})

//    Boot                                                                       
init()
                                              
init()
</script>
