<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — Workload Profiler Prototype</title>
<style>
/* ── Design tokens (subset of atlas.css for standalone preview) ──────────── */
:root {
  --navy:#002870; --orange:#FF5539; --teal:#00B290; --amber:#FFB600; --blue:#1C38F5;
  --dark:#111827; --mid:#6B7280; --light:#F8F9FA; --border:#E5E7EB; --white:#fff; --bg:#F0F2F5;
  --font:'Roboto',-apple-system,sans-serif; --font-mono:'Roboto Mono',monospace;
  --r:8px; --r-sm:5px; --r-full:9999px;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;
}
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;900&family=Roboto+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--dark);font-size:13px;line-height:1.5}
.wrap{max-width:1300px;margin:0 auto;padding:var(--sp-6)}

/* Header */
.hdr{background:var(--navy);color:#fff;padding:var(--sp-4) var(--sp-6);display:flex;align-items:center;gap:var(--sp-3)}
.hdr .brand{font-weight:900;letter-spacing:3px;font-size:18px}
.hdr .brand span{color:var(--orange)}
.hdr .crumb{font-size:12px;color:rgba(255,255,255,.65)}
.hdr .crumb b{color:#fff;font-weight:600}

/* Tabs */
.tabbar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:var(--sp-5);background:#fff;border-radius:var(--r) var(--r) 0 0;padding:0 var(--sp-4)}
.tabbtn{padding:var(--sp-3) var(--sp-4);font-size:13px;font-weight:600;color:var(--mid);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:var(--font);margin-bottom:-2px;transition:color .15s}
.tabbtn.active{color:var(--navy);border-bottom-color:var(--orange)}
.tabbtn .cnt{background:var(--light);color:var(--mid);font-size:10px;padding:1px 6px;border-radius:var(--r-full);margin-left:6px}
.tabbtn.active .cnt{background:rgba(255,85,57,.12);color:var(--orange)}

/* GPU default bar */
.gpu-default{display:flex;align-items:center;gap:var(--sp-3);background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4);font-size:12px}
.gpu-default label{font-weight:700;color:var(--mid);text-transform:uppercase;font-size:10px;letter-spacing:.4px}
.gpu-default select{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:12px}

/* Table */
.tablewrap{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:var(--sp-4)}
table.wl{width:100%;border-collapse:collapse}
table.wl thead th{background:var(--navy);color:#fff;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:var(--sp-2) var(--sp-3);font-weight:700}
table.wl thead th.num{text-align:right}
table.wl tbody tr.row-main{cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
table.wl tbody tr.row-main:hover{background:var(--light)}
table.wl tbody tr.row-main.open{background:rgba(0,40,112,.03)}
table.wl td{padding:var(--sp-2) var(--sp-3);font-size:12.5px}
table.wl td.num{text-align:right;font-family:var(--font-mono);font-size:12px}
table.wl td.name{font-weight:600;color:var(--dark)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:700}
.badge-met{background:rgba(0,178,144,.12);color:var(--teal)}
.badge-breach{background:rgba(255,85,57,.12);color:var(--orange)}
.arrow{display:inline-block;transition:transform .25s;font-size:10px;color:var(--mid)}
.row-main.open .arrow{transform:rotate(90deg)}
.totals-row td{background:var(--light);font-weight:700;border-top:2px solid var(--border);padding:var(--sp-2) var(--sp-3)}

/* Expand panel */
.expand-row td{padding:0;border-bottom:1px solid var(--border)}
.expand-inner{max-height:0;overflow:hidden;transition:max-height .35s ease}
.expand-inner.open{max-height:2200px;transition:max-height .45s ease}
.expand-pad{padding:var(--sp-5);background:#FAFBFC}

.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-4);margin-bottom:var(--sp-4)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.4px}
.fg select,.fg input[type=number],.fg input[type=text]{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:12.5px;background:#fff}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--blue)}
.fg-hint{font-size:10px;color:var(--mid)}

.radiorow{display:flex;flex-direction:column;gap:6px}
.radio-opt{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.radio-opt input{accent-color:var(--navy)}

.sliderwrap{display:flex;align-items:center;gap:var(--sp-3)}
.sliderwrap input[type=range]{flex:1;accent-color:var(--navy);height:4px}
.slider-val{font-size:16px;font-weight:900;color:var(--navy);min-width:64px;text-align:right;font-family:var(--font-mono)}

.collapsible{margin-bottom:var(--sp-3)}
.collapsible-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--navy);padding:6px 0;user-select:none}
.collapsible-hdr .arrow{color:var(--navy)}
.collapsible-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapsible-body.open{max-height:600px}
.collapsible-body-pad{padding:var(--sp-3) 0 var(--sp-2)}

.derived{background:var(--navy);color:#fff;border-radius:var(--r);padding:var(--sp-4);margin-top:var(--sp-2)}
.derived-line{display:flex;gap:var(--sp-5);flex-wrap:wrap;font-size:11.5px;color:rgba(255,255,255,.85);margin-bottom:4px}
.derived-line b{color:#fff}
.sla-banner{margin-top:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-radius:var(--r-sm);font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.sla-met{background:rgba(0,178,144,.18);color:#5EEAD4}
.sla-breach{background:rgba(255,85,57,.2);color:#FCA5A5}
.sla-hint{font-weight:400;font-size:11px;opacity:.85;margin-left:auto}

.rag-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(28,56,245,.1);color:var(--blue);padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700;margin-left:8px}
.tenant-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,178,144,.1);color:var(--teal);padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:600}
.pool-badge-reserved{display:inline-flex;align-items:center;gap:3px;background:rgba(0,40,112,.1);color:var(--navy);padding:2px 7px;border-radius:var(--r-full);font-size:9px;font-weight:700}
.pool-badge-open{display:inline-flex;align-items:center;gap:3px;background:rgba(255,182,0,.12);color:#92400E;padding:2px 7px;border-radius:var(--r-full);font-size:9px;font-weight:700}

/* Tenant management panel */
.tenant-mgmt{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:var(--sp-4);margin-bottom:var(--sp-4)}
.tenant-mgmt-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)}
.tenant-mgmt-title{font-size:13px;font-weight:700;color:var(--navy)}
.tenant-chip-list{display:flex;flex-wrap:wrap;gap:8px}
.tenant-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:11.5px;background:var(--light)}
.tenant-chip b{color:var(--dark)}
.tenant-chip .sec{font-size:9px;color:#fff;background:var(--navy);padding:1px 6px;border-radius:var(--r-full)}
.add-tenant-btn{padding:5px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:700;border:1.5px dashed var(--teal);background:rgba(0,178,144,.05);color:var(--teal);cursor:pointer;font-family:var(--font)}

/* Reusable tenant block (within any expanded row) */
.tenant-block{background:rgba(0,178,144,.04);border:1px solid rgba(0,178,144,.25);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4)}
.tenant-block-hdr{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.pool-toggle{display:flex;gap:0;margin-top:4px}
.pool-btn{padding:6px 14px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font)}
.pool-btn:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm)}
.pool-btn:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0;border-left:none}
.pool-btn.active-reserved{background:var(--navy);color:#fff;border-color:var(--navy)}
.pool-btn.active-open{background:var(--amber);color:#78350F;border-color:var(--amber)}
.mvb-toggle{display:flex;gap:0;margin-bottom:var(--sp-3)}
.mvb-btn{padding:5px 14px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font)}
.mvb-btn:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm)}
.mvb-btn:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0}
.mvb-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mvb-chart{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--sp-4);font-size:11px;color:var(--mid)}

.actions-row{display:flex;justify-content:space-between;align-items:center;margin-top:var(--sp-4)}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--font)}
.btn-ghost{background:var(--light);color:var(--dark)}
.btn-danger-text{background:none;color:var(--orange);border:1.5px solid var(--orange)}
.add-row{padding:var(--sp-3) var(--sp-4)}
.add-btn{padding:8px 18px;border-radius:var(--r-sm);font-size:12px;font-weight:700;border:1.5px dashed var(--navy);background:rgba(0,40,112,.03);color:var(--navy);cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">ATL<span>A</span>S</div>
  <div class="crumb">Docket &rsaquo; <b>HAICE</b> &rsaquo; Solution</div>
</div>

<div class="wrap">

  <div class="gpu-default">
    <label>Engagement default GPU</label>
    <select id="defaultGpu" onchange="C.setDefaultGpu(this.value)">
      <option value="h200">H200 SXM</option>
      <option value="b200">B200 SXM</option>
      <option value="gb200">GB200 NVL72</option>
      <option value="l40s">L40S</option>
    </select>
    <span class="fg-hint">Pre-fills every new workload row — override per row anytime</span>
  </div>

  <div class="tabbar" id="tabbar"></div>
  <div id="tabbody"></div>

</div>

<script>
'use strict'

// ═══════════════════ MODEL ═══════════════════
var M = {
  defaultGpu: 'h200',
  activeTab: 'uc',
  openRows: {},   // rowId -> bool
  uc: [
    {
      id:'uc1', name:'GLOF Early Warning System', ucLib:'glof', gpu:null,
      domain:'geospatial', model:'sarvam-2b', ucType:'rag', ragLatencyBudget:300,
      deployMode:'production', dau:500, reqPerDay:12, peakMult:3,
      inputTok:4096, outputTok:800, precision:'int4', slaTier:'tier1', ttftTarget:200,
      haTier:'2n', drType:'active_active',
      agentic:false, steps:1, toolWait:0,
      tenant:'state-it-dept', poolType:'reserved', tenure:'24',
      mvbView:'uc'
    },
    {
      id:'uc2', name:'Crop Disease Detection', ucLib:'crop', gpu:null,
      domain:'agriculture', model:'llama-3.1-8b', ucType:'vision', ragLatencyBudget:0,
      deployMode:'production', dau:50000, reqPerDay:3, peakMult:4,
      inputTok:1024, outputTok:300, precision:'int4', slaTier:'tier2', ttftTarget:2000,
      haTier:'n1', drType:'none',
      agentic:false, steps:1, toolWait:0,
      tenant:'agri-dept', poolType:'open', tenure:null,
      mvbView:'uc'
    }
  ],
  maas: [
    {
      id:'maas1', name:'Llama-3.3-70B — Open Pool', model:'llama-3.3-70b', gpu:'b200',
      precision:'int4', dau:50000, slaTier:'standard',
      tenant:null, poolType:'open', tenure:null,
      mvbView:'maas'
    },
    {
      id:'maas2', name:'Llama-3.3-70B — State IT Reservation', model:'llama-3.3-70b', gpu:'b200',
      precision:'int4', dau:8000, slaTier:'enterprise',
      tenant:'state-it-dept', poolType:'reserved', tenure:'24',
      mvbView:'maas'
    }
  ],
  gpuaas: [
    {
      id:'gpuaas1', name:'Dedicated GPU Block — Health Dept', gpu:'h200',
      gpuCount:16, tenant:'health-dept', poolType:'reserved', tenure:'36',
      mvbView:'fleet'
    }
  ]
}

var GPU_LABELS = { h200:'H200 SXM', b200:'B200 SXM', gb200:'GB200 NVL72', l40s:'L40S' }
var UC_LIB = { glof:'GLOF Early Warning System (UC Library)', crop:'Crop Disease Detection (UC Library)', adhoc:'+ Define ad-hoc' }
var SLA_LABELS = { tier1:'Tier 1 — Interactive (<200ms)', tier2:'Tier 2 — Analytical (<2s)', tier3:'Tier 3 — Async Batch' }
var ARCHETYPES = { text_chat:'Text / Chat', coding:'Coding', document:'Document', audio:'Audio / Speech', indic:'Indic / Regional', generic:'Generic / API' }
var MODEL_TIERS = { basic:'Basic (1-14B)', mid:'Mid (14-70B)', advanced:'Advanced (70B+)' }

var DOMAINS = { geospatial:'Geospatial', agriculture:'Agriculture', health:'Health', governance:'Governance', education:'Education', finance:'Finance', defence:'Defence' }
var MODELS = {
  'sarvam-2b':'Sarvam-2B (Indic, sovereign)', 'sarvam-m':'Sarvam-M (Indic, sovereign)',
  'llama-3.1-8b':'Llama-3.1-8B', 'llama-3.3-70b':'Llama-3.3-70B', 'llama-3.1-405b':'Llama-3.1-405B',
  'deepseek-coder-32b':'DeepSeek-Coder-V2 32B', 'qwen2.5-coder-32b':'Qwen2.5-Coder-32B',
  'mistral-large':'Mistral Large 2 123B'
}
var UC_TYPES = {
  chatbot:'Chatbot / Conversational', text:'Text Processing', rag:'RAG / Knowledge Retrieval',
  vision:'Vision / Multimodal', agentic:'Agentic / Tool-use', batch:'Batch Processing', voice:'Voice / Audio'
}
var HA_TIERS = { none:'None', n1:'N+1 (standard)', n2:'2N (mission-critical)' }
var DR_TYPES = { none:'None', warm:'Warm Standby (+50% DR site)', active_active:'Active-Active (+100% DR site)' }
var TENANTS_LIST = {
  'state-it-dept': { name:'State IT Department', secTier:'S2', chargeout:'cost_recovery' },
  'agri-dept':     { name:'Agriculture Department', secTier:'S1', chargeout:'subsidised' },
  'health-dept':   { name:'Health Department', secTier:'S2', chargeout:'cost_recovery' },
  'public':        { name:'Public / Citizen-facing', secTier:'S1', chargeout:'zero' },
}
var CHARGEOUT_LABELS = { commercial:'Commercial', cost_recovery:'Cost Recovery', subsidised:'Subsidised', zero:'Zero (free)' }
var TENURE_LABELS = { '12':'12 months', '24':'24 months', '36':'36 months', 'custom':'Custom' }

// ═══════════════════ SIZING (calls real SizingEngine pattern — dummy math here) ═══════════════════
// REFACTOR-MARKER: replace with real SizingEngine.sizeUC()/sizeMaaS() calls when C is wired
function sizeUC(wl) {
  var gpu = wl.gpu || M.defaultGpu
  var avgRPS = (wl.dau * wl.reqPerDay) / 86400
  var p95RPS = avgRPS * wl.peakMult * 1.5
  var concurrent = Math.max(1, Math.ceil(p95RPS * (wl.ttftTarget/1000)))
  var tpI = wl.precision === 'int4' ? 2 : wl.precision === 'int8' ? 4 : 8
  var baseGpus = Math.max(1, Math.ceil(concurrent / 4) * tpI)
  var buffers = Math.ceil(baseGpus * 0.65)
  var total = baseGpus + buffers
  var powerKw = Math.round(total * 0.7 * 10) / 10
  var ttftEstimate = Math.round(wl.ttftTarget * (0.7 + Math.random()*0.25))
  var slaMet = ttftEstimate <= wl.ttftTarget
  var margin = Math.round(Math.abs((wl.ttftTarget - ttftEstimate) / wl.ttftTarget) * 100)
  return {
    gpu: gpu, p95RPS: Math.round(p95RPS*100)/100, concurrent: concurrent,
    baseGpus: baseGpus, buffers: buffers, total: total, powerKw: powerKw,
    racks: total <= 72 ? '1 rack (partial)' : Math.ceil(total/72) + ' racks',
    ttftEstimate: ttftEstimate, slaMet: slaMet, margin: margin
  }
}
function sizeMaaS(wl) {
  var avgRPS = wl.dau / 86400 * 8
  var throughput = Math.round(avgRPS * 4000)
  var instances = Math.max(1, Math.ceil(throughput / 32000))
  var modelSize = (wl.model||'').includes('405b') || (wl.model||'').includes('large') ? 'advanced'
    : (wl.model||'').includes('70b') || (wl.model||'').includes('32b') ? 'mid' : 'basic'
  var baseGpus = instances * (modelSize === 'advanced' ? 8 : modelSize === 'mid' ? 4 : 2)
  var buffers = Math.ceil(baseGpus * 0.5)
  var total = baseGpus + buffers
  var powerKw = Math.round(total * 0.85 * 10) / 10
  var cpst = (0.001 + Math.random()*0.003).toFixed(4)
  return { gpu: wl.gpu, throughput: throughput, instances: instances, baseGpus: baseGpus,
    buffers: buffers, total: total, powerKw: powerKw, racks: total<=72?'1 rack':Math.ceil(total/72)+' racks', cpst: cpst }
}

// ═══════════════════ VIEW ═══════════════════
var V = {

  renderTabs: function() {
    var tabs = [
      {key:'uc', label:'UCs', count:M.uc.length},
      {key:'maas', label:'MaaS', count:M.maas.length},
      {key:'gpuaas', label:'GPUaaS', count:M.gpuaas.length},
      {key:'bmaas', label:'BMaaS', count:0},
    ]
    var html = ''
    tabs.forEach(function(t){
      html += '<button class="tabbtn'+(M.activeTab===t.key?' active':'')+'" onclick="C.switchTab(\''+t.key+'\')">'
        + t.label + '<span class="cnt">'+t.count+'</span></button>'
    })
    document.getElementById('tabbar').innerHTML = html
  },

  renderTabBody: function() {
    var el = document.getElementById('tabbody')
    el.innerHTML = V.renderTenantMgmt()
    if (M.activeTab === 'uc')     { el.innerHTML += V.renderUCTab(); return }
    if (M.activeTab === 'maas')   { el.innerHTML += V.renderMaasTab(); return }
    if (M.activeTab === 'gpuaas') { el.innerHTML += V.renderGpuaasTab(); return }
    el.innerHTML += '<div class="tablewrap"><div style="padding:40px;text-align:center;color:var(--mid)">'
      + 'No items in this category yet. Select the corresponding portfolio item in the Portfolio tab first.</div></div>'
  },

  renderTenantMgmt: function() {
    var h = '<div class="tenant-mgmt">'
    h += '<div class="tenant-mgmt-hdr"><div class="tenant-mgmt-title">Tenants — defined once, used across UC / MaaS / GPUaaS / BMaaS</div>'
    h += '<button class="add-tenant-btn" onclick="C.addTenant()">+ Define New Tenant</button></div>'
    h += '<div class="tenant-chip-list">'
    Object.keys(TENANTS_LIST).forEach(function(k){
      var t = TENANTS_LIST[k]
      h += '<div class="tenant-chip"><b>'+t.name+'</b><span class="sec">'+t.secTier+'</span><span style="color:var(--mid)">'+CHARGEOUT_LABELS[t.chargeout]+'</span></div>'
    })
    h += '</div></div>'
    return h
  },

  renderGpuaasTab: function() {
    var rows = M.gpuaas, totalGpus = 0
    var html = '<div class="tablewrap"><table class="wl"><thead><tr>'
      + '<th>Block</th><th>GPU</th><th class="num">GPUs</th><th>Tenant</th><th></th></tr></thead><tbody>'
    rows.forEach(function(wl) {
      totalGpus += wl.gpuCount
      var isOpen = !!M.openRows[wl.id]
      var t = wl.tenant ? TENANTS_LIST[wl.tenant] : null
      html += '<tr class="row-main'+(isOpen?' open':'')+'" onclick="C.toggleRow(\''+wl.id+'\')">'
        + '<td class="name">'+wl.name+'</td>'
        + '<td>'+GPU_LABELS[wl.gpu]+'</td>'
        + '<td class="num">'+wl.gpuCount+'</td>'
        + '<td>'+(t?'<span class="tenant-badge">'+t.name+'</span> <span class="pool-badge-'+wl.poolType+'">'+(wl.poolType==='reserved'?'&#128274; Reserved':'&#9889; Open'):'—')+'</td>'
        + '<td><span class="arrow">&#9654;</span></td></tr>'
      html += '<tr class="expand-row"><td colspan="5"><div class="expand-inner'+(isOpen?' open':'')+'">'
      if (isOpen) {
        html += '<div class="expand-pad">'
        html += '<div class="formgrid" style="grid-template-columns:1fr 1fr"><div class="fg"><label>GPU</label><select onchange="C.updGpuaas(\''+wl.id+'\',\'gpu\',this.value)">'
        Object.keys(GPU_LABELS).forEach(function(k2){ html += '<option value="'+k2+'"'+(wl.gpu===k2?' selected':'')+'>'+GPU_LABELS[k2]+'</option>' })
        html += '</select></div><div class="fg"><label>GPU Count</label><input type="number" value="'+wl.gpuCount+'" onchange="C.updGpuaas(\''+wl.id+'\',\'gpuCount\',+this.value)"></div></div>'
        html += V.renderTenantBlock(wl, 'gpuaas')

    h += '</svg>'
    h += '<div style="display:flex;gap:16px;margin-top:8px;font-size:10px">'
    h += '<span><span style="display:inline-block;width:10px;height:2px;background:#002870;margin-right:4px;vertical-align:middle"></span>Our on-prem</span>'
    h += '<span><span style="display:inline-block;width:10px;height:2px;background:#FF5539;margin-right:4px;vertical-align:middle"></span>API — Closed Weights</span>'
    h += '<span><span style="display:inline-block;width:10px;height:2px;background:#FFB600;margin-right:4px;vertical-align:middle"></span>API — Open Weights</span>'
    h += '</div>'
    h += '<div style="margin-top:8px;font-size:10px;color:var(--mid)">Breakeven vs Closed: ~48% utilisation &middot; vs Open: ~71% utilisation &middot; 5yr amortisation</div>'
    h += '</div>'
    return h
  },
}

// ═══════════════════ CONTROLLER ═══════════════════
var C = {
  switchTab: function(tab) {
    M.activeTab = tab
    V.renderTabs()
    V.renderTabBody()
  },

  toggleRow: function(id) {
    M.openRows[id] = !M.openRows[id]
    V.renderTabBody()
    // Trigger animation after render by toggling class on next frame
    requestAnimationFrame(function(){
      var el = document.getElementById('exp-'+id)
      if (el) el.classList.toggle('open', M.openRows[id])
    })
  },

  toggleCollapsible: function(hdrEl) {
    var body = hdrEl.nextElementSibling
    var arrow = hdrEl.querySelector('.arrow')
    body.classList.toggle('open')
    arrow.style.transform = body.classList.contains('open') ? 'rotate(90deg)' : 'rotate(0deg)'
  },

  setDefaultGpu: function(val) {
    M.defaultGpu = val
    V.renderTabBody()
  },

  updUC: function(id, field, val) {
    var wl = M.uc.find(function(w){ return w.id === id })
    if (wl) wl[field] = val
    V.renderTabBody()
  },
  updUCSlider: function(id, field, val) {
    var wl = M.uc.find(function(w){ return w.id === id })
    if (!wl) return
    wl[field] = val
    // Update only the value labels + derived panel, avoid full re-render jank while dragging
    if (field === 'dau') document.getElementById('dauval-'+id).textContent = val.toLocaleString()
    if (field === 'peakMult') document.getElementById('pmval-'+id).textContent = val + 'x'
    clearTimeout(C._sliderDebounce)
    C._sliderDebounce = setTimeout(function(){ V.renderTabBody() }, 150)
  },

  updMaas: function(id, field, val) {
    var wl = M.maas.find(function(w){ return w.id === id })
    if (wl) wl[field] = val
    V.renderTabBody()
  },
  updMaasSlider: function(id, field, val) {
    var wl = M.maas.find(function(w){ return w.id === id })
    if (!wl) return
    wl[field] = val
    if (field === 'dau') document.getElementById('madauval-'+id).textContent = val.toLocaleString()
    clearTimeout(C._sliderDebounce)
    C._sliderDebounce = setTimeout(function(){ V.renderTabBody() }, 150)
  },

  // ── Tenant block controller — works identically across UC/MaaS/GPUaaS ──
  updTenant: function(id, context, field, val) {
    var arr = context === 'uc' ? M.uc : context === 'maas' ? M.maas : M.gpuaas
    var wl = arr.find(function(w){ return w.id === id })
    if (!wl) return
    wl[field] = val
    if (field === 'tenant' && !val) { wl.poolType = 'open'; wl.tenure = null }
    if (field === 'poolType' && val === 'open') wl.tenure = null
    if (field === 'poolType' && val === 'reserved' && !wl.tenure) wl.tenure = '12'
    V.renderTabBody()
  },

    setMvBView: function(id, ctx) {
    var wl = M.uc.find(function(w){ return w.id === id }) || M.maas.find(function(w){ return w.id === id })
    if (wl) wl.mvbView = ctx
    V.renderTabBody()
  },

  addUC: function() {
    var id = 'uc' + (M.uc.length + 1) + '-' + Date.now()
    M.uc.push({ id:id, name:'New Use Case', ucLib:'adhoc', gpu:null, deployMode:'production',
      dau:1000, reqPerDay:5, peakMult:3, inputTok:2048, outputTok:500, precision:'int4',
      slaTier:'tier2', ttftTarget:2000, agentic:false, steps:1, toolWait:0, mvbView:'uc' })
    M.openRows[id] = true
    V.renderTabs(); V.renderTabBody()
  },
  removeUC: function(id) {
    M.uc = M.uc.filter(function(w){ return w.id !== id })
    V.renderTabs(); V.renderTabBody()
  },
  addMaas: function() {
    var id = 'maas' + (M.maas.length + 1) + '-' + Date.now()
    M.maas.push({ id:id, name:'New MaaS Pool', archetype:'text_chat', gpu:M.defaultGpu,
      model:'llama-3.1-8b', precision:'int4', dau:10000, slaTier:'standard', mvbView:'maas' })
    M.openRows[id] = true
    V.renderTabs(); V.renderTabBody()
  },
  removeMaas: function(id) {
    M.maas = M.maas.filter(function(w){ return w.id !== id })
    V.renderTabs(); V.renderTabBody()
  },

  addGpuaas: function() {
    var id = 'gpuaas' + (M.gpuaas.length + 1) + '-' + Date.now()
    M.gpuaas.push({ id:id, name:'New GPU Block', gpu:M.defaultGpu, gpuCount:8,
      tenant:null, poolType:'open', tenure:null, mvbView:'fleet' })
    M.openRows[id] = true
    V.renderTabs(); V.renderTabBody()
  },
  updGpuaas: function(id, field, val) {
    var wl = M.gpuaas.find(function(w){ return w.id === id })
    if (wl) wl[field] = val
    V.renderTabBody()
  },
  removeGpuaas: function(id) {
    M.gpuaas = M.gpuaas.filter(function(w){ return w.id !== id })
    V.renderTabs(); V.renderTabBody()
  },

  addTenant: function() {
    var name = prompt('New tenant name:')
    if (!name) return
    var id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-')
    TENANTS_LIST[id] = { name: name, secTier: 'S1', chargeout: 'commercial' }
    V.renderTabBody()
  },
}

// ═══════════════════ INIT ═══════════════════
M.openRows['uc1'] = true       // UC row open — Reserved tenant example
M.openRows['maas2'] = true     // MaaS row open — Reserved tenant example
M.openRows['gpuaas1'] = true   // GPUaaS row open — Reserved tenant example
V.renderTabs()
V.renderTabBody()
</script>
