<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS — Engagement Docket v3</title>
  <link rel="stylesheet" href="https://arvindbajaj5.github.io/atlas-platform/shared/atlas.css">
  <style>
    /* Tool-specific overrides — max 50 lines */
    .req-add-row { display:flex; gap:var(--sp-3); margin-bottom:var(--sp-4); }
    .req-add-row textarea { flex:1; min-height:60px; resize:none; }
    .source-btns { display:flex; flex-direction:column; gap:var(--sp-1); }
    .source-btn  { padding:4px 10px; border-radius:var(--r-sm); font-size:10px; font-weight:var(--fw-bold); border:1.5px solid; cursor:pointer; font-family:var(--font); white-space:nowrap; }
    .source-btn.explicit  { border-color:var(--navy);  color:var(--navy);  background:rgba(0,40,112,0.06);  }
    .source-btn.implicit  { border-color:var(--blue);  color:var(--blue);  background:rgba(28,56,245,0.06); }
    .source-btn.suggested { border-color:var(--teal);  color:var(--teal);  background:rgba(0,178,144,0.06); }
    .source-btn:hover { opacity:0.8; }
    .intel-run-bar { display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) var(--sp-4); background:var(--light); border-radius:var(--r); margin-bottom:var(--sp-4); border:1px solid var(--border); }
    .intel-run-meta { font-size:var(--text-xs); color:var(--mid); }
    .intel-run-meta strong { color:var(--dark); }
    .pulse-item { padding:var(--sp-3) var(--sp-4); border:1px solid var(--border); border-radius:var(--r-sm); margin-bottom:var(--sp-2); background:var(--white); }
    .pulse-item-hdr { display:flex; align-items:flex-start; gap:var(--sp-2); margin-bottom:var(--sp-1); }
    .pulse-item-title { font-size:var(--text-sm); font-weight:var(--fw-semi); color:var(--dark); flex:1; }
    .pulse-item-date  { font-size:10px; color:var(--mid); white-space:nowrap; }
    .pulse-item-body  { font-size:var(--text-xs); color:var(--mid); line-height:1.5; }
    .brief-section { margin-bottom:var(--sp-5); }
    .brief-section h4 { font-size:var(--text-sm); font-weight:var(--fw-bold); color:var(--navy); margin-bottom:var(--sp-2); border-bottom:1px solid var(--border); padding-bottom:var(--sp-1); }
    .brief-q { padding:var(--sp-2) var(--sp-3); background:var(--light); border-radius:var(--r-sm); margin-bottom:var(--sp-1); font-size:var(--text-sm); color:var(--dark); }
    .uc-match-item { display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-2) var(--sp-3); border:1px solid var(--border); border-radius:var(--r-sm); margin-bottom:var(--sp-2); background:var(--white); }
    .uc-match-score { font-size:var(--text-lg); font-weight:var(--fw-black); color:var(--teal); min-width:44px; text-align:center; }
    .uc-match-info { flex:1; }
    .uc-match-name { font-size:var(--text-sm); font-weight:var(--fw-semi); color:var(--dark); }
    .uc-match-meta { font-size:var(--text-xs); color:var(--mid); }
  </style>
</head>
<body>

<!-- ── MASTHEAD ────────────────────────────────────────────────────────────── -->
<div class="atlas-hdr">
  <div class="atlas-hdr-left">
    <div class="atlas-brand">ATL<span>A</span>S</div>
    <div class="atlas-tool-name">Engagement Docket</div>
  </div>
  <div class="atlas-hdr-right">
    <span class="atlas-ver">v3.0 — prototype</span>
    <button class="atlas-nav-btn" onclick="window.location.href='../../'">&#8592; Portal</button>
  </div>
</div>

<!-- ── LAYOUT ──────────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-search">
      <input type="text" id="sb-search" placeholder="Search customers, engagements..."
             oninput="M.filterSidebar(this.value)">
    </div>
    <div class="sb-body" id="sb-body"></div>
    <div style="padding:var(--sp-3) 14px;border-top:1px solid var(--border)">
      <button class="btn btn-outline" style="width:100%;font-size:11px"
              onclick="V.openNewCustomerModal()">+ New Customer</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="docket-area">
      <div class="empty-state" style="margin:auto;padding-top:80px">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Select an engagement</div>
        <div class="empty-desc">Choose a customer and engagement from the left panel, or create a new one.</div>
      </div>
    </div>
  </div>

</div>

<!-- ── MODALS ──────────────────────────────────────────────────────────────── -->

<!-- New Customer -->
<div class="modal-overlay" id="modal-customer" style="display:none" onclick="if(event.target===this)V.closeModal('modal-customer')">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Customer</div>
      <button class="btn btn-ghost btn-sm" onclick="V.closeModal('modal-customer')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Organisation Name</label>
        <input type="text" id="cust-name" placeholder="e.g. Government of Himachal Pradesh">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
        <div class="form-group">
          <label class="form-label">Organisation Type</label>
          <select id="cust-type">
            <option value="state_govt">State Government</option>
            <option value="central_govt">Central Government</option>
            <option value="defence">Defence / Intelligence</option>
            <option value="enterprise">Enterprise</option>
            <option value="csp">CSP / Cloud Provider</option>
            <option value="ai_lab">AI Lab / University</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" id="cust-location" placeholder="e.g. Shimla, India">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Primary Contact</label>
        <input type="text" id="cust-contact" placeholder="e.g. Secretary IT">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-customer')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveCustomer()">Create Customer</button>
    </div>
  </div>
</div>

<!-- New Engagement -->
<div class="modal-overlay" id="modal-engagement" style="display:none" onclick="if(event.target===this)V.closeModal('modal-engagement')">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Engagement</div>
      <button class="btn btn-ghost btn-sm" onclick="V.closeModal('modal-engagement')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eng-cust-id">
      <div class="form-group">
        <label class="form-label">Engagement Name</label>
        <input type="text" id="eng-name" placeholder="e.g. HP State — Himalayan AI Centre of Excellence">
      </div>
      <div class="form-group">
        <label class="form-label">Engagement Archetypes</label>
        <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-1)" id="archetype-selector">
          <!-- populated by V.renderArchetypeSelector() -->
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Territory / Geography</label>
        <input type="text" id="eng-territory" placeholder="e.g. Himachal Pradesh, India">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-engagement')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveEngagement()">Create Engagement</button>
    </div>
  </div>
</div>

<!-- Confirm Run Intel -->
<div class="modal-overlay" id="modal-intel-run" style="display:none">
  <div class="modal" style="max-width:440px">
    <div class="modal-hdr">
      <div class="modal-title">Run Intelligence Collection?</div>
    </div>
    <div class="modal-body">
      <div id="intel-run-details"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-intel-run')">Cancel</button>
      <button class="btn btn-ghost" onclick="C.runIntelCollection('stale')">Refresh stale only</button>
      <button class="btn btn-primary" onclick="C.runIntelCollection('full')">Run full refresh</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- ── SCRIPTS ─────────────────────────────────────────────────────────────── -->
<script src="https://arvindbajaj5.github.io/atlas-platform/shared/atlas-tokens.js"></script>
<script src="https://arvindbajaj5.github.io/atlas-platform/shared/atlas-db.js"></script>
<script>
'use strict'

// ═══════════════════════════════════════════════════════════════════════════════
// MODEL — Single source of truth for all page state
// Never written to by View functions. Only written to by Controllers.
// REFACTOR-MARKER: extract to shared/atlas-model.js in maintainability phase
// ═══════════════════════════════════════════════════════════════════════════════

var M = {
  // ── Data ──────────────────────────────────────────────────────────────────
  customers:       [],
  engagements:     [],
  currentEng:      null,
  currentDocketId: null,
  docketItems:     [],         // ALL items for current engagement
  ucLibrary:       [],
  activeTab:       'overview',
  selectedArchetypes: [],      // for new engagement modal

  // ── Derived collections (computed from docketItems, not fetched separately) ─
  get requirements() {
    return this.docketItems.filter(function(i) { return i.item_type === ATLAS.ITEM_TYPE.REQUIREMENT })
  },
  get portfolioSelection() {
    var item = this.docketItems.find(function(i) { return i.item_subtype === 'portfolio_selection' })
    return (item && item.content && item.content.items) ? item.content.items : []
  },
  get maasConfig() {
    var item = this.docketItems.find(function(i) { return i.item_subtype === 'maas_config' })
    return item ? atlasDB.parseContent(item).content : null
  },
  get ucItems() {
    return this.docketItems.filter(function(i) { return i.item_type === ATLAS.ITEM_TYPE.UC })
  },
  get actionItems() {
    return this.docketItems.filter(function(i) { return i.item_type === ATLAS.ITEM_TYPE.ACTION })
  },
  get outputItems() {
    return this.docketItems.filter(function(i) {
      return [ATLAS.ITEM_TYPE.PROPOSAL, ATLAS.ITEM_TYPE.BOM, ATLAS.ITEM_TYPE.EXEC_DOC].includes(i.item_type)
    })
  },
  get intelItems() {
    return this.docketItems.filter(function(i) { return i.item_type === ATLAS.ITEM_TYPE.INTEL })
  },

  // ── Sidebar filter ────────────────────────────────────────────────────────
  sidebarFilter: '',
  filterSidebar: function(q) {
    M.sidebarFilter = (q || '').toLowerCase()
    V.renderSidebar()
  },

  // ── Intel ops run state ───────────────────────────────────────────────────
  lastIntelRun: null,
  lastRunCost:  0,
  lastRunItems: 0,
}

// ─── DUMMY DATA ──────────────────────────────────────────────────────────────
// This is the M prototype — real shapes, fake values.
// When C is wired, these are replaced with atlasDB calls.
// The shapes here define what the Supabase schema must support.
// REFACTOR-MARKER: replace with atlasDB.get() calls in Controller wiring phase

var DUMMY = {

    { id: 'cust-003', name: 'DGCA — Civil Aviation', type: 'central_govt', location: 'New Delhi, India', contact: 'DG Civil Aviation' },
  ],
  engagements: [
    { id: 'ENG-2026-HP-001', customer_id: 'cust-001', name: 'HAICE — Himalayan AI Centre of Excellence', archetypes: [ATLAS.ARCHETYPE.TSAP], territory: 'Himachal Pradesh', docket_id: 'DOC-HP-001', status: 'active' },
    { id: 'ENG-2026-NE-001', customer_id: 'cust-002', name: 'Sovereign GeoAI Platform NE India', archetypes: [ATLAS.ARCHETYPE.TSAP, ATLAS.ARCHETYPE.DEPLOYER], territory: 'Northeast India', docket_id: 'DOC-NE-001', status: 'active' },
    { id: 'ENG-2026-DG-001', customer_id: 'cust-003', name: 'DGCA AI Safety Platform', archetypes: [ATLAS.ARCHETYPE.DEPLOYER, ATLAS.ARCHETYPE.DEFENCE], territory: 'India', docket_id: 'DOC-DG-001', status: 'active' },
  ],
  docketItems: {
    'DOC-HP-001': [
      // Requirements
      { id: 'req-001', docket_id: 'DOC-HP-001', item_type: 'requirement', source: 'explicit', status: 'active', text: 'We have a 10MW plot in Shimla for the AI Centre. Site is near the glacial river.', tags: ['10MW+', 'greenfield', 'DLC', 'free-cooling', 'S3-sovereign'], created_at: '2026-06-01T10:00:00Z' },
      { id: 'req-002', docket_id: 'DOC-HP-001', item_type: 'requirement', source: 'explicit', status: 'active', text: 'Must serve all 50 government departments as tenants. Need separate billing per department.', tags: ['sell-to-others', 'cost-recovery', 'S2-enhanced'], created_at: '2026-06-01T10:05:00Z' },
      { id: 'req-003', docket_id: 'DOC-HP-001', item_type: 'requirement', source: 'implicit', status: 'accepted', text: 'Glacial river proximity implies free cooling opportunity via river water. Significant opex saving.', tags: ['free-cooling', 'river-water', 'DLC'], created_at: '2026-06-01T10:10:00Z' },
      { id: 'req-004', docket_id: 'DOC-HP-001', item_type: 'requirement', source: 'suggested', status: 'accepted', text: 'Glacier Lake Outburst Flood (GLOF) early warning system using GeoAI — critical for Himachal.', tags: ['agriculture', 'geospatial', 'governance'], created_at: '2026-06-02T09:00:00Z' },
      { id: 'req-005', docket_id: 'DOC-HP-001', item_type: 'requirement', source: 'suggested', status: 'active', text: 'Horticulture AI for apple crop disease detection and yield prediction.', tags: ['agriculture'], created_at: '2026-06-02T09:05:00Z' },
      // Portfolio selection
      { id: 'port-001', docket_id: 'DOC-HP-001', item_type: 'solution', item_subtype: 'portfolio_selection', section: 'output', status: 'done', content: { items: ['P02', 'P03', 'P04', 'P08', 'B1A', 'B2A', 'B2C', 'B3A', 'B3G', 'B4A', 'B4B', 'B5A', 'B5E', 'B5F', 'B6A', 'B6B', 'B7A', 'B7B', 'O01', 'S01', 'S02', 'S05'] }, created_at: '2026-06-03T10:00:00Z' },
      // UC items

      { id: 'uc-002', docket_id: 'DOC-HP-001', item_type: 'uc', title: 'Crop Disease Detection', status: 'proposed', content: { uc_id: 'UC-AGR-002', domain: 'agriculture', dau: 50000 }, created_at: '2026-06-03T11:05:00Z' },
      // Actions
      { id: 'act-001', docket_id: 'DOC-HP-001', item_type: 'action', section: 'action', title: 'Send HAICE concept paper to Secretary IT', status: 'done', assigned_to: 'Arvind Bajaj', due_date: '2026-06-15', created_at: '2026-06-05T09:00:00Z' },
      { id: 'act-002', docket_id: 'DOC-HP-001', item_type: 'action', section: 'action', title: 'Follow up on site visit approval', status: 'open', assigned_to: 'Arvind Bajaj', due_date: '2026-07-05', created_at: '2026-06-20T09:00:00Z' },
      // Intel items
      { id: 'int-001', docket_id: 'DOC-HP-001', item_type: 'intel', title: 'HP announces ₹2000Cr AI budget in state budget 2026-27', content: { summary: 'Himachal Pradesh government allocated ₹2000 crore for AI infrastructure and digital governance in the state budget announced June 2026.', confidence_score: 0.92, domain_code: 'GOV', scraped_at: '2026-06-15T00:00:00Z' }, created_at: '2026-06-15T06:00:00Z' },
      { id: 'int-002', docket_id: 'DOC-HP-001', item_type: 'intel', title: 'NIT Hamirpur launches AI research centre in collaboration with MeitY', content: { summary: 'NIT Hamirpur has partnered with MeitY to establish an AI research centre focused on mountain ecosystem monitoring and disaster prediction.', confidence_score: 0.78, domain_code: 'EDU', scraped_at: '2026-06-10T00:00:00Z' }, created_at: '2026-06-10T06:00:00Z' },
    ]
  },
  ucLibrary: [
    { id: 'UC-GEO-003', uc_name: 'GLOF Early Warning System', cluster: 'Disaster Management', domain: 'geospatial', complexity: 'complex' },
    { id: 'UC-AGR-002', uc_name: 'Crop Disease Detection', cluster: 'Agriculture', domain: 'agriculture', complexity: 'medium' },
    { id: 'UC-AGR-005', uc_name: 'Horticulture Yield Prediction', cluster: 'Agriculture', domain: 'agriculture', complexity: 'medium' },
    { id: 'UC-GOV-001', uc_name: 'Smart Grievance Redressal', cluster: 'Governance', domain: 'governance', complexity: 'simple' },
    { id: 'UC-HLT-003', uc_name: 'Remote Health Diagnostics', cluster: 'Health', domain: 'health', complexity: 'complex' },
  ],
  intelRun: {
    lastRun: '2026-06-25T09:14:00Z',
    itemsCollected: 47,
    itemsDeduplicated: 12,
    cost: 0.072,
    domainsStale: 2,
    domainsTotal: 10,
  }
}

// ─── Load dummy data into Model on startup ──────────────────────────────────
function loadDummyData() {
  M.customers   = DUMMY.customers
  M.engagements = DUMMY.engagements
  M.ucLibrary   = DUMMY.ucLibrary
  M.lastIntelRun = DUMMY.intelRun.lastRun
  M.lastRunCost  = DUMMY.intelRun.cost
  M.lastRunItems = DUMMY.intelRun.itemsCollected
}

// ═══════════════════════════════════════════════════════════════════════════════
// VIEW — Pure render functions. Read from M only. Never write to M or DB.
// REFACTOR-MARKER: extract components to shared/atlas-components.js
// ═══════════════════════════════════════════════════════════════════════════════

var V = {

  // ── Sidebar ────────────────────────────────────────────────────────────────
  renderSidebar: function() {
    var q    = M.sidebarFilter
    var html = ''
    var customers = M.customers.filter(function(c) {
      if (!q) return true
      return c.name.toLowerCase().includes(q) || (c.location||'').toLowerCase().includes(q)
    })
    customers.forEach(function(cust) {
      var engs = M.engagements.filter(function(e) { return e.customer_id === cust.id })
      html += '<div class="sb-section" style="cursor:pointer" onclick="C.toggleCustomer(\'' + cust.id + '\')">'
      html += '<span>' + atlasDB.esc(cust.name) + '</span>'
      html += '<button onclick="event.stopPropagation();C.newEngagement(\'' + cust.id + '\')" title="New engagement">+</button>'
      html += '</div>'
      engs.forEach(function(eng) {
        var isActive = M.currentEng && M.currentEng.id === eng.id
        html += '<div class="sb-item' + (isActive ? ' active' : '') + '" onclick="C.openEngagement(\'' + eng.id + '\')">'
        html += '<span class="sb-item-name">' + atlasDB.esc(eng.name) + '</span>'
        html += '</div>'
      })
    })
    if (!customers.length) {
      html = '<div style="padding:var(--sp-4) 14px;font-size:var(--text-sm);color:var(--mid)">No results</div>'
    }
    document.getElementById('sb-body').innerHTML = html
  },

  // ── Docket shell ──────────────────────────────────────────────────────────
  renderDocket: function() {
    var eng = M.currentEng
    if (!eng) return
    var cust = M.customers.find(function(c) { return c.id === eng.customer_id }) || {}
    var archetypeLabels = {
      'sovereign-ai-platform': 'Sovereign AI Platform',
      'ai-infra-provider': 'AI Infrastructure Provider',
      'ai-application-deployer': 'AI Application Deployer',
      'ai-research-platform': 'AI Research Platform',
      'ai-services-consumer': 'AI Services Consumer',
      'defence-classified-ai': 'Defence / Classified'
    }
    var archBadges = (eng.archetypes || []).map(function(a) {
      return '<span class="badge badge-navy">' + (archetypeLabels[a] || a) + '</span>'
    }).join(' ')

    var html = ''
    // Engagement header
    html += '<div style="padding:var(--sp-5) var(--sp-6);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-4)">'
    html += '<div>'
    html += '<div style="font-size:var(--text-xs);color:var(--mid);margin-bottom:var(--sp-1)">' + atlasDB.esc(cust.name) + ' · ' + atlasDB.esc(eng.territory || '') + '</div>'
    html += '<div style="font-size:var(--text-xl);font-weight:var(--fw-bold);color:var(--navy);margin-bottom:var(--sp-2)">' + atlasDB.esc(eng.name) + '</div>'
    html += '<div style="display:flex;gap:var(--sp-1);flex-wrap:wrap">' + archBadges + '</div>'
    html += '</div>'
    html += '<button class="btn btn-orange btn-sm" onclick="C.openInSASC()">Open in Solution Builder →</button>'
    html += '</div>'

    // Tab bar
    var tabs = [
      { key: 'overview',      label: 'Overview' },
      { key: 'requirements',  label: 'Requirements' },
      { key: 'portfolio',     label: 'Portfolio' },
      { key: 'uc',            label: 'Use Cases' },
      { key: 'intel',         label: 'Intelligence' },
      { key: 'actions',       label: 'Actions' },
      { key: 'outputs',       label: 'Outputs' },
      { key: 'history',       label: 'History' },
    ]
    html += '<div class="tab-bar">'
    tabs.forEach(function(t) {
      var isActive = M.activeTab === t.key
      html += '<button class="tab-btn' + (isActive ? ' active' : '') + '" onclick="C.switchTab(\'' + t.key + '\')">' + t.label + '</button>'
    })
    html += '</div>'

    // Tab body
    html += '<div class="tab-body" id="tab-body">' + V.renderTab(M.activeTab) + '</div>'

    document.getElementById('docket-area').innerHTML = html
  },

  renderTab: function(tab) {
    switch(tab) {
      case 'overview':     return V.renderOverviewTab()
      case 'requirements': return V.renderRequirementsTab()
      case 'portfolio':    return V.renderPortfolioTab()
      case 'uc':           return V.renderUCTab()
      case 'intel':        return V.renderIntelTab()
      case 'actions':      return V.renderActionsTab()
      case 'outputs':      return V.renderOutputsTab()
      case 'history':      return V.renderHistoryTab()
      default:             return ''
    }
  },

  // ── OVERVIEW TAB ──────────────────────────────────────────────────────────
  renderOverviewTab: function() {
    var eng   = M.currentEng
    var reqs  = M.requirements
    var ports = M.portfolioSelection
    var ucs   = M.ucItems
    var acts  = M.actionItems
    var openActs = acts.filter(function(a) { return a.status !== 'done' })

    var html = ''

    // Stats row
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-4);margin-bottom:var(--sp-5)">'
    var stats = [
      { label: 'Requirements', val: reqs.length, sub: reqs.filter(function(r){ return r.status==='accepted' }).length + ' accepted', color: ATLAS.COLORS.NAVY },

    var activeIntelTab = M.activeIntelTab || 'Market Pulse'
    html += '<div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:var(--sp-4)">'

      html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-3)">'
      html += '<div><div style="font-weight:var(--fw-semi);color:var(--dark);margin-bottom:4px">' + atlasDB.esc(o.name) + '</div>'
      html += '<div style="font-size:var(--text-xs);color:var(--mid);margin-bottom:var(--sp-2)">' + atlasDB.esc(o.reason) + '</div>'
      html += '<div style="display:flex;gap:4px">' + o.tags.map(function(t){ return '<span class="tag active">' + t + '</span>' }).join('') + '</div></div>'
      html += '<div style="display:flex;flex-direction:column;gap:var(--sp-1);flex-shrink:0">'
      html += '<button class="btn btn-teal btn-sm" onclick="C.addToUCQueue(\'' + o.name + '\')">Add to UC Queue</button>'
      html += '<button class="btn btn-ghost btn-sm">Dismiss</button>'
      html += '</div></div></div>'
    })
    html += '</div>'
    return html
  },

  // ── ACTIONS TAB ───────────────────────────────────────────────────────────
  renderActionsTab: function() {
    var acts = M.actionItems
    var html = ''

    // Add action
    html += '<div class="card">'
    html += '<div style="display:flex;gap:var(--sp-3);align-items:flex-end">'
    html += '<div style="flex:1"><label class="form-label">New Action</label>'
    html += '<input type="text" id="act-title" placeholder="e.g. Send ROM to Secretary IT"></div>'
    html += '<div><label class="form-label">Due Date</label><input type="date" id="act-due" style="width:160px"></div>'
    html += '<button class="btn btn-primary" onclick="C.addAction()">Add</button>'
    html += '</div></div>'

    // Actions list
    var statuses = ['open', 'wip', 'done']
    statuses.forEach(function(s) {
      var filtered = acts.filter(function(a) { return a.status === s })
      if (!filtered.length) return
      html += '<div class="card"><div class="card-title">' + s.toUpperCase() + ' (' + filtered.length + ')</div>'
      html += '<table class="tbl"><thead><tr><th>Action</th><th>Assigned To</th><th>Due</th><th></th></tr></thead><tbody>'
      filtered.forEach(function(a) {
        html += '<tr>'
        html += '<td>' + atlasDB.esc(a.title) + '</td>'
        html += '<td>' + atlasDB.esc(a.assigned_to||'—') + '</td>'
        html += '<td>' + (a.due_date||'—') + '</td>'
        html += '<td style="white-space:nowrap">'
        if (s !== 'done') html += '<button class="btn btn-teal btn-sm" onclick="C.updateActionStatus(\'' + a.id + '\',\'done\')">✓ Done</button> '
        if (s === 'open') html += '<button class="btn btn-ghost btn-sm" onclick="C.updateActionStatus(\'' + a.id + '\',\'wip\')">Start</button>'
        html += '</td></tr>'
      })
      html += '</tbody></table></div>'
    })

    return html
  },

  // ── OUTPUTS TAB ───────────────────────────────────────────────────────────
  renderOutputsTab: function() {
    var html = '<div class="card"><div class="card-title">Solution Versions & Documents</div>'
    html += '<div class="coming-soon"><strong>Solution versions appear here</strong>After creating a BOM in the Solution Builder, versions are stored and linked to this engagement. Each version generates an internal document and a customer-facing document.</div>'
    html += '</div>'
    html += '<div class="card"><div class="card-title">Vision Document</div>'
    html += '<button class="btn btn-outline" onclick="C.generateVisionDoc()">Generate Vision Document</button>'
    html += '</div>'
    return html
  },

  // ── HISTORY TAB ───────────────────────────────────────────────────────────
  renderHistoryTab: function() {
    var html = '<div class="card"><div class="card-title">Engagement History</div>'
    html += '<div class="coming-soon"><strong>Timeline of all changes</strong>Every save, status change, version creation, and document generation is logged here with timestamp and user.</div>'
    html += '</div>'
    return html
  },

  // ── Archetype selector (for new engagement modal) ─────────────────────────
  renderArchetypeSelector: function() {
    var archetypes = [
      { key: ATLAS.ARCHETYPE.TSAP,     label: 'Sovereign AI Platform',     desc: 'National/state govt — supply + consume' },
      { key: ATLAS.ARCHETYPE.CSP,      label: 'AI Infrastructure Provider', desc: 'CSP, GPU rental, wholesale infra' },
      { key: ATLAS.ARCHETYPE.DEPLOYER, label: 'AI Application Deployer',    desc: 'Enterprise/public dept — use cases' },
      { key: ATLAS.ARCHETYPE.RESEARCH, label: 'AI Research Platform',       desc: 'University, AI lab, R&D' },
      { key: ATLAS.ARCHETYPE.CONSUMER, label: 'AI Services Consumer',       desc: 'Consume MaaS/GPUaaS only' },
      { key: ATLAS.ARCHETYPE.DEFENCE,  label: 'Defence / Classified',       desc: 'S3/S4 mandatory, air-gap' },
    ]
    var html = ''
    archetypes.forEach(function(a) {
      var isSelected = M.selectedArchetypes.includes(a.key)
      html += '<div onclick="C.toggleArchetype(\'' + a.key + '\')" style="cursor:pointer;padding:6px 10px;border-radius:var(--r-sm);border:1.5px solid ' + (isSelected?'var(--navy)':'var(--border)') + ';background:' + (isSelected?'rgba(0,40,112,0.06)':'transparent') + ';font-size:var(--text-xs)">'
      html += '<div style="font-weight:var(--fw-semi);color:' + (isSelected?'var(--navy)':'var(--dark)') + '">' + a.label + '</div>'
      html += '<div style="color:var(--mid)">' + a.desc + '</div>'
      html += '</div>'
    })
    document.getElementById('archetype-selector').innerHTML = html
  },

  // ── Modals ────────────────────────────────────────────────────────────────
  openNewCustomerModal: function() {
    document.getElementById('cust-name').value = ''
    document.getElementById('cust-location').value = ''
    document.getElementById('cust-contact').value = ''
    document.getElementById('modal-customer').style.display = 'flex'
    setTimeout(function(){ document.getElementById('cust-name').focus() }, 100)
  },
  closeModal: function(id) {
    document.getElementById(id).style.display = 'none'
  },

  // ── Toast ─────────────────────────────────────────────────────────────────
  toast: function(msg, type) {
    type = type || 'success'
    var container = document.getElementById('toast-container')
    var el = document.createElement('div')
    el.className = 'toast toast-' + type
    el.textContent = msg
    container.appendChild(el)
    setTimeout(function(){ el.remove() }, 3000)
  },
}

// ═══════════════════════════════════════════════════════════════════════════════
// CONTROLLER — Process orchestration.
// Reads M, calls shared utilities, writes back to M, then calls V to re-render.
// REFACTOR-MARKER: when C is wired, replace DUMMY lookups with atlasDB calls
// ═══════════════════════════════════════════════════════════════════════════════

var C = {

  // ── Engagement lifecycle ──────────────────────────────────────────────────
  openEngagement: function(engId) {
    var eng = M.engagements.find(function(e) { return e.id === engId })
    if (!eng) return
    // Step 1: update Model
    M.currentEng      = eng
    M.currentDocketId = eng.docket_id
    M.activeTab       = 'overview'
    M.activeIntelTab  = 'Market Pulse'
    // Step 2: load items from dummy data (replace with atlasDB.getDocketItems() when C wired)
    M.docketItems = (DUMMY.docketItems[eng.docket_id] || []).map(function(i) {
      return atlasDB.parseContent(Object.assign({}, i))
    })
    // Step 3: render
    V.renderSidebar()
    V.renderDocket()
  },

  switchTab: function(tab) {
    M.activeTab = tab
    var body = document.getElementById('tab-body')
    if (body) body.innerHTML = V.renderTab(tab)
    // Update tab button active state
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent.toLowerCase().replace(/ /g,'') === tab.replace(/ /g,'') || btn.onclick.toString().includes("'" + tab + "'"))
    })
  },

  switchIntelTab: function(tab) {
    M.activeIntelTab = tab
    var body = document.getElementById('tab-body')
    if (body) body.innerHTML = V.renderTab('intel')
  },

  toggleCustomer: function(custId) {
    // In full build: collapse/expand customer in sidebar
    // For prototype: just show engagements for this customer
  },

  newEngagement: function(custId) {
    M.selectedArchetypes = []
    document.getElementById('eng-cust-id').value = custId
    document.getElementById('eng-name').value = ''
    document.getElementById('eng-territory').value = ''
    document.getElementById('modal-engagement').style.display = 'flex'
    V.renderArchetypeSelector()
    setTimeout(function(){ document.getElementById('eng-name').focus() }, 100)
  },

  toggleArchetype: function(key) {
    var idx = M.selectedArchetypes.indexOf(key)
    if (idx >= 0) M.selectedArchetypes.splice(idx, 1)
    else M.selectedArchetypes.push(key)
    V.renderArchetypeSelector()
  },

  // ── Saves (dummy — will call atlasDB when C is wired) ─────────────────────
  saveCustomer: function() {
    var name = document.getElementById('cust-name').value.trim()
    if (!name) { V.toast('Enter organisation name', 'error'); return }
    // DUMMY: add to model
    var newCust = {
      id:       atlasDB.genId('cust'),
      name:     name,
      type:     document.getElementById('cust-type').value,
      location: document.getElementById('cust-location').value.trim(),
      contact:  document.getElementById('cust-contact').value.trim(),
    }
    M.customers.push(newCust)
    V.closeModal('modal-customer')
    V.renderSidebar()
    V.toast('Customer created — ' + name)
    // WHEN C WIRED: await atlasDB.post('customers', newCust)
  },

  saveEngagement: function() {
    var name = document.getElementById('eng-name').value.trim()
    var custId = document.getElementById('eng-cust-id').value
    if (!name) { V.toast('Enter engagement name', 'error'); return }
    if (!M.selectedArchetypes.length) { V.toast('Select at least one archetype', 'warning'); return }
    var newEng = {
      id:         atlasDB.genId('ENG'),
      customer_id: custId,
      name:       name,
      archetypes: M.selectedArchetypes.slice(),
      territory:  document.getElementById('eng-territory').value.trim(),
      docket_id:  atlasDB.genId('DOC'),
      status:     'active',
    }
    M.engagements.push(newEng)
    DUMMY.docketItems[newEng.docket_id] = []
    V.closeModal('modal-engagement')
    V.renderSidebar()
    C.openEngagement(newEng.id)
    V.toast('Engagement created — ' + name)
    // WHEN C WIRED: await atlasDB.post('engagements', newEng)
  },

  // ── Requirements ──────────────────────────────────────────────────────────
  addRequirement: function(source) {
    var text = (document.getElementById('req-text').value || '').trim()
    if (!text) { V.toast('Enter requirement text', 'warning'); return }
    var newReq = {
      id:         atlasDB.genId('req'),
      docket_id:  M.currentDocketId,
      item_type:  ATLAS.ITEM_TYPE.REQUIREMENT,
      source:     source,
      status:     'active',
      text:       text,
      tags:       [],
      created_at: new Date().toISOString(),
    }
    M.docketItems.push(newReq)
    document.getElementById('req-text').value = ''
    document.getElementById('tab-body').innerHTML = V.renderTab('requirements')
    V.toast('Requirement added · AI tagging coming soon')
    // WHEN C WIRED: await atlasDB.saveDocketItem(newReq) then call atlas-ai.js for tags
  },

  updateReqStatus: function(reqId, newStatus) {
    var req = M.docketItems.find(function(i) { return i.id === reqId })
    if (!req) return
    req.status = newStatus
    document.getElementById('tab-body').innerHTML = V.renderTab('requirements')
    V.toast('Requirement ' + newStatus)
    // WHEN C WIRED: await atlasDB.saveDocketItem(req)
  },

  // ── Portfolio ─────────────────────────────────────────────────────────────
  togglePortfolioItem: function(code) {
    // Find or create portfolio_selection item in M.docketItems
    var portItem = M.docketItems.find(function(i) { return i.item_subtype === 'portfolio_selection' })
    if (!portItem) {
      portItem = { id: atlasDB.genId('port'), docket_id: M.currentDocketId, item_type: 'solution', item_subtype: 'portfolio_selection', section: 'output', status: 'done', content: { items: [] } }
      M.docketItems.push(portItem)
    }
    var items = portItem.content.items
    var idx   = items.indexOf(code)
    if (idx >= 0) items.splice(idx, 1)
    else          items.push(code)
    // Update UI directly (no full re-render — just toggle the item)
    var el = document.getElementById('pi-' + code)
    if (el) el.classList.toggle('selected', items.includes(code))
  },

  savePortfolio: function() {
    var portItem = M.docketItems.find(function(i) { return i.item_subtype === 'portfolio_selection' })
    var count = portItem ? portItem.content.items.length : 0
    var statusEl = document.getElementById('port-save-status')
    if (statusEl) { statusEl.textContent = '✓ Saved · ' + count + ' items'; statusEl.className = 'save-status saved' }
    V.toast('Portfolio saved · ' + count + ' items selected')
    // WHEN C WIRED: await atlasDB.savePortfolioSelection(M.currentDocketId, portItem.id, portItem.content.items, M.currentEng.id)
  },

  // ── UCs ───────────────────────────────────────────────────────────────────
  acceptUC: function(ucId, name) {
    var newUC = {
      id:         atlasDB.genId('uc'),
      docket_id:  M.currentDocketId,
      item_type:  ATLAS.ITEM_TYPE.UC,
      title:      name,
      status:     'proposed',
      content:    { uc_id: ucId, domain: '', dau: 0 },
      created_at: new Date().toISOString(),
    }
    M.docketItems.push(newUC)
    document.getElementById('tab-body').innerHTML = V.renderTab('uc')
    V.toast('UC added — ' + name)
  },

  rejectUC: function(ucId) {
    V.toast('UC skipped', 'info')
  },

  configureUC: function(ucId) {
    V.toast('UC configuration — coming in Solution Builder', 'info')
  },

  openUCLibrary: function() {
    V.toast('UC library search — coming soon', 'info')
  },

  addToUCQueue: function(name) {
    V.toast('Added to UC review queue — ' + name)
  },

  // ── Actions ───────────────────────────────────────────────────────────────
  addAction: function() {
    var title = (document.getElementById('act-title').value || '').trim()
    if (!title) { V.toast('Enter action title', 'warning'); return }
    var newAct = {
      id:          atlasDB.genId('act'),
      docket_id:   M.currentDocketId,
      item_type:   ATLAS.ITEM_TYPE.ACTION,
      section:     'action',
      title:       title,
      status:      'open',
      assigned_to: 'Arvind Bajaj',
      due_date:    document.getElementById('act-due').value || null,
      created_at:  new Date().toISOString(),
    }
    M.docketItems.push(newAct)
    document.getElementById('act-title').value = ''
    document.getElementById('act-due').value   = ''
    document.getElementById('tab-body').innerHTML = V.renderTab('actions')
    V.toast('Action added')
    // WHEN C WIRED: await atlasDB.saveDocketItem(newAct)
  },

  updateActionStatus: function(actId, newStatus) {
    var act = M.docketItems.find(function(i) { return i.id === actId })
    if (!act) return
    act.status = newStatus
    document.getElementById('tab-body').innerHTML = V.renderTab('actions')
    V.toast('Action marked ' + newStatus)
    // WHEN C WIRED: await atlasDB.saveDocketItem(act)
  },

  // ── Intel Ops ─────────────────────────────────────────────────────────────
  confirmIntelRun: function() {
    var el = document.getElementById('intel-run-details')
    var lastRun = M.lastIntelRun ? new Date(M.lastIntelRun) : null
    var days    = lastRun ? Math.floor((Date.now() - lastRun.getTime()) / 86400000) : null
    if (el) {
      el.innerHTML = '<div style="font-size:var(--text-sm);margin-bottom:var(--sp-3)">'
        + (days !== null ? 'You last ran this <strong>' + days + ' days ago</strong>.' : 'This is your first run.')
        + '</div>'
        + '<div class="tbl-wrapper"><table class="tbl"><tr><th>Estimated cost</th><td>~$0.07</td></tr>'
        + '<tr><th>Domains to refresh</th><td>8 of 10 (2 already current)</td></tr>'
        + '<tr><th>Estimated time</th><td>4-6 minutes</td></tr></table></div>'
    }
    document.getElementById('modal-intel-run').style.display = 'flex'
  },

  runIntelCollection: function(mode) {
    V.closeModal('modal-intel-run')
    V.toast('Intelligence collection started (' + mode + ') · Results in 4-6 minutes', 'info')
    // WHEN C WIRED: await atlasIntel.runCollection(mode)
  },

  regenerateBrief: function() {
    V.toast('Regenerating engagement brief · AI call in progress', 'info')
    // WHEN C WIRED: await atlasIntel.generateEngagementBrief(M.currentEng.id)
  },

  // ── Solution Builder ──────────────────────────────────────────────────────
  openInSASC: function() {
    if (!M.currentEng) return
    var url = '../sasc/index.html?eng=' + M.currentEng.id + '&docket=' + M.currentDocketId
    window.open(url, '_blank')
  },

  // ── Outputs ───────────────────────────────────────────────────────────────
  generateVisionDoc: function() {
    V.toast('Vision document generation — coming soon', 'info')
  },
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT — Page startup sequence
// ═══════════════════════════════════════════════════════════════════════════════

;(function init() {
  // 1. Load dummy data into Model
  loadDummyData()
  // 2. Render sidebar
  V.renderSidebar()
  // 3. Open first engagement by default (for prototype inspection)
  C.openEngagement('ENG-2026-HP-001')
})()

</script>
