<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS — Engagement Docket v3</title>
  <!-- No hardcoded paths — BASE_URL drives all asset references -->
  <link rel="stylesheet" id="atlas-css-link">
  <style>
    /* Tool-specific overrides — ~30 lines only */
    .req-add-row { display:flex; gap:var(--sp-3); }
    .req-add-row textarea { flex:1; min-height:64px; resize:none; }
    .src-btns { display:flex; flex-direction:column; gap:var(--sp-1); }
    .src-btn  { padding:5px 10px; border-radius:var(--r-sm); font-size:10px; font-weight:var(--fw-bold); border:1.5px solid; cursor:pointer; font-family:var(--font); white-space:nowrap; transition:opacity .15s; }
    .src-btn:hover { opacity:.75; }
    .src-btn.explicit  { border-color:var(--navy);  color:var(--navy);  background:rgba(0,40,112,.07);  }
    .src-btn.implicit  { border-color:var(--blue);  color:var(--blue);  background:rgba(28,56,245,.07); }
    .src-btn.suggested { border-color:var(--teal);  color:var(--teal);  background:rgba(0,178,144,.07); }
    .pulse-item { padding:var(--sp-3); border:1px solid var(--border); border-radius:var(--r-sm); margin-bottom:var(--sp-2); }
    .val-map-cell { padding:var(--sp-2); border-radius:var(--r-sm); text-align:center; font-size:10px; font-weight:var(--fw-semi); }
    .val-map-high { background:rgba(0,178,144,.15); color:#065f46; }
    .val-map-med  { background:rgba(255,182,0,.15);  color:#92400e; }
    .val-map-low  { background:rgba(107,114,128,.1); color:var(--mid); }

    /* ── Solution tab CSS (folded in from workload-profiler-prototype) ── */

/* Header */
.hdr{background:var(--navy);color:#fff;padding:var(--sp-4) var(--sp-6);display:flex;align-items:center;gap:var(--sp-3)}
.hdr .brand{font-weight:900;letter-spacing:3px;font-size:18px}
.hdr .brand span{color:var(--orange)}
.hdr .crumb{font-size:12px;color:rgba(255,255,255,.65)}
.hdr .crumb b{color:#fff;font-weight:600}

/* Tabs */
.tabbar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:var(--sp-5);background:#fff;border-radius:var(--r) var(--r) 0 0;padding:0 var(--sp-4)}
.tabbtn{padding:var(--sp-3) var(--sp-4);font-size:13px;font-weight:600;color:var(--mid);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:var(--font);margin-bottom:-2px;transition:color .15s}
.tabbtn.active{color:var(--navy);border-bottom-color:var(--orange)}
.tabbtn-soon{color:var(--mid);border-bottom:2px solid transparent;font-style:italic;opacity:.65}
.tabbtn-soon:hover{opacity:1;color:var(--navy)}
.coming-soon-panel{padding:40px 32px;text-align:center;background:#fff;border-radius:var(--r);border:1.5px dashed var(--border);margin:var(--sp-4)}
.coming-soon-icon{font-size:36px;margin-bottom:12px}
.coming-soon-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:8px}
.coming-soon-desc{font-size:13px;color:var(--mid);line-height:1.7;max-width:540px;margin:0 auto 16px}
.coming-soon-deps{font-size:11px;color:var(--mid);background:var(--light);padding:10px 16px;border-radius:var(--r-sm);text-align:left;max-width:540px;margin:0 auto;line-height:1.8}
.coming-soon-deps b{color:var(--dark)}
.tabbtn .cnt{background:var(--light);color:var(--mid);font-size:10px;padding:1px 6px;border-radius:var(--r-full);margin-left:6px}
.tabbtn.active .cnt{background:rgba(255,85,57,.12);color:var(--orange)}

/* GPU default bar */
.gpu-default{display:flex;align-items:center;gap:var(--sp-3);background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4);font-size:12px}
.gpu-default label{font-weight:700;color:var(--mid);text-transform:uppercase;font-size:10px;letter-spacing:.4px}
.gpu-default select{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:12px}

/* Table */
.tablewrap{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:var(--sp-4)}
table.wl{width:100%;border-collapse:collapse}
table.wl thead th{background:var(--navy);color:#fff;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:var(--sp-2) var(--sp-3);font-weight:700}
table.wl thead th.num{text-align:right}
table.wl tbody tr.row-main{cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
table.wl tbody tr.row-main:hover{background:var(--light)}
table.wl tbody tr.row-main.open{background:rgba(0,40,112,.03)}
table.wl td{padding:var(--sp-2) var(--sp-3);font-size:12.5px}
table.wl td.num{text-align:right;font-family:var(--font-mono);font-size:12px}
table.wl td.name{font-weight:600;color:var(--dark)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:700}
.badge-met{background:rgba(0,178,144,.12);color:var(--teal)}
.badge-breach{background:rgba(255,85,57,.12);color:var(--orange)}
.arrow{display:inline-block;transition:transform .25s;font-size:10px;color:var(--mid)}
.row-main.open .arrow{transform:rotate(90deg)}
.totals-row td{background:var(--light);font-weight:700;border-top:2px solid var(--border);padding:var(--sp-2) var(--sp-3)}

/* Expand panel */
.expand-row td{padding:0;border-bottom:1px solid var(--border)}
.expand-inner{max-height:0;overflow:hidden;transition:max-height .35s ease}
.expand-inner.open{max-height:2200px;transition:max-height .45s ease}
.expand-pad{padding:var(--sp-5);background:#FAFBFC}

.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-4);margin-bottom:var(--sp-4)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.4px}
.fg select,.fg input[type=number],.fg input[type=text]{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:12.5px;background:#fff}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--blue)}
.fg-hint{font-size:10px;color:var(--mid)}

.radiorow{display:flex;flex-direction:column;gap:6px}
.radio-opt{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.radio-opt input{accent-color:var(--navy)}

.sliderwrap{display:flex;align-items:center;gap:var(--sp-3)}
.sliderwrap input[type=range]{flex:1;accent-color:var(--navy);height:4px}
.slider-val{font-size:16px;font-weight:900;color:var(--navy);min-width:64px;text-align:right;font-family:var(--font-mono)}

.collapsible{margin-bottom:var(--sp-3)}
.collapsible-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--navy);padding:6px 0;user-select:none}
.collapsible-hdr .arrow{color:var(--navy)}
.collapsible-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapsible-body.open{max-height:600px}
.collapsible-body-pad{padding:var(--sp-3) 0 var(--sp-2)}

.derived{background:var(--navy);color:#fff;border-radius:var(--r);padding:var(--sp-4);margin-top:var(--sp-2)}
.derived-line{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--sp-3) var(--sp-5);font-size:11.5px;color:rgba(255,255,255,.85);margin-bottom:8px}
.derived-line span{display:block}
.derived-line b{color:#fff}
.sla-banner{margin-top:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-radius:var(--r-sm);font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.sla-met{background:rgba(0,178,144,.18);color:#5EEAD4}
.sla-breach{background:rgba(255,85,57,.2);color:#FCA5A5}
.sla-hint{font-weight:400;font-size:11px;opacity:.85;margin-left:auto}

.rag-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(28,56,245,.1);color:var(--blue);padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700;margin-left:8px}
.tenant-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,178,144,.1);color:var(--teal);padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:600}
.pool-badge-reserved{display:inline-flex;align-items:center;gap:3px;background:rgba(0,40,112,.1);color:var(--navy);padding:2px 7px;border-radius:var(--r-full);font-size:9px;font-weight:700}
.pool-badge-open{display:inline-flex;align-items:center;gap:3px;background:rgba(255,182,0,.12);color:#92400E;padding:2px 7px;border-radius:var(--r-full);font-size:9px;font-weight:700}

/* Tenant management panel */
.tenant-mgmt{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:var(--sp-4);margin-bottom:var(--sp-4)}
.tenant-mgmt-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)}
.tenant-mgmt-title{font-size:13px;font-weight:700;color:var(--navy)}
.tenant-chip-list{display:flex;flex-wrap:wrap;gap:8px}
.tenant-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:11.5px;background:var(--light)}
.tenant-chip b{color:var(--dark)}
.tenant-chip .sec{font-size:9px;color:#fff;background:var(--navy);padding:1px 6px;border-radius:var(--r-full)}
.add-tenant-btn{padding:5px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:700;border:1.5px dashed var(--teal);background:rgba(0,178,144,.05);color:var(--teal);cursor:pointer;font-family:var(--font)}

/* Reusable tenant block (within any expanded row) */
.tenant-block{background:rgba(0,178,144,.04);border:1px solid rgba(0,178,144,.25);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4)}
.tenant-block-hdr{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.pool-toggle{display:flex;gap:0;margin-top:4px}
.pool-btn{padding:6px 14px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font)}
.pool-btn:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm)}
.pool-btn:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0;border-left:none}
.pool-btn.active-reserved{background:var(--navy);color:#fff;border-color:var(--navy)}
.pool-btn.active-open{background:var(--amber);color:#78350F;border-color:var(--amber)}
.mvb-toggle{display:flex;gap:0;margin-bottom:var(--sp-3)}
.mvb-btn{padding:5px 14px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font)}
.mvb-btn:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm)}
.mvb-btn:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0}
.mvb-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mvb-chart{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--sp-4);font-size:11px;color:var(--mid)}

.actions-row{display:flex;justify-content:space-between;align-items:center;margin-top:var(--sp-4)}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--font)}
.btn-ghost{background:var(--light);color:var(--dark)}
.btn-danger-text{background:none;color:var(--orange);border:1.5px solid var(--orange)}
.add-row{padding:var(--sp-3) var(--sp-4)}
.add-btn{padding:8px 18px;border-radius:var(--r-sm);font-size:12px;font-weight:700;border:1.5px dashed var(--navy);background:rgba(0,40,112,.03);color:var(--navy);cursor:pointer;font-family:var(--font)}
  </style>
</head>
<body>

<!-- MASTHEAD -->
<div class="atlas-hdr">
  <div class="atlas-hdr-left">
    <div class="atlas-brand">ATL<span>A</span>S</div>
    <div class="atlas-tool-name">Engagement Docket</div>
    <span class="atlas-ver">v3.0</span>
  </div>
  <div class="atlas-hdr-right">
    <span id="data-mode-badge" class="atlas-ver" style="display:none"></span>
    <button class="atlas-nav-btn" onclick="window.location.href='../../'">&#8592; Portal</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-search">
      <input type="text" id="sb-search" placeholder="Search customers, engagements..."
             oninput="M.filterSidebar(this.value)">
    </div>
    <div class="sb-body" id="sb-body"></div>
    <div style="padding:var(--sp-3) 14px;border-top:1px solid var(--border)">
      <button class="btn btn-outline" style="width:100%;font-size:11px"
              onclick="V.openModal('modal-customer')">+ New Customer</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="docket-area">
      <div class="empty-state" style="padding-top:80px">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Select an engagement</div>
        <div class="empty-desc">Choose from the left panel, or create a new customer.</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: New Customer -->
<div class="modal-overlay" id="modal-customer" style="display:none"
     onclick="if(event.target===this)V.closeModal('modal-customer')">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Customer</div>
      <button class="btn btn-ghost btn-sm" onclick="V.closeModal('modal-customer')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Organisation Name</label>
        <input type="text" id="cust-name" placeholder="e.g. Government of Himachal Pradesh"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
        <div class="form-group"><label class="form-label">Type</label>
          <select id="cust-type">
            <option value="state_govt">State Government</option>
            <option value="central_govt">Central Government</option>
            <option value="defence">Defence / Intelligence</option>
            <option value="enterprise">Enterprise</option>
            <option value="csp">CSP / Cloud Provider</option>
            <option value="ai_lab">AI Lab / University</option>
            <option value="other">Other</option>
          </select></div>
        <div class="form-group"><label class="form-label">Location</label>
          <input type="text" id="cust-location" placeholder="e.g. Shimla, India"></div>
      </div>
      <div class="form-group"><label class="form-label">Primary Contact</label>
        <input type="text" id="cust-contact" placeholder="e.g. Secretary IT"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-customer')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveCustomer()">Create Customer</button>
    </div>
  </div>
</div>

<!-- MODAL: New Engagement -->
<div class="modal-overlay" id="modal-engagement" style="display:none"
     onclick="if(event.target===this)V.closeModal('modal-engagement')">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Engagement</div>
      <button class="btn btn-ghost btn-sm" onclick="V.closeModal('modal-engagement')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eng-cust-id">
      <div class="form-group"><label class="form-label">Engagement Name</label>
        <input type="text" id="eng-name" placeholder="e.g. HAICE — HP Sovereign AI Centre"></div>
      <div class="form-group"><label class="form-label">Archetypes (select all that apply)</label>
        <div id="archetype-selector" style="display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-1)"></div>
      </div>
      <div class="form-group"><label class="form-label">Territory / Geography</label>
        <input type="text" id="eng-territory" placeholder="e.g. Himachal Pradesh, India"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-engagement')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveEngagement()">Create Engagement</button>
    </div>
  </div>
</div>

<!-- MODAL: Intel Run Confirmation -->
<div class="modal-overlay" id="modal-intel-run" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr"><div class="modal-title">Run Intelligence Collection?</div></div>
    <div class="modal-body" id="intel-run-detail"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-intel-run')">Cancel</button>
      <button class="btn btn-ghost" onclick="C.runIntel('stale')">Stale only (~$0.03)</button>
      <button class="btn btn-primary" onclick="C.runIntel('full')">Full refresh (~$0.07)</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-calc-detail" style="display:none">
  <div class="modal" style="max-width:600px">
    <div class="modal-hdr"><div class="modal-title">&#128269; How was this calculated?</div></div>
    <div class="modal-body">
      <div id="calc-detail-content" style="font-size:12.5px;line-height:1.8;font-family:var(--font-mono);white-space:pre-wrap;color:var(--dark)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-calc-detail')">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-tenant-edit" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr"><div class="modal-title" id="tenant-edit-title">Edit Tenant</div></div>
    <div class="modal-body">
      <input type="hidden" id="tenant-edit-id">
      <div class="fg" style="margin-bottom:12px"><label>Name</label><input type="text" id="tenant-edit-name" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px"></div>
      <div class="fg" style="margin-bottom:12px"><label>Security Tier</label><select id="tenant-edit-sectier" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px">
        <option value="S1">S1 — Standard isolation</option>
        <option value="S2">S2 — Enhanced isolation</option>
        <option value="S3">S3 — Sovereign / dedicated</option>
        <option value="S4">S4 — Air-gapped / classified</option>
      </select></div>
      <div class="fg"><label>Chargeout Model</label><select id="tenant-edit-chargeout" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px">
        <option value="commercial">Commercial</option>
        <option value="cost_recovery">Cost Recovery</option>
        <option value="subsidised">Subsidised</option>
        <option value="zero">Zero (free)</option>
      </select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-tenant-edit')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveTenantEdit()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- SCRIPTS — no hardcoded URLs, driven by CFG.baseUrl -->
<script>
// ── CONFIG — change ONE place to move to a new host ──────────────────────────
var CFG = {
  baseUrl: (function() {
    // Auto-detect: if running on GitHub Pages use that origin,
    // otherwise fall back to the canonical URL.
    // NEVER hardcode 'arvindbajaj5.github.io' outside this block.
    var origin = window.location.origin
    var path   = window.location.pathname
    // Extract repo base (everything up to /atlas-platform/)
    var m = path.match(/^(\/[^/]+\/atlas-platform\/)/)
    return m ? (origin + m[1]) : 'https://arvindbajaj5.github.io/atlas-platform/'
  })()
}

// Wire shared asset links dynamically
document.getElementById('atlas-css-link').href = CFG.baseUrl + 'shared/atlas.css'

// Dynamically load shared scripts in order
var ATLAS_BUILD_TS = '20260701c'
;(function loadShared(files, i) {
  if (i >= files.length) { init(); return }
  var s = document.createElement('script')
  s.src = CFG.baseUrl + files[i] + '?v=' + (window.ATLAS_BUILD_TS || Date.now())
  s.onload  = function() { loadShared(files, i+1) }
  s.onerror = function() { console.error('[ATLAS] Failed to load:', files[i]); loadShared(files, i+1) }
  document.head.appendChild(s)
})(['shared/atlas-tokens.js', 'shared/atlas-db.js', 'shared/sasc-sizing.js', 'shared/atlas-solution.js'], 0)
</script>

<script>
'use strict'

// ═══════════════════════════════════════════════════════════════════════
// MODEL — single source of truth. Never written by View.
// REFACTOR-MARKER: extract to shared/atlas-model.js in maintainability phase
// ═══════════════════════════════════════════════════════════════════════

var M = {
  customers:          [],
  engagements:        [],
  currentEng:         null,
  currentDocketId:    null,
  docketItems:        [],
  ucLibrary:          [],
  activeTab:          'customer',
  activeIntelSubTab:  'pulse',
  selectedArchetypes: [],
  sidebarFilter:      '',

  // Derived — computed from docketItems, no extra DB calls
  get requirements() {
    return this.docketItems.filter(function(i){ return i.item_type === 'requirement' })
  },
  get portfolioItems() {
    var item = this.docketItems.find(function(i){ return i.item_subtype === 'portfolio_selection' })
    return (item && item.content && item.content.items) ? item.content.items : []
  },
  get ucItems() {
    return this.docketItems.filter(function(i){ return i.item_type === 'uc' })
  },
  get actionItems() {
    return this.docketItems.filter(function(i){ return i.item_type === 'action' })
  },
  get intelItems() {
    return this.docketItems.filter(function(i){ return i.item_type === 'intel' })
  },

      return '<div class="coming-soon-panel"><div class="coming-soon-icon">&#9889;</div>'
        + '<div class="coming-soon-title">What-If — GPU Architecture Comparison</div>'
        + '<div class="coming-soon-desc">Add UC or MaaS workloads in the UCs and MaaS tabs first, then return here to compare GPU architectures for those workloads.</div></div>'
    }

    // Default: first workload
    if (!wi.selectedWorkloadId || !allWorkloads.find(function(w){ return w.id === wi.selectedWorkloadId })) {
      wi.selectedWorkloadId = allWorkloads[0].id
      wi.selectedWorkloadType = allWorkloads[0].type
    }
    // Default: first 3 GPUs
    var gpus = M.gpuConfigs || []
    if (!wi.selectedGpus.length && gpus.length) {
      wi.selectedGpus = gpus.slice(0,3).map(function(g){ return g.id })
    }

    var selectedWL = allWorkloads.find(function(w){ return w.id === wi.selectedWorkloadId })
    var wl = selectedWL ? selectedWL.wl : null
    var wlType = selectedWL ? selectedWL.type : 'uc'

    // ── Compute sizing for each selected GPU ───────────────────────────
    var results = []
    wi.selectedGpus.forEach(function(gpuId) {
      var gpuConf = M.gpuMap && M.gpuMap[gpuId]
      // Top-down: how many GPUs needed for this workload's demand?
      var wlCopy = Object.assign({}, wl, {gpu: gpuId})
      var sz = AtlasSolution.sizeWorkload(wlCopy, wlType, M)
      // Bottom-up: max DAU this GPU count can support?
      var cap = null
      if (window.SizingEngine && SizingEngine.ready && wl.model) {
        cap = SizingEngine.capacityForGPU(gpuId, {
          model_id:          wl.model,
          gpu_count:         sz.total,
          precision:         wl.precision || 'INT4',
          profile:           wlType === 'maas' ? 'A' : 'B',
          requests_per_day:  wl.reqPerDay || 12,
          peak_multiplier:   wl.peakMult || 3,
          avg_output_tokens: wl.outputTok || 500
        })
      }
      // Fallback bottom-up using AtlasSolution throughput factors
      var maxDau = cap && !cap.error ? cap.max_dau : Math.floor(sz.total * 8000 / ((wl.reqPerDay||12)/86400 * (wl.outputTok||500)))
      var demandDau = wl.dau || 1000
      results.push({
        gpuId: gpuId,
        gpuName: (gpuConf && gpuConf.name) || gpuId,
        gpusNeeded: sz.total,
        baseGpus: sz.baseGpus,
        buffers: sz.buffers,
        powerKw: sz.powerKw,
        maxDau: Math.max(maxDau, demandDau),
        demandDau: demandDau,
        headroom: Math.round(((maxDau - demandDau) / demandDau) * 100),
        meets: maxDau >= demandDau,
        audit: cap && !cap.error ? cap.audit : null
      })
    })

    // ── Build HTML ─────────────────────────────────────────────────────
    var h = '<div style="padding:0">'

    // Part 1 — Controls
    h += '<div class="card" style="margin-bottom:var(--sp-4)">'
    h += '<div class="card-title">What-If — GPU Architecture Comparison</div>'
    h += '<div class="formgrid" style="grid-template-columns:1fr 1fr">'

    // Workload selector
    h += '<div class="fg"><label>Workload to analyse</label><select onchange="C.updWhatIf(\'selectedWorkloadId\',this.value)" style="width:100%">'
    allWorkloads.forEach(function(w) {
      h += '<option value="'+w.id+'"'+(wi.selectedWorkloadId===w.id?' selected':'')+'>['
        +w.type.toUpperCase()+'] '+w.name+'</option>'
    })
    h += '</select></div>'

    // GPU count override
    h += '<div class="fg"><label>GPU count to test (leave blank = use sized count)</label>'
      + '<input type="number" min="1" placeholder="auto from sizing" value="'+(wi.gpuCountOverride||'')+'" '
      + 'onchange="C.updWhatIf(\'gpuCountOverride\',this.value?+this.value:null)">'
      + '<div class="fg-hint">Override the top-down GPU count for scenario testing</div></div>'
    h += '</div>'

    // GPU checkboxes
    h += '<div class="fg" style="margin-top:8px"><label>GPU architectures to compare (up to 5)</label>'
    h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">'
    gpus.forEach(function(g) {
      var checked = wi.selectedGpus.indexOf(g.id) >= 0
      var disabled = !checked && wi.selectedGpus.length >= 5
      h += '<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:'+(disabled?'not-allowed':'pointer')+';opacity:'+(disabled?'0.4':'1')+'">'
        + '<input type="checkbox" '+(checked?'checked':'')+' '+(disabled?'disabled':'')
        + ' onchange="C.toggleWhatIfGpu(\''+g.id+'\')">'  
        + g.name + '</label>'
    })
    h += '</div></div>'
    h += '</div>'

    if (!results.length) {
      h += '<div class="coming-soon-panel"><div class="coming-soon-desc">Select at least one GPU architecture above.</div></div>'
      h += '</div>'
      return h
    }

    // Part 2 — SVG Crossover Chart
    h += '<div class="card" style="margin-bottom:var(--sp-4)">'
    h += '<div class="card-title">Supply vs Demand — GPU Count by DAU</div>'
    h += V.renderWhatIfChart(results, wl)
    h += '</div>'

    // Part 3 — Comparison Table
    h += '<div class="card">'
    h += '<div class="card-title">Architecture Comparison</div>'
    h += '<table class="tbl"><thead><tr>'
      + '<th>GPU</th><th class="num">GPUs needed</th><th class="num">Power</th>'
      + '<th class="num">Max DAU</th><th class="num">Headroom</th><th>Verdict</th>'
      + '</tr></thead><tbody>'

    // Sort by GPUs needed (cheapest first)
    var sorted = results.slice().sort(function(a,b){ return a.gpusNeeded - b.gpusNeeded })
    var cheapestMeets = sorted.find(function(r){ return r.meets })

    results.forEach(function(r) {
      var isBest = cheapestMeets && r.gpuId === cheapestMeets.gpuId
      var verdict = r.meets
        ? (isBest ? '&#9733; Recommended — lowest GPU count that meets demand' : 'Meets demand')
        : '&#9888; Insufficient — max DAU below target'
      var rowStyle = isBest ? 'background:rgba(0,178,144,.06);font-weight:600' : ''
      h += '<tr style="'+rowStyle+'">'
        + '<td>'+r.gpuName+'</td>'
        + '<td class="num">'+r.gpusNeeded+'</td>'
        + '<td class="num">'+r.powerKw+'kW</td>'
        + '<td class="num">'+r.maxDau.toLocaleString()+'</td>'
        + '<td class="num" style="color:'+(r.headroom>=0?'var(--teal)':'var(--orange)')+'">'+r.headroom+'%</td>'
        + '<td style="font-size:11px">'+verdict+'</td>'
        + '</tr>'
    })
    h += '</tbody></table>'
    h += '</div>'
    h += '</div>'
    return h
  },

  renderWhatIfChart: function(results, wl) {
    var W = 680, H = 280, PL = 60, PR = 20, PT = 20, PB = 50
    var cW = W - PL - PR, cH = H - PT - PB
    var demandDau = (wl && wl.dau) || 1000
    var maxDauAll = Math.max.apply(null, results.map(function(r){ return r.maxDau }))
    var maxGpus   = Math.max.apply(null, results.map(function(r){ return r.gpusNeeded })) * 1.3
    var xMax = Math.max(maxDauAll, demandDau) * 1.1
    var xScale = function(d)  { return PL + (d / xMax) * cW }
    var yScale = function(g)  { return PT + cH - (g / maxGpus) * cH }
    var fmtN   = function(n)  { return n >= 1000000 ? Math.round(n/100000)/10+'M' : n >= 1000 ? Math.round(n/100)/10+'K' : n }

    var COLORS = ['#002870','#FF5539','#00B290','#FFB600','#1C38F5']

    var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+W+'px;font-family:var(--font)">'

    // Grid lines
    for (var gi = 0; gi <= 4; gi++) {
      var gy = PT + (gi/4)*cH
      svg += '<line x1="'+PL+'" y1="'+gy+'" x2="'+(PL+cW)+'" y2="'+gy+'" stroke="#E5E7EB" stroke-width="1"/>'
      svg += '<text x="'+(PL-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="10" fill="#6B7280">'
        + Math.round(maxGpus*(1-gi/4)) + '</text>'
    }
    for (var xi = 0; xi <= 5; xi++) {
      var xv = (xi/5)*xMax
      var xx = xScale(xv)
      svg += '<line x1="'+xx+'" y1="'+PT+'" x2="'+xx+'" y2="'+(PT+cH)+'" stroke="#E5E7EB" stroke-width="1"/>'
      svg += '<text x="'+xx+'" y="'+(PT+cH+16)+'" text-anchor="middle" font-size="10" fill="#6B7280">'+fmtN(Math.round(xv))+'</text>'
    }

    // Axes
    svg += '<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(PT+cH)+'" stroke="#374151" stroke-width="1.5"/>'
    svg += '<line x1="'+PL+'" y1="'+(PT+cH)+'" x2="'+(PL+cW)+'" y2="'+(PT+cH)+'" stroke="#374151" stroke-width="1.5"/>'
    svg += '<text x="'+(PL+cW/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="11" fill="#374151">DAU (Daily Active Users)</text>'
    svg += '<text x="14" y="'+(PT+cH/2)+'" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90,14,'+(PT+cH/2)+')">GPUs needed</text>'

    // Demand line — linear top-down: GPUs = f(DAU), passes through origin
    if (results.length) {
      var ref = results[0]
      var slope = ref.gpusNeeded / demandDau
      var x0 = PL, y0 = yScale(0)
      var x1 = xScale(xMax), y1 = yScale(slope * xMax)
      svg += '<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y1+'" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6,3"/>'
      svg += '<text x="'+(x1-4)+'" y="'+(y1-6)+'" text-anchor="end" font-size="10" fill="#6B7280">Demand</text>'
    }

    // Supply lines — one per GPU (horizontal at gpusNeeded level, extending to maxDau)
    results.forEach(function(r, i) {
      var col = COLORS[i % COLORS.length]
      var x0 = PL
      var x1 = xScale(r.maxDau)
      var yy = yScale(r.gpusNeeded)
      // Horizontal supply line
      svg += '<line x1="'+x0+'" y1="'+yy+'" x2="'+x1+'" y2="'+yy+'" stroke="'+col+'" stroke-width="2"/>'
      // Vertical drop at maxDau (capacity limit)
      svg += '<line x1="'+x1+'" y1="'+PT+'" x2="'+x1+'" y2="'+yy+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>'
      // Intersection with demand line
      var xIntersect = xScale(r.maxDau)
      svg += '<circle cx="'+x1+'" cy="'+yy+'" r="4" fill="'+col+'"/>'
      // Label
      svg += '<text x="'+(x0+4)+'" y="'+(yy-4)+'" font-size="10" fill="'+col+'" font-weight="600">'+r.gpuName+'</text>'
    })

    // Current DAU marker
    var xDemand = xScale(demandDau)
    svg += '<line x1="'+xDemand+'" y1="'+PT+'" x2="'+xDemand+'" y2="'+(PT+cH)+'" stroke="#FF5539" stroke-width="1.5" stroke-dasharray="4,2"/>'
    svg += '<text x="'+xDemand+'" y="'+(PT-6)+'" text-anchor="middle" font-size="10" fill="#FF5539">Current DAU</text>'

    // Legend
    results.forEach(function(r, i) {
      var lx = PL + i * 130, ly = PT + cH + 32
      svg += '<rect x="'+lx+'" y="'+(ly-8)+'" width="12" height="3" fill="'+COLORS[i%COLORS.length]+'"/>'
      svg += '<text x="'+(lx+16)+'" y="'+ly+'" font-size="10" fill="#374151">'+r.gpuName+'</text>'
    })

    svg += '</svg>'
    return svg
  },

    // ── Make vs Buy ────────────────────────────────────────────────────────
  renderMakeOrBuyTab: function() {
    var wls = (M.workloadConfigs.uc||[]).concat(M.workloadConfigs.maas||[])
    if (!wls.length) {
      return '<div class="card"><div class="card-title">Make vs Buy — On-prem vs API Market Price</div>'
        + '<div class="warn-panel"><div class="warn-body">Add UC or MaaS workloads in the UCs/MaaS tabs to see the comparison. The analysis compares on-prem cost per million tokens (from your sized fleet) vs market API reference prices from model_catalogue.</div></div>'
        + '<div style="padding:12px;font-size:11px;color:var(--mid)"><b>Formula preview:</b> On-prem cost/Mtok = (power + capex amortisation) / tokens served. Breakeven = utilisation% at which on-prem beats market price.</div>'
        + '</div>'
    }

    var h = '<div class="card"><div class="card-title">Make vs Buy — On-prem vs API Market Price</div>'
    h += '<p style="font-size:12px;color:var(--mid);margin-bottom:var(--sp-4)">Compares our on-prem cost per million tokens vs market API reference prices from model_catalogue. Breakeven = utilisation% where on-prem becomes cheaper.</p>'
    h += '<table class="tbl"><thead><tr><th>Workload / Model</th><th class="num">GPUs</th><th class="num">Est. cost/Mtok (on-prem)</th><th class="num">Market ref price/Mtok</th><th class="num">Breakeven util%</th><th>Verdict</th></tr></thead><tbody>'

    wls.forEach(function(wl) {
      var model = M.modelMap && M.modelMap[wl.model]
      var sz = AtlasSolution.sizeWorkload(wl, wl.mvbView==='maas'?'maas':'uc', M)
      // On-prem cost estimate: power cost + capex amortised
      // Power: sz.powerKw × 0.08 $/kWh × 730 hrs/month = monthly power cost
      // Capex: ~$30k/GPU × sz.total / 60 months = monthly capex
      var monthlyPower = sz.powerKw * 0.08 * 730
      var monthlyCapex = sz.total * 30000 / 60
      var totalMonthly = monthlyPower + monthlyCapex
      // Tokens per month at 75% utilisation
      var tokPerSec = sz.total * 8000  // H200 INT4 baseline
      var tokPerMonth75 = tokPerSec * 0.75 * 3600 * 730 / 1e6  // in millions
      var onPremCostPerMtok = tokPerMonth75 > 0 ? (totalMonthly / tokPerMonth75).toFixed(4) : '—'
      // Market ref price
      var mktIn  = model && model.price_input_per_1m  ? '$'+model.price_input_per_1m.toFixed(4)  : '—'
      var mktOut = model && model.price_output_per_1m ? '$'+model.price_output_per_1m.toFixed(4) : '—'
      var mktAvg = model && model.price_input_per_1m && model.price_output_per_1m
        ? (model.price_input_per_1m + model.price_output_per_1m) / 2 : null
      // Breakeven: at what utilisation does on-prem = market?
      var breakeven = mktAvg && onPremCostPerMtok !== '—'
        ? Math.round((totalMonthly / (mktAvg * tokPerSec * 3600 * 730 / 1e6)) * 100)
        : null
      var verdict = breakeven === null ? '—'
        : breakeven <= 40 ? '&#9733; On-prem wins at low utilisation'
        : breakeven <= 70 ? 'Breakeven at ' + breakeven + '% — manageable'
        : '&#9888; Need ' + breakeven + '% utilisation to beat market'
      h += '<tr>'
        + '<td>' + wl.name + (model ? '<br><span style="font-size:10px;color:var(--mid)">' + model.name + '</span>' : '') + '</td>'
        + '<td class="num">' + sz.total + '</td>'
        + '<td class="num">$' + onPremCostPerMtok + '</td>'
        + '<td class="num">' + (mktAvg ? '$' + mktAvg.toFixed(4) : '—') + '</td>'
        + '<td class="num" style="color:' + (breakeven && breakeven > 70 ? 'var(--orange)' : 'var(--teal)') + '">' + (breakeven || '—') + (breakeven ? '%' : '') + '</td>'
        + '<td style="font-size:11px">' + verdict + '</td>'
        + '</tr>'
    })
    h += '</tbody></table>'
    h += '<div style="margin-top:12px;font-size:11px;color:var(--mid)">Assumptions: $0.08/kWh power, $30k/GPU capex, 60-month amortisation, 8,000 tok/s/GPU (H200 INT4 baseline). Market prices from model_catalogue.price_input/output_per_1m.</div>'
    h += '</div>'
    return h
  },

  // ── BOM Complete ────────────────────────────────────────────────────────
  renderBomTab: function() {
    var wls = (M.workloadConfigs.uc||[]).concat(M.workloadConfigs.maas||[]).concat(M.workloadConfigs.gpuaas||[])
    // BOM can show GPU catalogue + fixed items even with no workloads

    // Aggregate fleet
    var totalGpus = 0, totalPowerKw = 0, totalByGpu = {}
    wls.forEach(function(wl) {
      var type = M.workloadConfigs.gpuaas && M.workloadConfigs.gpuaas.indexOf(wl) >= 0 ? 'gpuaas'
               : M.workloadConfigs.maas   && M.workloadConfigs.maas.indexOf(wl)   >= 0 ? 'maas' : 'uc'
      var sz = type === 'gpuaas'
        ? { total: wl.gpuCount || 0, gpu: wl.gpu, powerKw: Math.round((wl.gpuCount||0)*0.7*10)/10 }
        : AtlasSolution.sizeWorkload(wl, type, M)
      totalGpus += sz.total
      totalPowerKw += sz.powerKw || 0
      var gpuId = sz.gpu || wl.gpu || M.defaultGpu
      if (!totalByGpu[gpuId]) totalByGpu[gpuId] = {count:0, powerKw:0, name: (M.gpuMap&&M.gpuMap[gpuId]&&M.gpuMap[gpuId].name)||gpuId}
      totalByGpu[gpuId].count += sz.total
      totalByGpu[gpuId].powerKw += sz.powerKw || 0
    })

    // Rack estimate
    var totalRacks = Math.ceil(totalGpus / 8)
    var totalPowerRounded = Math.round(totalPowerKw * 10) / 10

    // Cost estimates
    var gpuCapexEst = totalGpus * 30000
    var gatewayNodes = 2, gatewayCapex = gatewayNodes * 25000
    var networkingCapex = totalGpus >= 8 ? Math.ceil(totalGpus/8) * 15000 : 0
    var totalCapex = gpuCapexEst + gatewayCapex + networkingCapex

    var h = '<div class="card"><div class="card-title">BOM Complete — Full Infrastructure Line Items</div>'

    // GPU fleet
    h += '<div style="margin-bottom:var(--sp-4)"><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">GPU Fleet</div>'
    h += '<table class="tbl"><thead><tr><th>GPU Architecture</th><th class="num">Count</th><th class="num">Power</th><th class="num">Racks (est)</th><th class="num">Capex est. ($)</th></tr></thead><tbody>'
    Object.keys(totalByGpu).forEach(function(gpuId) {
      var g = totalByGpu[gpuId]
      h += '<tr><td>' + g.name + '</td>'
        + '<td class="num">' + g.count + '</td>'
        + '<td class="num">' + Math.round(g.powerKw*10)/10 + 'kW</td>'
        + '<td class="num">' + Math.ceil(g.count/8) + '</td>'
        + '<td class="num">$' + (g.count*30000).toLocaleString() + '</td></tr>'
    })
    h += '<tr style="font-weight:700;background:var(--light)"><td>TOTAL GPU fleet</td><td class="num">' + totalGpus + '</td><td class="num">' + totalPowerRounded + 'kW</td><td class="num">' + totalRacks + '</td><td class="num">$' + gpuCapexEst.toLocaleString() + '</td></tr>'
    h += '</tbody></table></div>'

    // Management/gateway nodes
    h += '<div style="margin-bottom:var(--sp-4)"><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">Management &amp; Gateway (currently missing from most BOMs)</div>'
    h += '<table class="tbl"><thead><tr><th>Item</th><th>Spec</th><th class="num">Qty</th><th class="num">Capex est. ($)</th><th>Notes</th></tr></thead><tbody>'
    h += '<tr><td>Gateway / Management nodes</td><td>32-core CPU, 256GB RAM, 10GbE, 4TB NVMe</td><td class="num">2</td><td class="num">$' + gatewayCapex.toLocaleString() + '</td><td style="font-size:10px">vLLM + LiteLLM + Prometheus + Grafana</td></tr>'
    h += '<tr><td>Monitoring storage</td><td>NVMe on gateway nodes</td><td class="num">—</td><td class="num">Included</td><td style="font-size:10px">Prometheus TSDB + metering events</td></tr>'
    h += '</tbody></table></div>'

    // Networking
    if (networkingCapex > 0) {
      h += '<div style="margin-bottom:var(--sp-4)"><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">Networking</div>'
      h += '<table class="tbl"><thead><tr><th>Item</th><th>Spec</th><th class="num">Qty</th><th class="num">Capex est. ($)</th><th>Notes</th></tr></thead><tbody>'
      h += '<tr><td>InfiniBand switch + cabling</td><td>HDR/NDR per rack</td><td class="num">' + totalRacks + '</td><td class="num">$' + networkingCapex.toLocaleString() + '</td><td style="font-size:10px">Required for 671B+ models across nodes</td></tr>'
      h += '</tbody></table></div>'
    }

    // Summary
    h += '<div style="background:var(--navy);color:#fff;border-radius:var(--r);padding:var(--sp-4)">'
    h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center">'
    var items = [
      ['Total GPUs', totalGpus],
      ['Total Power', totalPowerRounded + 'kW'],
      ['Total Racks', totalRacks],
      ['Total Capex', '$' + (totalCapex/1e6).toFixed(1) + 'M']
    ]
    items.forEach(function(item) {
      h += '<div><div style="font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px">' + item[0] + '</div>'
        + '<div style="font-size:20px;font-weight:900">' + item[1] + '</div></div>'
    })
    h += '</div></div>'
    h += '<div style="margin-top:8px;font-size:11px;color:var(--mid)">Estimates: $30k/GPU, $25k/gateway node, $15k/rack networking. Actual prices from Settings when wired.</div>'
    h += '</div>'
    return h
  },

  // ── Margin Analysis ────────────────────────────────────────────────────
  renderMarginTab: function() {
    var wls = (M.workloadConfigs.uc||[]).concat(M.workloadConfigs.maas||[])
    if (!wls.length) {
      return '<div class="card"><div class="card-title">Margin Analysis — Known Leak Sources</div>'
        + '<div class="warn-panel"><div class="warn-body">Add UC or MaaS workloads to see per-workload margin risk analysis.</div></div>'
        + V._renderGlobalMarginRisks()
        + '</div>'
    }

    var h = '<div class="card"><div class="card-title">Margin Analysis — Known Leak Sources</div>'
    h += '<p style="font-size:12px;color:var(--mid);margin-bottom:var(--sp-4)">Items not yet reflected in sizing that reduce actual margin vs estimated.</p>'

    // Per-workload margin flags
    h += '<table class="tbl"><thead><tr><th>Workload</th><th>Model</th><th class="num">Sized GPUs</th><th>Margin risks</th></tr></thead><tbody>'
    wls.forEach(function(wl) {
      var model = M.modelMap && M.modelMap[wl.model]
      var sz = AtlasSolution.sizeWorkload(wl, wl.mvbView==='maas'?'maas':'uc', M)
      var risks = []
      if (model) {
        var pb = model.params_b || 0
        if (pb >= 100) risks.push('Large model ('+pb+'B) — requires InfiniBand across nodes, not costed')
        if (model.context_length_k >= 64) risks.push('Long context ('+model.context_length_k+'K) — KV cache consumes 40-60% VRAM at max context')
        if (model.is_reasoning) risks.push('Reasoning model — higher compute per token, TTFT estimates may be optimistic')
        if (model.is_multimodal) risks.push('Multimodal — vision preprocessing overhead not in sizing')
        var domain = model.domain
        if (domain === 'code') risks.push('Coding model — typically larger output sequences, higher GPU time per request')
      }
      if (!risks.length) risks.push('No major risks identified with current data')
      h += '<tr><td>' + wl.name + '</td>'
        + '<td>' + (model ? model.name : wl.model || '—') + '</td>'
        + '<td class="num">' + sz.total + '</td>'

      h += '<tr><td>' + d + '</td><td class="num">' + mods.length + '</td>'

  // ── Fleet Yield ─────────────────────────────────────────────────────────
  renderFleetYieldTab: function() {
    var wls = (M.workloadConfigs.uc||[]).concat(M.workloadConfigs.maas||[]).concat(M.workloadConfigs.gpuaas||[])

    // Compute fleet totals
    var commitedGpus = 0
    wls.forEach(function(wl) {
      var type = M.workloadConfigs.gpuaas && M.workloadConfigs.gpuaas.indexOf(wl) >= 0 ? 'gpuaas'
               : M.workloadConfigs.maas   && M.workloadConfigs.maas.indexOf(wl)   >= 0 ? 'maas' : 'uc'
      var sz = type === 'gpuaas'
        ? { total: wl.gpuCount || 0 }
        : AtlasSolution.sizeWorkload(wl, type, M)
      commitedGpus += sz.total
    })

    // Assume 20% failover reserve
    var failoverReserve = Math.ceil(commitedGpus * 0.2)
    var totalFleet = commitedGpus + failoverReserve
    var availableMaas = Math.max(0, totalFleet - commitedGpus - failoverReserve)

    // Fleet yield inputs (editable)
    var fy = M.fleetYield || { totalFleet: totalFleet, discountPct: 20, targetUtil: 70,
      avgTokensPerCustomerM: 10, inputOutputRatio: 0.5 }
    M.fleetYield = fy
    fy.totalFleet = fy.totalFleet || totalFleet

    var tokPerSec = fy.totalFleet * 8000
    var tokPerMonthM = tokPerSec * (fy.targetUtil/100) * 3600 * 730 / 1e6
    var monthlyPower = fy.totalFleet * 0.7 * 0.08 * 730
    var monthlyCapex = fy.totalFleet * 30000 / 60
    var costPerMtok = tokPerMonthM > 0 ? (monthlyPower + monthlyCapex) / tokPerMonthM : 0

    var models = M.modelCatalogue || []
    var priceableModels = models.filter(function(m){ return m.price_input_per_1m || m.price_output_per_1m })

    var h = '<div class="card"><div class="card-title">Fleet Yield — Commercial Planning</div>'

    // Scenario 1 — Top-down
    h += '<div style="margin-bottom:var(--sp-4)">'
    h += '<div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">Scenario 1 — Top-down: What volume do we need to sell?</div>'
    h += '<div class="formgrid" style="grid-template-columns:repeat(4,1fr);margin-bottom:12px">'
    h += '<div class="fg"><label>Total fleet GPUs</label><input type="number" value="'+fy.totalFleet+'" onchange="M.fleetYield.totalFleet=+this.value;V.renderSolTabBody()"></div>'
    h += '<div class="fg"><label>Target utilisation %</label><input type="number" min="1" max="100" value="'+fy.targetUtil+'" onchange="M.fleetYield.targetUtil=+this.value;V.renderSolTabBody()"></div>'
    h += '<div class="fg"><label>Discount vs market %</label><input type="number" min="0" max="80" value="'+fy.discountPct+'" onchange="M.fleetYield.discountPct=+this.value;V.renderSolTabBody()"></div>'
    h += '<div class="fg"><label>Avg tokens/customer/month (M)</label><input type="number" min="0.1" step="0.1" value="'+fy.avgTokensPerCustomerM+'" onchange="M.fleetYield.avgTokensPerCustomerM=+this.value;V.renderSolTabBody()"></div>'
    h += '</div>'

    h += '<div class="derived" style="margin-bottom:12px">'
    h += '<div class="derived-line">'
    h += '<span>Fleet size<br><b>'+fy.totalFleet+' GPUs</b></span>'
    h += '<span>Throughput<br><b>'+(tokPerSec/1000).toFixed(0)+'K tok/s</b></span>'
    h += '<span>Tokens/month @'+fy.targetUtil+'%<br><b>'+tokPerMonthM.toFixed(0)+'M</b></span>'
    h += '<span>Cost/Mtok<br><b>$'+costPerMtok.toFixed(4)+'</b></span>'
    h += '</div></div>'

    if (priceableModels.length) {
      h += '<table class="tbl"><thead><tr><th>Model</th><th class="num">Market $/Mtok (avg)</th><th class="num">Our price ('+fy.discountPct+'% disc.)</th><th class="num">Margin%</th><th class="num">Customers needed</th></tr></thead><tbody>'
      priceableModels.slice(0,10).forEach(function(m) {
        var mktAvg = ((m.price_input_per_1m||0) + (m.price_output_per_1m||0)) / 2
        var ourPrice = mktAvg * (1 - fy.discountPct/100)
        var margin = ourPrice > 0 ? Math.round(((ourPrice - costPerMtok) / ourPrice) * 100) : null
        var customersNeeded = fy.avgTokensPerCustomerM > 0 ? Math.ceil(tokPerMonthM / fy.avgTokensPerCustomerM) : '—'
        h += '<tr>'
          + '<td style="font-size:11px">' + m.name + '</td>'
          + '<td class="num">$' + mktAvg.toFixed(4) + '</td>'
          + '<td class="num">$' + ourPrice.toFixed(4) + '</td>'
          + '<td class="num" style="color:' + (margin>20?'var(--teal)':margin>0?'var(--amber)':'var(--orange)') + '">' + (margin!==null?margin+'%':'—') + '</td>'
          + '<td class="num">' + customersNeeded + '</td>'
          + '</tr>'
      })
      h += '</tbody></table>'
    } else {
      h += '<div class="warn-panel"><div class="warn-body">No market reference prices in model_catalogue yet. Populate price_input_per_1m and price_output_per_1m to see pricing analysis.</div></div>'
    }
    h += '</div>'

    // Scenario 2 — Inventory yield
    h += '<div><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">Scenario 2 — Inventory yield: Committed vs headroom</div>'
    h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:12px">'
    var segments = [
      {label:'Committed (UC/GPUaaS)', gpus: commitedGpus, color:'var(--navy)'},
      {label:'Failover reserve (20%)', gpus: failoverReserve, color:'var(--amber)'},
      {label:'Available for MaaS', gpus: Math.max(0, fy.totalFleet - commitedGpus - failoverReserve), color:'var(--teal)'},
    ]
    segments.forEach(function(s) {
      var pct = fy.totalFleet > 0 ? Math.round(s.gpus/fy.totalFleet*100) : 0
      h += '<div style="background:var(--light);border-radius:var(--r);padding:12px;text-align:center">'
        + '<div style="font-size:20px;font-weight:900;color:'+s.color+'">'+s.gpus+'</div>'
        + '<div style="font-size:11px;color:var(--mid)">'+s.label+'</div>'
        + '<div style="font-size:11px;color:var(--mid)">'+pct+'% of fleet</div>'
        + '</div>'
    })
    h += '</div>'
    var headroomPct = fy.totalFleet > 0 ? Math.round(Math.max(0, fy.totalFleet - commitedGpus - failoverReserve)/fy.totalFleet*100) : 0
    if (headroomPct < 20) {
      h += '<div class="sla-banner sla-breach">&#9888; Low headroom ('+headroomPct+'%) — consider promotional pricing or defer new MaaS commitments</div>'
    } else {
      h += '<div class="sla-banner sla-met">&#10003; Sufficient headroom ('+headroomPct+'%) for MaaS growth — consider seasonal push to fill idle capacity</div>'
    }
    h += '</div>'
    h += '</div>'
    return h
  },

    _renderGlobalMarginRisks: function() {
    var globalRisks = [
      ['Cold start latency', 'GPU idle time when loading infrequently-used models. Mitigation: keep-warm allocation (~5% buffer).'],
      ['Embedding models', 'BGE-M3, Nomic, MXBai, jina need batch-throughput sizing, not TTFT. Current formula may overstate GPU needs.'],
      ['Speculative decoding', 'Draft model overhead (~10-15% extra GPU) if enabled — reduces latency but adds cost.'],
      ['INT4 quality loss', 'May increase re-requests for quality-sensitive tasks — effective token consumption higher than sized.'],
      ['Large model networking', 'InfiniBand for 671B+ models (DeepSeek R1, V3, GLM 5.2) — not yet in BOM.'],
    ]
    var h = '<div style="margin-top:var(--sp-4)"><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px">Global margin risks (apply to all workloads)</div>'
    h += '<table class="tbl"><thead><tr><th>Risk</th><th>Description</th></tr></thead><tbody>'
    globalRisks.forEach(function(r) {
      h += '<tr><td style="font-weight:600;white-space:nowrap">⚠ ' + r[0] + '</td><td style="font-size:11px">' + r[1] + '</td></tr>'
    })
    h += '</tbody></table></div>'
    return h
  },

  openEngagement: async function(id) {
    var eng = M.engagements.find(function(e){ return e.id === id })
    if (!eng) return
    M.currentEng      = eng
    M.currentDocketId = eng.docket_id
    M.activeTab       = 'customer'

    document.getElementById('docket-area').innerHTML = '<div class="loading"><span class="spinner"></span>Loading engagement...</div>'

    if (atlasDB.isConfigured() && eng.docket_id) {
      // ── REAL DATA MODE ────────────────────────────────────────────
      var docketItemsP    = atlasDB.getDocketItems(eng.docket_id)
      var requirementsP   = atlasDB.get('requirement_items', 'engagement_id=eq.' + eng.id + '&order=created_at.asc')
      var intelP          = atlasDB.get('intelligence_items', 'order=scraped_at.desc', 20)
      var intelRunP       = atlasDB.get('intel_runs', 'order=started_at.desc', 1)

      var results = await Promise.all([docketItemsP, requirementsP, intelP, intelRunP])
      var docketItems  = results[0] || []
      var requirements = results[1] || []
      var intelItems   = results[2] || []
      var intelRuns    = results[3] || []

      // Merge requirement_items into docketItems shape (so M.requirements getter works)
      var reqAsItems = requirements.map(function(r) {
        return {
          id: r.id, item_type: 'requirement', source: r.source, status: r.status,
          text: r.text, tags: r.tags || [], portfolio_links: r.portfolio_links || [],
          created_at: r.created_at
        }
      })

      // Map intelligence_items into docket-shaped intel items
      var intelAsItems = intelItems.slice(0, 5).map(function(i) {
        return {
          id: i.id, item_type: 'intel', title: i.title,
          content: { summary: i.summary, confidence_score: i.confidence_score || 0.8, scraped_at: i.scraped_at },
          created_at: i.scraped_at
        }
      })

      M.docketItems = docketItems.concat(reqAsItems).concat(intelAsItems)
      M.intelRun = intelRuns.length ? {
        lastRun: intelRuns[0].started_at, cost: intelRuns[0].cost_usd || 0,
        items: intelRuns[0].items_collected || 0, stale: 0, total: 10
      } : null
    } else {
      // ── FALLBACK: dummy data ─────────────────────────────────────
      M.docketItems = (DUMMY.items[eng.docket_id]||[]).map(function(i){
        return atlasDB.parseContent(Object.assign({},i))
      })
      M.intelRun = DUMMY.intelRun
    }

    // ── Solution tab state — load from solution_versions (Supabase) ────────
    // workload_configs stored in bom_snapshot JSONB, tenants in assumptions JSONB
    // Fallback to DUMMY data if no saved version exists yet
    M.openWlRows  = {}
    M.activeSolTab = 'uc'
    M.tenantsList = Object.assign({}, AtlasSolution.defaultTenants)
    M.workloadConfigs = { uc: [], maas: [], gpuaas: [], bmaas: [] }
    M.currentSolutionVersionId = null

    if (atlasDB.isConfigured()) {
      try {
        var svResult = await atlasDB.get('solution_versions',
          'engagement_id=eq.' + eng.id + '&order=version_number.desc', 1)
        if (svResult && svResult.length) {
          var sv = svResult[0]
          M.currentSolutionVersionId = sv.id
          if (sv.bom_snapshot && sv.bom_snapshot.workload_configs) {
            M.workloadConfigs = sv.bom_snapshot.workload_configs
          }
          if (sv.assumptions && sv.assumptions.tenants) {
            M.tenantsList = Object.assign({}, AtlasSolution.defaultTenants, sv.assumptions.tenants)
          }
        } else {
          // No saved version — seed from DUMMY if available for demo engagements
          var dummySeed = DUMMY.workloadConfigs && DUMMY.workloadConfigs[eng.id]
          if (dummySeed) M.workloadConfigs = dummySeed
        }
      } catch(e) {
        console.warn('[ATLAS] solution_versions load failed:', e)
        var dummySeed2 = DUMMY.workloadConfigs && DUMMY.workloadConfigs[eng.id]
        if (dummySeed2) M.workloadConfigs = dummySeed2
      }
    } else {
      var dummySeed3 = DUMMY.workloadConfigs && DUMMY.workloadConfigs[eng.id]
      if (dummySeed3) M.workloadConfigs = dummySeed3
    }

    // Load model_catalogue + gpu_configs from Supabase into M
    // Non-blocking — dropdowns re-render once data arrives if Solution tab is active
    AtlasSolution.loadRefData(M).then(function() {
      if (M.activeTab === 'solution') { V.renderSolTabs(); V.renderSolTabBody() }
    }).catch(function(e) { console.warn('atlas-solution loadRefData:', e) })

    V.renderSidebar()
    V.renderDocket()
  },

  // Portfolio
  togglePort: function(code) {
    if (!GRAPH[code]) return  // B2C and other auto-BOM items not selectable

    // Get or create portfolio selection
    var portItem = M.docketItems.find(function(i){ return i.item_subtype === 'portfolio_selection' })
    if (!portItem) {
      portItem = { id:atlasDB.genId('port'), item_type:'solution', item_subtype:'portfolio_selection', section:'output', status:'done', content:{ items:[], auto_reasons:{} } }
      M.docketItems.push(portItem)
    }
    if (!portItem.content.auto_reasons) portItem.content.auto_reasons = {}

    var items   = portItem.content.items
    var reasons = portItem.content.auto_reasons  // tracks why each auto-item was added
    var rules   = GRAPH[code] || {}
    var affected = [code]
    var idx = items.indexOf(code)

    if (idx >= 0) {
      // ── DESELECTING ──────────────────────────────────────────────────
      items.splice(idx, 1)
      delete reasons[code]

      // Remove auto-included items that were added because of THIS code
      // only if no other selected item still requires them
      ;(rules.requires||[]).forEach(function(req) {
        var stillNeeded = items.some(function(k) {
          return k !== code && (GRAPH[k] && (GRAPH[k].requires||[]).includes(req))
        })
        if (!stillNeeded && reasons[req] && reasons[req].includes(code)) {
          var ri = items.indexOf(req)
          if (ri >= 0) {
            items.splice(ri, 1)
            delete reasons[req]
            affected.push(req)
            V.toast(req + ' removed (was auto-included for ' + code + ')', 'info')
          }
        }
      })
    } else {
      // ── SELECTING ────────────────────────────────────────────────────
      items.push(code)

      // 1. Enforce ONE_OF (DC type group — pick one)
      ;(rules.one_of||[]).forEach(function(other) {
        var oi = items.indexOf(other)
        if (oi >= 0) {
          items.splice(oi, 1)
          delete reasons[other]
          affected.push(other)
          V.toast(other + ' removed — only one DC type allowed', 'warning')
        }
      })

      // 2. Auto-select REQUIRES chain (full cascade)
      function autoRequire(reqCode, becauseOf) {
        if (items.includes(reqCode)) return  // already present
        if (!GRAPH[reqCode]) return          // not a selectable item
        items.push(reqCode)
        reasons[reqCode] = reasons[reqCode] || []
        if (!reasons[reqCode].includes(becauseOf)) reasons[reqCode].push(becauseOf)
        affected.push(reqCode)
        V.toast(reqCode + ' auto-included — required by ' + becauseOf, 'info')
        // Cascade: also satisfy the new item's requirements
        ;(GRAPH[reqCode].requires||[]).forEach(function(r) { autoRequire(r, reqCode) })
      }
      ;(rules.requires||[]).forEach(function(req) { autoRequire(req, code) })

      // 3. If L5 item and no L3 orchestration selected → auto-add K8s default
      var isL5  = ['B5A','B5B','B5C','B5D','B5E','B5F','B5G','B5H','B5I'].includes(code)
      var hasL3 = ['B3A','B3B','B3C'].some(function(k){ return items.includes(k) })
      if (isL5 && !hasL3) {
        items.push(DEFAULT_ORCH)
        reasons[DEFAULT_ORCH] = reasons[DEFAULT_ORCH] || []
        reasons[DEFAULT_ORCH].push(code)
        affected.push(DEFAULT_ORCH)
        V.toast(DEFAULT_ORCH + ' auto-included — default orchestration for UC deployment', 'info')
      }

      // 4. If L5 item and no DC type selected → warn (don't auto-select — DC is a big decision)
      var hasL1 = ['B1A','B1B','B1C','B1D','B1E'].some(function(k){ return items.includes(k) })
      if (isL5 && !hasL1) {
        V.toast('Select a DC/Facility type (L1) to complete the stack', 'warning')
      }

      // 5. Suggestions — toast only, never auto-select
      ;(rules.suggests||[]).forEach(function(sug) {
        if (!items.includes(sug)) V.toast('Consider: ' + sug + ' (recommended with ' + code + ')', 'info')
      })
    }

    // Update UI for all affected items only — no full re-render
    affected.forEach(function(c) {
      var el = document.getElementById('pi-' + c)
      if (el) {
        var isSelected = items.includes(c)
        var isAuto     = !!(reasons && reasons[c] && reasons[c].length)
        el.classList.toggle('selected', isSelected)
        // Update auto label
        var nameEl = el.querySelector('.portfolio-item-name')
        if (nameEl && isAuto && isSelected) {
          if (!nameEl.querySelector('.auto-tag')) {
            var tag = document.createElement('span')
            tag.className = 'auto-tag'
            tag.style.cssText = 'font-size:9px;color:var(--teal);margin-left:6px;font-weight:600'
            tag.textContent = '[auto]'
            tag.title = 'Auto-included because: ' + reasons[c].join(', ')
            nameEl.appendChild(tag)
          }
        } else if (nameEl) {
          var existing = nameEl.querySelector('.auto-tag')
          if (existing) existing.remove()
        }
      }
    })
  },

  savePortfolio: async function() {
    var port  = M.docketItems.find(function(i){ return i.item_subtype === 'portfolio_selection' })
    var items = (port && port.content && port.content.items) ? port.content.items : []
    var hasGPU = items.includes('B2A') || items.includes('B2B')

    // ── BLOCK GATE VALIDATION ─────────────────────────────────────────
    // GPU (L2) is the anchor. OPERATE and SUSTAIN cannot exist without it.
    var hasOperate = items.includes('O01')
    var hasSustain = ['S01','S02','S03','S04','S05'].some(function(s){ return items.includes(s) })
    var hasBuildNonGPU = items.some(function(i){
      return ['B1A','B1B','B1C','B1D','B1E','B1F',
              'B3A','B3B','B3C','B3D','B3E','B3F','B3G',
              'B4A','B4B','B4C',
              'B5A','B5B','B5C','B5D','B5E','B5F','B5G','B5H','B5I',
              'B6A','B6B','B6C','B6D',
              'B7A','B7B','B7C'].includes(i)
    })

    var errors = []
    if ((hasOperate || hasSustain) && !hasGPU) {
      errors.push('OPERATE / SUSTAIN selected but no GPU hardware (B2A/B2B). What are we operating? Add GPU compute first.')
    }
    if (hasBuildNonGPU && !hasGPU) {
      // This shouldn't happen with cascade rules — safety net
      errors.push('BUILD items selected without GPU hardware. GPU (B2A/B2B) is the anchor of the BUILD stack.')
    }

    if (errors.length) {
      errors.forEach(function(e){ V.toast('⚠ ' + e, 'error') })
      var el = document.getElementById('port-save-status')
      if (el) { el.textContent = '✗ Fix errors first'; el.className = 'save-status unsaved' }
      return
    }

    // ── WARN if GPU selected but no DC type ───────────────────────────
    var hasL1 = ['B1A','B1B','B1C','B1D','B1E','B1F'].some(function(k){ return items.includes(k) })
    if (hasGPU && !hasL1) {
      V.toast('Note: GPU hardware selected but no DC/Facility type chosen. Where will the hardware live?', 'warning')
    }

    var count = items.length
    var el = document.getElementById('port-save-status')
    if (el) { el.textContent = 'Saving...'; el.className = 'save-status' }

    if (atlasDB.isConfigured() && M.currentDocketId && port) {
      var result = await atlasDB.savePortfolioSelection(M.currentDocketId, port.id, items, M.currentEng.id)
      if (result.ok) {
        if (el) { el.textContent = '✓ Saved · ' + count + ' items'; el.className = 'save-status saved' }
        V.toast('Portfolio saved · ' + count + ' items')
      } else {
        if (el) { el.textContent = '✗ Save failed'; el.className = 'save-status unsaved' }
        V.toast('Save failed — ' + (result.error||'unknown'), 'error')
      }
    } else {
      if (el) { el.textContent = '✓ Saved · ' + count + ' items'; el.className = 'save-status saved' }
      V.toast('Portfolio saved · ' + count + ' items')
    }
  },

    C._sliderDebounce = setTimeout(function(){ V.renderSolTabBody() }, 150)
  },

  // ── Tenant block controller — works identically across UC/MaaS/GPUaaS ──
  updTenant: function(id, context, field, val) {
    var arr = context === 'uc' ? M.workloadConfigs.uc : context === 'maas' ? M.workloadConfigs.maas : M.workloadConfigs.gpuaas
    var wl = arr.find(function(w){ return w.id === id })
    if (!wl) return
    wl[field] = val
    if (field === 'tenant' && !val) { wl.poolType = 'open'; wl.tenure = null }
    if (field === 'poolType' && val === 'open') wl.tenure = null
    if (field === 'poolType' && val === 'reserved' && !wl.tenure) wl.tenure = '12'
    V.renderSolTabBody()
  },

    setMvBView: function(id, ctx) {
    var wl = M.workloadConfigs.uc.find(function(w){ return w.id === id }) || M.workloadConfigs.maas.find(function(w){ return w.id === id })
    if (wl) wl.mvbView = ctx
    V.renderSolTabBody()
  },

  addUC: function() {
    var id = 'uc' + (M.workloadConfigs.uc.length + 1) + '-' + Date.now()
    M.workloadConfigs.uc.push({ id:id, name:'New Use Case', ucLib:'adhoc', gpu:null, deployMode:'production',
      dau:1000, reqPerDay:5, peakMult:3, inputTok:2048, outputTok:500, precision:'int4',
      slaTier:'tier2', ttftTarget:2000, agentic:false, steps:1, toolWait:0, mvbView:'uc' })
    M.openWlRows[id] = true
    V.renderSolTabs(); V.renderSolTabBody()
    C.scheduleSolutionSave()
  },
  removeUC: function(id) {
    M.workloadConfigs.uc = M.workloadConfigs.uc.filter(function(w){ return w.id !== id })
    V.renderSolTabs(); V.renderSolTabBody()
    C.scheduleSolutionSave()
  },
  addMaas: function() {
    var id = 'maas' + (M.workloadConfigs.maas.length + 1) + '-' + Date.now()
    M.workloadConfigs.maas.push({ id:id, name:'New MaaS Pool', archetype:'text_chat', gpu:M.defaultGpu,
      model:'llama-3.1-8b', precision:'int4', dau:10000, commercialSla:'bronze', mvbView:'maas' })
    M.openWlRows[id] = true
    V.renderSolTabs(); V.renderSolTabBody()
    C.scheduleSolutionSave()
  },
  removeMaas: function(id) {
    M.workloadConfigs.maas = M.workloadConfigs.maas.filter(function(w){ return w.id !== id })
    V.renderSolTabs(); V.renderSolTabBody()
    C.scheduleSolutionSave()
  },

  addGpuaas: function() {
    var id = 'gpuaas' + (M.workloadConfigs.gpuaas.length + 1) + '-' + Date.now()
    M.workloadConfigs.gpuaas.push({
      id: id, name: 'New GPU Block', gpu: M.defaultGpu, gpuCount: 8,
      commitment: 'monthly', dedicated: true, interconnect: 'standalone',
      tenant: null, poolType: 'open', tenure: null, mvbView: 'fleet'
    })
    M.openWlRows[id] = true
    V.renderSolTabs(); V.renderSolTabBody()
    C.scheduleSolutionSave()
  },
  updGpuaas: function(id, field, val) {
    var wl = M.workloadConfigs.gpuaas.find(function(w){ return w.id === id })
    if (wl) wl[field] = val
    V.renderSolTabBody()
    C.scheduleSolutionSave()
  },
  removeGpuaas: function(id) {
    M.workloadConfigs.gpuaas = M.workloadConfigs.gpuaas.filter(function(w){ return w.id !== id })
    V.renderSolTabs(); V.renderSolTabBody()
    C.scheduleSolutionSave()
  },

  // ── Solution save — writes to solution_versions in Supabase ─────────────
  // Auto-saves on every workload change (debounced 2s to avoid hammering DB)
  // Also called explicitly by "Save Solution" button

  _solutionSaveTimer: null,

  scheduleSolutionSave: function() {
    clearTimeout(C._solutionSaveTimer)
    C._solutionSaveTimer = setTimeout(function() { C.saveSolution(false) }, 2000)
  },

  saveSolution: async function(explicit) {
    if (!atlasDB.isConfigured() || !M.currentEng) return
    var snapshot = {
      workload_configs: M.workloadConfigs
    }
    var assumptions = {
      tenants: M.tenantsList,
      default_gpu: M.defaultGpu,
      saved_at: new Date().toISOString()
    }
    try {
      if (M.currentSolutionVersionId) {
        // Update existing version
        await atlasDB.upsert('solution_versions', {
          id:            M.currentSolutionVersionId,
          engagement_id: M.currentEng.id,
          bom_snapshot:  snapshot,
          assumptions:   assumptions,
          status:        'draft'
        }, 'id')
      } else {
        // Create first version for this engagement
        var now = new Date().toISOString()
        var newRow = {
          id:             'sv-' + M.currentEng.id + '-' + Date.now(),
          engagement_id:  M.currentEng.id,
          version_number: 1,
          version_label:  'Draft v1',
          level:          'L1',
          status:         'draft',
          bom_snapshot:   snapshot,
          assumptions:    assumptions,
          created_by:     'atlas-docket',
          created_at:     now
        }
        var result = await atlasDB.upsert('solution_versions', newRow, 'id')
        if (result && result.ok) M.currentSolutionVersionId = newRow.id
      }
      if (explicit) V.toast('Solution saved', 'success')
    } catch(e) {
      console.warn('[ATLAS] solution save failed:', e)
      if (explicit) V.toast('Save failed — ' + (e.message||e), 'error')
    }
  },

  // ── What-If Controller ───────────────────────────────────────────────────
  updWhatIf: function(field, val) {
    M.whatif[field] = val
    if (field === 'selectedWorkloadId') {
      // Reset GPU selection when workload changes
      M.whatif.selectedGpus = []
    }
    V.renderSolTabBody()
  },

  toggleWhatIfGpu: function(gpuId) {
    var idx = M.whatif.selectedGpus.indexOf(gpuId)
    if (idx >= 0) {
      M.whatif.selectedGpus.splice(idx, 1)
    } else if (M.whatif.selectedGpus.length < 5) {
      M.whatif.selectedGpus.push(gpuId)
    }
    V.renderSolTabBody()
  },

  addTenant: function() {
    document.getElementById('tenant-edit-id').value = ''
    document.getElementById('tenant-edit-title').textContent = 'New Tenant'
    document.getElementById('tenant-edit-name').value = ''
    document.getElementById('tenant-edit-sectier').value = 'S1'
    document.getElementById('tenant-edit-chargeout').value = 'commercial'
    V.openModal('modal-tenant-edit')
  },

  showCalcDetail: function(id) {
    AtlasSolution.openCalcDetail(id)
  },

  editTenant: function(id) {
    var t = M.tenantsList[id]
    if (!t) return
    document.getElementById('tenant-edit-id').value = id
    document.getElementById('tenant-edit-title').textContent = 'Edit Tenant — ' + t.name
    document.getElementById('tenant-edit-name').value = t.name
    document.getElementById('tenant-edit-sectier').value = t.secTier
    document.getElementById('tenant-edit-chargeout').value = t.chargeout
    V.openModal('modal-tenant-edit')
  },

  saveTenantEdit: function() {
    var id   = document.getElementById('tenant-edit-id').value
    var name = (document.getElementById('tenant-edit-name').value||'').trim()
    if (!name) { V.toast('Enter a tenant name','warning'); return }
    var secTier   = document.getElementById('tenant-edit-sectier').value
    var chargeout = document.getElementById('tenant-edit-chargeout').value
    if (!id) id = name.toLowerCase().replace(/[^a-z0-9]+/g,'-')
    M.tenantsList[id] = { name: name, secTier: secTier, chargeout: chargeout }
    V.closeModal('modal-tenant-edit')
    V.renderSolTabBody()
    C.scheduleSolutionSave()
    V.toast('Tenant saved — ' + name)
  },
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════

async function init() {
  // atlasDB.init() is called automatically by atlas-db.js on load
  V.renderSidebar()  // show loading state first
  document.getElementById('sb-body').innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>'

  if (atlasDB.isConfigured()) {
    // ── REAL DATA MODE ──────────────────────────────────────────────
    M.customers   = await atlasDB.get('customers', 'order=name.asc')
    M.engagements = await atlasDB.get('engagements', 'order=name.asc')
    if (!M.customers.length && !M.engagements.length) {
      // Empty DB — fall back to dummy for demo purposes
      loadDummy()
      V.toast('No data in Supabase yet — showing demo data', 'info')
    }
  } else {
    // ── NO SUPABASE CONFIGURED — use dummy data ────────────────────
    loadDummy()
    V.toast('Supabase not configured — showing demo data', 'warning')
  }

  // Show data source mode
  var badge = document.getElementById('data-mode-badge')
  if (badge) {
    if (atlasDB.isConfigured()) {
      badge.textContent = '● Live Supabase'
      badge.style.cssText = 'display:inline-block;background:rgba(0,178,144,.2);color:#00B290'
    } else {
      badge.textContent = '● Demo data'
      badge.style.cssText = 'display:inline-block;background:rgba(255,182,0,.2);color:#FFB600'
    }
  }

  V.renderSidebar()

  // Open first engagement if any exist
  if (M.engagements.length) {
    await C.openEngagement(M.engagements[0].id)
  } else {
    document.getElementById('docket-area').innerHTML =
      '<div class="empty-state" style="padding-top:80px">'
      + '<div class="empty-icon">📋</div>'
      + '<div class="empty-title">No engagements yet</div>'
      + '<div class="empty-desc">Create a customer and engagement to get started.</div></div>'
  }
}
</script>
