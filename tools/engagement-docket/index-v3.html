<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS — Engagement Docket v3</title>
  <!-- No hardcoded paths — BASE_URL drives all asset references -->
  <link rel="stylesheet" id="atlas-css-link">
  <style>
    /* Tool-specific overrides — ~30 lines only */
    .req-add-row { display:flex; gap:var(--sp-3); }
    .req-add-row textarea { flex:1; min-height:64px; resize:none; }
    .src-btns { display:flex; flex-direction:column; gap:var(--sp-1); }
    .src-btn  { padding:5px 10px; border-radius:var(--r-sm); font-size:10px; font-weight:var(--fw-bold); border:1.5px solid; cursor:pointer; font-family:var(--font); white-space:nowrap; transition:opacity .15s; }
    .src-btn:hover { opacity:.75; }
    .src-btn.explicit  { border-color:var(--navy);  color:var(--navy);  background:rgba(0,40,112,.07);  }
    .src-btn.implicit  { border-color:var(--blue);  color:var(--blue);  background:rgba(28,56,245,.07); }
    .src-btn.suggested { border-color:var(--teal);  color:var(--teal);  background:rgba(0,178,144,.07); }
    .pulse-item { padding:var(--sp-3); border:1px solid var(--border); border-radius:var(--r-sm); margin-bottom:var(--sp-2); }
    .val-map-cell { padding:var(--sp-2); border-radius:var(--r-sm); text-align:center; font-size:10px; font-weight:var(--fw-semi); }
    .val-map-high { background:rgba(0,178,144,.15); color:#065f46; }
    .val-map-med  { background:rgba(255,182,0,.15);  color:#92400e; }
    .val-map-low  { background:rgba(107,114,128,.1); color:var(--mid); }

    /* ── Solution tab CSS (folded in from workload-profiler-prototype) ── */

/* Header */
.hdr{background:var(--navy);color:#fff;padding:var(--sp-4) var(--sp-6);display:flex;align-items:center;gap:var(--sp-3)}
.hdr .brand{font-weight:900;letter-spacing:3px;font-size:18px}
.hdr .brand span{color:var(--orange)}
.hdr .crumb{font-size:12px;color:rgba(255,255,255,.65)}
.hdr .crumb b{color:#fff;font-weight:600}

/* Tabs */
.tabbar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:var(--sp-5);background:#fff;border-radius:var(--r) var(--r) 0 0;padding:0 var(--sp-4)}
.tabbtn{padding:var(--sp-3) var(--sp-4);font-size:13px;font-weight:600;color:var(--mid);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:var(--font);margin-bottom:-2px;transition:color .15s}
.tabbtn.active{color:var(--navy);border-bottom-color:var(--orange)}
.tabbtn .cnt{background:var(--light);color:var(--mid);font-size:10px;padding:1px 6px;border-radius:var(--r-full);margin-left:6px}
.tabbtn.active .cnt{background:rgba(255,85,57,.12);color:var(--orange)}

/* GPU default bar */
.gpu-default{display:flex;align-items:center;gap:var(--sp-3);background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4);font-size:12px}
.gpu-default label{font-weight:700;color:var(--mid);text-transform:uppercase;font-size:10px;letter-spacing:.4px}
.gpu-default select{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:12px}

/* Table */
.tablewrap{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:var(--sp-4)}
table.wl{width:100%;border-collapse:collapse}
table.wl thead th{background:var(--navy);color:#fff;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:var(--sp-2) var(--sp-3);font-weight:700}
table.wl thead th.num{text-align:right}
table.wl tbody tr.row-main{cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
table.wl tbody tr.row-main:hover{background:var(--light)}
table.wl tbody tr.row-main.open{background:rgba(0,40,112,.03)}
table.wl td{padding:var(--sp-2) var(--sp-3);font-size:12.5px}
table.wl td.num{text-align:right;font-family:var(--font-mono);font-size:12px}
table.wl td.name{font-weight:600;color:var(--dark)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:700}
.badge-met{background:rgba(0,178,144,.12);color:var(--teal)}
.badge-breach{background:rgba(255,85,57,.12);color:var(--orange)}
.arrow{display:inline-block;transition:transform .25s;font-size:10px;color:var(--mid)}
.row-main.open .arrow{transform:rotate(90deg)}
.totals-row td{background:var(--light);font-weight:700;border-top:2px solid var(--border);padding:var(--sp-2) var(--sp-3)}

/* Expand panel */
.expand-row td{padding:0;border-bottom:1px solid var(--border)}
.expand-inner{max-height:0;overflow:hidden;transition:max-height .35s ease}
.expand-inner.open{max-height:2200px;transition:max-height .45s ease}
.expand-pad{padding:var(--sp-5);background:#FAFBFC}

.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-4);margin-bottom:var(--sp-4)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.4px}
.fg select,.fg input[type=number],.fg input[type=text]{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:12.5px;background:#fff}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--blue)}
.fg-hint{font-size:10px;color:var(--mid)}

.radiorow{display:flex;flex-direction:column;gap:6px}
.radio-opt{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.radio-opt input{accent-color:var(--navy)}

.sliderwrap{display:flex;align-items:center;gap:var(--sp-3)}
.sliderwrap input[type=range]{flex:1;accent-color:var(--navy);height:4px}
.slider-val{font-size:16px;font-weight:900;color:var(--navy);min-width:64px;text-align:right;font-family:var(--font-mono)}

.collapsible{margin-bottom:var(--sp-3)}
.collapsible-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--navy);padding:6px 0;user-select:none}
.collapsible-hdr .arrow{color:var(--navy)}
.collapsible-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapsible-body.open{max-height:600px}
.collapsible-body-pad{padding:var(--sp-3) 0 var(--sp-2)}

.derived{background:var(--navy);color:#fff;border-radius:var(--r);padding:var(--sp-4);margin-top:var(--sp-2)}
.derived-line{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--sp-3) var(--sp-5);font-size:11.5px;color:rgba(255,255,255,.85);margin-bottom:8px}
.derived-line span{display:block}
.derived-line b{color:#fff}
.sla-banner{margin-top:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-radius:var(--r-sm);font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.sla-met{background:rgba(0,178,144,.18);color:#5EEAD4}
.sla-breach{background:rgba(255,85,57,.2);color:#FCA5A5}
.sla-hint{font-weight:400;font-size:11px;opacity:.85;margin-left:auto}

.rag-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(28,56,245,.1);color:var(--blue);padding:3px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700;margin-left:8px}
.tenant-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,178,144,.1);color:var(--teal);padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:600}
.pool-badge-reserved{display:inline-flex;align-items:center;gap:3px;background:rgba(0,40,112,.1);color:var(--navy);padding:2px 7px;border-radius:var(--r-full);font-size:9px;font-weight:700}
.pool-badge-open{display:inline-flex;align-items:center;gap:3px;background:rgba(255,182,0,.12);color:#92400E;padding:2px 7px;border-radius:var(--r-full);font-size:9px;font-weight:700}

/* Tenant management panel */
.tenant-mgmt{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:var(--sp-4);margin-bottom:var(--sp-4)}
.tenant-mgmt-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)}
.tenant-mgmt-title{font-size:13px;font-weight:700;color:var(--navy)}
.tenant-chip-list{display:flex;flex-wrap:wrap;gap:8px}
.tenant-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:11.5px;background:var(--light)}
.tenant-chip b{color:var(--dark)}
.tenant-chip .sec{font-size:9px;color:#fff;background:var(--navy);padding:1px 6px;border-radius:var(--r-full)}
.add-tenant-btn{padding:5px 12px;border-radius:var(--r-sm);font-size:11px;font-weight:700;border:1.5px dashed var(--teal);background:rgba(0,178,144,.05);color:var(--teal);cursor:pointer;font-family:var(--font)}

/* Reusable tenant block (within any expanded row) */
.tenant-block{background:rgba(0,178,144,.04);border:1px solid rgba(0,178,144,.25);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4)}
.tenant-block-hdr{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.pool-toggle{display:flex;gap:0;margin-top:4px}
.pool-btn{padding:6px 14px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font)}
.pool-btn:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm)}
.pool-btn:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0;border-left:none}
.pool-btn.active-reserved{background:var(--navy);color:#fff;border-color:var(--navy)}
.pool-btn.active-open{background:var(--amber);color:#78350F;border-color:var(--amber)}
.mvb-toggle{display:flex;gap:0;margin-bottom:var(--sp-3)}
.mvb-btn{padding:5px 14px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font)}
.mvb-btn:first-child{border-radius:var(--r-sm) 0 0 var(--r-sm)}
.mvb-btn:last-child{border-radius:0 var(--r-sm) var(--r-sm) 0}
.mvb-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mvb-chart{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--sp-4);font-size:11px;color:var(--mid)}

.actions-row{display:flex;justify-content:space-between;align-items:center;margin-top:var(--sp-4)}
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--font)}
.btn-ghost{background:var(--light);color:var(--dark)}
.btn-danger-text{background:none;color:var(--orange);border:1.5px solid var(--orange)}
.add-row{padding:var(--sp-3) var(--sp-4)}
.add-btn{padding:8px 18px;border-radius:var(--r-sm);font-size:12px;font-weight:700;border:1.5px dashed var(--navy);background:rgba(0,40,112,.03);color:var(--navy);cursor:pointer;font-family:var(--font)}
  </style>
</head>
<body>

<!-- MASTHEAD -->
<div class="atlas-hdr">
  <div class="atlas-hdr-left">
    <div class="atlas-brand">ATL<span>A</span>S</div>
    <div class="atlas-tool-name">Engagement Docket</div>
    <span class="atlas-ver">v3.0</span>
  </div>
  <div class="atlas-hdr-right">
    <span id="data-mode-badge" class="atlas-ver" style="display:none"></span>
    <button class="atlas-nav-btn" onclick="window.location.href='../../'">&#8592; Portal</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-search">
      <input type="text" id="sb-search" placeholder="Search customers, engagements..."
             oninput="M.filterSidebar(this.value)">
    </div>
    <div class="sb-body" id="sb-body"></div>
    <div style="padding:var(--sp-3) 14px;border-top:1px solid var(--border)">
      <button class="btn btn-outline" style="width:100%;font-size:11px"
              onclick="V.openModal('modal-customer')">+ New Customer</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="docket-area">
      <div class="empty-state" style="padding-top:80px">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Select an engagement</div>
        <div class="empty-desc">Choose from the left panel, or create a new customer.</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: New Customer -->
<div class="modal-overlay" id="modal-customer" style="display:none"
     onclick="if(event.target===this)V.closeModal('modal-customer')">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Customer</div>
      <button class="btn btn-ghost btn-sm" onclick="V.closeModal('modal-customer')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Organisation Name</label>
        <input type="text" id="cust-name" placeholder="e.g. Government of Himachal Pradesh"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
        <div class="form-group"><label class="form-label">Type</label>
          <select id="cust-type">
            <option value="state_govt">State Government</option>
            <option value="central_govt">Central Government</option>
            <option value="defence">Defence / Intelligence</option>
            <option value="enterprise">Enterprise</option>
            <option value="csp">CSP / Cloud Provider</option>
            <option value="ai_lab">AI Lab / University</option>
            <option value="other">Other</option>
          </select></div>
        <div class="form-group"><label class="form-label">Location</label>
          <input type="text" id="cust-location" placeholder="e.g. Shimla, India"></div>
      </div>
      <div class="form-group"><label class="form-label">Primary Contact</label>
        <input type="text" id="cust-contact" placeholder="e.g. Secretary IT"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-customer')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveCustomer()">Create Customer</button>
    </div>
  </div>
</div>

<!-- MODAL: New Engagement -->
<div class="modal-overlay" id="modal-engagement" style="display:none"
     onclick="if(event.target===this)V.closeModal('modal-engagement')">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Engagement</div>
      <button class="btn btn-ghost btn-sm" onclick="V.closeModal('modal-engagement')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eng-cust-id">
      <div class="form-group"><label class="form-label">Engagement Name</label>
        <input type="text" id="eng-name" placeholder="e.g. HAICE — HP Sovereign AI Centre"></div>
      <div class="form-group"><label class="form-label">Archetypes (select all that apply)</label>
        <div id="archetype-selector" style="display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-1)"></div>
      </div>
      <div class="form-group"><label class="form-label">Territory / Geography</label>
        <input type="text" id="eng-territory" placeholder="e.g. Himachal Pradesh, India"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-engagement')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveEngagement()">Create Engagement</button>
    </div>
  </div>
</div>

<!-- MODAL: Intel Run Confirmation -->
<div class="modal-overlay" id="modal-intel-run" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr"><div class="modal-title">Run Intelligence Collection?</div></div>
    <div class="modal-body" id="intel-run-detail"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-intel-run')">Cancel</button>
      <button class="btn btn-ghost" onclick="C.runIntel('stale')">Stale only (~$0.03)</button>
      <button class="btn btn-primary" onclick="C.runIntel('full')">Full refresh (~$0.07)</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-calc-detail" style="display:none">
  <div class="modal" style="max-width:600px">
    <div class="modal-hdr"><div class="modal-title">&#128269; How was this calculated?</div></div>
    <div class="modal-body">
      <div id="calc-detail-content" style="font-size:12.5px;line-height:1.8;font-family:var(--font-mono);white-space:pre-wrap;color:var(--dark)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-calc-detail')">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-tenant-edit" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr"><div class="modal-title" id="tenant-edit-title">Edit Tenant</div></div>
    <div class="modal-body">
      <input type="hidden" id="tenant-edit-id">
      <div class="fg" style="margin-bottom:12px"><label>Name</label><input type="text" id="tenant-edit-name" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px"></div>
      <div class="fg" style="margin-bottom:12px"><label>Security Tier</label><select id="tenant-edit-sectier" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px">
        <option value="S1">S1 — Standard isolation</option>
        <option value="S2">S2 — Enhanced isolation</option>
        <option value="S3">S3 — Sovereign / dedicated</option>
        <option value="S4">S4 — Air-gapped / classified</option>
      </select></div>
      <div class="fg"><label>Chargeout Model</label><select id="tenant-edit-chargeout" style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:5px">
        <option value="commercial">Commercial</option>
        <option value="cost_recovery">Cost Recovery</option>
        <option value="subsidised">Subsidised</option>
        <option value="zero">Zero (free)</option>
      </select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="V.closeModal('modal-tenant-edit')">Cancel</button>
      <button class="btn btn-primary" onclick="C.saveTenantEdit()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- SCRIPTS — no hardcoded URLs, driven by CFG.baseUrl -->
<script>
// ── CONFIG — change ONE place to move to a new host ──────────────────────────
var CFG = {
  baseUrl: (function() {
    // Auto-detect: if running on GitHub Pages use that origin,
    // otherwise fall back to the canonical URL.
    // NEVER hardcode 'arvindbajaj5.github.io' outside this block.
    var origin = window.location.origin
    var path   = window.location.pathname
    // Extract repo base (everything up to /atlas-platform/)
    var m = path.match(/^(\/[^/]+\/atlas-platform\/)/)
    return m ? (origin + m[1]) : 'https://arvindbajaj5.github.io/atlas-platform/'
  })()
}

// Wire shared asset links dynamically
document.getElementById('atlas-css-link').href = CFG.baseUrl + 'shared/atlas.css'

// Dynamically load shared scripts in order
;(function loadShared(files, i) {
  if (i >= files.length) { init(); return }
  var s = document.createElement('script')
  s.src = CFG.baseUrl + files[i]
  s.onload  = function() { loadShared(files, i+1) }
  s.onerror = function() { console.error('[ATLAS] Failed to load:', files[i]); loadShared(files, i+1) }
  document.head.appendChild(s)
})(['shared/atlas-tokens.js', 'shared/atlas-db.js'], 0)
</script>

<script>
'use strict'

// ═══════════════════════════════════════════════════════════════════════
// MODEL — single source of truth. Never written by View.
// REFACTOR-MARKER: extract to shared/atlas-model.js in maintainability phase
// ═══════════════════════════════════════════════════════════════════════

var M = {
  customers:          [],
  engagements:        [],
  currentEng:         null,
  currentDocketId:    null,
  docketItems:        [],
  ucLibrary:          [],
  activeTab:          'customer',
  activeIntelSubTab:  'pulse',
  selectedArchetypes: [],
  sidebarFilter:      '',

  // Derived — computed from docketItems, no extra DB calls
  get requirements() {
    return this.docketItems.filter(function(i){ return i.item_type === 'requirement' })
  },
  get portfolioItems() {
    var item = this.docketItems.find(function(i){ return i.item_subtype === 'portfolio_selection' })
    return (item && item.content && item.content.items) ? item.content.items : []
  },
  get ucItems() {
    return this.docketItems.filter(function(i){ return i.item_type === 'uc' })
  },
  get actionItems() {
    return this.docketItems.filter(function(i){ return i.item_type === 'action' })
  },
  get intelItems() {
    return this.docketItems.filter(function(i){ return i.item_type === 'intel' })
  },

  filterSidebar: function(q) {
    M.sidebarFilter = (q||'').toLowerCase()
    V.renderSidebar()
  },

  // ── Solution tab state (folded in from workload-profiler-prototype) ─────
  defaultGpu:      'h200',
  activeSolTab:    'uc',
  openWlRows:      {},
  workloadConfigs: { uc: [], maas: [], gpuaas: [], bmaas: [] },
  tenantsList:     {}
}

// ── PORTFOLIO DEPENDENCY GRAPH ───────────────────────────────────────
// Four relationship types:
//   requires[]   → auto-select when this item is selected (hard prerequisite)
//   one_of[]     → selecting this deselects others in same group
//   suggests[]   → toast recommendation only (no auto-select)
//   auto_bom     → generates BOM lines but NOT a selectable portfolio item
//
// B2C is NOT in this graph — it is auto-generated in BOM when B2A/B2B selected.
// Rule: L5 (what customer wants to DO) cascades down the full stack automatically.

var GRAPH = {
  // ── RULE: L2 GPU compute is the anchor of the entire BUILD stack ─────
  // Nothing in BUILD (L1, L3, L4, L5, L6, L7), OPERATE, or SUSTAIN

  // SizingEngine's approach: concurrent = DAU x peak_concurrent_pct,
  var throughputFactor = GPU_THROUGHPUT_FACTOR[gpuId] || 1.0
  var haFactor  = HA_GPU_FACTOR[wl.haTier] || 1.0
  var drFactor  = DR_GPU_FACTOR[wl.drType] || 1.0
  var peakConcPct = wl.peakConcPct || 5

  // P50/P95/P99 — adjusts token counts used for sizing.
  // P50=typical session, P95=design point (default), P99=stress test.
  var ctxMult   = wl.contextPct === 'p50' ? 0.6 : wl.contextPct === 'p99' ? 1.4 : 1.0
  var inputTok  = Math.round((wl.inputTok  || 2048) * ctxMult)
  var outputTok = Math.round((wl.outputTok || 500)  * ctxMult)

  // CORRECTED THROUGHPUT-BASED FORMULA (fixed 1 Jul 2026)
  // CORRECTED FORMULA (fixed 1 Jul 2026)
  // Previous versions had two errors:
  //   1. "sessions per GPU" (concurrent/4 × tpI) — arbitrary, not throughput-based
  //   2. "concurrent × outputTok / genTime" — treats EVERY concurrent user as
  //      simultaneously generating, which is not how continuous batching works
  //
  // Correct approach: peak_rps (arrivals/sec) → throughput needed → GPUs
  //   Users are CONCURRENT but not all generating simultaneously — they submit
  //   a request, wait for the response, then submit another. Peak RPS ≪ concurrent.
  //
  // Step 1: peak concurrent users = DAU × peak%
  var concurrent = Math.max(1, Math.ceil(wl.dau * peakConcPct / 100))
  // Step 2: peak requests/sec = concurrent users × requests/user/day / 86400 × peak mult
  var avgRPS     = (wl.dau * (wl.reqPerDay || 12)) / 86400
  var peakRPS    = Math.ceil(avgRPS * (wl.peakMult || 3))
  // Step 3: requests/sec a single GPU can handle = throughput (tok/s) / output tokens/request
  //   H200 INT4 baseline: ~8,000 tok/s (conservative, continuous batching, small-medium models)
  var tokPerGpuBase = 8000
  var precMult  = wl.precision === 'int8' ? 0.55 : wl.precision === 'fp16' ? 0.35 : wl.precision === 'fp8' ? 0.8 : 1.0
  var tokPerGpu = Math.round(tokPerGpuBase * throughputFactor * precMult)
  var reqPerGpu = Math.max(1, Math.round(tokPerGpu / outputTok))
  // Step 4: base GPUs = ceil(peak_rps / req_per_gpu)
  var baseGpus  = Math.max(1, Math.ceil(peakRPS / reqPerGpu))
  // Step 5: buffers — headroom + HA + DR
  var buffers   = Math.max(1, Math.ceil(baseGpus * 0.3 * haFactor * drFactor))
  var total     = baseGpus + buffers
  var powerKw   = Math.round(total * 0.7 * 10) / 10

  var ttftEstimate = Math.round(wl.ttftTarget / throughputFactor * 0.85)
  var slaMet  = ttftEstimate <= wl.ttftTarget
  var margin  = wl.ttftTarget ? Math.round(Math.abs((wl.ttftTarget - ttftEstimate) / wl.ttftTarget) * 100) : 0
  var gpusPerUnit = GPU_GPUS_PER_UNIT[gpuId] || 8
  return {
    gpu: gpuId, concurrent: concurrent, peakRPS: peakRPS, baseGpus: baseGpus,
    buffers: buffers, total: total, powerKw: powerKw,
    racks: Math.ceil(total / gpusPerUnit) + ' rack(s) / ' + total + ' GPUs',
    p95RPS: peakRPS, ttftEstimate: ttftEstimate, slaMet: slaMet, margin: margin,
    peakConcPct: peakConcPct,
    formula: 'Step 1: Concurrent = DAU(' + wl.dau.toLocaleString() + ') × ' + peakConcPct + '% = ' + concurrent.toLocaleString()
      + ' | Ctx: ' + (wl.contextPct||'p95').toUpperCase() + ' (' + ctxMult + 'x) → output=' + outputTok + ' tok'
      + ' | Step 2: Peak RPS = DAU × req/day(' + (wl.reqPerDay||12) + ') ÷ 86400 × peakMult(' + (wl.peakMult||3) + ') = ' + peakRPS + ' req/s'
      + ' | Step 3: GPU=' + (GPU_LABELS[gpuId]||gpuId) + ' → ' + tokPerGpu + ' tok/s ÷ ' + outputTok + ' tok/req = ' + reqPerGpu + ' req/s/GPU'
      + ' | Step 4: Base GPUs = ceil(' + peakRPS + ' ÷ ' + reqPerGpu + ') = ' + baseGpus
      + ' | Step 5: +Buffers (HA=' + haFactor + 'x DR=' + drFactor + 'x × 30%) = ' + buffers + ' → Total = ' + total
  }
}
function sizeMaasWorkload(wl) {
  var gpuId = wl.gpu || M.defaultGpu
  if (window.SizingEngine && SizingEngine.ready) {
    var r = SizingEngine.sizeMaaS({
      model_id: wl.model, dau: wl.dau, precision: (wl.precision||'int4').toUpperCase(),
      pool_type: wl.poolType, commercial_sla: wl.commercialSla
    }, gpuId)
    if (r && !r.error) {
      return {
        gpu: gpuId, throughput: r.peak_rps ? Math.round(r.peak_rps * (wl.outputTok||500)) : 0,
        instances: r.instances || 1, baseGpus: r.base_gpus, buffers: r.total_gpus - r.base_gpus,
        total: r.total_gpus, powerKw: r.power_kw,
        racks: r.total_gpus <= 72 ? '1 rack' : Math.ceil(r.total_gpus/72) + ' racks',
        cpst: '0.0021', commercialSla: r.commercial_sla, notes: r.notes
      }
    }
  }
  // REFACTOR-MARKER: fallback placeholder — see sizeUCWorkload note above
  var avgRPS = wl.dau / 86400 * 8
  var throughput = Math.round(avgRPS * 4000)
  var instances = Math.max(1, Math.ceil(throughput / 32000))
  var modelSize = (wl.model||'').includes('405b') || (wl.model||'').includes('large') ? 'advanced'
    : (wl.model||'').includes('70b') || (wl.model||'').includes('32b') ? 'mid' : 'basic'
  var baseGpus = instances * (modelSize === 'advanced' ? 8 : modelSize === 'mid' ? 4 : 2)
  var buffers = Math.ceil(baseGpus * 0.5)
  var total = baseGpus + buffers
  var powerKw = Math.round(total * 0.85 * 10) / 10
  return { gpu: gpuId, throughput: throughput, instances: instances, baseGpus: baseGpus,
    buffers: buffers, total: total, powerKw: powerKw, racks: total<=72?'1 rack':Math.ceil(total/72)+' racks', cpst: '0.0021' }
}

  renderPortItem: function(item, sel, reasons) {
    reasons = reasons || {}
    var isSelected = sel.includes(item.code)
    var isAuto     = !!(reasons[item.code] && reasons[item.code].length)
    var rules      = GRAPH[item.code] || {}
    var reqs       = (rules.requires||[]).join(', ')
    return '<div class="portfolio-item' + (isSelected?' selected':'') + '" id="pi-' + item.code + '" onclick="C.togglePort(\'' + item.code + '\')">'
      + '<div class="portfolio-item-ck"></div>'
      + '<div><div class="portfolio-item-name">' + atlasDB.esc(item.name)
      + (isAuto && isSelected ? ' <span class="auto-tag" style="font-size:9px;color:var(--teal);font-weight:600" title="Auto for: ' + (reasons[item.code]||[]).join(', ') + '">[auto]</span>' : '')
      + '</div>'
      + '<div style="font-size:10px;color:var(--mid)">' + item.code + (reqs ? ' · requires: ' + reqs : '') + '</div></div>'
      + '</div>'
  },

  toggleBlock: function(key) {
    var el  = document.getElementById('block-' + key)
    var arr = document.getElementById('block-arr-' + key)
    if (!el) return
    el.classList.toggle('open')
    if (arr) arr.textContent = el.classList.contains('open') ? '▲' : '▼'

  renderUCTab: function() {

    var html = '<div class="tablewrap"><table class="wl"><thead><tr>'
      + '<th>Use Case</th><th>Domain</th><th>Tenant</th><th class="num">DAU</th><th>GPU</th><th class="num">GPUs</th>'

      h += '</div>'
    }

    h += '<div class="formgrid">'
    h += '<div class="fg"><label>Deployment Mode</label><div class="radiorow">'
    h += '<label class="radio-opt"><input type="radio" name="dm-'+wl.id+'" '+(wl.deployMode==='production'?'checked':'')+' onchange="C.updUC(\''+wl.id+'\',\'deployMode\',\'production\')"> Production (on-prem)</label>'
    h += '<label class="radio-opt"><input type="radio" name="dm-'+wl.id+'" '+(wl.deployMode==='pilot'?'checked':'')+' onchange="C.updUC(\''+wl.id+'\',\'deployMode\',\'pilot\')"> Pilot/Validation (API)</label>'
    h += '</div></div>'

    h += '<div class="fg"><label>HA / Failover</label><select onchange="C.updUC(\''+wl.id+'\',\'haTier\',this.value)">'
    Object.keys(HA_TIERS).forEach(function(k){ h += '<option value="'+k+'"'+(wl.haTier===k?' selected':'')+'>'+HA_TIERS[k]+'</option>' })
    h += '</select></div>'

    h += '</select></div>'

    h += '</div>'

    h += '<div class="fg"><label>Context Percentile</label><div style="display:flex;gap:0;border:1.5px solid var(--border);border-radius:5px;overflow:hidden">'

// ═══════════════════════════════════════════════════════════════════════
// CONTROLLER — orchestrates. Reads M, calls utilities, writes M, calls V.
// REFACTOR-MARKER: when C is wired, replace DUMMY lookups with atlasDB calls
// ═══════════════════════════════════════════════════════════════════════

var C = {

  openEngagement: async function(id) {
    var eng = M.engagements.find(function(e){ return e.id === id })
    if (!eng) return
    M.currentEng      = eng
    M.currentDocketId = eng.docket_id
    M.activeTab       = 'customer'

    document.getElementById('docket-area').innerHTML = '<div class="loading"><span class="spinner"></span>Loading engagement...</div>'

    if (atlasDB.isConfigured() && eng.docket_id) {
      // ── REAL DATA MODE ────────────────────────────────────────────
      var docketItemsP    = atlasDB.getDocketItems(eng.docket_id)
      var requirementsP   = atlasDB.get('requirement_items', 'engagement_id=eq.' + eng.id + '&order=created_at.asc')
      var intelP          = atlasDB.get('intelligence_items', 'order=scraped_at.desc', 20)
      var intelRunP       = atlasDB.get('intel_runs', 'order=started_at.desc', 1)

      var results = await Promise.all([docketItemsP, requirementsP, intelP, intelRunP])
      var docketItems  = results[0] || []
      var requirements = results[1] || []
      var intelItems   = results[2] || []
      var intelRuns    = results[3] || []

      // Merge requirement_items into docketItems shape (so M.requirements getter works)
      var reqAsItems = requirements.map(function(r) {
        return {
          id: r.id, item_type: 'requirement', source: r.source, status: r.status,
          text: r.text, tags: r.tags || [], portfolio_links: r.portfolio_links || [],
          created_at: r.created_at
        }
      })

      // Map intelligence_items into docket-shaped intel items
      var intelAsItems = intelItems.slice(0, 5).map(function(i) {
        return {
          id: i.id, item_type: 'intel', title: i.title,
          content: { summary: i.summary, confidence_score: i.confidence_score || 0.8, scraped_at: i.scraped_at },
          created_at: i.scraped_at
        }
      })

      M.docketItems = docketItems.concat(reqAsItems).concat(intelAsItems)
      M.intelRun = intelRuns.length ? {
        lastRun: intelRuns[0].started_at, cost: intelRuns[0].cost_usd || 0,
        items: intelRuns[0].items_collected || 0, stale: 0, total: 10
      } : null
    } else {
      // ── FALLBACK: dummy data ─────────────────────────────────────
      M.docketItems = (DUMMY.items[eng.docket_id]||[]).map(function(i){
        return atlasDB.parseContent(Object.assign({},i))
      })
      M.intelRun = DUMMY.intelRun
    }

    // ── Solution tab state — engagement-scoped, reset on every open ──────
    // REFACTOR-MARKER: real mode currently reuses DUMMY workload seed data
    // since workload_configs/tenant_configs Supabase tables exist (per
    // Solution Builder Spec Section 6/10) but no atlasDB read is wired yet.
    // Wire this alongside other Controller wiring — see Spec Section 13.
    M.workloadConfigs = (DUMMY.workloadConfigs && DUMMY.workloadConfigs[eng.id])
      || { uc: [], maas: [], gpuaas: [], bmaas: [] }
    M.tenantsList = Object.assign({}, DEFAULT_TENANTS)
    M.openWlRows  = {}
    M.activeSolTab = 'uc'

    V.renderSidebar()
    V.renderDocket()
  },

  switchTab: function(tab) {
    M.activeTab = tab
    var body = document.getElementById('tab-body')
    if (body) body.innerHTML = V.renderTab(tab)
    // Sync active class on tab buttons
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("'" + tab + "'"))
    })
    // Solution tab has its own UC/MaaS/GPUaaS/BMaaS sub-tabs — render them
    // into the shell once the shell HTML above is actually in the DOM
    if (tab === 'solution' && M.portfolioItems.length) {
      V.renderSolTabs()
      V.renderSolTabBody()
    }
  },

  newEngagement: function(custId) {
    M.selectedArchetypes = []
    document.getElementById('eng-cust-id').value   = custId
    document.getElementById('eng-name').value       = ''
    document.getElementById('eng-territory').value  = ''
    V.openModal('modal-engagement')
    V.renderArchetypeSelector()
    setTimeout(function(){ document.getElementById('eng-name').focus() }, 100)
  },

  toggleArchetype: function(key) {
    var idx = M.selectedArchetypes.indexOf(key)
    if (idx >= 0) M.selectedArchetypes.splice(idx,1)
    else          M.selectedArchetypes.push(key)
    V.renderArchetypeSelector()
  },

  saveCustomer: async function() {
    var name = (document.getElementById('cust-name').value||'').trim()
    if (!name) { V.toast('Enter organisation name','error'); return }
    var cust = {
      id: atlasDB.genId('cust'), name: name,
      type: document.getElementById('cust-type').value,
      location: (document.getElementById('cust-location').value||'').trim(),
      contact:  (document.getElementById('cust-contact').value||'').trim(),

  // Portfolio
  togglePort: function(code) {
    if (!GRAPH[code]) return  // B2C and other auto-BOM items not selectable

    // Get or create portfolio selection
    var portItem = M.docketItems.find(function(i){ return i.item_subtype === 'portfolio_selection' })
    if (!portItem) {
      portItem = { id:atlasDB.genId('port'), item_type:'solution', item_subtype:'portfolio_selection', section:'output', status:'done', content:{ items:[], auto_reasons:{} } }
      M.docketItems.push(portItem)
    }
    if (!portItem.content.auto_reasons) portItem.content.auto_reasons = {}

    var items   = portItem.content.items
    var reasons = portItem.content.auto_reasons  // tracks why each auto-item was added
    var rules   = GRAPH[code] || {}
    var affected = [code]
    var idx = items.indexOf(code)

    if (idx >= 0) {
      // ── DESELECTING ──────────────────────────────────────────────────
      items.splice(idx, 1)
      delete reasons[code]

      // Remove auto-included items that were added because of THIS code
      // only if no other selected item still requires them
      ;(rules.requires||[]).forEach(function(req) {
        var stillNeeded = items.some(function(k) {
          return k !== code && (GRAPH[k] && (GRAPH[k].requires||[]).includes(req))
        })
        if (!stillNeeded && reasons[req] && reasons[req].includes(code)) {
          var ri = items.indexOf(req)
          if (ri >= 0) {
            items.splice(ri, 1)
            delete reasons[req]
            affected.push(req)
            V.toast(req + ' removed (was auto-included for ' + code + ')', 'info')
          }
        }
      })
    } else {
      // ── SELECTING ────────────────────────────────────────────────────
      items.push(code)

      // 1. Enforce ONE_OF (DC type group — pick one)
      ;(rules.one_of||[]).forEach(function(other) {
        var oi = items.indexOf(other)
        if (oi >= 0) {
          items.splice(oi, 1)
          delete reasons[other]
          affected.push(other)
          V.toast(other + ' removed — only one DC type allowed', 'warning')
        }
      })

      // 2. Auto-select REQUIRES chain (full cascade)
      function autoRequire(reqCode, becauseOf) {
        if (items.includes(reqCode)) return  // already present
        if (!GRAPH[reqCode]) return          // not a selectable item
        items.push(reqCode)
        reasons[reqCode] = reasons[reqCode] || []
        if (!reasons[reqCode].includes(becauseOf)) reasons[reqCode].push(becauseOf)
        affected.push(reqCode)
        V.toast(reqCode + ' auto-included — required by ' + becauseOf, 'info')
        // Cascade: also satisfy the new item's requirements
        ;(GRAPH[reqCode].requires||[]).forEach(function(r) { autoRequire(r, reqCode) })
      }
      ;(rules.requires||[]).forEach(function(req) { autoRequire(req, code) })

      // 3. If L5 item and no L3 orchestration selected → auto-add K8s default
      var isL5  = ['B5A','B5B','B5C','B5D','B5E','B5F','B5G','B5H','B5I'].includes(code)
      var hasL3 = ['B3A','B3B','B3C'].some(function(k){ return items.includes(k) })
      if (isL5 && !hasL3) {
        items.push(DEFAULT_ORCH)
        reasons[DEFAULT_ORCH] = reasons[DEFAULT_ORCH] || []
        reasons[DEFAULT_ORCH].push(code)
        affected.push(DEFAULT_ORCH)
        V.toast(DEFAULT_ORCH + ' auto-included — default orchestration for UC deployment', 'info')
      }

      // 4. If L5 item and no DC type selected → warn (don't auto-select — DC is a big decision)
      var hasL1 = ['B1A','B1B','B1C','B1D','B1E'].some(function(k){ return items.includes(k) })
      if (isL5 && !hasL1) {
        V.toast('Select a DC/Facility type (L1) to complete the stack', 'warning')
      }

      // 5. Suggestions — toast only, never auto-select
      ;(rules.suggests||[]).forEach(function(sug) {
        if (!items.includes(sug)) V.toast('Consider: ' + sug + ' (recommended with ' + code + ')', 'info')
      })
    }

    // Update UI for all affected items only — no full re-render
    affected.forEach(function(c) {
      var el = document.getElementById('pi-' + c)
      if (el) {
        var isSelected = items.includes(c)
        var isAuto     = !!(reasons && reasons[c] && reasons[c].length)
        el.classList.toggle('selected', isSelected)
        // Update auto label
        var nameEl = el.querySelector('.portfolio-item-name')
        if (nameEl && isAuto && isSelected) {
          if (!nameEl.querySelector('.auto-tag')) {
            var tag = document.createElement('span')
            tag.className = 'auto-tag'
            tag.style.cssText = 'font-size:9px;color:var(--teal);margin-left:6px;font-weight:600'
            tag.textContent = '[auto]'
            tag.title = 'Auto-included because: ' + reasons[c].join(', ')
            nameEl.appendChild(tag)
          }
        } else if (nameEl) {
          var existing = nameEl.querySelector('.auto-tag')
          if (existing) existing.remove()
        }
      }
    })
  },

  savePortfolio: async function() {
    var port  = M.docketItems.find(function(i){ return i.item_subtype === 'portfolio_selection' })
    var items = (port && port.content && port.content.items) ? port.content.items : []
    var hasGPU = items.includes('B2A') || items.includes('B2B')

    // ── BLOCK GATE VALIDATION ─────────────────────────────────────────
    // GPU (L2) is the anchor. OPERATE and SUSTAIN cannot exist without it.
    var hasOperate = items.includes('O01')
    var hasSustain = ['S01','S02','S03','S04','S05'].some(function(s){ return items.includes(s) })
    var hasBuildNonGPU = items.some(function(i){
      return ['B1A','B1B','B1C','B1D','B1E','B1F',
              'B3A','B3B','B3C','B3D','B3E','B3F','B3G',
              'B4A','B4B','B4C',
              'B5A','B5B','B5C','B5D','B5E','B5F','B5G','B5H','B5I',
              'B6A','B6B','B6C','B6D',
              'B7A','B7B','B7C'].includes(i)
    })

    var errors = []
    if ((hasOperate || hasSustain) && !hasGPU) {
      errors.push('OPERATE / SUSTAIN selected but no GPU hardware (B2A/B2B). What are we operating? Add GPU compute first.')
    }
    if (hasBuildNonGPU && !hasGPU) {
      // This shouldn't happen with cascade rules — safety net
      errors.push('BUILD items selected without GPU hardware. GPU (B2A/B2B) is the anchor of the BUILD stack.')
    }

    if (errors.length) {
      errors.forEach(function(e){ V.toast('⚠ ' + e, 'error') })
      var el = document.getElementById('port-save-status')
      if (el) { el.textContent = '✗ Fix errors first'; el.className = 'save-status unsaved' }
      return
    }

    // ── WARN if GPU selected but no DC type ───────────────────────────
    var hasL1 = ['B1A','B1B','B1C','B1D','B1E','B1F'].some(function(k){ return items.includes(k) })
    if (hasGPU && !hasL1) {
      V.toast('Note: GPU hardware selected but no DC/Facility type chosen. Where will the hardware live?', 'warning')
    }

    var count = items.length
    var el = document.getElementById('port-save-status')
    if (el) { el.textContent = 'Saving...'; el.className = 'save-status' }

    if (atlasDB.isConfigured() && M.currentDocketId && port) {
      var result = await atlasDB.savePortfolioSelection(M.currentDocketId, port.id, items, M.currentEng.id)
      if (result.ok) {
        if (el) { el.textContent = '✓ Saved · ' + count + ' items'; el.className = 'save-status saved' }
        V.toast('Portfolio saved · ' + count + ' items')
      } else {
        if (el) { el.textContent = '✗ Save failed'; el.className = 'save-status unsaved' }
        V.toast('Save failed — ' + (result.error||'unknown'), 'error')
      }
    } else {
      if (el) { el.textContent = '✓ Saved · ' + count + ' items'; el.className = 'save-status saved' }
      V.toast('Portfolio saved · ' + count + ' items')
    }
  },

  // atlasDB.init() is called automatically by atlas-db.js on load
  V.renderSidebar()  // show loading state first
  document.getElementById('sb-body').innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>'

  if (atlasDB.isConfigured()) {
    // ── REAL DATA MODE ──────────────────────────────────────────────
    M.customers   = await atlasDB.get('customers', 'order=name.asc')
    M.engagements = await atlasDB.get('engagements', 'order=name.asc')
    if (!M.customers.length && !M.engagements.length) {
      // Empty DB — fall back to dummy for demo purposes
      loadDummy()
      V.toast('No data in Supabase yet — showing demo data', 'info')
    }
  } else {
    // ── NO SUPABASE CONFIGURED — use dummy data ────────────────────
    loadDummy()
    V.toast('Supabase not configured — showing demo data', 'warning')
  }

  // Show data source mode
  var badge = document.getElementById('data-mode-badge')
  if (badge) {
    if (atlasDB.isConfigured()) {
      badge.textContent = '● Live Supabase'
      badge.style.cssText = 'display:inline-block;background:rgba(0,178,144,.2);color:#00B290'
    } else {
      badge.textContent = '● Demo data'
      badge.style.cssText = 'display:inline-block;background:rgba(255,182,0,.2);color:#FFB600'
    }
  }

  V.renderSidebar()

  // Open first engagement if any exist
  if (M.engagements.length) {
    await C.openEngagement(M.engagements[0].id)
  } else {
    document.getElementById('docket-area').innerHTML =
      '<div class="empty-state" style="padding-top:80px">'
      + '<div class="empty-icon">📋</div>'
      + '<div class="empty-title">No engagements yet</div>'
      + '<div class="empty-desc">Create a customer and engagement to get started.</div></div>'
  }
}
</script>
</body>
</html>
